/* === User requested refinement: premium mobile nav, gold Arabic, working saved/favorites === */

html.dark-mode{--arabic:var(--gold2);}

.label.when-label{color:var(--gold2)!important;}
.card-action.is-active,.action.is-active{background:linear-gradient(135deg,#2d7a46,#4caf6a)!important;color:#fff!important;border-color:rgba(45,122,70,.42)!important;box-shadow:0 10px 24px rgba(45,122,70,.22)!important;}

/* === v6: clean sticky layer toggles, no decorative boxes === */
.layer-controls{
  position:sticky;
  top:0;
  z-index:3000;
  max-width:820px;
  margin:0 auto 18px;
  padding:10px 6px 12px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  border:0!important;
  border-radius:0!important;
  box-shadow:none!important;
  background:linear-gradient(180deg,rgba(18,30,36,.98),rgba(18,30,36,.92));
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}
.layer-toggle{
  position:relative;
  min-height:0;
  border:0!important;
  border-radius:0!important;
  background:transparent!important;
  box-shadow:none!important;
  color:var(--gold2);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  padding:0;
  font-size:13px;
  font-weight:750;
  cursor:pointer;
  user-select:none;
  letter-spacing:.01em;
}
.layer-toggle:hover{transform:none!important;border-color:transparent!important;box-shadow:none!important}
.layer-toggle input{position:absolute;opacity:0;pointer-events:none}
.toggle-mark{
  width:18px;
  height:18px;
  border-radius:5px;
  border:1.5px solid rgba(215,181,109,.66);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:transparent;
  box-shadow:none;
  flex:0 0 auto;
}
.toggle-mark::after{
  content:"";
  width:9px;
  height:5px;
  border-left:2px solid #fff;
  border-bottom:2px solid #fff;
  transform:rotate(-45deg) scale(.55);
  opacity:0;
  transition:.14s ease;
}
.layer-toggle:has(input:checked){
  color:#fff;
  background:transparent!important;
  border-color:transparent!important;
  box-shadow:none!important;
}
.layer-toggle:has(input:checked) .toggle-mark{
  background:linear-gradient(135deg,#2d7a46,#4caf6a);
  border-color:rgba(255,255,255,.32);
}
.layer-toggle:has(input:checked) .toggle-mark::after{opacity:1;transform:rotate(-45deg) scale(1)}
html.light-mode .layer-controls{
  background:linear-gradient(180deg,rgba(255,254,249,.98),rgba(255,254,249,.92));
  box-shadow:none!important;
}
html.light-mode .layer-toggle{background:transparent!important;color:#8a681f}
html.light-mode .layer-toggle:has(input:checked){color:#17221c}
html.hide-arabic .ar{display:none!important}
html.hide-translit .translit{display:none!important}
html.hide-meaning .meaning{display:none!important}
.ar{font-size:21px!important;line-height:1.82!important;font-weight:400!important;color:var(--arabic)!important}
.translit{white-space:pre-line!important;overflow:visible!important;text-overflow:clip!important;display:block!important;line-height:1.75!important}
.reading-mode .ar{font-size:23px!important;line-height:1.9!important}
@media(max-width:720px){
  .layer-controls{
    top:0;
    width:calc(100% + 24px);

    margin-left:-12px;
    margin-right:-12px;

  .layer-toggle{font-size:12px;gap:6px}

}
@media(max-width:390px){
  .layer-controls{gap:8px;padding-left:7px;padding-right:7px}

}

    <button class="action" data-action="save" type="button" aria-label="Сохранить"><svg viewBox="0 0 24 24"><path d="M6 4.5A1.5 1.5 0 0 1 7.5 3h9A1.5 1.5 0 0 1 18 4.5V21l-6-3.5L6 21V4.5z"></path></svg><span class="action-label">Сохранить</span></button>

<script id="barakaway-bottom-nav-inline">
(function () {
  var FAVORITES_KEY = 'barakaway_favorites_v1';

  function detectLang() {
    var htmlLang = (document.documentElement.getAttribute('lang') || '').toLowerCase();
    var path = window.location.pathname.toLowerCase();
    var match = path.match(/(?:^|[-_\/])(ru|en|kz|kk|uz|tr|ur|ar|id|bn|hi)(?=\.|-|_|\/|$)/);

    if (match) return match[1] === 'kk' ? 'kz' : match[1];
    if (htmlLang.indexOf('kk') === 0) return 'kz';
    if (htmlLang.indexOf('ru') === 0) return 'ru';
    if (htmlLang.indexOf('en') === 0) return 'en';
    if (htmlLang.indexOf('uz') === 0) return 'uz';
    if (htmlLang.indexOf('tr') === 0) return 'tr';
    if (htmlLang.indexOf('ur') === 0) return 'ur';
    if (htmlLang.indexOf('ar') === 0) return 'ar';
    if (htmlLang.indexOf('id') === 0) return 'id';
    if (htmlLang.indexOf('bn') === 0) return 'bn';
    if (htmlLang.indexOf('hi') === 0) return 'hi';

    return 'ru';
  }

  var lang = detectLang();

  var labels = {
    ru: { today:'Сегодня', favorites:'Избранное', quran:'Коран', holidays:'Праздники', learning:'Обучение' },
    en: { today:'Today', favorites:'Favorites', quran:'Quran', holidays:'Holidays', learning:'Learning' },
    kz: { today:'Бүгін', favorites:'Таңдаулы', quran:'Құран', holidays:'Мерекелер', learning:'Оқу' },
    uz: { today:'Bugun', favorites:'Sevimli', quran:'Qurʼon', holidays:'Bayramlar', learning:'O‘rganish' },
    tr: { today:'Bugün', favorites:'Favoriler', quran:'Kur’an', holidays:'Bayramlar', learning:'Öğrenme' },
    ar: { today:'اليوم', favorites:'المفضلة', quran:'القرآن', holidays:'الأعياد', learning:'التعلّم' },
    ur: { today:'آج', favorites:'پسندیدہ', quran:'قرآن', holidays:'اعیاد', learning:'تعلیم' },
    id: { today:'Hari ini', favorites:'Favorit', quran:'Quran', holidays:'Hari raya', learning:'Belajar' },
    bn: { today:'আজ', favorites:'প্রিয়', quran:'কুরআন', holidays:'উৎসব', learning:'শিক্ষা' },
    hi: { today:'आज', favorites:'पसंदीदा', quran:'क़ुरआन', holidays:'त्योहार', learning:'सीखना' }
  };

  var L = labels[lang] || labels.ru;

  function file(base) {
    return '/' + base + '-' + lang + '.html';
  }

  function readFavorites() {
    try {
      var raw = localStorage.getItem(FAVORITES_KEY);
      var list = raw ? JSON.parse(raw) : [];
      return Array.isArray(list) ? list.filter(Boolean) : [];
    } catch (e) {
      return [];
    }
  }

  function saveFavorites(list) {
    localStorage.setItem(FAVORITES_KEY, JSON.stringify(Array.isArray(list) ? list : []));
    updateNavHeart();
  }

  function hasFavorites() {
    return readFavorites().length > 0;
  }

  function buildId(data) {
    return (data.url || '') + '::' + (data.title || '');
  }

  window.BarakaWayFavorites = {
    list: readFavorites,
    hasAny: hasFavorites,

    isActive: function (id) {
      return readFavorites().some(function (x) {
        return String(x.id) === String(id);
      });
    },

    toggle: function (data) {
      var id = buildId(data);
      var list = readFavorites();

      var exists = list.some(function (x) {
        return String(x.id) === String(id);
      });

      if (exists) {
        list = list.filter(function (x) {
          return String(x.id) !== String(id);
        });
        saveFavorites(list);
        return false;
      }

      list.unshift({
        id: id,
        title: data.title || document.title,
        url: data.url || window.location.pathname,
        text: data.text || '',
        type: data.type || '',
        addedAt: new Date().toISOString()
      });

      saveFavorites(list);
      return true;
    },

    open: function () {
      window.location.href = file('favorites');
    },

    refreshNav: function () {
      updateNavHeart();
    }
  };

  function iconToday() {
    return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7.5h16"/><path d="M8 3.5v4"/><path d="M16 3.5v4"/><rect x="4" y="5.5" width="16" height="15" rx="3"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M8 16h.01"/><path d="M12 16h.01"/></svg>';
  }

  function iconHeart() {
    return '<svg class="bottom-nav-heart-svg" viewBox="0 0 24 24" aria-hidden="true"><path class="bottom-nav-heart-path" d="M12 20s-7-4.35-7-10.15A4.15 4.15 0 0 1 12 6.9a4.15 4.15 0 0 1 7 2.95C19 15.65 12 20 12 20Z"/></svg>';
  }

  function iconQuran() {
    return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5.5 4.5h5.2c1.1 0 1.8.7 1.8 1.8v13.2c0-1-.8-1.7-1.8-1.7H5.5A1.5 1.5 0 0 1 4 16.3V6a1.5 1.5 0 0 1 1.5-1.5Z"/><path d="M18.5 4.5h-5.2c-1.1 0-1.8.7-1.8 1.8v13.2c0-1 .8-1.7 1.8-1.7h5.2A1.5 1.5 0 0 0 20 16.3V6a1.5 1.5 0 0 0-1.5-1.5Z"/><path d="M8 8.5h2"/><path d="M14 8.5h2"/></svg>';
  }

  function iconHolidays() {
    return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.5l2.15 4.35 4.8.7-3.48 3.38.82 4.78L12 14.45 7.71 16.71l.82-4.78L5.05 8.55l4.8-.7L12 3.5Z"/><path d="M4.5 20.5h15"/></svg>';
  }

  function iconLearning() {
    return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.5 6.5A2.5 2.5 0 0 1 7 4h10a2.5 2.5 0 0 1 2.5 2.5v11A2.5 2.5 0 0 1 17 20H7a2.5 2.5 0 0 1-2.5-2.5v-11Z"/><path d="M9 8h6"/><path d="M9 12h6"/><path d="M9 16h3"/></svg>';
  }

  var navItems = [
    { key:'today', label:L.today, href:file('home'), icon:iconToday },
    { key:'favorites', label:L.favorites, href:file('favorites'), icon:iconHeart },
    { key:'quran', label:L.quran, href:file('quran'), icon:iconQuran },
    { key:'holidays', label:L.holidays, href:file('holidays'), icon:iconHolidays },
    { key:'learning', label:L.learning, href:file('learning'), icon:iconLearning }
  ];

function activeKey() {
  var p = decodeURIComponent(window.location.pathname || '').toLowerCase();
  var fileName = p.split('/').pop() || '';
  var title = (document.title || '').toLowerCase();
  var h1 = ((document.querySelector('h1') || {}).textContent || '').toLowerCase();
  var bodyClass = (document.body.className || '').toLowerCase();
  var pageText = p + ' ' + fileName + ' ' + title + ' ' + h1 + ' ' + bodyClass;

  if (
    fileName.indexOf('favorites-') === 0 ||
    fileName.indexOf('favorite-') === 0 ||
    pageText.indexOf('favorites') !== -1 ||
    pageText.indexOf('favorite') !== -1 ||
    pageText.indexOf('favourites') !== -1 ||
    pageText.indexOf('favourite') !== -1 ||
    pageText.indexOf('избран') !== -1
  ) return 'favorites';

  if (
    fileName.indexOf('quran-') === 0 ||
    pageText.indexOf('quran') !== -1 ||
    pageText.indexOf('surah') !== -1 ||
    pageText.indexOf('коран') !== -1
  ) return 'quran';

  if (
    fileName.indexOf('holidays-') === 0 ||
    pageText.indexOf('holiday') !== -1 ||
    pageText.indexOf('holidays') !== -1 ||
    pageText.indexOf('eid') !== -1 ||
    pageText.indexOf('ramadan') !== -1 ||
    pageText.indexOf('calendar') !== -1 ||
    pageText.indexOf('празд') !== -1
  ) return 'holidays';

  if (
    fileName.indexOf('learning-') === 0 ||
    pageText.indexOf('learning') !== -1 ||
    pageText.indexOf('learn') !== -1 ||
    pageText.indexOf('education') !== -1 ||
    pageText.indexOf('video') !== -1 ||
    pageText.indexOf('обуч') !== -1
  ) return 'learning';

  if (
    fileName.indexOf('home-') === 0 ||
    fileName.indexOf('index') === 0 ||
    pageText.indexOf('home') !== -1 ||
    pageText.indexOf('сегодня') !== -1 ||
    p === '/' ||
    p === ''
  ) return 'today';

  return '';
}

  function injectNavStyle() {
    var old = document.getElementById('barakaway-bottom-nav-final-style');
    if (old) old.remove();

    var style = document.createElement('style');
    style.id = 'barakaway-bottom-nav-final-style';

    style.textContent =
      '.bottom-app-nav{' +
        'z-index:3100 !important;' +
      '}' +

      '.bottom-app-nav-inner{' +
        'display:grid !important;' +
        'grid-template-columns:repeat(5,minmax(0,1fr)) !important;' +
        'align-items:center !important;' +
        'justify-items:center !important;' +
      '}' +

      '.bottom-app-nav-item{' +
        'box-sizing:border-box !important;' +
        'display:flex !important;' +
        'flex-direction:column !important;' +
        'align-items:center !important;' +
        'justify-content:center !important;' +
        'text-align:center !important;' +
        'gap:4px !important;' +
        'height:60px !important;' +
        'min-width:0 !important;' +
        'width:100% !important;' +
        'max-width:108px !important;' +
        'padding:7px 3px 6px !important;' +
        'border-radius:24px !important;' +
        'line-height:1 !important;' +
        'overflow:visible !important;' +
      '}' +

      '.bottom-app-nav-item.active{' +
        'width:100% !important;' +
        'max-width:108px !important;' +
        'min-height:60px !important;' +
        'border-radius:24px !important;' +
        'padding:7px 5px 6px !important;' +
        'overflow:visible !important;' +
      '}' +

      '.bottom-app-nav-icon{' +
        'box-sizing:border-box !important;' +
        'display:flex !important;' +
        'align-items:center !important;' +
        'justify-content:center !important;' +
        'width:26px !important;' +
        'height:26px !important;' +
        'min-width:26px !important;' +
        'min-height:26px !important;' +
        'margin:0 auto !important;' +
        'padding:0 !important;' +
        'flex:0 0 26px !important;' +
        'position:static !important;' +
        'transform:none !important;' +
      '}' +

      '.bottom-app-nav-icon svg{' +
        'display:block !important;' +
        'width:22px !important;' +
        'height:22px !important;' +
        'margin:0 auto !important;' +
        'position:static !important;' +
        'transform:none !important;' +
        'fill:none !important;' +
        'stroke:currentColor !important;' +
        'stroke-width:2 !important;' +
      '}' +

      '.bottom-app-nav-item.active .bottom-app-nav-icon,' +
      '.bottom-app-nav-item.active .bottom-app-nav-icon svg{' +
        'position:static !important;' +
        'transform:none !important;' +
      '}' +

      '.bottom-app-nav-item.active .bottom-app-nav-icon svg{' +
        'stroke-width:2.15 !important;' +
      '}' +

      '.bottom-app-nav-label{' +
        'box-sizing:border-box !important;' +
        'display:block !important;' +
        'width:100% !important;' +
        'max-width:100% !important;' +
        'text-align:center !important;' +
        'margin:0 auto !important;' +
        'padding:0 !important;' +
        'font-size:11px !important;' +
        'line-height:1.05 !important;' +
        'white-space:nowrap !important;' +
        'overflow:visible !important;' +
        'text-overflow:clip !important;' +
      '}' +

      '@media(max-width:420px){' +
        '.bottom-app-nav-item{' +
          'max-width:96px !important;' +
          'height:58px !important;' +
          'min-height:58px !important;' +
          'gap:3px !important;' +
          'padding:7px 2px 6px !important;' +
        '}' +
        '.bottom-app-nav-item.active{' +
          'max-width:96px !important;' +
          'min-height:58px !important;' +
          'padding:7px 3px 6px !important;' +
        '}' +
        '.bottom-app-nav-label{' +
          'font-size:10.5px !important;' +
        '}' +
        '.bottom-app-nav-icon{' +
          'width:25px !important;' +
          'height:25px !important;' +
          'min-width:25px !important;' +
          'min-height:25px !important;' +
          'flex-basis:25px !important;' +
        '}' +
        '.bottom-app-nav-icon svg{' +
          'width:21px !important;' +
          'height:21px !important;' +
        '}' +
      '}' +

      '.bottom-app-nav-item[data-nav="favorites"] .bottom-app-nav-icon svg,' +
      '.bottom-app-nav-item[data-nav="favorites"] .bottom-app-nav-icon svg path{' +
        'stroke:#d7c07a !important;' +
        'color:#d7c07a !important;' +
      '}' +

      '.bottom-app-nav-item[data-nav="favorites"] .bottom-app-nav-icon svg path{' +
        'fill:transparent !important;' +
      '}' +

      '.bottom-app-nav-item[data-nav="favorites"].has-favorites .bottom-app-nav-icon svg path{' +
        'fill:#d7c07a !important;' +
        'stroke:#d7c07a !important;' +
      '}' +

      '.bottom-app-nav-item[data-nav="favorites"].active,' +
'.bottom-app-nav-item[data-nav="favorites"].is-active{' +
  'background:linear-gradient(135deg,rgba(215,192,122,.20),rgba(58,130,82,.24)) !important;' +
  'border:1px solid rgba(215,192,122,.45) !important;' +
  'box-shadow:inset 0 0 0 1px rgba(255,255,255,.04),0 10px 24px rgba(0,0,0,.22) !important;' +
'}' +

'.bottom-app-nav-item[data-nav="favorites"] .bottom-app-nav-label{' +
  'color:inherit !important;' +
'}';

    document.head.appendChild(style);
  }

  function updateNavHeart() {
    var item = document.querySelector('.bottom-app-nav-item[data-nav="favorites"]');
    if (!item) return;

    if (hasFavorites()) {
      item.classList.add('has-favorites');
      item.setAttribute('data-favorites-state', 'filled');
    } else {
      item.classList.remove('has-favorites');
      item.setAttribute('data-favorites-state', 'empty');
    }
  }

  function renderBottomNav() {
    injectNavStyle();

    document.querySelectorAll('.bottom-app-nav').forEach(function (nav) {
      nav.remove();
    });

    var active = activeKey();

    var nav = document.createElement('nav');
    nav.className = 'bottom-app-nav';
    nav.setAttribute('aria-label', 'BarakaWay navigation');

    var inner = document.createElement('div');
    inner.className = 'bottom-app-nav-inner';

    navItems.forEach(function (item) {
      var a = document.createElement('a');
      a.className = 'bottom-app-nav-item' + (item.key === active ? ' active is-active' : '');
      a.href = item.href;
      a.dataset.nav = item.key;
      a.setAttribute('aria-label', item.label);

      if (item.key === active) {
        a.setAttribute('aria-current', 'page');
      }

      a.innerHTML =
        '<span class="bottom-app-nav-icon">' + item.icon() + '</span>' +
        '<span class="bottom-app-nav-label">' + item.label + '</span>';

      a.addEventListener('click', function () {
        document.querySelectorAll('.bottom-app-nav-item').forEach(function (el) {
          el.classList.remove('active', 'is-active');
          el.removeAttribute('aria-current');
        });

        a.classList.add('active');
        a.setAttribute('aria-current', 'page');
      });

      inner.appendChild(a);
    });

    nav.appendChild(inner);
    document.body.appendChild(nav);

    updateNavHeart();
  }

  function extractData(btn) {
    if (btn.dataset.surahName) {
      return {
        title: btn.dataset.surahName,
        url: btn.dataset.surahHref,
        text: btn.dataset.surahMeta,
        type: 'Сура'
      };
    }

    return {
      title: btn.dataset.title || document.title,
      url: btn.dataset.url || window.location.pathname,
      text: btn.dataset.text || '',
      type: btn.dataset.type || ''
    };
  }

  function updateButton(btn, active) {
    if (active) {
      btn.classList.add('is-active');
      btn.setAttribute('aria-pressed', 'true');
    } else {
      btn.classList.remove('is-active');
      btn.setAttribute('aria-pressed', 'false');
    }
  }

  function initFavoritesButtons() {
    document.querySelectorAll('[data-surah-action="favorite"], [data-surah-action="save"]').forEach(function (btn) {
      var data = extractData(btn);
      var id = buildId(data);

      updateButton(btn, window.BarakaWayFavorites.isActive(id));

      btn.addEventListener('click', function (e) {
        e.preventDefault();
        e.stopPropagation();

        var result = window.BarakaWayFavorites.toggle(data);

        updateButton(btn, result);
        updateNavHeart();
      });
    });
  }

  function boot() {
    renderBottomNav();
    initFavoritesButtons();

    window.addEventListener('storage', updateNavHeart);
    document.addEventListener('barakaway:favorites:changed', updateNavHeart);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
<script>
const DATA = {"categories":[["all","Все"],["morning","Утро"],["evening","Вечер"],["after_prayer","После намаза"],["before_sleep","Перед сном"],["general","Общие"]],"intros":{"all":"Полный практический набор ежедневных азкаров.","morning":"Утренние азкары: всё, что читается утром. Лучшее время — после Фаджра и до восхода солнца.","evening":"Вечерние азкары: всё, что читается вечером. Лучшее время — после Асра и до Магриба.","after_prayer":"Желательно читать сразу после обязательных намазов.","before_sleep":"Желательно читать перед сном.","general":"Универсальные азкары и зикры, которые можно повторять в течение дня."},"items":[{"id":"01_hamd_salawat","n":"1/25","title":"Хвала Аллаху и салават Пророку ﷺ","cats":["morning","evening"],"rep":"1 раз","ref":"Утром и вечером","ar":"الْحَمْدُ لِلَّهِ وَحْدَهُ، وَالصَّلَاةُ وَالسَّلَامُ عَلَى مَنْ لَا نَبِيَّ بَعْدَهُ","tr":"Аль-хамду ли-Лляхи вахда-ху, ва-с-саляту ва-с-саляму ‘аля ман ля набийя ба‘да-ху.","meaning":"Хвала одному лишь Аллаху, благословение и мир тому, после кого уже не будет другого пророка.","when":"Читать утром и вечером в начале азкаров."},{"id":"02_ayat_kursi","n":"2/25","title":"Аят аль-Курси","cats":["morning","evening","after_prayer","before_sleep"],"rep":"1 раз","ref":"Коран 2:255","ar":"اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَنْ ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ","tr":"Аллаху ля иляха илля Хува-ль-Хайю-ль-Кайюм. Ля та’хузуху синатун ва ля наум. Ля-ху ма фи-с-самавати ва ма фи-ль-ард. Ман за-ллязи яшфа‘у ‘инда-ху илля би-изни-хи. Я‘ляму ма байна айдихим ва ма хальфахум, ва ля юхитуна би-шай’ин мин ‘ильми-хи илля би-ма ша’. Васи‘а курсийю-ху-с-самавати ва-ль-ард, ва ля я’уду-ху хифзу-хума, ва Хува-ль-‘Алийю-ль-‘Азым.","meaning":"Аллах — нет божества, кроме Него, Живого, Вседержителя. Им не овладевают ни дремота, ни сон. Ему принадлежит то, что на небесах, и то, что на земле. Его Престол объемлет небеса и землю, и не тяготит Его оберегание их. Он — Возвышенный, Великий.","when":"Читать утром, вечером, после обязательных намазов и перед сном."},{"id":"03_ikhlas_falaq_nas","n":"3/25","title":"Аль-Ихляс, Аль-Фаляк, Ан-Нас","cats":["morning","evening","before_sleep"],"rep":"3 раза","ref":"Коран 112, 113, 114","ar":"بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ\nقُلْ هُوَ ٱللَّهُ أَحَدٌ ۝ ٱللَّهُ ٱلصَّمَدُ ۝ لَمْ يَلِدْ وَلَمْ يُولَدْ ۝ وَلَمْ يَكُن لَّهُۥ كُفُوًا أَحَدٌ\n\nبِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ\nقُلْ أَعُوذُ بِرَبِّ ٱلْفَلَقِ ۝ مِن شَرِّ مَا خَلَقَ ۝ وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ ۝ وَمِن شَرِّ ٱلنَّفَّٰثَٰتِ فِى ٱلْعُقَدِ ۝ وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ\n\nبِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ\nقُلْ أَعُوذُ بِرَبِّ ٱلنَّاسِ ۝ مَلِكِ ٱلنَّاسِ ۝ إِلَٰهِ ٱلنَّاسِ ۝ مِن شَرِّ ٱلْوَسْوَاسِ ٱلْخَنَّاسِ ۝ ٱلَّذِى يُوَسْوِسُ فِى صُدُورِ ٱلنَّاسِ ۝ مِنَ ٱلْجِنَّةِ وَٱلنَّاسِ","tr":"Бисми-Лляхи-р-Рахмани-р-Рахим. Куль хува-Ллаху ахад. Аллаху-с-Самад. Лям ялид ва лям юляд. Ва лям якул-ля-ху куфуван ахад.\n\nБисми-Лляхи-р-Рахмани-р-Рахим. Куль а‘узу би-Рабби-ль-фаляк. Мин шарри ма халяк. Ва мин шарри гасикин иза вакаб. Ва мин шарри-н-наффасати фи-ль-‘укад. Ва мин шарри хасидин иза хасад.\n\nБисми-Лляхи-р-Рахмани-р-Рахим. Куль а‘узу би-Рабби-н-нас. Малики-н-нас. Иляхи-н-нас. Мин шарри-ль-васваси-ль-ханнас. Аллязи ювасвису фи судури-н-нас. Мина-ль-джиннати ва-н-нас.","meaning":"Три последние суры Корана: очищение веры, защита от зла сотворённого, от зависти, наущений джиннов и людей.","when":"Желательно читать по 3 раза утром и вечером. Этого достаточно для защиты от всего дурного."},{"id":"04_asbahna_morning","n":"4/25","title":"Мы дожили до утра","cats":["morning"],"rep":"1 раз","ref":"Утро","ar":"أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ، رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ وَسُوءِ الْكِبَرِ، رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ","tr":"Асбахна ва асбаха-ль-мульку ли-Ллях, ва-ль-хамду ли-Ллях. Ля иляха илля-Ллаху вахда-ху ля шарика ля-ху, ля-ху-ль-мульку ва ля-ху-ль-хамду, ва Хува ‘аля кулли шай’ин кадир. Рабби, ас’алука хайра ма фи хаза-ль-йауми ва хайра ма ба‘да-ху, ва а‘узу би-ка мин шарри ма фи хаза-ль-йауми ва шарри ма ба‘да-ху. Рабби, а‘узу би-ка мина-ль-касали ва су’и-ль-кибар. Рабби, а‘узу би-ка мин ‘азабин фи-н-нари ва ‘азабин фи-ль-кабр.","meaning":"Мы дожили до утра, и утром власть принадлежит Аллаху. Нет бога, кроме одного лишь Аллаха. Господь мой, прошу Тебя о благе этого дня и прибегаю к Твоей защите от зла этого дня, от лени, старости, мучений в Огне и мучений в могиле.","when":"Читать утром."},{"id":"04_amsayna_evening","n":"4/25","title":"Мы дожили до вечера","cats":["evening"],"rep":"1 раз","ref":"Вечер","ar":"أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذِهِ اللَّيْلَةِ وَخَيْرَ مَا بَعْدَهَا، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذِهِ اللَّيْلَةِ وَشَرِّ مَا بَعْدَهَا، رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ وَسُوءِ الْكِبَرِ، رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ","tr":"Амсайна ва амса-ль-мульку ли-Ллях, ва-ль-хамду ли-Ллях. Ля иляха илля-Ллаху вахда-ху ля шарика ля-ху, ля-ху-ль-мульку ва ля-ху-ль-хамду, ва Хува ‘аля кулли шай’ин кадир. Рабби, ас’алука хайра ма фи хазихи-л-ляйляти ва хайра ма ба‘да-ха, ва а‘узу би-ка мин шарри ма фи хазихи-л-ляйляти ва шарри ма ба‘да-ха. Рабби, а‘узу би-ка мина-ль-касали ва су’и-ль-кибар. Рабби, а‘узу би-ка мин ‘азабин фи-н-нари ва ‘азабин фи-ль-кабр.","meaning":"Мы дожили до вечера, и вечером власть принадлежит Аллаху. Господь мой, прошу Тебя о благе этой ночи и прибегаю к Твоей защите от её зла, от лени, старости, мучений в Огне и мучений в могиле.","when":"Читать вечером."},{"id":"05_bika_asbahna","n":"5/25","title":"Тобой мы дожили до утра / вечера","cats":["morning","evening"],"rep":"1 раз","ref":"Утро и вечер","ar":"اللَّهُمَّ بِكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ النُّشُورُ\n\nاللَّهُمَّ بِكَ أَمْسَيْنَا، وَبِكَ أَصْبَحْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ الْمَصِيرُ","tr":"Аллахумма би-ка асбахна, ва би-ка амсайна, ва би-ка нахйа, ва би-ка намуту, ва иляйка-н-нушур.\n\nАллахумма би-ка амсайна, ва би-ка асбахна, ва би-ка нахйа, ва би-ка намуту, ва иляйка-ль-масыр.","meaning":"О Аллах, по Твоей воле мы дожили до утра и до вечера, по Твоей воле мы живём и умираем, и к Тебе возвращение.","when":"Первая формула утром, вторая — вечером."},{"id":"06_sayyid_istighfar","n":"6/25","title":"Саййидуль-истигфар","cats":["morning","evening"],"rep":"1 раз","ref":"Утро и вечер","ar":"اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبِي، فَاغْفِرْ لِي، فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ","tr":"Аллахумма Анта Рабби, ля иляха илля Анта. Халяктани ва ана ‘абдука, ва ана ‘аля ‘ахдика ва ва‘дика ма-стата‘ту. А‘узу би-ка мин шарри ма сана‘ту. Абу’у ляка би-ни‘матика ‘алайя, ва абу’у би-занби. Фагфир ли, фа-инна-ху ля ягфиру-з-зунуба илля Анта.","meaning":"О Аллах, Ты — мой Господь, нет бога, кроме Тебя. Ты создал меня, а я — Твой раб. Я признаю Твою милость и признаю свой грех. Прости меня, ибо никто не прощает грехов, кроме Тебя.","when":"Читать утром и вечером."},{"id":"07_witness","n":"7/25","title":"Свидетельство утром и вечером","cats":["morning","evening"],"rep":"4 раза","ref":"Утро и вечер","ar":"اللَّهُمَّ إِنِّي أَصْبَحْتُ أُشْهِدُكَ، وَأُشْهِدُ حَمَلَةَ عَرْشِكَ، وَمَلَائِكَتَكَ، وَجَمِيعَ خَلْقِكَ، أَنَّكَ أَنْتَ اللَّهُ لَا إِلَهَ إِلَّا أَنْتَ وَحْدَكَ لَا شَرِيكَ لَكَ، وَأَنَّ مُحَمَّدًا عَبْدُكَ وَرَسُولُكَ","tr":"Аллахумма инни асбахту ушхидука, ва ушхиду хамалята ‘аршика, ва маляикатака, ва джами‘а халькика, аннака Анта-Ллаху ля иляха илля Анта вахдака ля шарика ляк, ва анна Мухаммадан ‘абдука ва расулюк.","meaning":"О Аллах, поистине, утром я призываю Тебя, тех, кто держит Твой Престол, Твоих ангелов и всё Твоё творение засвидетельствовать, что Ты — Аллах, нет бога, кроме Тебя, и что Мухаммад — Твой раб и посланник.","when":"Читать утром и вечером по 4 раза."},{"id":"08_blessing","n":"8/25","title":"Благодарность за милости","cats":["morning","evening"],"rep":"1 раз","ref":"Утро и вечер","ar":"اللَّهُمَّ مَا أَصْبَحَ بِي مِنْ نِعْمَةٍ أَوْ بِأَحَدٍ مِنْ خَلْقِكَ فَمِنْكَ وَحْدَكَ لَا شَرِيكَ لَكَ، فَلَكَ الْحَمْدُ وَلَكَ الشُّكْرُ","tr":"Аллахумма ма асбаха би мин ни‘матин ау би-ахадин мин халькика, фа-минка вахдака ля шарика ляк, фа-ляка-ль-хамду ва ляка-ш-шукр.","meaning":"О Аллах, всякая милость, которой утром / вечером пользуюсь я или кто-либо из Твоих созданий, исходит только от Тебя. Хвала и благодарность только Тебе.","when":"Утром и вечером."},{"id":"09_afiya","n":"9/25","title":"Просьба о благополучии","cats":["morning","evening"],"rep":"3 раза","ref":"Утро и вечер","ar":"اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لَا إِلَهَ إِلَّا أَنْتَ. اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْكُفْرِ وَالْفَقْرِ، وَأَعُوذُ بِكَ مِنْ عَذَابِ الْقَبْرِ، لَا إِلَهَ إِلَّا أَنْتَ","tr":"Аллахумма ‘афини фи бадани. Аллахумма ‘афини фи сам‘и. Аллахумма ‘афини фи басари. Ля иляха илля Анта. Аллахумма инни а‘узу би-ка мина-ль-куфри ва-ль-факр, ва а‘узу би-ка мин ‘азаби-ль-кабр. Ля иляха илля Анта.","meaning":"О Аллах, убереги моё тело, слух и зрение. Нет бога, кроме Тебя. О Аллах, я прибегаю к Тебе от неверия, бедности и мучений могилы.","when":"Желательно произносить утром и вечером по 3 раза."},{"id":"10_hasbi","n":"10/25","title":"Достаточно мне Аллаха","cats":["morning","evening"],"rep":"7 раз","ref":"Утро и вечер","ar":"حَسْبِيَ اللَّهُ لَا إِلَهَ إِلَّا هُوَ، عَلَيْهِ تَوَكَّلْتُ، وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ","tr":"Хасбия-Ллаху ля иляха илля Хува, ‘алейхи таваккальту, ва Хува Раббу-ль-‘арши-ль-‘азым.","meaning":"Достаточно мне Аллаха, помимо Которого нет иного бога; на Него я уповаю, и Он — Господь великого престола.","when":"Утром и вечером по 7 раз."},{"id":"11_protection_all_sides","n":"11/25","title":"Защита спереди, сзади, справа, слева и сверху","cats":["morning","evening"],"rep":"1 раз","ref":"Утро и вечер","ar":"اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي الدُّنْيَا وَالْآخِرَةِ، اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي دِينِي وَدُنْيَايَ وَأَهْلِي وَمَالِي، اللَّهُمَّ اسْتُرْ عَوْرَاتِي، وَآمِنْ رَوْعَاتِي، اللَّهُمَّ احْفَظْنِي مِنْ بَيْنِ يَدَيَّ، وَمِنْ خَلْفِي، وَعَنْ يَمِينِي، وَعَنْ شِمَالِي، وَمِنْ فَوْقِي، وَأَعُوذُ بِعَظَمَتِكَ أَنْ أُغْتَالَ مِنْ تَحْتِي","tr":"Аллахумма инни ас’алука-ль-‘афва ва-ль-‘афията фи-д-дунья ва-ль-ахира. Аллахумма инни ас’алука-ль-‘афва ва-ль-‘афията фи дини ва дуньяйа ва ахли ва мали. Аллахумма-стур ‘аурати, ва амин рау‘ати. Аллахумма-хфазни мин байни йадайя, ва мин хальфи, ва ‘ан йамини, ва ‘ан шимали, ва мин фауки, ва а‘узу би-‘азаматика ан угталя мин тахти.","meaning":"О Аллах, прошу у Тебя прощения и благополучия в этом мире и в мире вечном. Сохрани мою религию, мирскую жизнь, семью и имущество. Укрой мои слабости и дай безопасность моему страху.","when":"Утром и вечером."},{"id":"12_alim_ghayb","n":"12/25","title":"Защита от зла души и шайтана","cats":["morning","evening"],"rep":"1 раз","ref":"Утро и вечер","ar":"اللَّهُمَّ عَالِمَ الْغَيْبِ وَالشَّهَادَةِ، فَاطِرَ السَّمَاوَاتِ وَالْأَرْضِ، رَبَّ كُلِّ شَيْءٍ وَمَلِيكَهُ، أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا أَنْتَ، أَعُوذُ بِكَ مِنْ شَرِّ نَفْسِي، وَمِنْ شَرِّ الشَّيْطَانِ وَشِرْكِهِ، وَأَنْ أَقْتَرِفَ عَلَى نَفْسِي سُوءًا، أَوْ أَجُرَّهُ إِلَى مُسْلِمٍ","tr":"Аллахумма ‘алима-ль-гайби ва-ш-шахада, фатира-с-самавати ва-ль-ард, Рабба кулли шай’ин ва малика-ху. Ашхаду ан ля иляха илля Анта. А‘узу би-ка мин шарри нафси, ва мин шарри-ш-шайтани ва ширки-хи, ва ан актарифа ‘аля нафси су’ан ау аджурра-ху иля муслим.","meaning":"О Аллах, Знающий сокрытое и явное, Творец небес и земли, Господь и Владыка всего. Я прибегаю к Твоей защите от зла собственной души, от зла шайтана и от того, чтобы причинить зло себе или мусульманину.","when":"Утром и вечером."},{"id":"13_bismillah_harm","n":"13/25","title":"С именем Аллаха — защита от вреда","cats":["morning","evening"],"rep":"3 раза","ref":"Утро и вечер","ar":"بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ","tr":"Бисми-Лляхи-ллязи ля ядурру ма‘а-смихи шай’ун фи-ль-арди ва ля фи-с-сама’и ва Хува-с-Сами‘у-ль-‘Алим.","meaning":"С именем Аллаха, с именем Которого ничто не причинит вреда ни на земле, ни на небе. Он — Слышащий, Знающий.","when":"Утром и вечером по 3 раза."},{"id":"14_raditu","n":"14/25","title":"Доволен Аллахом, Исламом и Мухаммадом ﷺ","cats":["morning","evening"],"rep":"3 раза","ref":"Утро и вечер","ar":"رَضِيتُ بِاللَّهِ رَبًّا، وَبِالْإِسْلَامِ دِينًا، وَبِمُحَمَّدٍ نَبِيًّا","tr":"Радыту би-Лляхи Раббан, ва би-ль-Ислями динан, ва би-Мухаммадин набийян.","meaning":"Доволен я Аллахом как Господом, Исламом — как религией, и Мухаммадом — как пророком.","when":"Утром и вечером по 3 раза."},{"id":"15_hayyu_qayyum","n":"15/25","title":"Я Хайю, Я Кайюм","cats":["morning","evening"],"rep":"1 раз","ref":"Утро и вечер","ar":"يَا حَيُّ يَا قَيُّومُ، بِرَحْمَتِكَ أَسْتَغِيثُ، أَصْلِحْ لِي شَأْنِي كُلَّهُ، وَلَا تَكِلْنِي إِلَى نَفْسِي طَرْفَةَ عَيْنٍ","tr":"Я Хайю, я Кайюм, би-рахматика астагис, аслих ли ша’ни кулля-ху, ва ля такильни иля нафси тарфата ‘айн.","meaning":"О Живой, О Вседержитель, Твоей милостью я ищу спасения. Приведи в порядок все мои дела и не вверяй меня душе моей ни на мгновение.","when":"Утром и вечером."},{"id":"16_morning_good","n":"16/25","title":"Прошу блага этого дня","cats":["morning"],"rep":"1 раз","ref":"Утро","ar":"أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ رَبِّ الْعَالَمِينَ، اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ هَذَا الْيَوْمِ: فَتْحَهُ، وَنَصْرَهُ، وَنُورَهُ، وَبَرَكَتَهُ، وَهُدَاهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِيهِ وَشَرِّ مَا بَعْدَهُ","tr":"Асбахна ва асбаха-ль-мульку ли-Лляхи Рабби-ль-‘алямин. Аллахумма инни ас’алука хайра хаза-ль-йаум: фатха-ху, ва насра-ху, ва нура-ху, ва бараката-ху, ва худа-ху. Ва а‘узу би-ка мин шарри ма фи-хи ва шарри ма ба‘да-ху.","meaning":"Мы дожили до утра, и утром власть принадлежит Аллаху, Господу миров. О Аллах, прошу Тебя о благе этого дня: победе, свете, благословении и руководстве.","when":"Читать утром."},{"id":"16_evening_good","n":"16/25","title":"Прошу блага этой ночи","cats":["evening"],"rep":"1 раз","ref":"Вечер","ar":"أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ رَبِّ الْعَالَمِينَ، اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ هَذِهِ اللَّيْلَةِ: فَتْحَهَا، وَنَصْرَهَا، وَنُورَهَا، وَبَرَكَتَهَا، وَهُدَاهَا، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِيهَا وَشَرِّ مَا بَعْدَهَا","tr":"Амсайна ва амса-ль-мульку ли-Лляхи Рабби-ль-‘алямин. Аллахумма инни ас’алука хайра хазихи-л-ляйля: фатха-ха, ва насра-ха, ва нура-ха, ва бараката-ха, ва худа-ха. Ва а‘узу би-ка мин шарри ма фи-ха ва шарри ма ба‘да-ха.","meaning":"Мы дожили до вечера, и вечером власть принадлежит Аллаху, Господу миров. О Аллах, прошу Тебя о благе этой ночи и прибегаю к Твоей защите от её зла.","when":"Читать вечером."},{"id":"17_fitra","n":"17/25","title":"На естественной религии Ислама","cats":["morning","evening"],"rep":"1 раз","ref":"Утро и вечер","ar":"أَصْبَحْنَا عَلَى فِطْرَةِ الْإِسْلَامِ، وَعَلَى كَلِمَةِ الْإِخْلَاصِ، وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ، وَعَلَى مِلَّةِ أَبِينَا إِبْرَاهِيمَ، حَنِيفًا مُسْلِمًا وَمَا كَانَ مِنَ الْمُشْرِكِينَ","tr":"Асбахна ‘аля фитрати-ль-Ислям, ва ‘аля калимати-ль-ихляс, ва ‘аля дини набиййина Мухаммад, ва ‘аля милляти абина Ибрахима, ханифан муслиман, ва ма кана мина-ль-мушрикин.","meaning":"Мы встретили утро / вечер, придерживаясь Ислама, слова искренности, религии нашего пророка Мухаммада ﷺ и религии нашего отца Ибрахима, который был ханифом и мусульманином.","when":"Утром и вечером."},{"id":"18_subhanallah_100","n":"18/25","title":"Пречист Аллах и хвала Ему","cats":["morning","evening","general"],"rep":"100 раз","ref":"Ежедневно","ar":"سُبْحَانَ اللَّهِ وَبِحَمْدِهِ","tr":"Субхана-Ллахи ва би-хамдихи.","meaning":"Пречист Аллах и хвала Ему.","when":"100 раз в день."},{"id":"19_tawhid_10","n":"19/25","title":"Нет бога, кроме Аллаха","cats":["morning","evening"],"rep":"10 раз","ref":"Утро и вечер","ar":"لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ","tr":"Ля иляха илля-Ллаху вахда-ху ля шарика ля-ху, ля-ху-ль-мульку ва ля-ху-ль-хамду, ва Хува ‘аля кулли шай’ин кадир.","meaning":"Нет бога, кроме одного лишь Аллаха, у Которого нет сотоварища. Ему принадлежит власть, Ему — хвала, и Он всё может.","when":"Утром и вечером по 10 раз или хотя бы 1 раз."},{"id":"20_tawhid_daily","n":"20/25","title":"Тот, кто произнесёт это за день","cats":["general"],"rep":"1 раз или больше","ref":"В течение дня","ar":"لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ","tr":"Ля иляха илля-Ллаху вахда-ху ля шарика ля-ху, ля-ху-ль-мульку ва ля-ху-ль-хамду, ва Хува ‘аля кулли шай’ин кадир.","meaning":"Нет бога, кроме одного лишь Аллаха, у Которого нет сотоварища. Ему принадлежит власть, Ему — хвала, и Он всё может.","when":"Можно читать в течение дня. Чем больше, тем лучше."},{"id":"21_subhan_count","n":"21/25","title":"Хвала по числу творений","cats":["morning"],"rep":"3 раза","ref":"Утро","ar":"سُبْحَانَ اللَّهِ وَبِحَمْدِهِ، عَدَدَ خَلْقِهِ، وَرِضَا نَفْسِهِ، وَزِنَةَ عَرْشِهِ، وَمِدَادَ كَلِمَاتِهِ","tr":"Субхана-Ллахи ва би-хамдихи ‘адада халькихи, ва рида нафсихи, ва зината ‘аршихи, ва мидада калиматихи.","meaning":"Пречист Аллах, и хвала Ему столько раз, сколько существует Его творений, насколько Он доволен, сколько весит Его Престол и сколько чернил потребовалось бы для Его слов.","when":"Утром 3 раза."},{"id":"22_knowledge_rizq","n":"22/25","title":"Полезное знание и благой удел","cats":["morning"],"rep":"1 раз","ref":"Утро","ar":"اللَّهُمَّ إِنِّي أَسْأَلُكَ عِلْمًا نَافِعًا، وَرِزْقًا طَيِّبًا، وَعَمَلًا مُتَقَبَّلًا","tr":"Аллахумма инни ас’алука ‘ильман нафи‘ан, ва ризкан таййибан, ва ‘амалан мутакаббалян.","meaning":"О Аллах, прошу Тебя наделить меня полезным знанием, благим уделом и таким делом, которое будет принято.","when":"Желательно произносить утром."},{"id":"23_istighfar_100","n":"23/25","title":"Истигфар","cats":["general","morning","evening"],"rep":"100 раз","ref":"Ежедневно","ar":"أَسْتَغْفِرُ اللَّهَ وَأَتُوبُ إِلَيْهِ","tr":"Астагфиру-Ллаха ва атубу иляйхи.","meaning":"Прошу прощения у Аллаха и приношу Ему покаяние.","when":"Желательно произносить 100 раз в день."},{"id":"24_complete_words","n":"24/25","title":"Защита совершенными словами Аллаха","cats":["evening"],"rep":"3 раза","ref":"Вечер","ar":"أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ","tr":"А‘узу би-калимати-Лляхи-т-таммати мин шарри ма халяк.","meaning":"Прибегаю к защите совершенных слов Аллаха от зла того, что Он создал.","when":"Вечером по 3 раза."},{"id":"25_salawat","n":"25/25","title":"Салават Пророку Мухаммаду ﷺ","cats":["morning","evening","general"],"rep":"10 раз","ref":"Утро и вечер","ar":"اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى نَبِيِّنَا مُحَمَّدٍ","tr":"Аллахумма салли ва саллим ‘аля набиййина Мухаммад.","meaning":"О Аллах, благослови и приветствуй нашего пророка Мухаммада.","when":"Утром и вечером. Также можно читать в течение дня."}]};
const ICONS = {"favorite": "<svg viewBox=\"0 0 24 24\"><path d=\"M12 3.6l2.45 5.05 5.55.8-4.02 3.92.95 5.53L12 16.3l-4.93 2.6.95-5.53L4 9.45l5.55-.8L12 3.6z\"></path></svg>", "share": "<svg viewBox=\"0 0 24 24\"><circle cx=\"18\" cy=\"5\" r=\"3\"></circle><circle cx=\"6\" cy=\"12\" r=\"3\"></circle><circle cx=\"18\" cy=\"19\" r=\"3\"></circle><path d=\"M8.7 10.7l6.6-4.4M8.7 13.3l6.6 4.4\"></path></svg>", "reading": "<svg viewBox=\"0 0 24 24\"><path d=\"M4 5.5A2.5 2.5 0 0 1 6.5 3H20v17H6.5A2.5 2.5 0 0 0 4 22V5.5z\"></path><path d=\"M8 7h8M8 11h8M8 15h5\"></path></svg>", "save": "<svg viewBox=\"0 0 24 24\"><path d=\"M6 4.5A1.5 1.5 0 0 1 7.5 3h9A1.5 1.5 0 0 1 18 4.5V21l-6-3.5L6 21V4.5z\"></path></svg>", "theme": "<svg viewBox=\"0 0 24 24\"><path d=\"M21 14.5A8.5 8.5 0 0 1 9.5 3 9 9 0 1 0 21 14.5z\"></path></svg>"};
const state = {category:'all', query:''};
function readSavedBookmark(){
  const direct = localStorage.getItem('adhkarSavedBookmark');
  if(direct) return direct;
  try{const arr=JSON.parse(localStorage.getItem('adhkarSaved')||'[]');return Array.isArray(arr)&&arr[0]?arr[0]:'';}catch(e){return '';}
}
const store = {
  favorites: new Set(JSON.parse(localStorage.getItem('adhkarFavorites')||'[]')),
  saved: new Set(readSavedBookmark()?[readSavedBookmark()]:[]),
  pageFavorite: localStorage.getItem('adhkarPageFavorite')==='1',
  pageSaved: !!readSavedBookmark(),
  reading: localStorage.getItem('adhkarReading')==='1'
};
function persist(){localStorage.setItem('adhkarFavorites',JSON.stringify([...store.favorites]));const bookmark=[...store.saved][0]||'';localStorage.setItem('adhkarSavedBookmark',bookmark);localStorage.setItem('adhkarSaved',JSON.stringify(bookmark?[bookmark]:[]));localStorage.setItem('adhkarPageFavorite',store.pageFavorite?'1':'0');localStorage.setItem('adhkarPageSaved',store.pageSaved?'1':'0');localStorage.setItem('adhkarReading',store.reading?'1':'0');}
function globalFavoriteKey(x){return '#'+x.id+'::'+x.title;}
function readGlobalFavorites(){try{const raw=localStorage.getItem('barakaway_favorites_v1');const arr=raw?JSON.parse(raw):[];return Array.isArray(arr)?arr:[]}catch(e){return []}}
function writeGlobalFavorites(arr){localStorage.setItem('barakaway_favorites_v1',JSON.stringify(arr));if(window.BarakaWayFavorites&&window.BarakaWayFavorites.refreshNav){window.BarakaWayFavorites.refreshNav();}document.dispatchEvent(new CustomEvent('barakaway:favorites:changed'));}
function syncGlobalFavorite(id,active){const x=findItem(id);if(!x)return;let arr=readGlobalFavorites();const gid=globalFavoriteKey(x);arr=arr.filter(v=>String(v.id)!==gid);if(active){arr.unshift({id:gid,title:x.n+' — '+x.title,url:window.location.pathname+'#'+x.id,text:x.ref+' • '+x.rep,type:'Азкар',addedAt:new Date().toISOString()});}writeGlobalFavorites(arr);}
function syncTopStates(){store.pageFavorite=store.favorites.size>0;store.pageSaved=store.saved.size>0;localStorage.setItem('adhkarPageFavorite',store.pageFavorite?'1':'0');localStorage.setItem('adhkarPageSaved',store.pageSaved?'1':'0');syncPageButtons();}
function openSavedFromTop(){
  const id=[...store.saved][0];
  if(!id){toast('Сохранённое место не выбрано');return;}
  function go(){const el=document.getElementById(id);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});toast('Открыто сохранённое место');return true;}return false;}
  if(go()) return;
  state.category='all';
  state.query='';
  const search=document.getElementById('search');
  if(search) search.value='';
  renderAll();
  setTimeout(()=>{if(!go()) toast('Сохранённое место не найдено');},60);
}
function openFavoritesFromTop(){const arr=[...store.favorites].map(findItem).filter(Boolean);if(!arr.length){openList('favorites');return;}openList('favorites');}

function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('is-visible');clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>t.classList.remove('is-visible'),1800)}
function syncPageButtons(){document.querySelector('[data-action="favorite"]').classList.toggle('is-active',store.pageFavorite);document.querySelector('[data-action="save"]').classList.toggle('is-active',store.pageSaved);document.querySelector('[data-action="reading"]').classList.toggle('is-active',store.reading);document.documentElement.classList.toggle('reading-mode',store.reading)}
function itemMatches(x){const catOk = state.category==='all' || x.cats.includes(state.category); const q = state.query.trim().toLowerCase(); if(!q) return catOk; const blob=[x.n,x.title,x.ref,x.ar,x.tr,x.meaning,x.when,...x.cats].join(' ').toLowerCase(); return catOk && blob.includes(q);}
function renderNav(){const nav=document.getElementById('nav');nav.innerHTML=DATA.categories.map(([id,name])=>`<button class="nav-btn ${state.category===id?'is-active':''}" data-cat="${id}" type="button">${name}</button>`).join('');nav.querySelectorAll('[data-cat]').forEach(b=>b.addEventListener('click',()=>{state.category=b.dataset.cat;renderAll();}));}
function renderPanel(){const current=DATA.categories.find(x=>x[0]===state.category)||DATA.categories[0];document.getElementById('panelTitle').textContent=current[1];document.getElementById('panelIntro').textContent=DATA.intros[state.category]||'';}
function cardHtml(x,idx,total){const chips = [...x.cats.map(c=>({'morning':'утро','evening':'вечер','after_prayer':'после намаза','before_sleep':'перед сном','general':'общее'}[c]||c)), x.rep].filter(Boolean);return `<article class="card" id="${esc(x.id)}" data-id="${esc(x.id)}"><div class="card-head"><div class="idx">${idx+1}/${total}</div><div class="meta"><h2 class="title">${esc(x.title)}</h2><div class="ref">${esc(x.ref)}</div><div class="rep">${esc(x.rep)}</div></div></div><div class="ar">${esc(x.ar)}</div><div class="label layer-translit-label">Транскрипция</div><p class="translit">${esc(x.tr)}</p><div class="label layer-meaning-label">Перевод</div><p class="meaning">${esc(x.meaning)}</p><div class="label when-label">Когда читать</div><p class="when">${esc(x.when)}</p><div class="chips">${chips.map(c=>`<span class="chip">${esc(c)}</span>`).join('')}</div><div class="card-actions" aria-label="Действия"><button class="card-action ${store.favorites.has(x.id)?'is-active':''}" data-card-action="favorite" data-id="${esc(x.id)}" aria-label="Избранное" type="button"><svg viewBox="0 0 24 24"><path d="M12 3.6l2.45 5.05 5.55.8-4.02 3.92.95 5.53L12 16.3l-4.93 2.6.95-5.53L4 9.45l5.55-.8L12 3.6z"></path></svg></button><button class="card-action ${store.saved.has(x.id)?'is-active':''}" data-card-action="save" data-id="${esc(x.id)}" aria-label="Сохранить место" type="button"><svg viewBox="0 0 24 24"><path d="M6 4.5A1.5 1.5 0 0 1 7.5 3h9A1.5 1.5 0 0 1 18 4.5V21l-6-3.5L6 21V4.5z"></path></svg></button><button class="card-action" data-card-action="share" data-id="${esc(x.id)}" aria-label="Поделиться" type="button"><svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><path d="M8.7 10.7l6.6-4.4M8.7 13.3l6.6 4.4"></path></svg></button></div></article>`;}
function renderGrid(){const grid=document.getElementById('grid');const rows=DATA.items.filter(itemMatches);grid.innerHTML = rows.length ? rows.map((x,i)=>cardHtml(x,i,rows.length)).join('') : `<div class="empty">По этому запросу ничего не найдено.</div>`;grid.querySelectorAll('[data-card-action]').forEach(btn=>btn.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();const id=btn.dataset.id;const action=btn.dataset.cardAction;if(action==='favorite'){const willAdd=!store.favorites.has(id);willAdd?store.favorites.add(id):store.favorites.delete(id);persist();syncGlobalFavorite(id,willAdd);syncTopStates();renderGrid();toast(willAdd?'Добавлено в избранное':'Удалено из избранного')}if(action==='save'){const willAdd=!store.saved.has(id);store.saved.clear();if(willAdd)store.saved.add(id);persist();syncTopStates();renderGrid();toast(willAdd?'Место сохранено':'Сохранённое место очищено')}if(action==='share') shareItem(id);}));}
function renderAll(){renderNav();renderPanel();renderGrid();syncPageButtons();}
function findItem(id){return DATA.items.find(x=>x.id===id)}
async function nativeShare(text){if(navigator.share){try{await navigator.share({title:'Азкары — BarakaWay',text});return true}catch(e){return false}}return false}
async function copyText(text){try{await navigator.clipboard.writeText(text);toast('Текст скопирован');}catch(e){toast('Скопируйте текст вручную')}}
function shareItem(id){const x=findItem(id);if(!x)return;const text=`${x.title}\n\n${x.ar}\n\n${x.tr}\n\n${x.meaning}\n\n${x.when}`;openModal('Поделиться',`<div class="share-card"><div class="share-bismillah">بِسْمِ ٱللَّٰهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</div><div class="share-main">${esc(x.title)}</div><div class="share-sub">${esc(x.ref)} • ${esc(x.rep)}</div><div class="share-arabic">${esc(x.ar)}</div><div class="share-actions"><button class="share-button" id="shareNative" type="button">Поделиться</button><button class="share-button secondary" id="copyShare" type="button">Скопировать</button></div></div>`);document.getElementById('shareNative').onclick=async()=>{const ok=await nativeShare(text);if(!ok) copyText(text)};document.getElementById('copyShare').onclick=()=>copyText(text)}
function openList(kind){const set = kind==='favorites'?store.favorites:store.saved;const title = kind==='favorites'?'Избранное':'Сохранённые';const arr=[...set].map(findItem).filter(Boolean);const body = arr.length ? `<div class="list">${arr.map(x=>`<div class="list-item"><div><div class="list-title">${esc(x.n)} — ${esc(x.title)}</div><div class="list-meta">${esc(x.ref)} • ${esc(x.rep)}</div></div><button class="share-button secondary" data-go="${esc(x.id)}" type="button">Открыть</button></div>`).join('')}</div>` : `<div class="empty">Здесь пока ничего нет.</div>`;openModal(title,body);document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{closeModal();document.getElementById(b.dataset.go)?.scrollIntoView({behavior:'smooth',block:'center'});});}
function openModal(title,body){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=body;document.getElementById('modal').classList.add('is-visible');}
function closeModal(){document.getElementById('modal').classList.remove('is-visible');}
function initTheme(){const saved=localStorage.getItem('theme');if(saved==='light'||saved==='dark'){document.documentElement.classList.toggle('dark-mode',saved==='dark');document.documentElement.classList.toggle('light-mode',saved==='light');}else{document.documentElement.classList.add('dark-mode');}}
function toggleTheme(){const dark=!document.documentElement.classList.contains('dark-mode');document.documentElement.classList.toggle('dark-mode',dark);document.documentElement.classList.toggle('light-mode',!dark);localStorage.setItem('theme',dark?'dark':'light');toast(dark?'Тёмная тема':'Светлая тема')}

function initLayerControls(){
  const saved=(()=>{try{return JSON.parse(localStorage.getItem('adhkarLayerPrefs')||'{}')}catch(e){return {}}})();
  const defaults={arabic:true,translit:true,meaning:true};
  const prefs=Object.assign(defaults,saved||{});
  function apply(){
    document.documentElement.classList.toggle('hide-arabic',!prefs.arabic);
    document.documentElement.classList.toggle('hide-translit',!prefs.translit);
    document.documentElement.classList.toggle('hide-meaning',!prefs.meaning);
    localStorage.setItem('adhkarLayerPrefs',JSON.stringify(prefs));
  }
  document.querySelectorAll('[data-layer]').forEach(input=>{
    const key=input.dataset.layer;
    input.checked=!!prefs[key];
    input.addEventListener('change',()=>{prefs[key]=input.checked;apply();});
  });
  apply();
}

document.addEventListener('DOMContentLoaded',()=>{initTheme();initLayerControls();document.getElementById('search').addEventListener('input',e=>{state.query=e.target.value;renderGrid();});document.querySelectorAll('[data-action]').forEach(btn=>btn.addEventListener('click',async()=>{const a=btn.dataset.action;if(a==='favorite'){openFavoritesFromTop()}if(a==='save'){openSavedFromTop()}if(a==='reading'){store.reading=!store.reading;persist();syncPageButtons();toast(store.reading?'Режим чтения включён':'Режим чтения выключен')}if(a==='theme'){toggleTheme()}if(a==='share'){const text='Азкары — BarakaWay. Утренние и вечерние азкары.';const ok=await nativeShare(text);if(!ok)copyText(text)}}));document.getElementById('modalClose').onclick=closeModal;document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});renderAll();syncTopStates();});
</script>
</body>
</html>
