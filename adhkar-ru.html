инадлежит то, что на небесах, и то, что на земле. Его Престол объемлет небеса и землю, и не тяготит Его оберегание их. Он — Возвышенный, Великий.", "when": "Читать утром, вечером, после обязательных намазов и перед сном."}, {"id": "03_ikhlas_falaq_nas", "n": "3/25", "title": "Аль-Ихляс, Аль-Фаляк, Ан-Нас", "cats": ["morning", "evening", "before_sleep"], "rep": "3 раза", "ref": "Коран 112, 113, 114", "ar": "بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ\nقُلْ هُوَ ٱللَّهُ أَحَدٌ ۝ ٱللَّهُ ٱلصَّمَدُ ۝ لَمْ يَلِدْ وَلَمْ يُولَدْ ۝ وَلَمْ يَكُن لَّهُۥ كُفُوًا أَحَدٌ\n\nبِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ\nقُلْ أَعُوذُ بِرَبِّ ٱلْفَلَقِ ۝ مِن شَرِّ مَا خَلَقَ ۝ وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ ۝ وَمِن شَرِّ ٱلنَّفَّٰثَٰتِ فِى ٱلْعُقَدِ ۝ وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ\n\nبِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ\nقُلْ أَعُوذُ بِرَبِّ ٱلنَّاسِ ۝ مَلِكِ ٱلنَّاسِ ۝ إِلَٰهِ ٱلنَّاسِ ۝ مِن شَرِّ ٱلْوَسْوَاسِ ٱلْخَنَّاسِ ۝ ٱلَّذِى يُوَسْوِسُ فِى صُدُورِ ٱلنَّاسِ ۝ مِنَ ٱلْجِنَّةِ وَٱلنَّاسِ", "tr": "Куль хува-Ллаху ахад... Куль а‘узу би-Рабби-ль-фаляк... Куль а‘узу би-Рабби-н-нас...", "meaning": "Три последние суры Корана: очищение веры, защита от зла сотворённого, от зависти, наущений джиннов и людей.", "when": "Желательно читать по 3 раза утром и вечером. Этого достаточно для защиты от всего дурного."}, {"id": "04_asbahna_morning", "n": "4/25", "title": "Мы дожили до утра", "cats": ["morning"], "rep": "1 раз", "ref": "Утро", "ar": "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ، رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ وَسُوءِ الْكِبَرِ، رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ", "tr": "Асбахна ва асбаха-ль-мульку ли-Ллях...", "meaning": "Мы дожили до утра, и утром власть принадлежит Аллаху. Нет бога, кроме одного лишь Аллаха. Господь мой, прошу Тебя о благе этого дня и прибегаю к Твоей защите от зла этого дня, от лени, старости, мучений в Огне и мучений в могиле.", "when": "Читать утром."}, {"id": "04_amsayna_evening", "n": "4/25", "title": "Мы дожили до вечера", "cats": ["evening"], "rep": "1 раз", "ref": "Вечер", "ar": "أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذِهِ اللَّيْلَةِ وَخَيْرَ مَا بَعْدَهَا، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذِهِ اللَّيْلَةِ وَشَرِّ مَا بَعْدَهَا، رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ وَسُوءِ الْكِبَرِ، رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ", "tr": "Амсайна ва амса-ль-мульку ли-Ллях...", "meaning": "Мы дожили до вечера, и вечером власть принадлежит Аллаху. Господь мой, прошу Тебя о благе этой ночи и прибегаю к Твоей защите от её зла, от лени, старости, мучений в Огне и мучений в могиле.", "when": "Читать вечером."}, {"id": "05_bika_asbahna", "n": "5/25", "title": "Тобой мы дожили до утра / вечера", "cats": ["morning", "evening"], "rep": "1 раз", "ref": "Утро и вечер", "ar": "اللَّهُمَّ بِكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ النُّشُورُ\n\nاللَّهُمَّ بِكَ أَمْسَيْنَا، وَبِكَ أَصْبَحْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ الْمَصِيرُ", "tr": "Аллахумма би-ка асбахна ва би-ка амсайна... / Аллахумма би-ка амсайна ва би-ка асбахна...", "meaning": "О Аллах, по Твоей воле мы дожили до утра и до вечера, по Твоей воле мы живём и умираем, и к Тебе возвращение.", "when": "Первая формула утром, вторая — вечером."}, {"id": "06_sayyid_istighfar", "n": "6/25", "title": "Саййидуль-истигфар", "cats": ["morning", "evening"], "rep": "1 раз", "ref": "Утро и вечер", "ar": "اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبِي، فَاغْفِرْ لِي، فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ", "tr": "Аллахумма анта Рабби ля иляха илля Анта...", "meaning": "О Аллах, Ты — мой Господь, нет бога, кроме Тебя. Ты создал меня, а я — Твой раб. Я признаю Твою милость и признаю свой грех. Прости меня, ибо никто не прощает грехов, кроме Тебя.", "when": "Читать утром и вечером."}, {"id": "07_witness", "n": "7/25", "title": "Свидетельство утром и вечером", "cats": ["morning", "evening"], "rep": "4 раза", "ref": "Утро и вечер", "ar": "اللَّهُمَّ إِنِّي أَصْبَحْتُ أُشْهِدُكَ، وَأُشْهِدُ حَمَلَةَ عَرْشِكَ، وَمَلَائِكَتَكَ، وَجَمِيعَ خَلْقِكَ، أَنَّكَ أَنْتَ اللَّهُ لَا إِلَهَ إِلَّا أَنْتَ وَحْدَكَ لَا شَرِيكَ لَكَ، وَأَنَّ مُحَمَّدًا عَبْدُكَ وَرَسُولُكَ", "tr": "Аллахумма инни асбахту ушхидука...", "meaning": "О Аллах, поистине, утром я призываю Тебя, тех, кто держит Твой Престол, Твоих ангелов и всё Твоё творение засвидетельствовать, что Ты — Аллах, нет бога, кроме Тебя, и что Мухаммад — Твой раб и посланник.", "when": "Читать утром и вечером по 4 раза."}, {"id": "08_blessing", "n": "8/25", "title": "Благодарность за милости", "cats": ["morning", "evening"], "rep": "1 раз", "ref": "Утро и вечер", "ar": "اللَّهُمَّ مَا أَصْبَحَ بِي مِنْ نِعْمَةٍ أَوْ بِأَحَدٍ مِنْ خَلْقِكَ فَمِنْكَ وَحْدَكَ لَا شَرِيكَ لَكَ، فَلَكَ الْحَمْدُ وَلَكَ الشُّكْرُ", "tr": "Аллахумма ма асбаха би мин ни‘матин...", "meaning": "О Аллах, всякая милость, которой утром / вечером пользуюсь я или кто-либо из Твоих созданий, исходит только от Тебя. Хвала и благодарность только Тебе.", "when": "Утром и вечером."}, {"id": "09_afiya", "n": "9/25", "title": "Просьба о благополучии", "cats": ["morning", "evening"], "rep": "3 раза", "ref": "Утро и вечер", "ar": "اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لَا إِلَهَ إِلَّا أَنْتَ. اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْكُفْرِ وَالْفَقْرِ، وَأَعُوذُ بِكَ مِنْ عَذَابِ الْقَبْرِ، لَا إِلَهَ إِلَّا أَنْتَ", "tr": "Аллахумма ‘афини фи бадани...", "meaning": "О Аллах, убереги моё тело, слух и зрение. Нет бога, кроме Тебя. О Аллах, я прибегаю к Тебе от неверия, бедности и мучений могилы.", "when": "Желательно произносить утром и вечером по 3 раза."}, {"id": "10_hasbi", "n": "10/25", "title": "Достаточно мне Аллаха", "cats": ["morning", "evening"], "rep": "7 раз", "ref": "Утро и вечер", "ar": "حَسْبِيَ اللَّهُ لَا إِلَهَ إِلَّا هُوَ، عَلَيْهِ تَوَكَّلْتُ، وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ", "tr": "Хасбия-Ллаху ля иляха илля Хува, ‘алейхи таваккальту, ва Хува Раббу-ль-‘арши-ль-‘азым.", "meaning": "Достаточно мне Аллаха, помимо Которого нет иного бога; на Него я уповаю, и Он — Господь великого престола.", "when": "Утром и вечером по 7 раз."}, {"id": "11_protection_all_sides", "n": "11/25", "title": "Защита спереди, сзади, справа, слева и сверху", "cats": ["morning", "evening"], "rep": "1 раз", "ref": "Утро и вечер", "ar": "اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي الدُّنْيَا وَالْآخِرَةِ، اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي دِينِي وَدُنْيَايَ وَأَهْلِي وَمَالِي، اللَّهُمَّ اسْتُرْ عَوْرَاتِي، وَآمِنْ رَوْعَاتِي، اللَّهُمَّ احْفَظْنِي مِنْ بَيْنِ يَدَيَّ، وَمِنْ خَلْفِي، وَعَنْ يَمِينِي، وَعَنْ شِمَالِي، وَمِنْ فَوْقِي، وَأَعُوذُ بِعَظَمَتِكَ أَنْ أُغْتَالَ مِنْ تَحْتِي", "tr": "Аллахумма инни ас’алука-ль-‘афва ва-ль-‘афия...", "meaning": "О Аллах, прошу у Тебя прощения и благополучия в этом мире и в мире вечном. Сохрани мою религию, мирскую жизнь, семью и имущество. Укрой мои слабости и дай безопасность моему страху.", "when": "Утром и вечером."}, {"id": "12_alim_ghayb", "n": "12/25", "title": "Защита от зла души и шайтана", "cats": ["morning", "evening"], "rep": "1 раз", "ref": "Утро и вечер", "ar": "اللَّهُمَّ عَالِمَ الْغَيْبِ وَالشَّهَادَةِ، فَاطِرَ السَّمَاوَاتِ وَالْأَرْضِ، رَبَّ كُلِّ شَيْءٍ وَمَلِيكَهُ، أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا أَنْتَ، أَعُوذُ بِكَ مِن }, {"id": "16_morning_good", "n": "16/25", "title": "Прошу блага этого дня", "cats": ["morning"], "rep": "1 раз", "ref": "Утро", "ar": "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ رَبِّ الْعَالَمِينَ، اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ هَذَا الْيَوْمِ: فَتْحَهُ، وَنَصْرَهُ، وَنُورَهُ، وَبَرَكَتَهُ، وَهُدَاهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِيهِ وَشَرِّ مَا بَعْدَهُ", "tr": "Асбахна ва асбаха-ль-мульку ли-Лляхи Рабби-ль-‘алямин...", "meaning": "Мы дожили до утра, и утром власть принадлежит Аллаху, Господу миров. О Аллах, прошу Тебя о благе этого дня: победе, свете, благословении и руководстве.", "when": "Читать утром."}, {"id": "16_evening_good", "n": "16/25", "title": "Прошу блага этой ночи", "cats": ["evening"], "rep": "1 раз", "ref": "Вечер", "ar": "أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ رَبِّ الْعَالَمِينَ، اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ هَذِهِ اللَّيْلَةِ: فَتْحَهَا، وَنَصْرَهَا، وَنُورَهَا، وَبَرَكَتَهَا، وَهُدَاهَا، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِيهَا وَشَرِّ مَا بَعْدَهَا", "tr": "Амсайна ва амса-ль-мульку ли-Лляхи Рабби-ль-‘алямин...", "meaning": "Мы дожили до вечера, и вечером власть принадлежит Аллаху, Господу миров. О Аллах, прошу Тебя о благе этой ночи и прибегаю к Твоей защите от её зла.", "when": "Читать вечером."}, {"id": "17_fitra", "n": "17/25", "title": "На естественной религии Ислама", "cats": ["morning", "evening"], "rep": "1 раз", "ref": "Утро и вечер", "ar": "أَصْبَحْنَا عَلَى فِطْرَةِ الْإِسْلَامِ، وَعَلَى كَلِمَةِ الْإِخْلَاصِ، وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ، وَعَلَى مِلَّةِ أَبِينَا إِبْرَاهِيمَ، حَنِيفًا مُسْلِمًا وَمَا كَانَ مِنَ الْمُشْرِكِينَ", "tr": "Асбахна ‘аля фитрати-ль-Ислям...", "meaning": "Мы встретили утро / вечер, придерживаясь Ислама, слова искренности, религии нашего пророка Мухаммада ﷺ и религии нашего отца Ибрахима, который был ханифом и мусульманином.", "when": "Утром и вечером."}, {"id": "18_subhanallah_100", "n": "18/25", "title": "Пречист Аллах и хвала Ему", "cats": ["morning", "evening", "general"], "rep": "10 const ICONS = {"favorite": "<svg viewBox=\"0 0 24 24\"><path d=\"M12 3.6l2.45 5.05 5.55.8-4.02 3.92.95 5.53L12 16.3l-4.93 2.6.95-5.53L4 9.45l5.55-.8L12 3.6z\"></path></svg>", "share": "<svg viewBox=\"0 0 24 24\"><circle cx=\"18\" cy=\"5\" r=\"3\"></circle><circle cx=\"6\" cy=\"12\" r=\"3\"></circle><circle cx=\"18\" cy=\"19\" r=\"3\"></circle><path d=\"M8.7 10.7l6.6-4.4M8.7 13.3l6.6 4.4\"></path></svg>", "reading": "<svg viewBox=\"0 0 24 24\"><path d=\"M4 5.5A2.5 2.5 0 0 1 6.5 3H20v17H6.5A2.5 2.5 0 0 0 4 22V5.5z\"></path><path d=\"M8 7h8M8 11h8M8 15h5\"></path></svg>", "save": "<svg viewBox=\"0 0 24 24\"><path d=\"M6 4.5A1.5 1.5 0 0 1 7.5 3h9A1.5 1.5 0 0 1 18 4.5V21l-6-3.5L6 21V4.5z\"></path></svg>", "theme": "<svg viewBox=\"0 0 24 24\"><path d=\"M21 14.5A8.5 8.5 0 0 1 9.5 3 9 9 0 1 0 21 14.5z\"></path></svg>"};
const state = {category:'all', query:''};
const store = {
  favorites: new Set(JSON.parse(localStorage.getItem('adhkarFavorites')||'[]')),
  saved: new Set(JSON.parse(localStorage.getItem('adhkarSaved')||'[]')),
  pageFavorite: localStorage.getItem('adhkarPageFavorite')==='1',
  pageSaved: localStorage.getItem('adhkarPageSaved')==='1',
  reading: localStorage.getItem('adhkarReading')==='1'
};
function persist(){localStorage.setItem('adhkarFavorites',JSON.stringify([...store.favorites]));localStorage.setItem('adhkarSaved',JSON.stringify([...store.saved]));localStorage.setItem('adhkarPageFavorite',store.pageFavorite?'1':'0');localStorage.setItem('adhkarPageSaved',store.pageSaved?'1':'0');localStorage.setItem('adhkarReading',store.reading?'1':'0');}
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('is-visible');clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>t.classList.remove('is-visible'),1800)}
function syncPageButtons(){document.querySelector('[data-action="favorite"]').classList.toggle('is-active',store.pageFavorite);document.querySelector('[data-action="save"]').classList.toggle('is-active',store.pageSaved);document.querySelector('[data-action="reading"]').classList.toggle('is-active',store.reading);document.documentElement.classList.toggle('reading-mode',store.reading)}
function itemMatches(x){const catOk = state.category==='all' || x.cats.includes(state.category); const q = state.query.trim().toLowerCase(); if(!q) return catOk; const blob=[x.n,x.title,x.ref,x.ar,x.tr,x.meaning,x.when,...x.cats].join(' ').toLowerCase(); return catOk && blob.includes(q);}
function renderNav(){const nav=document.getElementById('nav');nav.innerHTML=DATA.categories.map(([id,name])=>`<button class="nav-btn ${state.category===id?'is-active':''}" data-cat="${id}" type="button">${name}</button>`).join('');nav.querySelectorAll('[data-cat]').forEach(b=>b.addEventListener('click',()=>{state.category=b.dataset.cat;renderAll();}));}
function renderPanel(){const current=DATA.categories.find(x=>x[0]===state.category)||DATA.categories[0];document.getElementById('panelTitle').textContent=current[1];document.getElementById('panelIntro').textContent=DATA.intros[state.category]||'';}
function cardHtml(x,idx){const chips = [...x.cats.map(c=>({'morning':'утро','evening':'вечер','after_prayer':'после намаза','before_sleep':'перед сном','general':'общее'}[c]||c)), x.rep].filter(Boolean);return `<article class="card" id="${esc(x.id)}" data-id="${esc(x.id)}"><div class="card-head"><div class="idx">${esc(x.n)}</div><div class="meta"><h2 class="title">${esc(x.title)}</h2><div class="ref">${esc(x.ref)}</div><div class="rep">${esc(x.rep)}</div></div></div><div class="ar">${esc(x.ar)}</div><div class="label">Транскрипция</div><p class="translit">${esc(x.tr)}</p><div class="label">Перевод</div><p class="meaning">${esc(x.meaning)}</p><div class="label">Когда читать</div><p class="when">${esc(x.when)}</p><div class="chips">${chips.map(c=>`<span class="chip">${esc(c)}</span>`).join('')}</div><div class="card-actions" aria-label="Действия"><button class="card-action ${store.favorites.has(x.id)?'is-active':''}" data-card-action="favorite" data-id="${esc(x.id)}" aria-label="Избранное" type="button">${ICONS.favorite}</button><button class="card-action ${store.saved.has(x.id)?'is-active':''}" data-card-action="save" data-id="${esc(x.id)}" aria-label="Сохранить" type="button">${ICONS.save}</button><button class="card-action" data-card-action="share" data-id="${esc(x.id)}" aria-label="Поделиться" type="button">${ICONS.share}</button></div></article>`}
function renderGrid(){const grid=document.getElementById('grid');const rows=DATA.items.filter(itemMatches);grid.innerHTML = rows.length ? rows.map(cardHtml).join('') : `<div class="empty">По этому запросу ничего не найдено.</div>`;grid.querySelectorAll('[data-card-action]').forEach(btn=>btn.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();const id=btn.dataset.id;const action=btn.dataset.cardAction;if(action==='favorite'){store.favorites.has(id)?store.favorites.delete(id):store.favorites.add(id);persist();renderGrid();toast(store.favorites.has(id)?'Добавлено в избранное':'Удалено из избранного')}if(action==='save'){store.saved.has(id)?store.saved.delete(id):store.saved.add(id);persist();renderGrid();toast(store.saved.has(id)?'Сохранено':'Удалено из сохранённых')}if(action==='share') shareItem(id);}));}
function renderAll(){renderNav();renderPanel();renderGrid();syncPageButtons();}
function findItem(id){return DATA.items.find(x=>x.id===id)}
async function nativeShare(text){if(navigator.share){try{await navigator.share({title:'Азкары — BarakaWay',text});return true}catch(e){return false}}return false}
async function copyText(text){try{await navigator.clipboard.writeText(text);toast('Текст скопирован');}catch(e){toast('Скопируйте текст вручную')}}
function shareItem(id){const x=findItem(id);if(!x)return;const text=`${x.title}\n\n${x.ar}\n\n${x.tr}\n\n${x.meaning}\n\n${x.when}`;openModal('Поделиться',`<div class="share-card"><div class="share-bismillah">بِسْمِ ٱللَّٰهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</div><div class="share-main">${esc(x.title)}</div><div class="share-sub">${esc(x.ref)} • ${esc(x.rep)}</div><div class="share-arabic">${esc(x.ar)}</div><div class="share-actions"><button class="share-button" id="shareNative" type="button">Поделиться</button><button class="share-button secondary" id="copyShare" type="button">Скопировать</button></div></div>`);document.getElementById('shareNative').onclick=async()=>{const ok=await nativeShare(text);if(!ok) copyText(text)};document.getElementById('copyShare').onclick=()=>copyText(text)}
function openList(kind){const set = kind==='favorites'?store.favorites:store.saved;const title = kind==='favorites'?'Избранное':'Сохранённые';const arr=[...set].map(findItem).filter(Boolean);const body = arr.length ? `<div class="list">${arr.map(x=>`<div class="list-item"><div><div class="list-title">${esc(x.n)} — ${esc(x.title)}</div><div class="list-meta">${esc(x.ref)} • ${esc(x.rep)}</div></div><button class="share-button secondary" data-go="${esc(x.id)}" type="button">Открыть</button></div>`).join('')}</div>` : `<div class="empty">Здесь пока ничего нет.</div>`;openModal(title,body);document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{closeModal();document.getElementById(b.dataset.go)?.scrollIntoView({behavior:'smooth',block:'center'});});}
function openModal(title,body){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=body;document.getElementById('modal').classList.add('is-visible');}
function closeModal(){document.getElementById('modal').classList.remove('is-visible');}
function initTheme(){const saved=localStorage.getItem('theme');if(saved==='light'||saved==='dark'){document.documentElement.classList.toggle('dark-mode',saved==='dark');document.documentElement.classList.toggle('light-mode',saved==='light');}else{document.documentElement.classList.add('dark-mode');}}
function toggleTheme(){const dark=!document.documentElement.classList.contains('dark-mode');document.documentElement.classList.toggle('dark-mode',dark);document.documentElement.classList.toggle('light-mode',!dark);localStorage.setItem('theme',dark?'dark':'light');toast(dark?'Тёмная тема':'Светлая тема')}
document.addEventListener('DOMContentLoaded',()=>{initTheme();document.getElementById('search').addEventListener('input',e=>{state.query=e.target.value;renderGrid();});document.querySelectorAll('[data-action]').forEach(btn=>btn.addEventListener('click',async()=>{const a=btn.dataset.action;if(a==='favorite'){store.pageFavorite=!store.pageFavorite;persist();syncPageButtons();toast(store.pageFavorite?'Страница добавлена в избранное':'Страница удалена из избранного')}if(a==='save'){store.pageSaved=!store.pageSaved;persist();syncPageButtons();toast(store.pageSaved?'Страница сохранена':'Страница удалена из сохранённых')}if(a==='reading'){store.reading=!store.reading;persist();syncPageButtons();toast(store.reading?'Режим чтения включён':'Режим чтения выключен')}if(a==='theme'){toggleTheme()}if(a==='share'){const text='Азкары — BarakaWay. Утренние и вечерние азкары.';const ok=await nativeShare(text);if(!ok)copyText(text)}}));document.getElementById('modalClose').onclick=closeModal;document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});renderAll();});
</script>
</body>
</html>
