<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>पसंदीदा — BarakaWay</title>
<link href="/favicon.png" rel="icon" type="image/png">
<link href="/theme.css" rel="stylesheet">
<link href="/theme-universal.css" rel="stylesheet">
<style>
body{margin:0;font-family:system-ui;background:#101418;color:#e9eef3;line-height:1.6;padding-bottom:110px}
a{color:inherit}
.page{max-width:850px;margin:auto;padding:34px 22px}
.hero{border-radius:30px;padding:26px 22px;background:linear-gradient(135deg,#111a23,#182632 55%,#163228);border:1px solid rgba(102,198,128,.24);box-shadow:0 18px 38px rgba(0,0,0,.25)}
.kicker{font-size:11px;font-weight:950;letter-spacing:.16em;text-transform:uppercase;color:#d7c07a;margin-bottom:8px}
.hero h1{margin:0;font-size:34px;line-height:1.05;letter-spacing:-.05em}
.hero p{margin:12px 0 0;color:#b9c8c0;font-weight:700}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.pill{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;border:1px solid rgba(215,192,122,.32);background:rgba(215,192,122,.08);color:#f0d891;padding:8px 13px;font-size:12px;font-weight:950}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:22px}
.card{position:relative;border-radius:24px;padding:18px;text-decoration:none;background:linear-gradient(135deg,#151f29,#18212b 55%,#162a25);border:1px solid rgba(96,147,120,.25);box-shadow:0 12px 24px rgba(0,0,0,.20);min-height:112px}
.icon{width:42px;height:42px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:rgba(215,192,122,.12);font-size:22px;margin-bottom:14px}
.title{font-size:18px;font-weight:950;letter-spacing:-.035em;padding-right:44px}
.text{font-size:13px;color:#aebbb5;font-weight:700;margin-top:6px;padding-right:44px}
.badge{display:inline-flex;margin-top:12px;padding:5px 9px;border-radius:999px;background:rgba(58,130,82,.18);color:#aee3bd;font-size:11px;font-weight:950}
.remove{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:999px;border:1px solid rgba(215,192,122,.34);background:rgba(215,192,122,.10);color:#f0d891;font-size:20px;font-weight:950;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
.remove:hover{background:rgba(215,192,122,.20)}
.empty{margin-top:22px;padding:20px;border-radius:24px;background:#151d25;border:1px dashed rgba(215,192,122,.28);color:#b9c8c0;font-weight:700}
.clear{display:none;margin-top:16px;border-radius:999px;border:1px solid rgba(215,192,122,.34);background:rgba(215,192,122,.08);color:#f0d891;padding:10px 16px;font:inherit;font-size:13px;font-weight:950;cursor:pointer}
.clear.is-visible{display:inline-flex}
html[dir="rtl"] .title,html[dir="rtl"] .text{padding-right:0;padding-left:44px}
html[dir="rtl"] .remove{right:auto;left:14px}
@media(max-width:700px){.hero h1{font-size:28px}.grid{grid-template-columns:1fr}.page{padding:24px 16px}}


/* Light mode fix: favorites hero must not keep the dark card background */
html.light-mode .hero,
body.light-mode .hero{
  background:linear-gradient(135deg,#ffffff 0%,#f7fbf8 58%,#eef7f1 100%) !important;
  border:1.5px solid rgba(143,182,155,.58) !important;
  box-shadow:0 18px 42px rgba(33,58,41,.10), inset 0 1px 0 rgba(255,255,255,.96) !important;
  color:#142019 !important;
}

html.light-mode .hero h1,
body.light-mode .hero h1{
  color:#142019 !important;
}

html.light-mode .hero p,
body.light-mode .hero p{
  color:#405248 !important;
}


.card{padding-bottom:42px!important;transition:transform .18s ease,box-shadow .18s ease,opacity .18s ease,border-color .18s ease}
.drag-handle{position:absolute;right:14px;bottom:14px;z-index:4;width:34px;height:34px;border-radius:12px;border:1px solid rgba(215,192,122,.28);background:rgba(215,192,122,.08);color:#d7c07a;display:flex;align-items:center;justify-content:center;cursor:grab;-webkit-tap-highlight-color:transparent;touch-action:none;transition:transform .16s ease,background .16s ease,box-shadow .16s ease}
.drag-handle:active{cursor:grabbing;transform:scale(.96)}
.drag-handle span,.drag-handle span:before,.drag-handle span:after{display:block;width:16px;height:2px;border-radius:999px;background:currentColor;content:""}
.drag-handle span{position:relative;box-shadow:0 5px 0 currentColor,0 -5px 0 currentColor}
.card.is-dragging{opacity:.86;transform:scale(.965) translateY(-4px);border-color:rgba(240,216,145,.58)!important;box-shadow:0 24px 46px rgba(0,0,0,.42),0 0 0 1px rgba(240,216,145,.16)!important;z-index:20}
.card.is-dragging .drag-handle{background:rgba(215,192,122,.18);box-shadow:0 8px 18px rgba(0,0,0,.22)}
.card.is-reorder-animating{transition:transform .22s cubic-bezier(.2,.8,.2,1)!important}
html.light-mode .drag-handle{background:#fff8df!important;border-color:#d8c783!important;color:#6d550b!important}
</style>
<script src="/theme-init.js"></script>
<link rel="stylesheet" href="/theme.css">
<link rel="stylesheet" href="/theme-universal.css">
</head>
<body>
<main class="page">
<section class="hero">
<div class="kicker">व्यक्तिगत स्थान</div>
<h1>पसंदीदा</h1>
<p>सहेजी गई सूरहें, अज़कार, लेख और अल्लाह के नाम दैनिक पढ़ने के लिए यहाँ एकत्र होंगे।</p>
<div class="stats">
<span class="pill" id="favoritesCount">0 सहेजे गए</span>
<span class="pill">एकीकृत BarakaWay पसंदीदा</span>
</div>
</section>
<section class="empty" id="favoritesEmpty">जिन सामग्री को उपयोगकर्ता ने स्टार किया है, वे यहाँ दिखेंगी: सूरहें, अज़कार, लेख, अल्लाह के नाम और अन्य उपयोगी पृष्ठ।</section>
<section class="grid" id="favoritesGrid" style="margin-top:14px"></section>
<button class="clear" id="favoritesClear" type="button">पसंदीदा साफ़ करें</button>
</main>
<script>
(function(){
  var KEY='barakaway_favorites_v1';
  var CURRENT_LANG='hi';
  var TEXT={fav:'पसंदीदा',saved:'सहेजे गए',savedMaterial:'सहेजी गई सामग्री',dua:'दुआ',remove:'पसंदीदा से हटाएँ'};
  var pageCache={};

  function safe(value){
    return String(value == null ? '' : value)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  function read(){
    try{
      var parsed=JSON.parse(localStorage.getItem(KEY)||'[]');
      return Array.isArray(parsed)?parsed.filter(Boolean):[];
    }catch(e){return [];}
  }

  function write(list){
    try{localStorage.setItem(KEY,JSON.stringify(Array.isArray(list)?list:[]));}catch(e){}
    try{document.dispatchEvent(new CustomEvent('barakaway:favorites:changed'));}catch(e){}
    if(window.BarakaWayFavorites&&typeof window.BarakaWayFavorites.refreshNav==='function'){
      try{window.BarakaWayFavorites.refreshNav();}catch(e){}
    }
  }

  function itemId(x){
    return String((x && x.id) || ((x && x.url || '') + '::' + (x && x.title || '')));
  }

  function normalizeLang(lang){
    lang=String(lang||'').toLowerCase();
    if(lang==='kk') return 'kz';
    return lang || CURRENT_LANG;
  }

  function localizedUrl(url){
    url=String(url||'#');
    return url.replace(/(prophets-duas-)(ru|en|tr|uz|id|kz|kk|hi|bn|ur|ar)(\.html)/i,function(_,a,b,c){return a+CURRENT_LANG+c;});
  }

  function parseProphetsDuaId(id){
    var m=String(id||'').match(/(?:^|\/)prophets-duas-(ru|en|tr|uz|id|kz|kk|hi|bn|ur|ar)\.html::dua::(.+)$/i);
    return m?{sourceLang:normalizeLang(m[1]),duaId:m[2]}:null;
  }

  function localProphetsDuaGlobalId(duaId){
    return '/prophets-duas-'+CURRENT_LANG+'.html::dua::'+duaId;
  }

  function fetchProphetsPage(){
    var url='/prophets-duas-'+CURRENT_LANG+'.html';
    if(!pageCache[url]){
      pageCache[url]=fetch(url,{cache:'force-cache'}).then(function(r){
        if(!r.ok) throw new Error('Failed to load '+url);
        return r.text();
      }).then(function(html){
        return new DOMParser().parseFromString(html,'text/html');
      }).catch(function(){return null;});
    }
    return pageCache[url];
  }

  function pickText(root, selectors){
    for(var i=0;i<selectors.length;i++){
      var el=root.querySelector(selectors[i]);
      var text=el && el.textContent ? el.textContent.trim() : '';
      if(text) return text;
    }
    return '';
  }

  function resolveItem(x){
    var rawId=itemId(x);
    var parsed=parseProphetsDuaId(rawId);
    var fallback={
      id: rawId,
      removeId: rawId,
      url: localizedUrl(x && x.url || '#'),
      title: (x && x.title) || TEXT.fav,
      text: (x && (x.text || x.type)) || TEXT.savedMaterial,
      type: (x && x.type) || TEXT.savedMaterial
    };

    if(!parsed){
      return Promise.resolve(fallback);
    }

    fallback.id=localProphetsDuaGlobalId(parsed.duaId);
    fallback.url='/prophets-duas-'+CURRENT_LANG+'.html#'+parsed.duaId;
    fallback.type=TEXT.dua;

    return fetchProphetsPage().then(function(doc){
      if(!doc) return fallback;
      var selector='details.nested-dua[data-dua-id="'+CSS.escape(parsed.duaId)+'"]';
      var dua=doc.querySelector(selector);
      if(!dua) return fallback;
      var title=dua.getAttribute('data-dua-title') || pickText(dua,[
        ':scope > summary .dua-title',
        'summary .dua-title',
        '.dua-title'
      ]);
      var text=pickText(dua,[
        ':scope > .dua-body .dua-meaning',
        ':scope > .dua-body .dua-translit',
        ':scope > .dua-body .dua-arabic',
        '.dua-meaning',
        '.dua-translit',
        '.dua-arabic'
      ]);
      return {
        id:fallback.id,
        removeId:rawId,
        url:fallback.url,
        title:title || fallback.title,
        text:text || fallback.text,
        type:TEXT.dua
      };
    });
  }

  function updateCount(n){
    var count=document.getElementById('favoritesCount');
    if(count) count.textContent=n+' '+TEXT.saved;
  }

  function render(){
    var grid=document.getElementById('favoritesGrid');
    var empty=document.getElementById('favoritesEmpty');
    var clear=document.getElementById('favoritesClear');
    var list=read();
    if(!grid || !empty) return;

    updateCount(list.length);

    if(!list.length){
      empty.style.display='';
      if(clear) clear.classList.remove('is-visible');
      grid.innerHTML='';
      return;
    }

    empty.style.display='none';
    if(clear) clear.classList.add('is-visible');
    grid.innerHTML=list.map(function(x){
      var id=safe(itemId(x));
      var url=safe(localizedUrl(x && x.url || '#'));
      var title=safe((x && x.title) || TEXT.fav);
      var text=safe((x && (x.text || x.type)) || TEXT.savedMaterial);
      var type=safe((x && x.type) || TEXT.savedMaterial);
      return '<div class="card" data-id="'+id+'">'+
        '<button class="remove" type="button" data-remove-id="'+id+'" aria-label="'+safe(TEXT.remove)+'">×</button>'+
        '<button class="drag-handle" type="button" aria-label="Reorder"><span></span></button>'+
        '<a href="'+url+'" style="text-decoration:none;color:inherit;display:block">'+
        '<div class="icon">💛</div>'+
        '<div class="title">'+title+'</div>'+
        '<div class="text">'+text+'</div>'+
        '<span class="badge">'+type+'</span>'+
        '</a>'+
      '</div>';
    }).join('');

    Promise.all(list.map(resolveItem)).then(function(localized){
      var current=read();
      if(current.length!==list.length) return;
      grid.innerHTML=localized.map(function(x){
        var id=safe(x.removeId || x.id);
        return '<div class="card" data-id="'+id+'">'+
          '<button class="remove" type="button" data-remove-id="'+id+'" aria-label="'+safe(TEXT.remove)+'">×</button>'+
        '<button class="drag-handle" type="button" aria-label="Reorder"><span></span></button>'+
          '<a href="'+safe(x.url)+'" style="text-decoration:none;color:inherit;display:block">'+
          '<div class="icon">💛</div>'+
          '<div class="title">'+safe(x.title)+'</div>'+
          '<div class="text">'+safe(x.text)+'</div>'+
          '<span class="badge">'+safe(x.type)+'</span>'+
          '</a>'+
        '</div>';
      }).join('');
    });
  }


  var draggedCard=null;
  var draggedGrid=null;

  function persistOrderFromDom(){
    var grid=document.getElementById('favoritesGrid');
    if(!grid) return;
    var ids=[].slice.call(grid.querySelectorAll('.card[data-id]')).map(function(card){return card.getAttribute('data-id');}).filter(Boolean);
    if(!ids.length) return;
    var list=read();
    var byId={};
    list.forEach(function(x){byId[itemId(x)]=x;});
    var next=[];
    ids.forEach(function(id){if(byId[id]){next.push(byId[id]);delete byId[id];}});
    list.forEach(function(x){var id=itemId(x);if(byId[id]) next.push(x);});
    if(next.length===list.length) write(next);
  }

  document.addEventListener('pointerdown',function(e){
    var handle=e.target && e.target.closest ? e.target.closest('.drag-handle') : null;
    if(!handle) return;
    var card=handle.closest('.card');
    var grid=handle.closest('#favoritesGrid');
    if(!card || !grid) return;
    e.preventDefault();
    e.stopPropagation();
    draggedCard=card;
    draggedGrid=grid;
    card.classList.add('is-dragging');
    try{handle.setPointerCapture(e.pointerId);}catch(err){}
  });

  function animateReorder(grid, mutator){
    var cards=[].slice.call(grid.querySelectorAll('.card'));
    var first=new Map();
    cards.forEach(function(card){first.set(card,card.getBoundingClientRect());});
    mutator();
    cards=[].slice.call(grid.querySelectorAll('.card'));
    cards.forEach(function(card){
      var before=first.get(card);
      if(!before) return;
      var after=card.getBoundingClientRect();
      var dx=before.left-after.left;
      var dy=before.top-after.top;
      if(!dx && !dy) return;
      card.classList.add('is-reorder-animating');
      card.style.transform='translate('+dx+'px,'+dy+'px)';
      card.getBoundingClientRect();
      card.style.transform='';
      window.setTimeout(function(){card.classList.remove('is-reorder-animating');},240);
    });
  }

  document.addEventListener('pointermove',function(e){
    if(!draggedCard || !draggedGrid) return;
    e.preventDefault();
    var el=document.elementFromPoint(e.clientX,e.clientY);
    var over=el && el.closest ? el.closest('#favoritesGrid .card') : null;
    if(!over || over===draggedCard || over.parentNode!==draggedGrid) return;
    var rect=over.getBoundingClientRect();
    var before=e.clientY < rect.top + rect.height/2;
    animateReorder(draggedGrid,function(){
      draggedGrid.insertBefore(draggedCard,before ? over : over.nextSibling);
    });
  },{passive:false});

  document.addEventListener('pointerup',function(){
    if(!draggedCard) return;
    draggedCard.classList.remove('is-dragging');
    persistOrderFromDom();
    draggedCard=null;
    draggedGrid=null;
  });

  document.addEventListener('pointercancel',function(){
    if(draggedCard) draggedCard.classList.remove('is-dragging');
    draggedCard=null;
    draggedGrid=null;
  });

  document.addEventListener('click',function(e){
    var btn=e.target && e.target.closest ? e.target.closest('[data-remove-id]') : null;
    if(!btn)return;
    e.preventDefault();
    e.stopPropagation();
    var id=btn.getAttribute('data-remove-id');
    var next=read().filter(function(x){return itemId(x)!==id;});
    write(next);
    render();
  });

  var clearBtn=document.getElementById('favoritesClear');
  if(clearBtn){
    clearBtn.addEventListener('click',function(){write([]);render();});
  }

  document.addEventListener('barakaway:favorites:changed',render);
  render();
})();
</script>
<script src="/bottom-nav.js"></script>
</body>
</html>
