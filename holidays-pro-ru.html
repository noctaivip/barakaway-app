/* Holidays Pro: animation upgrade for existing cards */
.greeting-card .card-art:before,
.greeting-card .card-art:after{
content:"";
position:absolute;
inset:6% 6% 8% 6%;
z-index:4;
pointer-events:none;
border-radius:22px;
}
.greeting-card .card-art:before{
opacity:.18;
background:
linear-gradient(125deg,transparent 0 40%,rgba(243,217,146,.13) 50%,transparent 62%);
animation:holidayProOuterSheen 9s ease-in-out infinite;
filter:none;
}
.greeting-card .card-art:after{
opacity:.16;
background:
linear-gradient(125deg,transparent 0 38%,rgba(255,255,255,.10) 50%,transparent 64%);
mix-blend-mode:screen;
animation:holidayProOuterSheen 11s ease-in-out infinite reverse;
filter:none;
}
.greeting-card .card-image{
animation:holidayProImageFloat 7.5s ease-in-out infinite;
will-change:transform,filter;
}
.card-brand-badge,
.card-category-badge,
.card-site-mark{
z-index:4;
}
.card-image-overlay{
z-index:3;
}
.greeting-card:hover .card-image{
filter:saturate(1.08) contrast(1.04);
}
.preview-canvas{
box-shadow:0 0 0 1px rgba(243,217,146,.18),0 22px 70px rgba(0,0,0,.34);
}
@keyframes holidayProImageFloat{
0%,100%{transform:scale(1) translateY(0)}
50%{transform:scale(1.018) translateY(-6px)}
}
@keyframes holidayProOuterStars{
0%{transform:translate(-4px,3px) scale(.97);opacity:.60}
30%{transform:translate(5px,-7px) scale(1.12);opacity:1}
60%{transform:translate(-3px,-10px) scale(1.03);opacity:.82}
100%{transform:translate(4px,4px) scale(.98);opacity:.66}
}
@keyframes holidayProOuterSheen{
0%{transform:translateX(-18%);opacity:.12}
48%{transform:translateX(14%);opacity:.42}
100%{transform:translateX(22%);opacity:.20}
}
48%{transform:translateX(14%);opacity:.42}
100%{transform:translateX(22%);opacity:.20}
}
42%{transform:translateX(18%);opacity:.62}
100%{transform:translateX(28%);opacity:.26}

/* Holidays Pro: extra premium variation for ready cards */
.greeting-card{
position:relative;
}
.greeting-card:before{
content:"";
position:absolute;
inset:1px;
border-radius:inherit;
z-index:5;
pointer-events:none;
background:none;
border:1px solid rgba(243,217,146,.18);
box-shadow:inset 0 0 18px rgba(243,217,146,.06);
opacity:.72;
}
.greeting-card:after{
content:"";
position:absolute;
inset:10px;
border-radius:24px;
z-index:5;
pointer-events:none;
border:1px solid rgba(243,217,146,.14);
box-shadow:
inset 0 0 24px rgba(243,217,146,.07),
0 0 18px rgba(243,217,146,.05);
opacity:.50;
animation:holidayProCardBreath 5.6s ease-in-out infinite;
}
@keyframes holidayProCardSheen{
0%,100%{transform:translateX(-18%) scale(1.03);opacity:.18}
45%{opacity:.52}
70%{transform:translateX(18%) scale(1.03);opacity:.32}
}
@keyframes holidayProCardBreath{
0%,100%{opacity:.28;transform:scale(.992)}
50%{opacity:.70;transform:scale(1.006)}
}




/* Holidays Pro: slow individual moving stars */
.holiday-pro-stars{
position:absolute;
inset:6% 6% 8% 6%;
z-index:6;
pointer-events:none;
overflow:hidden;
border-radius:22px;
}
.holiday-pro-stars span{
position:absolute;
left:var(--x);
top:var(--y);
width:var(--s);
height:var(--s);
opacity:.82;
background:rgba(243,217,146,.92);
clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
filter:drop-shadow(0 0 7px rgba(243,217,146,.78));
animation:holidayProStarTravel var(--d) ease-in-out infinite alternate;
animation-delay:var(--delay);
}
.holiday-pro-stars span:nth-child(2n){
background:rgba(255,255,255,.84);
}
@keyframes holidayProStarTravel{
0%{transform:translate3d(var(--from-x),var(--from-y),0) rotate(0deg) scale(.86);opacity:.62}
18%{opacity:.95}
50%{opacity:1}
82%{opacity:.94}
100%{transform:translate3d(var(--to-x),var(--to-y),0) rotate(58deg) scale(1.08);opacity:.68}
}
35%{opacity:1}
70%{opacity:.86}
100%{transform:translate3d(var(--to-x),var(--to-y),0) rotate(70deg) scale(1.12);opacity:.72}
}

function cleanPersonalName(value){
  return String(value||"")
    .replace(/[<>]/g,"")
    .replace(/\s+/g," ")
    .trim()
    .slice(0,42);
}

function withPersonalName(name,text){
  const safeName=cleanPersonalName(name);
  const body=String(text||"").trim();
  const cleanBody=body.charAt(0).toUpperCase()+body.slice(1).replace(/[.\s]*$/,".");
  if(!safeName)return cleanBody;
  return safeName+", "+cleanBody.charAt(0).toLowerCase()+cleanBody.slice(1);
}

}

function holidayProHash(text){
let h=2166136261;
text=String(text||"");
for(let i=0;i<text.length;i++){
h^=text.charCodeAt(i);
h=Math.imul(h,16777619);
}

}

function holidayProPickVariation(g){

return HOLIDAY_PRO_VARIATIONS[idx];
}

function holidayProRand(seed){

x^=x<<13;

}

function getAverageLuminance(ctx,x,y,w,h){
try{
const data=ctx.getImageData(x,y,w,h).data;
let total=0,count=0;
for(let i=0;i<data.length;i+=16){
const r=data[i],g=data[i+1],b=data[i+2];
total+=(0.2126*r+0.7152*g+0.0722*b);
count++;
}
return count?total/count:80;
}catch(e){return 80;}
}

function drawHolidayProEffects(ctx,w,h,t,g,variation){

const pulse=.5+.5*Math.sin(t*Math.PI*2);

const boxX=w*.12;
const boxY=h*.33;
const boxW=w*.76;
const boxH=h*.40;

function smoothPingPong(v){
v=v-Math.floor(v);
const p=v<.5?v*2:(1-v)*2;
return p*p*(3-2*p);
}

ctx.save();

/* EXACT ready-card style stars for generated cards */
const stars=[
{x0:boxX-boxW*.06,y0:boxY-h*.12,x1:boxX+boxW*.78,y1:boxY-h*.04,size:7.2,duration:10.5,delay:.0},
{x0:boxX+boxW*.82,y0:boxY-h*.08,x1:boxX-boxW*.12,y1:boxY+h*.03,size:5.8,duration:12.0,delay:.18},
{x0:boxX-boxW*.10,y0:boxY+boxH*.16,x1:boxX+boxW*.16,y1:boxY+boxH*.62,size:5.2,duration:13.0,delay:.34},
{x0:boxX+boxW*.92,y0:boxY+boxH*.12,x1:boxX+boxW*.66,y1:boxY+boxH*.72,size:6.8,duration:11.5,delay:.52},
{x0:boxX+boxW*.10,y0:boxY+boxH*.82,x1:boxX+boxW*.74,y1:boxY+boxH*.56,size:4.8,duration:14.0,delay:.12},
{x0:boxX+boxW*.42,y0:boxY-h*.10,x1:boxX+boxW*.58,y1:boxY+boxH*.78,size:4.2,duration:15.0,delay:.40},
{x0:boxX-boxW*.04,y0:boxY+boxH*.36,x1:boxX+boxW*.88,y1:boxY+boxH*.18,size:5.0,duration:12.8,delay:.66},
{x0:boxX+boxW*.94,y0:boxY+boxH*.86,x1:boxX+boxW*.24,y1:boxY+boxH*.22,size:5.6,duration:13.8,delay:.82}
];

for(let i=0;i<stars.length;i++){
const s=stars[i];
const p=smoothPingPong((t/s.duration)+s.delay);

const x=s.x0+(s.x1-s.x0)*p;
const y=s.y0+(s.y1-s.y0)*p;

const twinkle=.62+.38*Math.sin(t*Math.PI*2+i*.9);
const size=s.size+twinkle*1.8;

ctx.save();
ctx.translate(x,y);
ctx.rotate((t*.42)+i);

ctx.globalAlpha=.48+twinkle*.34;
ctx.strokeStyle=i%2===0?"rgba(243,217,146,.88)":"rgba(255,255,255,.90)";

for(let point=0;point<10;point++){
const radius=point%2===0?size:size*.42;

const py=Math.sin(angle)*radius;
if(point===0){ctx.moveTo(px,py);}else{ctx.lineTo(px,py);}
}
ctx.closePath();
ctx.fillStyle=i%2===0?"rgba(243,217,146,.88)":"rgba(255,255,255,.90)";
ctx.fill();

ctx.restore();
}

/* Small floating premium particles */
for(let i=0;i<12;i++){
const drift=smoothPingPong((t/(8+i))+i*.17);
const x=boxX+drift*boxW;
const y=boxY+((i%4)*.22+.14)*boxH+Math.sin(t*Math.PI*1.4+i)*5;

ctx.globalAlpha=.12+.18*Math.sin(t*Math.PI*2+i*.4);
ctx.fillStyle=i%2===0?"rgba(243,217,146,.58)":"rgba(255,255,255,.52)";
ctx.fillRect(x,y,1.4,1.4);
}

/* Thin premium border glow */
ctx.save();
ctx.globalAlpha=.34+.14*pulse;
ctx.strokeStyle="rgba(243,217,146,.52)";
ctx.lineWidth=2.4;
drawRoundRect(ctx,52,52,w-104,h-104,44);
ctx.stroke();

ctx.globalAlpha=.20+.08*pulse;
ctx.strokeStyle="rgba(255,255,255,.28)";
ctx.lineWidth=1.2;
drawRoundRect(ctx,68,68,w-136,h-136,34);
ctx.stroke();
ctx.restore();

ctx.restore();
}
