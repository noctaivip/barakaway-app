<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BarakaWay — выбор языка</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="stylesheet" href="desktop-web.css">
<style>
:root{color-scheme:dark;--bg:#071115;--card:#101b20;--gold:#d7b56d;--green:#2d7a46;--text:#eef7f2;--muted:#9dafaa;--border:rgba(215,181,109,.24)}
*{box-sizing:border-box}
body{margin:0;min-width:1024px;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 50% -20%,rgba(215,181,109,.18),transparent 42%),linear-gradient(180deg,#071115,#0d171c 58%,#071115);color:var(--text)}
.lang-shell{width:min(1120px,calc(100% - 80px));margin:0 auto;padding:88px 0}
.lang-hero{text-align:center;padding:44px 34px 50px;border:1px solid var(--border);border-radius:34px;background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.022));box-shadow:0 30px 80px rgba(0,0,0,.32)}
.lang-logo{width:104px;height:104px;object-fit:contain;border-radius:28px;display:block;margin:0 auto 34px;filter:drop-shadow(0 18px 30px rgba(0,0,0,.35))}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:18px;margin-top:0}
.lang-card{min-height:132px;border-radius:26px;border:1px solid rgba(215,181,109,.22);background:radial-gradient(circle at 80% 0%,rgba(215,181,109,.14),transparent 42%),linear-gradient(180deg,#132127,#0e181d);color:var(--text);text-decoration:none;padding:24px 18px;display:flex;flex-direction:column;justify-content:center;gap:10px;transition:.18s ease;box-shadow:0 16px 40px rgba(0,0,0,.18)}
.lang-card:hover{transform:translateY(-3px);border-color:rgba(215,181,109,.48);box-shadow:0 24px 56px rgba(0,0,0,.28)}
.lang-card strong{font-size:21px;line-height:1.15;color:#65e28f}
.lang-card span{color:#f4f1df;font-size:15px;font-weight:900}
.lang-card.ru{background:radial-gradient(circle at 80% 0%,rgba(215,181,109,.22),transparent 42%),linear-gradient(135deg,#173726,#101b20);border-color:rgba(215,181,109,.42)}
</style>

<script src="theme-init.js"></script>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="theme-universal.css">
<script src="theme-toggle.js" defer></script>

</head>
<body>
<main class="lang-shell">
<section class="lang-hero">
<img class="lang-logo" src="Logo.png" alt="BarakaWay">
<div class="grid" aria-label="Выбор языка">
<a class="lang-card ru" href="home-ru.html"><strong>Русский</strong><span>Открыть сайт</span></a>
<a class="lang-card" href="home-en.html"><strong>English</strong><span>Open website</span></a>
<a class="lang-card" href="home-ar.html"><strong>العربية</strong><span>افتح الموقع</span></a>
<a class="lang-card" href="home-tr.html"><strong>Türkçe</strong><span>Siteyi aç</span></a>
<a class="lang-card" href="home-uz.html"><strong>O‘zbekcha</strong><span>Saytni ochish</span></a>
<a class="lang-card" href="home-kz.html"><strong>Қазақша</strong><span>Сайтты ашу</span></a>
<a class="lang-card" href="home-id.html"><strong>Indonesia</strong><span>Buka situs</span></a>
<a class="lang-card" href="home-hi.html"><strong>हिन्दी</strong><span>वेबसाइट खोलें</span></a>
<a class="lang-card" href="home-bn.html"><strong>বাংলা</strong><span>সাইট খুলুন</span></a>
<a class="lang-card" href="home-ur.html"><strong>اردو</strong><span>ویب سائٹ کھولیں</span></a>
</div>
</section>
</main>
</body>
</html>
