<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Selection</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#f5f7f8;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
background:white;
padding:40px 30px;
border-radius:16px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
text-align:center;
max-width:400px;
width:90%;
}

h1{
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:30px;
}

.btn{
display:block;
width:100%;
padding:16px;
margin-bottom:12px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.btn-en{
background:#2d7a46;
color:white;
}

.btn-ru{
background:#eaeaea;
color:#222;
}

.btn:hover{
transform:translateY(-1px);
}
</style>
</head>

<body>

<div class="container">
<h1>Select Language</h1>
<p>Choose your language to continue</p>

<button class="btn btn-en" onclick="setLang('en')">English</button>
<button class="btn btn-ru" onclick="setLang('ru')">Русский</button>
</div>

<script>
function setLang(lang){
  localStorage.setItem("siteLanguage", lang);
  sessionStorage.removeItem("forceLanguageSelect");

  if(lang === "en"){
    window.location.href = "home.html";
  } else {
    window.location.href = "home-ru.html";
  }
}

// If user pressed "Change language", force the chooser once.
const force = sessionStorage.getItem("forceLanguageSelect");

if(force === "1"){
  sessionStorage.removeItem("forceLanguageSelect");
} else {
  const savedLang = localStorage.getItem("siteLanguage");
  if(savedLang){
    if(savedLang === "en"){
      window.location.href = "home.html";
    } else {
      window.location.href = "home-ru.html";
    }
  }
}
</script>

</body>
</html>
