<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Selection</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#f5f7f8;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
background:white;
padding:40px 30px;
border-radius:16px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
text-align:center;
max-width:400px;
width:90%;
}

h1{
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:30px;
}

.btn{
display:block;
width:100%;
padding:16px;
margin-bottom:12px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.btn-en{background:#2d7a46;color:white;}
.btn-ru{background:#eaeaea;color:#222;}
.btn-uz{background:#e6f4ea;color:#1f2a22;}
.btn-ar{background:#f0f5ff;color:#1a2a4a;}
.btn-id{background:#fff3e8;color:#7a3e00;}
.btn-ur{background:#f3e8ff;color:#3a1a4a;}
.btn-hi{background:#f0fff4;color:#1a4a2a;}

/* NEW DISABLED LANGS */
.btn-disabled{
background:#f2f2f2;
color:#999;
cursor:not-allowed;
position:relative;
}

.btn-disabled::after{
content:"Coming soon";
position:absolute;
right:14px;
top:50%;
transform:translateY(-50%);
font-size:12px;
color:#bbb;
}

.note{
font-size:13px;
color:#888;
margin-top:10px;
}

.btn:hover{
transform:translateY(-1px);
}
.btn-disabled:hover{
transform:none;
}
</style>
</head>

<body>

<div class="container">
<h1>Select Language</h1>
<p>Choose your language to continue</p>

<button class="btn btn-en" onclick="setLang('en')">English</button>
<button class="btn btn-ru" onclick="setLang('ru')">Русский</button>
<button class="btn btn-uz" onclick="setLang('uz')">O‘zbekcha</button>
<button class="btn btn-ar" onclick="setLang('ar')">العربية</button>
<button class="btn btn-id" onclick="setLang('id')">Bahasa Indonesia</button>
<button class="btn btn-ur" onclick="setLang('ur')">اردو</button>
<button class="btn btn-hi" onclick="setLang('hi')">हिन्दी</button>

<!-- NEW LANGUAGES (DISABLED) -->
<button class="btn btn-disabled">বাংলা (Bengali)</button>
<button class="btn btn-disabled">Türkçe</button>
<button class="btn btn-disabled">Қазақша</button>

<div class="note">
More languages will be available soon
</div>

</div>

<script>
function setLang(lang){
  localStorage.setItem("siteLanguage", lang);
  sessionStorage.removeItem("forceLanguageSelect");

  if(lang === "en"){
    window.location.href = "home-en.html";
  } else if(lang === "ru"){
    window.location.href = "home-ru.html";
  } else if(lang === "uz"){
    window.location.href = "home-uz.html";
  } else if(lang === "ar"){
    window.location.href = "home-ar.html";
  } else if(lang === "id"){
    window.location.href = "home-id.html";
  } else if(lang === "ur"){
    window.location.href = "home-ur.html";
  } else if(lang === "hi"){
    window.location.href = "home-hi.html";
  }
}

const force = sessionStorage.getItem("forceLanguageSelect");

if(force === "1"){
  sessionStorage.removeItem("forceLanguageSelect");
} else {
  const savedLang = localStorage.getItem("siteLanguage");
  if(savedLang){
    if(savedLang === "en"){
      window.location.href = "home-en.html";
    } else if(savedLang === "ru"){
      window.location.href = "home-ru.html";
    } else if(savedLang === "uz"){
      window.location.href = "home-uz.html";
    } else if(savedLang === "ar"){
      window.location.href = "home-ar.html";
    } else if(savedLang === "id"){
      window.location.href = "home-id.html";
    } else if(savedLang === "ur"){
      window.location.href = "home-ur.html";
    } else if(savedLang === "hi"){
      window.location.href = "home-hi.html";
    }
  }
}
</script>

</body>
</html>
