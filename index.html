<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Selection</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#f5f7f8;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
background:white;
padding:40px 30px;
border-radius:16px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
text-align:center;
max-width:400px;
width:90%;
}

h1{
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:30px;
}

.btn{
display:block;
width:100%;
padding:16px;
margin-bottom:12px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.btn-en{background:#2d7a46;color:white;}
.btn-ru{background:#eaeaea;color:#222;}
.btn-uz{background:#e6f4ea;color:#1f2a22;}
.btn-ar{background:#f0f5ff;color:#1a2a4a;}
.btn-id{background:#fff3e8;color:#7a3e00;}
.btn-ur{background:#f3e8ff;color:#3a1a4a;}
.btn-hi{background:#f0fff4;color:#1a4a2a;}

/* NEW DISABLED LANGS */
.btn-disabled{
background:#f2f2f2;
color:#999;
cursor:not-allowed;
position:relative;
}

.btn-disabled::after{
position:absolute;
right:14px;
top:50%;
transform:translateY(-50%);
font-size:12px;
color:#bbb;
}

.note{
font-size:13px;
color:#888;
margin-top:10px;
}

.btn:hover{
transform:translateY(-1px);
}
.btn-disabled:hover{
transform:none;
}


.theme-toggle{
position:fixed;
top:18px;
left:50%;
transform:translateX(-50%);
display:inline-flex;
align-items:center;
gap:10px;
padding:8px 14px;
background:rgba(255,255,255,0.92);
border:1px solid rgba(0,0,0,0.08);
border-radius:999px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
z-index:1000;
backdrop-filter:blur(8px);
}

.theme-toggle-label{
font-size:14px;
font-weight:600;
color:#222;
}

.theme-switch{
position:relative;
width:52px;
height:30px;
appearance:none;
background:#d8dde3;
border-radius:999px;
outline:none;
cursor:pointer;
transition:0.25s;
}

.theme-switch::before{
content:"";
position:absolute;
top:3px;
left:3px;
width:24px;
height:24px;
border-radius:50%;
background:#fff;
box-shadow:0 2px 6px rgba(0,0,0,0.18);
transition:0.25s;
}

.theme-switch:checked{
background:#2d7a46;
}

.theme-switch:checked::before{
transform:translateX(22px);
}

body,
.container,
p,
.note{
transition:background 0.25s,color 0.25s,box-shadow 0.25s,border-color 0.25s;
}

body.dark-mode{
background:#101418;
}

body.dark-mode .theme-toggle{
background:rgba(21,27,34,0.94);
border-color:rgba(255,255,255,0.08);
box-shadow:0 8px 24px rgba(0,0,0,0.35);
}

body.dark-mode .theme-toggle-label{
color:#f3f5f7;
}

body.dark-mode .container{
background:#171d24;
box-shadow:0 10px 28px rgba(0,0,0,0.35);
}

body.dark-mode h1{
color:#f5f7fa;
}

body.dark-mode p,
body.dark-mode .note{
color:#b9c0c8;
}

body.dark-mode .btn-ru{
background:#2a3138;
color:#f3f5f7;
}

body.dark-mode .btn-uz{
background:#1d3327;
color:#dff4e6;
}

body.dark-mode .btn-ar{
background:#1c2940;
color:#dfe9ff;
}

body.dark-mode .btn-id{
background:#3b2a1f;
color:#ffe7cf;
}

body.dark-mode .btn-ur{
background:#30213d;
color:#f1dcff;
}

body.dark-mode .btn-hi{
background:#1f3326;
color:#dcffe8;
}

body.dark-mode .btn-disabled{
background:#222a31;
color:#6f7882;
}

</style>
</head>

<body>

<div class="theme-toggle">
  <span class="theme-toggle-label">Dark mode</span>
  <input type="checkbox" class="theme-switch" id="themeSwitch" aria-label="Toggle dark mode">
</div>

<div class="container">
<h1>Select Language</h1>
<p>Choose your language to continue</p>

<button class="btn btn-en" onclick="setLang('en')">English</button>
<button class="btn btn-ru" onclick="setLang('ru')">Русский</button>
<button class="btn btn-uz" onclick="setLang('uz')">O‘zbekcha</button>
<button class="btn btn-ar" onclick="setLang('ar')">العربية</button>
<button class="btn btn-id" onclick="setLang('id')">Bahasa Indonesia</button>
<button class="btn btn-ur" onclick="setLang('ur')">اردو</button>
<button class="btn btn-hi" onclick="setLang('hi')">हिन्दी</button>
<div class="note">
More languages will be available soon
</div>
<!-- NEW LANGUAGES (DISABLED) -->
<button class="btn btn-disabled">Türkçe</button>
<button class="btn btn-disabled">বাংলা (Bengali)</button>
<button class="btn btn-disabled">Қазақша</button>
</div>

<script>
function setLang(lang){
  localStorage.setItem("siteLanguage", lang);
  sessionStorage.removeItem("forceLanguageSelect");

  if(lang === "en"){
    window.location.href = "home-en.html";
  } else if(lang === "ru"){
    window.location.href = "home-ru.html";
  } else if(lang === "uz"){
    window.location.href = "home-uz.html";
  } else if(lang === "ar"){
    window.location.href = "home-ar.html";
  } else if(lang === "id"){
    window.location.href = "home-id.html";
  } else if(lang === "ur"){
    window.location.href = "home-ur.html";
  } else if(lang === "hi"){
    window.location.href = "home-hi.html";
  }
}

const themeSwitch = document.getElementById("themeSwitch");
const savedTheme = localStorage.getItem("siteTheme");

if(savedTheme === "dark"){
  document.body.classList.add("dark-mode");
  themeSwitch.checked = true;
}

themeSwitch.addEventListener("change", function(){
  if(this.checked){
    document.body.classList.add("dark-mode");
    localStorage.setItem("siteTheme", "dark");
  } else {
    document.body.classList.remove("dark-mode");
    localStorage.setItem("siteTheme", "light");
  }
});

const force = sessionStorage.getItem("forceLanguageSelect");

if(force === "1"){
  sessionStorage.removeItem("forceLanguageSelect");
} else {
  const savedLang = localStorage.getItem("siteLanguage");
  if(savedLang){
    if(savedLang === "en"){
      window.location.href = "home-en.html";
    } else if(savedLang === "ru"){
      window.location.href = "home-ru.html";
    } else if(savedLang === "uz"){
      window.location.href = "home-uz.html";
    } else if(savedLang === "ar"){
      window.location.href = "home-ar.html";
    } else if(savedLang === "id"){
      window.location.href = "home-id.html";
    } else if(savedLang === "ur"){
      window.location.href = "home-ur.html";
    } else if(savedLang === "hi"){
      window.location.href = "home-hi.html";
    }
  }
}
</script>

</body>
</html>
