<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Selection</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:#0d141c;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:28px 16px;
transition:background 0.25s ease,color 0.25s ease;
}

.page-shell{
width:100%;
max-width:420px;
display:flex;
flex-direction:column;
align-items:center;
gap:16px;
}

.theme-toggle{
display:inline-flex;
align-items:center;
justify-content:center;
gap:10px;
padding:10px 14px;
background:rgba(20,28,38,0.96);
border:1px solid rgba(255,255,255,0.08);
border-radius:999px;
box-shadow:0 10px 30px rgba(0,0,0,0.28);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
}

.theme-toggle-label{
font-size:14px;
font-weight:600;
color:#f3f5f7;
white-space:nowrap;
letter-spacing:0.1px;
transition:color 0.25s ease;
}

.theme-switch{
position:relative;
width:54px;
height:30px;
appearance:none;
-webkit-appearance:none;
border:none;
outline:none;
cursor:pointer;
border-radius:999px;
background:#2d7a46;
transition:background 0.25s ease;
flex:0 0 auto;
}

.theme-switch::before{
content:"";
position:absolute;
top:3px;
left:27px;
width:24px;
height:24px;
border-radius:50%;
background:#ffffff;
box-shadow:0 2px 8px rgba(0,0,0,0.18);
transition:left 0.25s ease;
}

.container{
background:#171f29;
padding:40px 28px 26px;
border-radius:22px;
box-shadow:0 16px 42px rgba(0,0,0,0.34);
text-align:center;
width:100%;
transition:background 0.25s ease, box-shadow 0.25s ease;
}

h1{
margin:0 0 10px;
font-size:28px;
line-height:1.2;
color:#f5f7fa;
transition:color 0.25s ease;
}

p{
color:#b7c0c9;
margin:0 0 28px;
font-size:18px;
line-height:1.45;
transition:color 0.25s ease;
}

.btn{
display:block;
width:100%;
padding:16px;
margin-bottom:12px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:transform 0.2s ease, filter 0.2s ease, background 0.25s ease, color 0.25s ease;
}

.btn:hover{
transform:translateY(-1px);
filter:brightness(1.03);
}

.btn-disabled:hover{
transform:none;
filter:none;
}

.btn-en{
background:linear-gradient(135deg,#2f8f55 0%, #43b06a 100%);
color:#ffffff;
box-shadow:0 10px 24px rgba(67,176,106,0.18);
}
.btn-ru{
background:linear-gradient(135deg,#31445f 0%, #43638b 100%);
color:#f3f7ff;
box-shadow:0 10px 24px rgba(67,99,139,0.18);
}
.btn-uz{
background:linear-gradient(135deg,#25533a 0%, #2f7a59 100%);
color:#e6fff1;
box-shadow:0 10px 24px rgba(47,122,89,0.18);
}
.btn-ar{
background:linear-gradient(135deg,#2b3f69 0%, #4668a5 100%);
color:#eef4ff;
box-shadow:0 10px 24px rgba(70,104,165,0.18);
}
.btn-id{
background:linear-gradient(135deg,#6a4428 0%, #9b6942 100%);
color:#fff1e5;
box-shadow:0 10px 24px rgba(155,105,66,0.18);
}
.btn-ur{
background:linear-gradient(135deg,#51306d 0%, #75469f 100%);
color:#f7ebff;
box-shadow:0 10px 24px rgba(117,70,159,0.18);
}
.btn-hi{
background:linear-gradient(135deg,#2f5938 0%, #458152 100%);
color:#ebfff0;
box-shadow:0 10px 24px rgba(69,129,82,0.18);
}

.btn-disabled{
background:linear-gradient(135deg,#263341 0%, #314152 100%);
color:#8593a0;
cursor:not-allowed;
box-shadow:none;
}

.note{
font-size:13px;
line-height:1.45;
color:#afbac4;
margin:2px 0 14px;
transition:color 0.25s ease;
}

/* Light mode */
body.light-mode{
background:#eef3f8;
}

body.light-mode .theme-toggle{
background:rgba(255,255,255,0.96);
border-color:rgba(15,23,42,0.08);
box-shadow:0 10px 26px rgba(15,23,42,0.10);
}

body.light-mode .theme-toggle-label{
color:#1f2937;
}

body.light-mode .theme-switch{
background:#d7dee7;
}

body.light-mode .theme-switch::before{
left:3px;
}

body.light-mode .container{
background:#ffffff;
box-shadow:0 14px 36px rgba(15,23,42,0.10);
}

body.light-mode h1{
color:#111827;
}

body.light-mode p{
color:#64748b;
}

body.light-mode .note{
color:#7b8794;
}

body.light-mode .btn-ru{
background:#e9edf2;
color:#222;
}

body.light-mode .btn-uz{
background:#e6f4ea;
color:#1f2a22;
}

body.light-mode .btn-ar{
background:#edf4ff;
color:#1a2a4a;
}

body.light-mode .btn-id{
background:#fff3e8;
color:#7a3e00;
}

body.light-mode .btn-ur{
background:#f3e8ff;
color:#3a1a4a;
}

body.light-mode .btn-hi{
background:#f0fff4;
color:#1a4a2a;
}

body.light-mode .btn-disabled{
background:#f1f4f7;
color:#9aa4af;
}

@media (max-width:640px){
body{
padding:14px;
align-items:flex-start;
}

.page-shell{
max-width:100%;
gap:14px;
}

.theme-toggle{
padding:9px 12px;
}

.theme-toggle-label{
font-size:13px;
}

.theme-switch{
width:50px;
height:28px;
}

.theme-switch::before{
width:22px;
height:22px;
top:3px;
left:25px;
}

body.light-mode .theme-switch::before{
left:3px;
}

.container{
padding:30px 18px 20px;
border-radius:18px;
}

h1{
font-size:26px;
}

p{
font-size:16px;
margin-bottom:22px;
}

.btn{
font-size:17px;
padding:15px;
border-radius:13px;
}
}
</style>
<script src="/theme-init.js"></script>
<link rel="stylesheet" href="/theme.css">
<link rel="stylesheet" href="/theme-universal.css">
</head>

<body>

<div class="page-shell">
  <div class="theme-toggle">
    <span class="theme-toggle-label">Light mode</span>
    <input type="checkbox" class="theme-switch" id="themeSwitch" aria-label="Toggle theme">
  </div>

  <div class="container">
    <h1>Select Language</h1>
    <p>Choose your language to continue</p>

    <button class="btn btn-en" onclick="setLang('en')">English</button>
    <button class="btn btn-ru" onclick="setLang('ru')">Русский</button>
    <button class="btn btn-uz" onclick="setLang('uz')">O‘zbekcha</button>
    <button class="btn btn-ar" onclick="setLang('ar')">العربية</button>
    <button class="btn btn-id" onclick="setLang('id')">Bahasa Indonesia</button>
    <button class="btn btn-ur" onclick="setLang('ur')">اردو</button>
    <button class="btn btn-hi" onclick="setLang('hi')">हिन्दी</button>

    <div class="note">More languages will be available soon</div>

    <button class="btn btn-disabled">Türkçe</button>
    <button class="btn btn-disabled">বাংলা (Bengali)</button>
    <button class="btn btn-disabled">Қазақша</button>
  </div>
</div>

<script>
function setLang(lang){
  localStorage.setItem("siteLanguage", lang);
  sessionStorage.removeItem("forceLanguageSelect");

  if(lang === "en"){
    window.location.href = "home-en.html";
  } else if(lang === "ru"){
    window.location.href = "home-ru.html";
  } else if(lang === "uz"){
    window.location.href = "home-uz.html";
  } else if(lang === "ar"){
    window.location.href = "home-ar.html";
  } else if(lang === "id"){
    window.location.href = "home-id.html";
  } else if(lang === "ur"){
    window.location.href = "home-ur.html";
  } else if(lang === "hi"){
    window.location.href = "home-hi.html";
  }
}

const themeSwitch = document.getElementById("themeSwitch");
const themeLabel = document.querySelector(".theme-toggle-label");
const savedTheme = localStorage.getItem("siteTheme");

if(savedTheme === "light"){
  document.body.classList.add("light-mode");
  themeSwitch.checked = true;
} else {
  localStorage.setItem("siteTheme", "dark");
}

function updateThemeLabel(){
  if(document.body.classList.contains("light-mode")){
    themeLabel.textContent = "Dark mode";
  } else {
    themeLabel.textContent = "Light mode";
  }
}

updateThemeLabel();

themeSwitch.addEventListener("change", function(){
  if(this.checked){
    document.body.classList.add("light-mode");
    localStorage.setItem("siteTheme", "light");
  } else {
    document.body.classList.remove("light-mode");
    localStorage.setItem("siteTheme", "dark");
  }
  updateThemeLabel();
});

const force = sessionStorage.getItem("forceLanguageSelect");

if(force === "1"){
  sessionStorage.removeItem("forceLanguageSelect");
} else {
  const savedLang = localStorage.getItem("siteLanguage");
  if(savedLang){
    if(savedLang === "en"){
      window.location.href = "home-en.html";
    } else if(savedLang === "ru"){
      window.location.href = "home-ru.html";
    } else if(savedLang === "uz"){
      window.location.href = "home-uz.html";
    } else if(savedLang === "ar"){
      window.location.href = "home-ar.html";
    } else if(savedLang === "id"){
      window.location.href = "home-id.html";
    } else if(savedLang === "ur"){
      window.location.href = "home-ur.html";
    } else if(savedLang === "hi"){
      window.location.href = "home-hi.html";
    }
  }
}
</script>

<script src="/theme-toggle.js"></script>
</body>
</html>
