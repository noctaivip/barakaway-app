<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Selection</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:#0d141c;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:28px 16px;
transition:background 0.25s ease,color 0.25s ease;
}

.page-shell{
width:100%;
max-width:420px;
display:flex;
flex-direction:column;
align-items:center;
gap:16px;
}

.theme-toggle{
display:inline-flex;
align-items:center;
justify-content:center;
gap:10px;
padding:10px 14px;
background:rgba(20,28,38,0.96);
border:1px solid rgba(255,255,255,0.08);
border-radius:999px;
box-shadow:0 10px 30px rgba(0,0,0,0.28);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
}

.theme-toggle-label{
font-size:14px;
font-weight:600;
color:#f3f5f7;
white-space:nowrap;
letter-spacing:0.1px;
transition:color 0.25s ease;
}

.theme-switch{
position:relative;
width:54px;
height:30px;
appearance:none;
-webkit-appearance:none;
border:none;
outline:none;
cursor:pointer;
border-radius:999px;
background:#2d7a46;
transition:background 0.25s ease;
flex:0 0 auto;
}

.theme-switch::before{
content:"";
position:absolute;
top:3px;
left:27px;
width:24px;
height:24px;
border-radius:50%;
background:#ffffff;
box-shadow:0 2px 8px rgba(0,0,0,0.18);
transition:left 0.25s ease;
}

.brand-block{
display:flex;
align-items:center;
justify-content:center;
margin:2px 0 2px;
}

.brand-signature{
display:inline-flex;
align-items:baseline;
justify-content:center;
gap:0;
font-weight:900;
letter-spacing:-0.045em;
line-height:1;
font-size:42px;
}

.brand-letter-accent{
color:#4caf6a;
}

.brand-letter-main{
color:#f5f7fa;
}

.container{
background:linear-gradient(180deg,#131b25 0%, #101821 100%);
padding:28px 28px 28px;
border-radius:28px;
border:1px solid rgba(255,255,255,0.05);
box-shadow:
  0 22px 60px rgba(0,0,0,0.42),
  0 8px 22px rgba(17,29,42,0.24),
  inset 0 1px 0 rgba(255,255,255,0.04);
text-align:center;
width:100%;
transition:background 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}

h1{
margin:0 0 10px;
font-size:28px;
line-height:1.2;
color:#f5f7fa;
transition:color 0.25s ease;
}

p{
color:#b7c0c9;
margin:0 0 24px;
font-size:18px;
line-height:1.45;
transition:color 0.25s ease;
}

.btn{
display:block;
width:100%;
padding:17px 18px;
margin-bottom:14px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:800;
letter-spacing:-0.01em;
cursor:pointer;
transition:transform 0.2s ease, filter 0.2s ease, background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);
background-clip:padding-box;
}

.btn:hover{
transform:translateY(-2px);
filter:brightness(1.05);
}

.btn-disabled:hover{
transform:none;
filter:none;
}

.container .btn-en{
background:linear-gradient(135deg,#1f6b43 0%, #2f8f55 100%) !important;
color:#ffffff !important;
border:1px solid rgba(92,181,128,0.26) !important;
box-shadow:0 12px 28px rgba(47,143,85,0.22) !important;
}
.container .btn-ru{
background:linear-gradient(135deg,#2f4968 0%, #406285 100%) !important;
color:#f3f7ff !important;
border:1px solid rgba(112,154,208,0.24) !important;
box-shadow:0 12px 28px rgba(64,98,133,0.22) !important;
}
.container .btn-uz{
background:linear-gradient(135deg,#24553d 0%, #2f7a59 100%) !important;
color:#e9fff2 !important;
border:1px solid rgba(94,175,139,0.24) !important;
box-shadow:0 12px 28px rgba(47,122,89,0.22) !important;
}
.container .btn-ar{
background:linear-gradient(135deg,#304a76 0%, #43639a 100%) !important;
color:#eef4ff !important;
border:1px solid rgba(103,138,201,0.24) !important;
box-shadow:0 12px 28px rgba(67,99,154,0.22) !important;
}
.container .btn-id{
background:linear-gradient(135deg,#6c4529 0%, #946343 100%) !important;
color:#fff2e8 !important;
border:1px solid rgba(193,139,98,0.22) !important;
box-shadow:0 12px 28px rgba(148,99,67,0.20) !important;
}
.container .btn-ur{
background:linear-gradient(135deg,#4a2f65 0%, #6b4390 100%) !important;
color:#f8efff !important;
border:1px solid rgba(151,111,205,0.22) !important;
box-shadow:0 12px 28px rgba(107,67,144,0.20) !important;
}
.container .btn-hi{
background:linear-gradient(135deg,#2d5a3a 0%, #3f7d52 100%) !important;
color:#effff4 !important;
border:1px solid rgba(104,171,123,0.22) !important;
box-shadow:0 12px 28px rgba(63,125,82,0.20) !important;
}

.container .btn-disabled{
background:linear-gradient(135deg,#24313d 0%, #314150 100%) !important;
color:#7f8d9a !important;
border:1px solid rgba(255,255,255,0.04) !important;
cursor:not-allowed;
box-shadow:none !important;
}

.note{
font-size:13px;
line-height:1.45;
color:#afbac4;
margin:2px 0 14px;
transition:color 0.25s ease;
}

/* Light mode */
body.light-mode{
background:#eef3f8;
}

body.light-mode .theme-toggle{
background:rgba(255,255,255,0.96);
border-color:rgba(15,23,42,0.08);
box-shadow:0 10px 26px rgba(15,23,42,0.10);
}

body.light-mode .theme-toggle-label{
color:#1f2937;
}

body.light-mode .theme-switch{
background:#d7dee7;
}

body.light-mode .theme-switch::before{
left:3px;
}

body.light-mode .container{
background:#ffffff;
box-shadow:0 14px 36px rgba(15,23,42,0.10);
}

body.light-mode .brand-letter-main{
color:#1f2a22;
}

body.light-mode h1{
color:#111827;
}

body.light-mode p{
color:#64748b;
}

body.light-mode .note{
color:#7b8794;
}

body.light-mode .btn-ru{
background:#e9edf2;
color:#222;
}

body.light-mode .btn-uz{
background:#e6f4ea;
color:#1f2a22;
}

body.light-mode .btn-ar{
background:#edf4ff;
color:#1a2a4a;
}

body.light-mode .btn-id{
background:#fff3e8;
color:#7a3e00;
}

body.light-mode .btn-ur{
background:#f3e8ff;
color:#3a1a4a;
}

body.light-mode .btn-hi{
background:#f0fff4;
color:#1a4a2a;
}

body.light-mode .btn-disabled{
background:#f1f4f7 !important;
color:#9aa4af !important;
border:none !important;
box-shadow:none !important;
}

@media (max-width:640px){
body{
padding:14px;
align-items:flex-start;
}

.page-shell{
max-width:100%;
gap:12px;
}

.brand-signature{
font-size:34px;
}

.theme-toggle{
padding:9px 12px;
}

.theme-toggle-label{
font-size:13px;
}

.theme-switch{
width:50px;
height:28px;
}

.theme-switch::before{
width:22px;
height:22px;
top:3px;
left:25px;
}

body.light-mode .theme-switch::before{
left:3px;
}

.container{
padding:30px 18px 20px;
border-radius:18px;
}

h1{
font-size:26px;
}

p{
font-size:16px;
margin-bottom:22px;
}

.btn{
font-size:17px;
padding:15px;
border-radius:13px;
}
}
</style>
<script src="/theme-init.js"></script>
<link rel="stylesheet" href="/theme.css">
<link rel="stylesheet" href="/theme-universal.css">

<body>

<div class="page-shell">
  <div class="theme-toggle">
    <span class="theme-toggle-label">Light mode</span>
    <input type="checkbox" class="theme-switch" id="themeSwitch" aria-label="Toggle theme">
  </div>

  <div class="brand-block" aria-label="BarakaWay">
    <div class="brand-signature">
      <span class="brand-letter-accent">B</span><span class="brand-letter-main">araka</span><span class="brand-letter-accent">W</span><span class="brand-letter-main">ay</span>
    </div>
  </div>

  <div class="container">
    <p>Choose your language to continue</p>

    <button class="btn btn-en" onclick="setLang('en')">English</button>
    <button class="btn btn-ru" onclick="setLang('ru')">Русский</button>
    <button class="btn btn-uz" onclick="setLang('uz')">O‘zbekcha</button>
    <button class="btn btn-ar" onclick="setLang('ar')">العربية</button>
    <button class="btn btn-id" onclick="setLang('id')">Bahasa Indonesia</button>
    <button class="btn btn-ur" onclick="setLang('ur')">اردو</button>
    <button class="btn btn-hi" onclick="setLang('hi')">हिन्दी</button>
    <button class="btn btn-tr" onclick="setLang('tr')">Türkçe</button>

    <div class="note">More languages will be available soon</div>

    <button class="btn btn-disabled">বাংলা (Bengali)</button>
    <button class="btn btn-disabled">Қазақша</button>
  </div>
</div>

<script>
function setLang(lang){
  localStorage.setItem("siteLanguage", lang);
  sessionStorage.removeItem("forceLanguageSelect");

  if(lang === "en"){
    window.location.href = "home-en.html";
  } else if(lang === "ru"){
    window.location.href = "home-ru.html";
  } else if(lang === "uz"){
    window.location.href = "home-uz.html";
  } else if(lang === "ar"){
    window.location.href = "home-ar.html";
  } else if(lang === "id"){
    window.location.href = "home-id.html";
  } else if(lang === "ur"){
    window.location.href = "home-ur.html";
  } else if(lang === "hi"){
    window.location.href = "home-hi.html";
  } else if(lang === "tr"){
    window.location.href = "home-tr.html";
  }
}

const themeSwitch = document.getElementById("themeSwitch");
const themeLabel = document.querySelector(".theme-toggle-label");
const savedTheme = localStorage.getItem("siteTheme");

if(savedTheme === "light"){
  document.body.classList.add("light-mode");
  themeSwitch.checked = true;
} else {
  localStorage.setItem("siteTheme", "dark");
}

function updateThemeLabel(){
  if(document.body.classList.contains("light-mode")){
    themeLabel.textContent = "Dark mode";
  } else {
    themeLabel.textContent = "Light mode";
  }
}

updateThemeLabel();

themeSwitch.addEventListener("change", function(){
  if(this.checked){
    document.body.classList.add("light-mode");
    localStorage.setItem("siteTheme", "light");
  } else {
    document.body.classList.remove("light-mode");
    localStorage.setItem("siteTheme", "dark");
  }
  updateThemeLabel();
});

const force = sessionStorage.getItem("forceLanguageSelect");

if(force === "1"){
  sessionStorage.removeItem("forceLanguageSelect");
} else {
  const savedLang = localStorage.getItem("siteLanguage");
  if(savedLang){
    if(savedLang === "en"){
      window.location.href = "home-en.html";
    } else if(savedLang === "ru"){
      window.location.href = "home-ru.html";
    } else if(savedLang === "uz"){
      window.location.href = "home-uz.html";
    } else if(savedLang === "ar"){
      window.location.href = "home-ar.html";
    } else if(savedLang === "id"){
      window.location.href = "home-id.html";
    } else if(savedLang === "ur"){
      window.location.href = "home-ur.html";
    } else if(savedLang === "hi"){
      window.location.href = "home-hi.html";
    } else if(savedLang === "tr"){
      window.location.href = "home-tr.html";
    }
  }
}
</script>

<script src="/theme-toggle.js"></script>
</body>
