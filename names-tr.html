_mean": "Дарующий веру и безопасность", "en_desc": "Ya Mu’min, give my heart security, faith, and reassurance.", "ru_desc": "Я Му’мин, даруй моему сердцу безопасность, веру и уверенность.", "tr_mean": "İman ve güven veren", "tr_desc": "Ya Mu’min, kalbime güven, iman ve itminan ver."}, {"num": 7, "ar": "ٱلْمُهَيْمِنُ", "tr": "Al-Muhaymin", "en_mean": "The Watchful Protector", "ru_mean": "Оберегающий", "en_desc": "Ya Muhaymin, protect me, my family, and all that You entrusted to me.", "ru_desc": "Я Мухаймин, защити меня, мою семью и всё, что Ты доверил мне.", "tr_mean": "Gözetip koruyan", "tr_desc": "Ya Muhaymin, beni, ailemi ve bana emanet edilen her şeyi koru."}, {"num": 8, "ar": "ٱلْعَزِيزُ", "tr": "Al-Aziz", "en_mean": "The Almighty", "ru_mean": "Всемогущий", "en_desc": "Ya Aziz, strengthen me with dignity and keep me firm in truth.", "ru_desc": "Я Азиз, укрепи меня достоинством и удержи меня на истине.", "tr_mean": "Mutlak izzet sahibi", "tr_desc": "Ya Aziz, beni izzetle güçlendir ve hak üzere sabit kıl."}, {"num": 9, "ar": "ٱلْجَبَّارُ", "tr": "Al-Jabbar", "en_mean": "The Compeller and Restorer", "ru_mean": "Подчиняющий и исправляющий", "en_desc": "Ya Jabbar, mend what is broken in my heart and my life.", "ru_desc": "Я Джаббар, исцели всё сломленное в моём сердце и моей жизни.", "tr_mean": "Kırıkları düzelten ve iradesi mutlak olan", "tr_desc": "Ya Jabbar, kalbimde ve hayatımda kırılan her şeyi onar."}, {"num": 10, "ar": "ٱلْمُتَكَبِّرُ", "tr": "Al-Mutakabbir", "en_mean": "The Supremely Exalted", "ru_mean": "Превознесённый", "en_desc": "Ya Mutakabbir, protect me from arrogance and fill me with humility before You.", "ru_desc": "Я Мутакаббир, защити меня от гордыни и наполни меня смирением перед Тобой.", "tr_mean": "Büyüklükte eşsiz olan", "tr_desc": "Ya Mutakabbir, beni kibirden koru ve Sana karşı tevazu ile doldur."}, {"num": 11, "ar": "ٱلْخَالِقُ", "tr": "Al-Khaliq", "en_mean": "The Creator", "ru_mean": "Творец", "en_desc": "Ya Khaliq, create in me a better character and a better future.", "ru_desc": "Я Халик, сотвори во мне лучший нрав и лучшее будущее.", "tr_mean": "Yaratan", "tr_desc": "Ya Khaliq, bende daha güzel bir ahlak ve daha hayırlı bir gelecek yarat."}, {"num": 12, "ar": "ٱلْبَارِئُ", "tr": "Al-Bari’", "en_mean": "The Originator", "ru_mean": "Создающий из небытия", "en_desc": "Ya Bari’, set my life in right order and bring good out of disorder.", "ru_desc": "Я Бари’, приведи мою жизнь в правильный порядок и выведи добро из беспорядка.", "tr_mean": "Yoktan var eden", "tr_desc": "Ya Bari’, hayatımı düzgün bir düzene koy ve karışıklıktan hayır çıkar."}, {"num": 13, "ar": "ٱلْمُصَوِّرُ", "tr": "Al-Musawwir", "en_mean": "The Fashioner", "ru_mean": "Придающий облик", "en_desc": "Ya Musawwir, beautify my character and shape my life in the best way.", "ru_desc": "Я Мусаввир, укрась мой нрав и устрой мою жизнь наилучшим образом.", "tr_mean": "Şekil veren", "tr_desc": "Ya Musawwir, ahlakımı güzelleştir ve hayatıma en güzel şekli ver."}, {"num": 14, "ar": "ٱلْغَفَّارُ", "tr": "Al-Ghaffar", "en_mean": "The Constant Forgiver", "ru_mean": "Многократно прощающий", "en_desc": "Ya Ghaffar, forgive me again and again, and cover my sins.", "ru_desc": "Ya Ghaffar, прощай меня снова и снова и покрой мои грехи.", "tr_mean": "Çokça bağışlayan", "tr_desc": "Ya Ghaffar, beni tekrar tekrar bağışla ve günahlarımı ört."}, {"num": 15, "ar": "ٱلْقَهَّارُ", "tr": "Al-Qahhar", "en_mean": "The All-Dominant", "ru_mean": "Всепокоряющий", "en_desc": "Ya Qahhar, subdue my ego, my desires, and everything that pulls me away from You.", "ru_desc": "Я Каххар, подчини моё эго, мои страсти и всё, что уводит меня от Тебя.", "tr_mean": "Her şeye galip gelen", "tr_desc": "Ya Qahhar, nefsimi, arzularımı ve beni Senden uzaklaştıran her şeyi boyun eğdir."}, {"num": 16, "ar": "ٱلْوَهَّابُ", "tr": "Al-Wahhab", "en_mean": "The Bestower", "ru_mean": "Щедро Дарующий", "en_desc": "Ya Wahhab, grant me blessings that bring me closer to You.", "ru_desc": "Я Ваххаб, даруй мне блага, которые приблизят меня к Тебе.", "tr_mean": "Karşılıksız veren", "tr_desc": "Ya Wahhab, beni Sana yaklaştıracak nimetler ver."}, {"num": 17, "ar": "ٱلرَّزَّاقُ", "tr": "Ar-Razzaq", "en_mean": "The Provider", "ru_mean": "Наделяющий уделом", "en_desc": "Ya Razzaq, provide me with halal sustenance and remove my need.", "ru_desc": "Ya Razzaq, даруй мне халяльный удел и убери мою нужду.", "tr_mean": "Rızık veren", "tr_desc": "Ya Razzaq, bana helal rızık ver ve ihtiyacımı gider."}, {"num": 18, "ar": "ٱلْفَتَّاحُ", "tr": "Al-Fattah", "en_mean": "The Opener", "ru_mean": "Открывающий", "en_desc": "Ya Fattah, open for me the doors of mercy, relief, and success.", "ru_desc": "Я Фаттах, открой для меня двери милости, облегчения и успеха.", "tr_mean": "Kapılar açan", "tr_desc": "Ya Fattah, bana rahmetin, ferahlığın ve başarının kapılarını aç."}, {"num": 19, "ar": "ٱلْعَلِيمُ", "tr": "Al-‘Alim", "en_mean": "The All-Knowing", "ru_mean": "Всезнающий", "en_desc": "Ya ‘Alim, grant me beneficial knowledge and protect me from ignorance.", "ru_desc": "Я Алим, даруй мне полезное знание и защити меня от невежества.", "tr_mean": "Her şeyi bilen", "tr_desc": "Ya Alim, bana faydalı ilim ver ve beni cehaletten koru."}, {"num": 20, "ar": "ٱلْقَابِضُ", "tr": "Al-Qabid", "en_mean": "The Withholder", "ru_mean": "Сдерживающий", "en_desc": "Ya Qabid, hold back from me what would harm my faith and my heart.", "ru_desc": "Я Кабид, удержи от меня то, что может повредить моей вере и моему сердцу.", "tr_mean": "Daraltan", "tr_desc": "Ya Qabid, imanımı ve kalbimi zedeleyecek şeyleri benden uzak tut."}, {"num": 21, "ar": "ٱلْبَاسِطُ", "tr": "Al-Basit", "en_mean": "The Expander", "ru_mean": "Расширяющий", "en_desc": "Ya Basit, expand my chest, my provision, and my hope.", "ru_desc": "Я Басит, расширь мою грудь, мой удел и мою надежду.", "tr_mean": "Genişleten", "tr_desc": "Ya Basit, göğsümü, rızkımı ve umudumu genişlet."}, {"num": 22, "ar": "ٱلْخَافِضُ", "tr": "Al-Khafid", "en_mean": "The Reducer", "ru_mean": "Унижающий", "en_desc": "Ya Khafid, lower my pride and save me from arrogance.", "ru_desc": "Я Хафид, смири мою гордыню и спаси меня от высокомерия.", "tr_mean": "Alçaltan", "tr_desc": "Ya Khafid, gururumu indir ve beni kibirden kurtar."}, {"num": 23, "ar": "ٱلرَّافِعُ", "tr": "Ar-Rafi’", "en_mean": "The Exalter", "ru_mean": "Возвышающий", "en_desc": "Ya Rafi’, raise me in faith, character, and honor.", "ru_desc": "Я Рафи’, возвышай меня в вере, нраве и достоинстве.", "tr_mean": "Yükselten", "tr_desc": "Ya Rafi’, beni imanda, ahlakta ve itibarda yükselt."}, {"num": 24, "ar": "ٱلْمُعِزُّ", "tr": "Al-Mu’izz", "en_mean": "The Giver of Honor", "ru_mean": "Дарующий честь", "en_desc": "Ya Mu’izz, honor me through obedience to You and truth.", "ru_desc": "Я Му’изз, даруй мне честь через покорность Тебе и истину.", "tr_mean": "İzzet veren", "tr_desc": "Ya Mu’izz, bana Sana itaat ve hak sayesinde izzet ver."}, {"num": 25, "ar": "ٱلْمُذِلُّ", "tr": "Al-Mudhill", "en_mean": "The Humiliator", "ru_mean": "Подвергающий унижению", "en_desc": "Ya Mudhill, keep me far from humiliation through sin and wrongdoing.", "ru_desc": "Я Музилл, убереги меня от унижения через грех и несправедливость.", "tr_mean": "Zillete düşüren", "tr_desc": "Ya Mudhill, beni günah ve zulüm sebebiyle zillete düşmekten koru."}, {"num": 26, "ar": "ٱلسَّمِيعُ", "tr": "As-Sami’", "en_mean": "The All-Hearing", "ru_mean": "Всеслышащий", "en_desc": "Ya Sami’, hear my dua, my weakness, and my hidden pain.", "ru_desc": "Я Сами’, услышь моё дуа, мою слабость и мою скрытую боль.", "tr_mean": "Her şeyi işiten", "tr_desc": "Ya Sami’, duamı, zayıflığımı ve gizli acımı işit."}, {"num": 27, "ar": "ٱلْبَصِيرُ", "tr": "Al-Basir", "en_mean": "The All-Seeing", "ru_mean": "Всевидящий", "en_desc": "Ya Basir, see my state and guide me to what is right.", "ru_desc": "Я Басир, увидь моё состояние и направь меня к правильному.", "tr_mean": "Her şeyi gören", "tr_desc": "Ya Basir, hâlimi gör ve beni doğru olana yönelt."}, {"num": 28, "ar": "ٱلْحَكَمُ", "tr": "Al-Hakam", "en_mean": "The Judge", "ru_mean": "Судящий", "en_desc": "Ya Hakam, judge my affairs with truth and guide me through confusion.", "ru_desc": "Я Хакам, рассуди мои дела по истине и выведи меня из смятения.", "tr_mean": "Hükmeden", "tr_desc": "Ya Hakam, işlerime hak ile hükmet ve beni şaşkınlıktan çıkar."}, {"num": 29, "ar": "ٱلْعَدْلُ", "tr": "Al-‘Adl", "en_mean": "The Utterly Just", "ru_mean": "Совершенно Справедливый", "en_desc": "Ya ‘Adl, place justice in my life and protect me from wrongdoing.", "ru_desc": "Я ‘Адль, установи справедливость в моей жизни и защити меня от зла.", "tr_mean": "Mutlak adalet sahibi", "tr_desc": "Ya Adl, hayatıma adalet yerleştir ve beni haksızlıktan koru."}, {"num": 30, "ar": "ٱللَّطِيفُ", "tr": "Al-Latif", "en_mean": "The Most Gentle", "ru_mean": "Тонкий и Добрый", "en_desc": "Ya Latif, be gentle with me in what I see and what I do not see.", "ru_desc": "Я Латиф, будь мягок ко мне в том, что я вижу, и в том, чего я не вижу.", "tr_mean": "Lütfu ince olan", "tr_desc": "Ya Latif, gördüğüm ve görmediğim her konuda bana lütufla muamele et."}, {"num": 31, "ar": "ٱلْخَبِيرُ", "tr": "Al-Khabir", "en_mean": "The All-Aware", "ru_mean": "Всеведающий", "en_desc": "Ya Khabir, guide me in what is hidden from my understanding.", "ru_desc": "Я Хабир, направь меня в том, что скрыто от моего понимания.", "tr_mean": "Her şeyden haberdar olan", "tr_desc": "Ya Khabir, kavrayamadığım gizli konularda bana doğru yolu göster."}, {"num": 32, "ar": "ٱلْحَلِيمُ", "tr": "Al-Halim", "en_mean": "The Forbearing", "ru_mean": "Кроткий", "en_desc": "Ya Halim, treat me with forbearance and do not punish me for my haste.", "ru_desc": "Я Халим, обойдиcь со мной кротко и не наказывай меня за мою поспешность.", "tr_mean": "Yumuşak davranan", "tr_desc": "Ya Halim, bana yumuşak davran ve aceleciliğim yüzünden beni cezalandırma."}, {"num": 33, "ar": "ٱلْعَظِيمُ", "tr": "Al-‘Azim", "en_mean": "The Magnificent", "ru_mean": "Великий", "en_desc": "Ya ‘Azim, fill my heart with reverence for Your greatness.", "ru_desc": "Я ‘Азим, наполни моё сердце трепетом перед Твоим величием.", "tr_mean": "Çok yüce olan", "tr_desc": "Ya Azim, kalbimi Senin azametine karşı saygıyla doldur."}, {"num": 34, "ar": "ٱلْغَفُورُ", "tr": "Al-Ghafur", "en_mean": "The Great Forgiver", "ru_mean": "Всепрощающий", "en_desc": "Ya Ghafur, forgive my major sins and accept my repentance.", "ru_desc": "Я Гафур, прости мои большие грехи и прими моё покаяние.", "tr_mean": "Bağışlaması büyük olan", "tr_desc": "Ya Ghafur, büyük günahlarımı bağışla ve tevbemi kabul et."}, {"num": 35, "ar": "ٱلشَّكُورُ", "tr": "Ash-Shakur", "en_mean": "The Appreciative", "ru_mean": "Благодарно вознаграждающий", "en_desc": "Ya Shakur, accept my small deeds and multiply their reward.", "ru_desc": "Я Шакур, прими мои малые дела и умножь их награду.", "tr_mean": "Az amele çok karşılık veren", "tr_desc": "Ya Shakur, küçük amellerimi kabul et ve ecirlerini çoğalt."}, {"num": 36, "ar": "ٱلْعَلِيُّ", "tr": "Al-‘Aliyy", "en_mean": "The Most High", "ru_mean": "Всевышний", "en_desc": "Ya ‘Aliyy, raise my soul above what lowers me.", "ru_desc": "Я ‘Алий, подними мою душу выше того, что унижает меня.", "tr_mean": "En yüce olan", "tr_desc": "Ya Aliyy, ruhumu beni aşağı çeken şeylerin üstüne yükselt."}, {"num": 37, "ar": "ٱلْكَبِيرُ", "tr": "Al-Kabir", "en_mean": "The Most Great", "ru_mean": "Величайший", "en_desc": "Ya Kabir, make the dunya small in my eyes and Your pleasure great.", "ru_desc": "Я Кабир, сделай дунью малой в моих глазах, а Твоё довольство — великим.", "tr_mean": "En büyük olan", "tr_desc": "Ya Kabir, dünyanın gözümde küçülmesini ve Senin rızanın büyümesini nasip et."}, {"num": 38, "ar": "ٱلْحَفِيظُ", "tr": "Al-Hafiz", "en_mean": "The Preserver", "ru_mean": "Хранящий", "en_desc": "Ya Hafiz, preserve my faith, my family, and my end.", "ru_desc": "Я Хафиз, сохрани мою веру, мою семью и мой конец.", "tr_mean": "Koruyup gözeten", "tr_desc": "Ya Hafiz, imanımı, ailemi ve sonumu koru."}, {"num": 39, "ar": "ٱلْمُقِيتُ", "tr": "Al-Muqit", "en_mean": "The Sustainer", "ru_mean": "Поддерживающий и питающий", "en_desc": "Ya Muqit, sustain me with strength, patience, and enough provision.", "ru_desc": "Я Мукит, поддержи меня силой, терпением и достаточным уделом.", "tr_mean": "Rızkı ulaştıran ve güç veren", "tr_desc": "Ya Muqit, bana güç, sabır ve yeterli rızık ver."}, {"num": 40, "ar": "ٱلْحَسِيبُ", "tr": "Al-Hasib", "en_mean": "The Sufficient Reckoner", "ru_mean": "Достаточный", "en_desc": "Ya Hasib, be sufficient for me in every worry and affair.", "ru_desc": "Я Хасиб, будь достаточен для меня в каждом беспокойстве и деле.", "tr_mean": "Kuluna yeten", "tr_desc": "Ya Hasib, her kaygımda ve her işimde bana yet."}, {"num": 41, "ar": "ٱلْجَلِيلُ", "tr": "Al-Jalil", "en_mean": "The Majestic", "ru_mean": "Величественный", "en_desc": "Ya Jalil, fill my heart with reverence for Your majesty.", "ru_desc": "Я Джалиль, наполни моё сердце почтением к Твоему величию.", "tr_mean": "Azamet sahibi", "tr_desc": "Ya Jalil, kalbimi Senin celâline karşı saygıyla doldur."}, {"num": 42, "ar": "ٱلْكَرِيمُ", "tr": "Al-Karim", "en_mean": "The Most Generous", "ru_mean": "Щедрейший", "en_desc": "Ya Karim, be generous to me with forgiveness, ease, and blessing.", "ru_desc": "Я Карим, будь щедр ко мне прощением, лёгкостью и благословением.", "tr_mean": "Çok cömert olan", "tr_desc": "Ya Karim, bana bağışlama, kolaylık ve bereketle cömertçe muamele et."}, {"num": 43, "ar": "ٱلرَّقِيبُ", "tr": "Ar-Raqib", "en_mean": "The Watchful", "ru_mean": "Наблюдающий", "en_desc": "Ya Raqib, watch over me and keep me away from secret sins.", "ru_desc": "Я Ракиб, наблюдай за мной и удержи меня от скрытых грехов.", "tr_mean": "Her şeyi gözetleyen", "tr_desc": "Ya Raqib, beni gözet ve beni gizli günahlardan uzak tut."}, {"num": 44, "ar": "ٱلْمُجِيبُ", "tr": "Al-Mujib", "en_mean": "The Responsive", "ru_mean": "Отвечающий", "en_desc": "Ya Mujib, answer my dua and do not turn me away disappointed.", "ru_desc": "Я Муджиб, ответь на моё дуа и не возвращай меня разочарованным.", "tr_mean": "Dualara cevap veren", "tr_desc": "Ya Mujib, duama cevap ver ve beni mahrum bırakma."}, {"num": 45, "ar": "ٱلْوَاسِعُ", "tr": "Al-Wasi’", "en_mean": "The All-Encompassing", "ru_mean": "Всеобъемлющий", "en_desc": "Ya Wasi’, expand for me mercy, understanding, and relief.", "ru_desc": "Я Васи’, расширь для меня милость, понимание и облегчение.", "tr_mean": "Kuşatıcılığı sonsuz olan", "tr_desc": "Ya Wasi’, benim için rahmeti, anlayışı ve ferahlığı genişlet."}, {"num": 46, "ar": "ٱلْحَكِيمُ", "tr": "Al-Hakim", "en_mean": "The All-Wise", "ru_mean": "Премудрый", "en_desc": "Ya Hakim, give me wisdom and right decisions.", "ru_desc": "Я Хаким, дай мне мудрость и правильные решения.", "tr_mean": "Hikmet sahibi", "tr_desc": "Ya Hakim, bana hikmet ve doğru kararlar ver."}, {"num": 47, "ar": "ٱلْوَدُودُ", "tr": "Al-Wadud", "en_mean": "The Most Loving", "ru_mean": "Любящий", "en_desc": "Ya Wadud, fill my heart with love, mercy, and goodness.", "ru_desc": "Я Вадуд, наполни моё сердце любовью, милостью и добром.", "tr_mean": "Çok seven", "tr_desc": "Ya Wadud, kalbimi sevgi, merhamet ve iyilikle doldur."}, {"num": 48, "ar": "ٱلْمَجِيدُ", "tr": "Al-Majid", "en_mean": "The Most Glorious", "ru_mean": "Преславный", "en_desc": "Ya Majid, honor me with noble character and righteous deeds.", "ru_desc": "Я Маджид, почти меня благородным нравом и праведными делами.", "tr_mean": "Şanı yüce olan", "tr_desc": "Ya Majid, bana asil ahlak ve salih ameller nasip et."}, {"num": 49, "ar": "ٱلْبَاعِثُ", "tr": "Al-Ba’ith", "en_mean": "The Resurrector", "ru_mean": "Воскрешающий", "en_desc": "Ya Ba’ith, revive my heart with faith and sincere worship.", "ru_desc": "Я Ба’ис, оживи моё сердце верой и искренним поклонением.", "tr_mean": "Ölüleri dirilten", "tr_desc": "Ya Ba’ith, kalbimi iman ve ihlaslı ibadetle dirilt."}, {"num": 50, "ar": "ٱلشَّهِيدُ", "tr": "Ash-Shahid", "en_mean": "The Witness", "ru_mean": "Свидетель", "en_desc": "Ya Shahid, be my witness in truth and protect me from hypocrisy.", "ru_desc": "Я Шахид, будь моим свидетелем в истине и защити меня от лицемерия.", "tr_mean": "Her şeye şahit olan", "tr_desc": "Ya Shahid, hak üzere bana şahit ol ve beni nifaktan koru."}, {"num": 51, "ar": "ٱلْحَقُّ", "tr": "Al-Haqq", "en_mean": "The Truth", "ru_mean": "Истина", "en_desc": "Ya Haqq, keep me firm upon truth in belief, word, and action.", "ru_desc": "Я Хакк, удержи меня на истине в вере, словах и делах.", "tr_mean": "Hak olan", "tr_desc": "Ya Haqq, beni inançta, sözde ve amelde hak üzere sabit kıl."}, {"num": 52, "ar": "ٱلْوَكِيلُ", "tr": "Al-Wakil", "en_mean": "The Trustee", "ru_mean": "Попечитель", "en_desc": "Ya Wakil, manage my affairs in the best way, for I rely upon You.", "ru_desc": "Я Вакиль, устрой мои дела наилучшим образом, ведь я уповаю на Тебя.", "tr_mean": "Vekil olan", "tr_desc": "Ya Wakil, işlerimi en güzel şekilde Sen yönet; ben Sana dayanıyorum."}, {"num": 53, "ar": "ٱلْقَوِيُّ", "tr": "Al-Qawiyy", "en_mean": "The All-Strong", "ru_mean": "Всесильный", "en_desc": "Ya Qawiyy, strengthen me against weakness, fear, and sin.", "ru_desc": "Я Кавий, укрепи меня против слабости, страха и греха.", "tr_mean": "Çok güçlü olan", "tr_desc": "Ya Qawiyy, beni zayıflığa, korkuya ve günaha karşı güçlendir."}, {"num": 54, "ar": "ٱلْمَتِينُ", "tr": "Al-Matin", "en_mean": "The Firm", "ru_mean": "Крепкий", "en_desc": "Ya Matin, make me firm in patience, worship, and obedience.", "ru_desc": "Я Матин, сделай меня стойким в терпении, поклонении и покорности.", "tr_mean": "Sarsılmaz kuvvet sahibi", "tr_desc": "Ya Matin, beni sabırda, ibadette ve itaate devamda sağlam kıl."}, {"num": 55, "ar": "ٱلْوَلِيُّ", "tr": "Al-Waliyy", "en_mean": "The Protecting Friend", "ru_mean": "Покровительствующий Друг", "en_desc": "Ya Waliyy, be my protector, supporter, and nearest helper.", "ru_desc": "Я Валий, будь моим покровителем, поддержкой и ближайшим помощником.", "tr_mean": "Dost ve yardımcı olan", "tr_desc": "Ya Waliyy, benim koruyucum, destekçim ve en yakın yardımcım ol."}, {"num": 56, "ar": "ٱلْحَمِيدُ", "tr": "Al-Hamid", "en_mean": "The Praiseworthy", "ru_mean": "Достойный хвалы", "en_desc": "Ya Hamid, make me among those whose lives are worthy of praise before You.", "ru_desc": "Я Хамид, сделай меня из тех, чья жизнь достойна хвалы перед Тобой.", "tr_mean": "Övgüye layık olan", "tr_desc": "Ya Hamid, beni hayatı Senin katında övgüye layık olanlardan eyle."}, {"num": 57, "ar": "ٱلْمُحْصِي", "tr": "Al-Muhsi", "en_mean": "The All-Enumerating", "ru_mean": "Исчисляющий всё", "en_desc": "Ya Muhsi, record for me mercy and erase from me what brings blame.", "ru_desc": "Я Мухси, запиши для меня милость и сотри с меня то, что приносит порицание.", "tr_mean": "Her şeyi sayıp bilen", "tr_desc": "Ya Muhsi, benim için rahmet yaz ve beni kınamaya götüren şeyleri sil."}, {"num": 58, "ar": "ٱلْمُبْدِئُ", "tr": "Al-Mubdi’", "en_mean": "The Originator of All", "ru_mean": "Начинающий", "en_desc": "Ya Mubdi’, begin for me a new opening full of obedience and good.", "ru_desc": "Я Мубди’, начни для меня новое открытие, полное покорности и добра.", "tr_mean": "İlk defa var eden", "tr_desc": "Ya Mubdi’, benim için itaat ve hayırla dolu yeni bir başlangıç aç."}, {"num": 59, "ar": "ٱلْمُعِيدُ", "tr": "Al-Mu’id", "en_mean": "The Restorer", "ru_mean": "Возвращающий", "en_desc": "Ya Mu’id, return to me what is good, and restore what I lost with better.", "ru_desc": "Я Му’ид, верни мне то, что благо, и восстанови лучшее взамен утраченного.", "tr_mean": "Geri getiren", "tr_desc": "Ya Mu’id, bana hayırlı olanı geri ver ve kaybettiklerimin yerine daha iyisini nasip et."}, {"num": 60, "ar": "ٱلْمُحْيِي", "tr": "Al-Muhyi", "en_mean": "The Giver of Life", "ru_mean": "Дарующий жизнь", "en_desc": "Ya Muhyi, give life to my heart after heedlessness.", "ru_desc": "Я Мухйи, оживи моё сердце после беспечности.", "tr_mean": "Hayat veren", "tr_desc": "Ya Muhyi, kalbimi gafletten sonra dirilt."}, {"num": 61, "ar": "ٱلْمُمِيتُ", "tr": "Al-Mumit", "en_mean": "The Creator of Death", "ru_mean": "Умерщвляющий", "en_desc": "Ya Mumit, give me a good ending and take me only when You are pleased with me.", "ru_desc": "Я Мумит, даруй мне хороший конец и забери меня только тогда, когда Ты доволен мной.", "tr_mean": "Ölümü yaratan", "tr_desc": "Ya Mumit, bana güzel bir son ver ve beni ancak Sen benden razı iken al."}, {"num": 62, "ar": "ٱلْحَيُّ", "tr": "Al-Hayy", "en_mean": "The Ever-Living", "ru_mean": "Вечно Живой", "en_desc": "Ya Hayy, keep my heart alive with remembrance of You.", "ru_desc": "Я Хайй, сохраняй моё сердце живым через поминание Тебя.", "tr_mean": "Diri olan", "tr_desc": "Ya Hayy, kalbimi Senin zikrinle diri tut."}, {"num": 63, "ar": "ٱلْقَيُّومُ", "tr": "Al-Qayyum", "en_mean": "The Self-Subsisting", "ru_mean": "Самосущий", "en_desc": "Ya Qayyum, sustain me, support me, and do not let me collapse.", "ru_desc": "Я Кайюм, поддержи меня, укрепи меня и не дай мне пасть.", "tr_mean": "Varlığı kendinden olan", "tr_desc": "Ya Qayyum, beni ayakta tut, destekle ve yıkılmama izin verme."}, {"num": 64, "ar": "ٱلْوَاجِدُ", "tr": "Al-Wajid", "en_mean": "The Finder", "ru_mean": "Находящий", "en_desc": "Ya Wajid, let me find what is good, and let me find You near me in every hardship.", "ru_desc": "Я Ваджид, дай мне найти то, что благо, и ощущать Тебя близким в каждой трудности.", "tr_mean": "Arananı bulan", "tr_desc": "Ya Wajid, bana hayırlı olanı buldur ve her sıkıntımda Sana yakınlığı hissettir."}, {"num": 65, "ar": "ٱلْمَاجِدُ", "tr": "Al-Majid", "en_mean": "The Noble and Glorious", "ru_mean": "Славнейший", "en_desc": "Ya Majid, ennoble my heart and make my path honorable before You.", "ru_desc": "Я Маджид, облагородь моё сердце и сделай мой путь почтенным перед Тобой.", "tr_mean": "Şerefi büyük olan", "tr_desc": "Ya Majid, kalbimi yücelt ve yolumu Senin katında değerli kıl."}, {"num": 66, "ar": "ٱلْوَاحِدُ", "tr": "Al-W let activePremiumSet = "";
function isNamesProActive(){
  try{ return localStorage.getItem("barakaway_pro") === "true"; }catch(e){ return false; }
}
let currentIndex = 0;
let autoTimer = null;

const nameArabic = document.getElementById("nameArabic");
const nameTranslit = document.getElementById("nameTranslit");
const nameMeaning = document.getElementById("nameMeaning");
const nameDesc = document.getElementById("nameDesc");
const nameCounter = document.getElementById("nameCounter");
const playStatus = document.getElementById("playStatus");
const speedRange = document.getElementById("speedRange");
const speedValue = document.getElementById("speedValue");
const namesGrid = document.getElementById("namesGrid");
const searchInput = document.getElementById("searchInput");

function renderGrid(filter=""){
  namesGrid.innerHTML = "";
  const q = filter.trim().toLowerCase();
  names.forEach((item, idx) => {
    const hay = `${item.tr} ${item[meanKey]} ${item[descKey]} ${item.ar}`.toLowerCase();
    if (q && !hay.includes(q)) return;
    const card = document.createElement("div");
    card.className = "name-chip" + (idx === currentIndex ? " active" : "");
    card.innerHTML = `
      <div class="chip-num">#${item.num}</div>
      <div class="chip-ar">${item.ar}</div>
      <div class="chip-tr">${item.tr}</div>
      <div class="chip-mean">${item[meanKey]}</div>
    `;
    card.addEventListener("click", () => {
  currentIndex = idx;
  renderCurrent();
  renderGrid(searchInput.value);

  // Плавный скролл к верхнему блоку с именем
  document.querySelector(".player-card").scrollIntoView({
    behavior: "smooth",
    block: "start"
  });
});
    namesGrid.appendChild(card);
  });
}

function renderCurrent(){
  const item = names[currentIndex];
  nameArabic.textContent = item.ar;
  nameTranslit.textContent = item.tr;
  nameMeaning.textContent = item[meanKey];
  if(isNamesProActive() && activePremiumSet === "rizq" && premiumRizqDescriptions[currentIndex]){
    nameDesc.textContent = premiumRizqDescriptions[currentIndex];
  } else if(isNamesProActive() && activePremiumSet === "health" && premiumHealthDescriptions[currentIndex]){
    nameDesc.textContent = premiumHealthDescriptions[currentIndex];
  } else if(isNamesProActive() && activePremiumSet === "forgive" && premiumForgiveDescriptions[currentIndex]){
    nameDesc.textContent = premiumForgiveDescriptions[currentIndex];
  } else if(isNamesProActive() && activePremiumSet === "debts" && premiumDebtDescriptions[currentIndex]){
    nameDesc.textContent = premiumDebtDescriptions[currentIndex];
  } else if(isNamesProActive() && activePremiumSet === "both" && premiumBothDescriptions[currentIndex]){
    nameDesc.textContent = premiumBothDescriptions[currentIndex];
  } else {
    nameDesc.textContent = item[descKey];
  }
  nameCounter.textContent = `İsim ${item.num} / 99`;
}

function nextName(){
  if (currentIndex >= names.length - 1) {
    stopAuto();
    return;
  }
  currentIndex += 1;
  renderCurrent();
  renderGrid(searchInput.value);
}

function prevName(){
  if (currentIndex <= 0) {
    return;
  }
  currentIndex -= 1;
  renderCurrent();
  renderGrid(searchInput.value);
}

function startAuto(){
  stopAuto();
  if (currentIndex >= names.length - 1) {
    return;
  }
  const seconds = parseInt(speedRange.value, 10);
  autoTimer = setInterval(() => {
    if (currentIndex >= names.length - 1) {
      stopAuto();
      return;
    }
    nextName();
  }, seconds * 1000);
  playStatus.textContent = "Otomatik kaydırma: " + seconds + "s";
}

function stopAuto(){
  if (autoTimer) {
    clearInterval(autoTimer);
    autoTimer = null;
  }
  playStatus.textContent = "Geri/ileri düğmeleriyle manuel okuyabilir veya 1 ila 10 saniye arasında otomatik kaydırmayı açabilirsiniz.";
}

document.getElementById("playBtn").addEventListener("click", startAuto);
document.getElementById("pauseBtn").addEventListener("click", stopAuto);
document.getElementById("nextBtn").addEventListener("click", () => { stopAuto(); nextName(); });
document.getElementById("prevBtn").addEventListener("click", () => { stopAuto(); prevName(); });
document.getElementById("resetBtn").addEventListener("click", () => {
  stopAuto();
  currentIndex = 0;
  renderCurrent();
  renderGrid(searchInput.value);
});

speedRange.addEventListener("input", () => {
  speedValue.textContent = speedRange.value;
  if (autoTimer) startAuto();
});

searchInput.addEventListener("input", () => renderGrid(searchInput.value));


function initPremiumDescriptionCards(){
  const cards = document.querySelectorAll(".premium-card");
  cards.forEach((card) => {
    card.addEventListener("click", () => {
      if(!isNamesProActive()) return;
      cards.forEach((item) => item.classList.remove("active"));
      card.classList.add("active");
      activePremiumSet = card.dataset.premiumSet || "";

      if(activePremiumSet === "default"){
        activePremiumSet = "";
      }

      renderCurrent();
    });
  });

  const activeCard = document.querySelector(".premium-card.active");
  if(activeCard && isNamesProActive()){
    activePremiumSet = activeCard.dataset.premiumSet || "";

    if(activePremiumSet === "default"){
      activePremiumSet = "";
    }

    renderCurrent();
  }
}

initPremiumDescriptionCards();

renderCurrent();
renderGrid();
</script>
<script src="/bottom-nav.js"></script>

<script>
(function(){
  "use strict";
  const PRO_KEY = "barakaway_pro";

  function isProActive(){
    try{
      return localStorage.getItem(PRO_KEY) === "true";
    }catch(e){
      return false;
    }
  }

  function syncNamesProState(){
    const active = isProActive();
    document.querySelectorAll(".premium-categories-wrap").forEach(function(wrap){
      wrap.setAttribute("data-pro-state", active ? "unlocked" : "locked");
    });

    document.querySelectorAll("[data-names-pro-status]").forEach(function(node){
      node.textContent = active ? "✅ PRO aktif" : "PRO aktif değil";
    });

    document.querySelectorAll(".premium-card").forEach(function(card){
      card.setAttribute("aria-disabled", active ? "false" : "true");
      card.tabIndex = active ? 0 : -1;
    });

    try{
      if(typeof renderCurrent === "function"){
        renderCurrent();
      }
    }catch(e){}
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", syncNamesProState);
  }else{
    syncNamesProState();
  }

  window.addEventListener("storage", syncNamesProState);
})();
</script>
