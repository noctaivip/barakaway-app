<!doctype html>
<html lang="ru">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TasksLocal cache reset</title><style>body{font-family:system-ui;background:#020B1D;color:#fff;display:grid;place-items:center;min-height:100vh;margin:0;padding:24px}button{padding:16px 22px;border-radius:14px;border:0;background:#dba740;font-weight:900}.box{max-width:560px;text-align:center}p{color:#aebbd0}</style></head>
<body><div class="box"><h1>TasksLocal cache reset</h1><p>Версия: 20260623-02</p><button id="reset">Сбросить кэш и открыть сайт</button><p id="status"></p></div><script>
async function reset(){
 const s=document.getElementById('status'); s.textContent='Сброс кэша...';
 if('serviceWorker' in navigator){
   const regs=await navigator.serviceWorker.getRegistrations();
   await Promise.all(regs.map(r=>r.unregister()));
 }
 if('caches' in window){
   const keys=await caches.keys();
   await Promise.all(keys.map(k=>caches.delete(k)));
 }
 try{localStorage.clear(); sessionStorage.clear();}catch(e){}
 s.textContent='Готово. Открываю свежую версию...';
 location.replace('/?v=20260623-02');
}
document.getElementById('reset').addEventListener('click', reset);
</script></body></html>
