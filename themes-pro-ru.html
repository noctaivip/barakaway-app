<!DOCTYPE html>
<html lang="ru">
<head>

بِسْمِ ٱللَّٰهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#101820">
<title>PRO-темы BarakaWay</title>

<style>
:root{
  --page:#0b1016;
  --panel:#151d26;
  --panel-2:#101820;
  --gold:#d7c07a;
  --gold-2:#af8430;
  --green:#4caf6a;
  --green-2:#2d7a46;
  --text:#f7faf8;
  --muted:#aeb9c5;
  --border:rgba(215,192,122,.20);
  --shadow:0 24px 70px rgba(0,0,0,.36);
}

*{box-sizing:border-box;}

html{scroll-behavior:smooth;}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at 12% 0%,rgba(215,192,122,.12),transparent 26%),
    radial-gradient(circle at 88% 8%,rgba(76,175,106,.10),transparent 30%),
    linear-gradient(180deg,#0b1016 0%,#101820 52%,#0b1016 100%);
  color:var(--text);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  line-height:1.55;
}

a{color:inherit;text-decoration:none;}
button{font-family:inherit;}

.page{
  width:min(100%,980px);
  margin:0 auto;
  padding:22px 18px 120px;
}

.topbar{
  position:sticky;
  top:0;
  z-index:30;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px 0 18px;
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
}

.top-pill,
.pro-state{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  min-height:42px;
  padding:9px 15px;
  border-radius:999px;
  background:rgba(18,25,33,.78);
  border:1px solid rgba(215,192,122,.18);
  color:#f7f2d9;
  font-size:13px;
  font-weight:900;
}

.pro-state.locked{
  background:rgba(215,192,122,.10);
  border-color:rgba(215,192,122,.24);
  color:#f2df9d;
}

.pro-state.active{
  background:rgba(76,175,106,.12);
  border-color:rgba(102,198,128,.28);
  color:#dff7e6;
}

.hero{
  position:relative;
  overflow:hidden;
  border-radius:38px;
  padding:42px 32px 32px;
  background:
    radial-gradient(circle at 88% 8%,rgba(215,192,122,.18),transparent 27%),
    radial-gradient(circle at 14% 88%,rgba(76,175,106,.14),transparent 28%),
    linear-gradient(135deg,#151d26 0%,#101820 50%,#17261f 100%);
  border:1px solid var(--border);
  box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.04);
}

.hero::after{
  content:"";
  position:absolute;
  inset:-40%;
  background:linear-gradient(115deg,transparent 0%,rgba(255,255,255,.04) 45%,transparent 55%);
  transform:rotate(8deg);
  pointer-events:none;
}

.hero-inner{position:relative;z-index:2;}

.badge{
  display:inline-flex;
  align-items:center;
  gap:9px;
  padding:9px 15px;
  border-radius:999px;
  background:rgba(215,192,122,.10);
  border:1px solid rgba(215,192,122,.26);
  color:var(--gold);
  font-size:12px;
  font-weight:950;
  letter-spacing:.12em;
  text-transform:uppercase;
}

h1{
  margin:20px 0 12px;
  max-width:720px;
  font-size:52px;
  line-height:.96;
  letter-spacing:-.065em;
}

.hero-text{
  max-width:720px;
  color:var(--muted);
  font-size:17px;
  font-weight:650;
}

.hero-actions{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:28px;
}

.btn{
  appearance:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:9px;
  min-height:52px;
  padding:14px 21px;
  border-radius:18px;
  border:1px solid transparent;
  font-size:14px;
  font-weight:950;
  cursor:pointer;
  text-decoration:none;
  transition:transform .18s ease,box-shadow .25s ease,background .25s ease,border-color .25s ease;
  -webkit-tap-highlight-color:transparent;
}

.btn:hover{transform:translateY(-2px);}
.btn:active{transform:scale(.985);}

.btn-primary{
  background:linear-gradient(135deg,#f1db91 0%,#d7c07a 42%,#af8430 100%);
  color:#11150f;
  box-shadow:0 18px 38px rgba(215,192,122,.22);
}

.btn-secondary{
  background:rgba(20,28,37,.82);
  color:#f7faf8;
  border-color:rgba(215,192,122,.18);
}

.btn-green{
  background:linear-gradient(135deg,#66c680 0%,#2d7a46 100%);
  color:white;
  box-shadow:0 18px 38px rgba(76,175,106,.16);
}

.access-panel{
  margin-top:24px;
  border-radius:30px;
  padding:22px;
  background:
    radial-gradient(circle at 96% 0%,rgba(215,192,122,.12),transparent 30%),
    linear-gradient(135deg,#151d26 0%,#101820 55%,#14231b 100%);
  border:1px solid rgba(215,192,122,.18);
  box-shadow:0 18px 44px rgba(0,0,0,.24);
}

.access-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
}

.access-kicker{
  color:#d7c07a;
  font-size:11px;
  font-weight:950;
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-bottom:7px;
}

.access-title{
  margin:0;
  font-size:28px;
  line-height:1.08;
  letter-spacing:-.045em;
}

.access-text{
  margin:8px 0 0;
  max-width:650px;
  color:#aeb9c5;
  font-size:14px;
  font-weight:650;
}

.access-status{
  flex:0 0 auto;
  display:inline-flex;
  min-height:38px;
  align-items:center;
  justify-content:center;
  padding:9px 13px;
  border-radius:999px;
  background:rgba(215,192,122,.10);
  border:1px solid rgba(215,192,122,.22);
  color:#f2df9d;
  font-size:12px;
  font-weight:950;
  white-space:nowrap;
}

.access-panel.active .access-status{
  background:rgba(76,175,106,.12);
  border-color:rgba(102,198,128,.28);
  color:#dff7e6;
}

.section{
  margin-top:34px;
}

.section-head{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:16px;
  margin-bottom:18px;
}

.section-title{
  margin:0;
  font-size:32px;
  line-height:1.08;
  letter-spacing:-.045em;
}

.section-subtitle{
  margin:8px 0 0;
  max-width:680px;
  color:#aeb9c5;
  font-size:14px;
  font-weight:650;
}

.section-note{
  color:#d7c07a;
  font-size:12px;
  font-weight:950;
  letter-spacing:.08em;
  text-transform:uppercase;
  white-space:nowrap;
}

.theme-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:16px;
}

.theme-card{
  position:relative;
  overflow:hidden;
  min-height:238px;
  border-radius:32px;
  padding:24px;
  border:1px solid rgba(255,255,255,.10);
  box-shadow:0 18px 42px rgba(0,0,0,.26), inset 0 1px 0 rgba(255,255,255,.04);
  cursor:pointer;
  text-align:left;
  color:white;
  transition:transform .18s ease,border-color .25s ease,box-shadow .25s ease;
}

.theme-card:hover{
  transform:translateY(-4px);
  border-color:rgba(215,192,122,.36);
  box-shadow:0 24px 52px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.05);
}

.theme-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent 50%,rgba(255,255,255,.10),transparent 70%);
  opacity:.7;
  pointer-events:none;
}

.theme-card.locked::after{
  display:none !important;
  content:none !important;
  opacity:0 !important;
  visibility:hidden !important;
}

.theme-card.active-theme{
  border-color:rgba(102,198,128,.52);
  box-shadow:0 24px 52px rgba(76,175,106,.16), inset 0 1px 0 rgba(255,255,255,.05);
}

.theme-gold{background:linear-gradient(145deg,#a97808 0%,#c99410 42%,#e6b91e 70%,#b8860b 100%) !important;}

.theme-emerald{background:linear-gradient(145deg,#001b12 0%,#006a3c 52%,#48f29d 100%) !important;}

.theme-violet{background:linear-gradient(145deg,#16091f 0%,#4b1d76 48%,#9b55d8 100%) !important;}

.theme-rose{background:linear-gradient(145deg,#7f2854 0%,#d46d9d 52%,#ffb8d6 100%) !important;}


.theme-carbon{position:relative;overflow:hidden;background:linear-gradient(135deg,#050608 0%,#161d25 52%,#4d5965 100%) !important;border:1px solid rgba(230,238,246,.24) !important;}


.theme-child{position:relative;overflow:hidden;background:linear-gradient(135deg,#bfe9ff 0%,#79bdeb 55%,#fff0f6 100%) !important;border:1px solid rgba(228,246,255,.66) !important;}

.theme-night{position:relative;overflow:hidden;background:linear-gradient(145deg,#07091f 0%,#10184a 55%,#1e3471 100%) !important;border:1px solid rgba(189,205,255,.34) !important;}

.theme-sand{position:relative;overflow:hidden;background:linear-gradient(145deg,#b98542 0%,#d8a862 55%,#f6dca6 100%) !important;border:1px solid rgba(255,232,184,.50) !important;}

.theme-top{
  position:relative;
  z-index:2;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:14px;
}

.theme-icon{
  width:54px;
  height:54px;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.20);
  font-size:27px;
}

.theme-chip{
  padding:6px 10px;
  border-radius:999px;
  background:rgba(0,0,0,.24);
  border:1px solid rgba(255,255,255,.18);
  color:#fff;
  font-size:10px;
  font-weight:950;
  letter-spacing:.09em;
}

.theme-card h3{
  position:relative;
  z-index:2;
  margin:22px 0 8px;
  max-width:320px;
  font-size:26px;
  line-height:1.05;
  letter-spacing:-.045em;
}

.theme-card p{
  position:relative;
  z-index:2;
  margin:0;
  max-width:340px;
  color:rgba(255,255,255,.84);
  font-size:14px;
  font-weight:700;
}

.theme-preview{
  position:relative;
  z-index:2;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  margin-top:22px;
  max-width:230px;
}

.preview-pill{
  height:12px;
  border-radius:999px;
  background:rgba(255,255,255,.30);
}

.preview-pill:nth-child(2){opacity:.72;}
.preview-pill:nth-child(3){opacity:.48;}

.info-box{
  margin-top:28px;
  border-radius:28px;
  padding:22px;
  background:rgba(215,192,122,.08);
  border:1px solid rgba(215,192,122,.16);
  color:#d3dde6;
  font-size:13px;
  font-weight:650;
}

.bottom-nav{
  position:fixed;
  left:50%;
  bottom:18px;
  z-index:50;
  transform:translateX(-50%);
  width:min(92%,560px);
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:8px;
  padding:8px;
  border-radius:24px;
  background:rgba(14,20,27,.84);
  border:1px solid rgba(215,192,122,.18);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  box-shadow:0 18px 44px rgba(0,0,0,.34);
}

.bottom-nav a,
.bottom-nav button{
  appearance:none;
  border:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  min-height:54px;
  border-radius:18px;
  background:transparent;
  color:#c8d2dc;
  font-size:11px;
  font-weight:850;
  cursor:pointer;
}

.bottom-nav a.active,
.bottom-nav button.active{
  background:linear-gradient(135deg,rgba(215,192,122,.18),rgba(76,175,106,.12));
  color:#f8e9a9;
}

.modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  z-index:100;
  padding:18px;
  background:rgba(5,8,11,.72);
  backdrop-filter:blur(9px);
  -webkit-backdrop-filter:blur(9px);
  align-items:center;
  justify-content:center;
}

.modal-overlay.open{display:flex;}

.modal{
  width:min(100%,560px);
  border-radius:32px;
  padding:24px;
  background:
    radial-gradient(circle at 88% 0%,rgba(215,192,122,.12),transparent 32%),
    linear-gradient(180deg,#17202a 0%,#111821 100%);
  border:1px solid rgba(215,192,122,.22);
  box-shadow:0 28px 80px rgba(0,0,0,.50);
}

.modal-badge{
  display:inline-flex;
  padding:7px 11px;
  border-radius:999px;
  background:rgba(215,192,122,.10);
  border:1px solid rgba(215,192,122,.22);
  color:#f2df9d;
  font-size:11px;
  font-weight:950;
  letter-spacing:.10em;
  text-transform:uppercase;
}

.modal h3{
  margin:16px 0 8px;
  font-size:28px;
  line-height:1.1;
  letter-spacing:-.04em;
}

.modal p{
  color:var(--muted);
  margin:0;
  font-size:15px;
  font-weight:650;
}

.modal-actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:22px;
}

.modal-actions .btn{flex:1 1 190px;}

.toast{
  position:fixed;
  left:50%;
  bottom:94px;
  z-index:140;
  transform:translateX(-50%) translateY(14px);
  opacity:0;
  pointer-events:none;
  width:min(92%,460px);
  padding:14px 16px;
  border-radius:18px;
  background:rgba(16,24,32,.94);
  border:1px solid rgba(102,198,128,.24);
  color:#eaf7ee;
  font-size:13px;
  font-weight:850;
  text-align:center;
  box-shadow:0 18px 40px rgba(0,0,0,.35);
  transition:opacity .25s ease,transform .25s ease;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

@media(max-width:760px){
  .page{padding:18px 12px 110px;}
  .topbar{padding-top:8px;}
  .top-pill,.pro-state{
    min-height:38px;
    padding:8px 12px;
    font-size:12px;
  }
  .hero{
    padding:32px 20px 24px;
    border-radius:30px;
  }
  h1{font-size:39px;}
  .hero-text{font-size:16px;}
  .access-head,
  .section-head{
    align-items:flex-start;
    flex-direction:column;
  }
  .theme-grid{
    grid-template-columns:1fr;
  }
  .theme-card{
    min-height:214px;
    border-radius:28px;
  }
  .section-title{
    font-size:28px;
  }
  .hero-actions .btn{
    width:100%;
  }
  .bottom-nav{
    bottom:10px;
    width:calc(100% - 18px);
  }
}

@media(max-width:420px){
  h1{font-size:35px;}
}
</style>

<script>
(function(){
  const PRO_KEY = "barakaway_pro";
  const THEME_KEY = "barakaway_premium_theme";
  const proState = document.getElementById("proState");
  const toast = document.getElementById("toast");

  const themeNames = {
    "royal-gold":"Королевское золото",
    "emerald-quran":"Изумрудный Коран",
    "violet-noor":"Фиолетовый нур",
    "rose-soft":"Розовая гармония",
    "carbon-elite":"Карбоновая элита",
    "children-soft":"Детская тема",
    "night-mosque":"Ночная мечеть",
    "desert-sand":"Песочная классика"
  };

  function isPro(){
    try{ return localStorage.getItem(PRO_KEY) === "true"; }catch(e){ return false; }
  }

  function showToast(message){
    if(!toast) return;

    toast.textContent = message;
    toast.classList.add("show");

    clearTimeout(window.__barakawayProThemeToast);
    window.__barakawayProThemeToast = setTimeout(function(){
      toast.classList.remove("show");
    }, 2600);
  }

  function blinkPro(){
    if(proState){
      proState.classList.remove("pro-attention");
      void proState.offsetWidth;
      proState.classList.add("pro-attention");

      setTimeout(function(){
        proState.classList.remove("pro-attention");
      }, 3400);
    }

    showToast("PRO не активирован. Активируйте доступ для выбора темы.");
  }

  function syncThemeCards(){
    const active = isPro();
    let current = "";

    try{ current = localStorage.getItem(THEME_KEY) || ""; }catch(e){ current = ""; }

    document.documentElement.classList.toggle("original-theme-preview", active && !current);

    if(proState){
      proState.classList.toggle("locked", !active);
      proState.classList.toggle("active", active);
      proState.innerHTML = active ? "✅ PRO активирован" : "🔒 PRO не активирован";
    }

    document.querySelectorAll("[data-theme]").forEach(function(card){
      const theme = card.getAttribute("data-theme");
      card.classList.toggle("locked", !active);
      card.classList.toggle("active-theme", active && current === theme);
    });

    if(window.BarakaWayTheme && typeof window.BarakaWayTheme.refresh === "function"){
      window.BarakaWayTheme.refresh();
    }
  }

  function setTheme(theme){
    if(!isPro()){
      blinkPro();
      return;
    }

    if(!theme) return;

    if(window.BarakaWayTheme && typeof window.BarakaWayTheme.applyPremiumTheme === "function"){
      window.BarakaWayTheme.applyPremiumTheme(theme);
    }else{
      try{ localStorage.setItem(THEME_KEY, theme); }catch(e){}
      document.documentElement.classList.add("premium-theme-" + theme);
    }

    try{
      window.dispatchEvent(new StorageEvent("storage", {key:THEME_KEY, newValue:theme}));
    }catch(e){
      window.dispatchEvent(new Event("storage"));
    }

    syncThemeCards();
    showToast("Тема применена: " + (themeNames[theme] || "PRO-тема"));
  }

  document.querySelectorAll("[data-theme]").forEach(function(card){
    card.addEventListener("click", function(event){
      event.preventDefault();
      event.stopPropagation();
      setTheme(card.getAttribute("data-theme"));
      return false;
    }, true);
  });

  if(proState){
    proState.addEventListener("click", function(){
      if(!isPro()){
        window.location.href = "pro-ru.html";
      }
    });
  }

  window.addEventListener("storage", syncThemeCards);
  syncThemeCards();
})();
</script>


<script>
(function(){
  document.querySelectorAll('[data-theme-clear="true"]').forEach(function(card){
    card.addEventListener('click', function(event){
      event.preventDefault();
      event.stopPropagation();

      if(window.BarakaWayTheme && typeof window.BarakaWayTheme.clearPremiumTheme === 'function'){
        window.BarakaWayTheme.clearPremiumTheme();
      }else{
        try{
          localStorage.removeItem('barakaway_premium_theme');
        }catch(e){}
      }

      try{
        window.dispatchEvent(new StorageEvent('storage', {
          key:'barakaway_premium_theme',
          newValue:''
        }));
      }catch(e){
        window.dispatchEvent(new Event('storage'));
      }

      const toast = document.getElementById('toast');
      if(toast){
        toast.textContent = 'Оригинальная тема восстановлена';
        toast.classList.add('show');
        clearTimeout(window.__restoreThemeToast);
        window.__restoreThemeToast = setTimeout(function(){
          toast.classList.remove('show');
        }, 2200);
      }
    }, true);
  });
})();
</script>
