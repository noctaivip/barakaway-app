const cats=['الكل',...Array.from(new Set(cases.map(x=>x.cat)))];let activeCat='الكل',active=null,activeTab='plan',mode='all';
const tabLabels={plan:'الخطة',links:'فتح',check:'قائمة التحقق',important:'مهم'};
const grid=document.getElementById('grid'),search=document.getElementById('search'),chips=document.getElementById('chips'),backdrop=document.getElementById('backdrop'),tabs=document.getElementById('tabs'),content=document.getElementById('content'),toast=document.getElementById('toast'),lastStrip=document.getElementById('lastStrip');
function readArr(k){try{return JSON.parse(localStorage.getItem(k)||'[]')}catch(e){return[]}}
function writeArr(k,a){localStorage.setItem(k,JSON.stringify([...new Set(a)]))}
function seen(){return readArr('bw_life_guide_seen')}
function favs(){return readArr('bw_life_guide_fav')}
function recent(){return readArr('bw_life_guide_recent')}
function doneChecks(id){return readArr('bw_life_guide_done_'+id)}
function setSeen(id){const s=seen();if(!s.includes(id))s.push(id);writeArr('bw_life_guide_seen',s);updateProgress()}
function setRecent(id){const r=[id,...recent().filter(x=>x!==id)].slice(0,6);writeArr('bw_life_guide_recent',r);renderLast()}
function toggleFav(id){const f=favs();const on=f.includes(id);writeArr('bw_life_guide_fav',on?f.filter(x=>x!==id):[...f,id]);if(!on){mode='favorites';activeCat='الكل';search.value='';document.querySelectorAll('#quick button').forEach(x=>x.classList.toggle('active',x.dataset.mode==='favorites'));closePanel();renderChips();showToast('تمت الإضافة إلى المفضلة')}else{showToast('تمت الإزالة من المفضلة')}renderGrid();renderPanel()}
function updateProgress(){const n=seen().length;document.getElementById('seenCount').textContent=n+'/'+cases.length;document.getElementById('progressRing').style.setProperty('--p',(n/cases.length*100)+'%')}
function renderChips(){chips.innerHTML=cats.map(c=>`<button class="chip ${c===activeCat?'active':''}" data-cat="${esc(c)}">${esc(c)}</button>`).join('')}
function esc(v){return String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function filtered(){const q=search.value.trim().toLowerCase();let arr=cases.slice();if(mode==='favorites')arr=arr.filter(x=>favs().includes(x.id));if(mode==='recent')arr=recent().map(id=>cases.find(x=>x.id===id)).filter(Boolean);if(mode==='premium')arr=arr.filter(x=>x.premium);return arr.filter(x=>(activeCat==='الكل'||x.cat===activeCat)&&(!q||`${x.title} ${x.sub} ${x.cat} ${x.guide.plan.join(' ')}`.toLowerCase().includes(q)))}
function renderGrid(){const list=filtered();document.getElementById('resultCount').textContent=list.length+' من '+cases.length;document.getElementById('sectionTitle').textContent=mode==='favorites'?'المفضلة':mode==='recent'?'المفتوحة مؤخراً':mode==='premium'?'سيناريوهات PRO':'جميع الحالات';grid.innerHTML=list.length?list.map(x=>`<article class="case-card" data-id="${x.id}" data-watermark="${x.icon}" style="--accent:${x.accent};--case-bg:${x.bg}"><span class="fav-dot ${favs().includes(x.id)?'on':''}"></span><div class="case-top"><div class="emoji">${x.icon}</div><span class="badge">${esc(x.cat)}${x.premium?' · PRO':''}</span></div><h3>${esc(x.title)}</h3><p>${esc(x.sub)}</p><div class="open-line"><span class="stars">${seen().includes(x.id)?'مفتوح':'افتح الخطة'}</span><span class="arrow">›</span></div></article>`).join(''):'<div class="empty">لم يتم العثور على نتائج. جرّب كلمة أو فئة أخرى.</div>'}
function renderLast(){if(!lastStrip)return;const list=recent().map(id=>cases.find(x=>x.id===id)).filter(Boolean);lastStrip.innerHTML=list.map(x=>`<button class="last-pill" data-id="${x.id}"><span>${x.icon}</span>${esc(x.title)}</button>`).join('')}
function openCase(id){active=cases.find(x=>x.id===id);activeTab='plan';if(!active)return;setSeen(id);setRecent(id);document.getElementById('panelIcon').textContent=active.icon;document.getElementById('panelTitle').textContent=active.title;document.getElementById('panelSub').textContent=active.sub;const hero=document.getElementById('panelHero');hero.style.setProperty('--active-bg',active.bg);hero.setAttribute('data-symbol',active.symbol||active.icon);backdrop.classList.add('show');backdrop.setAttribute('aria-hidden','false');renderPanel();renderGrid()}
function renderPanel(){if(!active)return;const keys=['plan','links','check','important'];tabs.innerHTML=keys.map(k=>`<button class="tab ${k===activeTab?'active':''}" data-tab="${k}">${tabLabels[k]}</button>`).join('');content.innerHTML=renderContent(activeTab);document.getElementById('favBtn').textContent=favs().includes(active.id)?'♥ في المفضلة':'♡ إضافة إلى المفضلة'}
function renderContent(kind){
  const g=active.guide;
  if(kind==='plan') return `<h3>ماذا تفعل الآن</h3><ol>${g.plan.map(x=>`<li>${esc(x)}</li>`).join('')}</ol><div class="mini-note">هذه خطة عملية. تبقى الأدعية والنصوص في «حصن المسلم»، وهنا ترتيب الخطوات.</div>`;
  if(kind==='links') return `<h3>انتقالات سريعة</h3><p>افتح القسم المناسب من BarakaWay مباشرة من هذه الحالة.</p><div class="link-grid">${g.links.map(([t,s,u])=>`<button class="deep-link" data-url="${esc(u)}"><span>${esc(s)}</span>${esc(t)}</button>`).join('')}</div><div class="source">بهذا لا ينافس القسم «حصن المسلم»، بل يربط وظائف التطبيق الموجودة.</div>`;
  if(kind==='check') return `<h3>قائمة التحقق الحالة</h3>${g.check.map((x,i)=>`<div class="check-row ${doneChecks(active.id).includes(String(i))?'done':''}" data-check="${i}"><div class="check-box"></div><div><strong>${esc(x)}</strong><small>اضغط لتحديده كمنجز.</small></div></div>`).join('')}`;
  return `<h3>مهم فهم</h3><p>${esc(g.important)}</p><div class="mini-note">إذا كان الأمر يحتاج إلى حكم شرعي أو مساعدة طبية أو تقييم قانوني أو استشارة مالية، فيجب الرجوع إلى مختص.</div>`;
}
function closePanel(){backdrop.classList.remove('show');backdrop.setAttribute('aria-hidden','true')}
function showToast(t){toast.textContent=t;toast.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove('show'),1800)}
async function shareText(){if(!active)return;const text=`BarakaWay — ${active.title}\n${active.sub}\n\nالخطة:\n- ${active.guide.plan.join('\n- ')}\n\nbarakaway.app`;try{if(navigator.share){await navigator.share({title:'BarakaWay',text});return}}catch(e){}try{await navigator.clipboard.writeText(text);showToast('تم نسخ النص')}catch(e){showToast('المشاركة غير متاحة')}}
chips.addEventListener('click',e=>{const b=e.target.closest('.chip');if(!b)return;activeCat=b.dataset.cat;renderChips();renderGrid()});
grid.addEventListener('click',e=>{const c=e.target.closest('.case-card');if(c&&c.dataset.id)openCase(c.dataset.id)});if(lastStrip){lastStrip.addEventListener('click',e=>{const b=e.target.closest('.last-pill');if(b)openCase(b.dataset.id)})};
tabs.addEventListener('click',e=>{const b=e.target.closest('.tab');if(!b)return;activeTab=b.dataset.tab;renderPanel()});
content.addEventListener('click',e=>{const link=e.target.closest('.deep-link');if(link){location.href=link.dataset.url;return}const row=e.target.closest('.check-row');if(row&&active){const id=String(row.dataset.check),arr=doneChecks(active.id);writeArr('bw_life_guide_done_'+active.id,arr.includes(id)?arr.filter(x=>x!==id):[...arr,id]);renderPanel();showToast('تم تحديث قائمة التحقق')}});
document.getElementById('closeBtn').onclick=closePanel;backdrop.addEventListener('click',e=>{if(e.target===backdrop)closePanel()});document.getElementById('favBtn').onclick=()=>active&&toggleFav(active.id);document.getElementById('shareBtn').onclick=shareText;document.getElementById('doneBtn').onclick=()=>{if(!active)return;activeTab='check';renderPanel();showToast('تم فتح قائمة التحقق')};search.oninput=renderGrid;document.getElementById('clearBtn').onclick=()=>{search.value='';renderGrid();search.focus()};document.getElementById('randomBtn').onclick=()=>openCase(cases[Math.floor(Math.random()*cases.length)].id);document.getElementById('quick').addEventListener('click',e=>{const b=e.target.closest('button[data-mode]');if(!b)return;mode=b.dataset.mode;document.querySelectorAll('#quick button').forEach(x=>x.classList.toggle('active',x===b));renderGrid()});
document.getElementById('momentBox').addEventListener('click',e=>{const b=e.target.closest('button[data-open]');if(b)openCase(b.dataset.open)});
renderChips();renderLast();renderGrid();updateProgress();
