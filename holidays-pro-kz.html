/* Ready-card fullscreen zoom */
.zoom-viewer{
  position:fixed;
  inset:0;
  z-index:99999;
  display:none;
  background:rgba(0,0,0,.94);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  touch-action:none;
}
.zoom-viewer.active{display:block}
.zoom-stage{
  position:absolute;
  inset:0;
  overflow:hidden;
  cursor:grab;
  touch-action:none;
}
.zoom-stage:active{cursor:grabbing}
.zoom-stage img{
  position:absolute;
  left:50%;
  top:50%;
  width:min(92vw,760px);
  max-width:none;
  height:auto;
  transform:translate(-50%,-50%) scale(1.85);
  transform-origin:center center;
  user-select:none;
  -webkit-user-drag:none;
  border-radius:18px;
  box-shadow:0 30px 90px rgba(0,0,0,.72);
  will-change:transform;opacity:0;transition:opacity .18s ease;
}
.zoom-close{
  position:fixed;
  top:calc(env(safe-area-inset-top,0px) + 14px);
  right:calc(env(safe-area-inset-right,0px) + 14px);
  z-index:100001;
  width:46px;
  height:46px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(12,16,20,.84);
  color:#fff;
  font-size:30px;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 14px 36px rgba(0,0,0,.44);
}
.zoom-hint{
  position:fixed;
  left:50%;
  bottom:calc(env(safe-area-inset-bottom,0px) + 18px);
  transform:translateX(-50%);
  z-index:100000;
  color:rgba(255,255,255,.78);
  background:rgba(12,16,20,.62);
  border:1px solid rgba(255,255,255,.12);
  border-radius:999px;
  padding:9px 14px;
  font-size:13px;
  font-weight:800;
  pointer-events:none;
}
@media(max-width:560px){
  .zoom-stage img{
    width:94vw;
    transform:translate(-50%,-50%) scale(2.15);
  }
}

<body>
<div class="ramadan-wrapper"><div class="ramadan-bar"><div class="ramadan-text">Holidays Pro • Pro құттықтаулар • BarakaWay</div></div></div>
<main class="container">
<section class="hero"><div class="hero-inner"><div class="logo"><img src="./assets/greetings-pro-kz/logo.png" alt="BarakaWay"></div><h1>Holidays <span class="pro-word">Pro</span></h1></div></section>
<section class="generator"><h2>Жеке құттықтау</h2><div class="generator-grid"><input id="generatorName" type="text" placeholder="Алушының аты"><select id="generatorCategory"><option value="jumuah">Жұма</option><option value="ramadan">Рамазан</option><option value="eid-fitr">Ораза айт</option><option value="eid-adha">Құрбан айт</option><option value="daily">Күн сайын</option></select><button class="mini-btn" type="button" onclick="generatePersonal()">Генерациялау</button></div></section>
<nav class="tabs" aria-label="Құттықтау санаттары"><button class="tab" type="button" data-filter="all">Барлығы</button><button class="tab active" type="button" data-filter="jumuah">Жұма</button><button class="tab" type="button" data-filter="ramadan">Рамазан</button><button class="tab" type="button" data-filter="eid-fitr">Ораза айт</button><button class="tab" type="button" data-filter="eid-adha">Құрбан айт</button><button class="tab" type="button" data-filter="daily">Күн сайын</button></nav>
<div class="section-title"><h2>Дайын құттықтаулар</h2></div><section class="cards" id="cards"></section>
</main>
<div class="modal" id="modal" aria-hidden="true"><div class="modal-card"><canvas class="preview-canvas" id="previewCanvas" width="1080" height="1350"></canvas><div class="modal-actions"><button class="action-btn primary" type="button" onclick="requestShareConfirmation()">Бөлісу</button><button class="action-btn" type="button" onclick="regeneratePersonal()">Қайта генерациялау</button><button class="action-btn" type="button" onclick="downloadCurrent()">Жүктеп алу</button></div><button class="close-btn" type="button" onclick="closeModal()">Жабу</button></div></div><div class="confirm-modal" id="shareConfirmModal" aria-hidden="true"><div class="confirm-card" role="dialog" aria-modal="true" aria-labelledby="shareConfirmTitle"><h3 id="shareConfirmTitle"></h3><div class="confirm-category" id="shareConfirmCategory"></div><p id="shareConfirmBody"></p><div class="confirm-actions"><button type="button" onclick="closeShareConfirm()" id="shareConfirmCancel"></button><button class="confirm-primary" type="button" onclick="confirmShareNow()" id="shareConfirmOk"></button></div></div></div><div class="toast" id="toast">Дайын</div>
<script>

function cleanPersonalName(value){
  return String(value||"")
    .replace(/[<>]/g,"")
    .replace(/\s+/g," ")
    .trim()
    .slice(0,42);
}
function formatPersonalText(name,text){
  const safeName=cleanPersonalName(name);
  const body=String(text||"").trim();
  if(!safeName)return body;
  return safeName+", "+body;
}
function getPersonalHistory(key){
  try{
    const data=JSON.parse(localStorage.getItem(key)||"[]");
    return Array.isArray(data)?data:[];
  }catch(e){return [];}
}
function savePersonalHistory(key,value,limit){
  const history=getPersonalHistory(key).filter(function(item){return item!==value;});
  history.unshift(value);
  localStorage.setItem(key,JSON.stringify(history.slice(0,limit)));
}
function pickPersonalOption(category,type,list,currentValue,limit){
  if(!Array.isArray(list)||!list.length)return "";
  const key="barakaway_personal_"+type+"_history_"+category;
  const history=getPersonalHistory(key);
  let available=list.filter(function(item){return item!==currentValue&&history.indexOf(item)===-1;});
  if(!available.length)available=list.filter(function(item){return item!==currentValue;});
  if(!available.length)available=list.slice();
  const selected=available[Math.floor(Math.random()*available.length)]||list[0]||"";
  savePersonalHistory(key,selected,limit);
  return selected;
}
function selectPersonalHeadline(category,currentValue){
  const tpl=personalizedTemplates[category]||personalizedTemplates.jumuah;
  return pickPersonalOption(category,"headline",tpl.headlines||[tpl.title],currentValue||"",20)||tpl.title;
}
function buildPersonalText(category,name,currentSignature){
  const tpl=personalizedTemplates[category]||personalizedTemplates.jumuah;
  const openings=tpl.openings||[];
  const blessings=tpl.blessings||[];
  const closings=tpl.closings||[];
  const totalCombos=openings.length*blessings.length*closings.length;
  if(!totalCombos)return formatPersonalText(name,"Алла бұл күнді нұрға, тыныштыққа және баракатқа толтырсын.");
  const key="barakaway_personal_combo_history_"+category;
  const history=getPersonalHistory(key);
  let selected=null;
  for(let attempt=0;attempt<80;attempt++){
    const oi=Math.floor(Math.random()*openings.length);
    const bi=Math.floor(Math.random()*blessings.length);
    const ci=Math.floor(Math.random()*closings.length);
    const signature=oi+"-"+bi+"-"+ci;
    if(signature!==currentSignature&&history.indexOf(signature)===-1){
      selected={signature:signature,text:openings[oi]+". "+blessings[bi]+" "+closings[ci]};
      break;
    }
  }
  if(!selected){
    const oi=Math.floor(Math.random()*openings.length);
    const bi=Math.floor(Math.random()*blessings.length);
    const ci=Math.floor(Math.random()*closings.length);
    selected={signature:oi+"-"+bi+"-"+ci,text:openings[oi]+". "+blessings[bi]+" "+closings[ci]};
  }
  savePersonalHistory(key,selected.signature,40);
  return {text:formatPersonalText(name,selected.text),signature:selected.signature,total:totalCombos};
}
function selectPersonalText(category,name,currentSignature){
  return buildPersonalText(category,name,currentSignature);
}

const ASSET_CACHE_TAG="pro-mobile-asset-fix-20260526";
function stripAssetQuery(src){return String(src||"").split("?")[0];}
function cacheAsset(src){
  src=String(src||"");
  if(!src||!src.startsWith("./assets/"))return src;
  const clean=stripAssetQuery(src);
  return clean+"?v="+ASSET_CACHE_TAG;
}
function uniqueAssetList(list){
  const seen=new Set();
  return list.filter(function(item){if(!item||seen.has(item))return false;seen.add(item);return true;});
}
function assetFallbacks(src){
  const clean=stripAssetQuery(src);
  const list=[clean];
  const m=clean.match(/^\.\/assets\/(greetings(?:-pro)?-([a-z]+))\/([^\/]+)$/);
  if(m){
    const folder=m[1], lang=m[2], file=m[3];
    const proFolder="greetings-pro-"+lang;
    const normalFolder="greetings-"+lang;
    const base=file.replace(/\.(png|jpg|jpeg|webp)$/i,"");
    const ext=(file.match(/\.(png|jpg|jpeg|webp)$/i)||[".png"])[0];
    const noPro=base.replace(/-pro$/i,"");
    const pro=noPro+"-pro";
    const variants=[];
    [pro,noPro].forEach(function(stem){
      variants.push(stem+ext.toLowerCase());
      variants.push(stem+ext.toUpperCase());
      variants.push(stem+".png");
      variants.push(stem+".jpg");
      variants.push(stem+".jpeg");
      variants.push(stem+".webp");
      variants.push(stem.replace(/^ramadan/i,"Ramadan")+".png");
      variants.push(stem.replace(/^Ramadan/,"ramadan")+".png");
    });
    [proFolder,normalFolder].forEach(function(f){variants.forEach(function(v){list.push("./assets/"+f+"/"+v);});});
    if(file==="logo.png"){list.push("./assets/barakaway-logo.png");}
  }
  const p=clean.match(/^\.\/assets\/(personal(?:-pro)?)\/([^\/]+)$/);
  if(p){
    const file=p[2];
    const stem=file.replace(/\.(png|jpg|jpeg|webp)$/i,"").replace(/-pro$/i,"");
    ["personal-pro","personal"].forEach(function(f){
      [".jpg",".jpeg",".png",".webp"].forEach(function(ext){list.push("./assets/"+f+"/"+stem+ext);list.push("./assets/"+f+"/"+stem+"-pro"+ext);});
    });
  }
  return uniqueAssetList(list).map(cacheAsset);
}
function handleImageFallback(img){
  if(!img)return;
  let list=[];
  try{list=JSON.parse(img.dataset.assetFallbacks||"[]");}catch(e){list=[];}
  const index=Number(img.dataset.assetFallbackIndex||"0")+1;
  if(index<list.length){
    img.dataset.assetFallbackIndex=String(index);
    img.src=list[index];
  }
}
function prepareSafeImage(img,src){
  if(!img)return;
  const clean=stripAssetQuery(src||img.getAttribute("src")||"");
  if(!clean||!clean.startsWith("./assets/"))return;
  const fallbacks=assetFallbacks(clean);
  img.dataset.assetFallbacks=JSON.stringify(fallbacks);
  img.dataset.assetFallbackIndex="0";
  img.onerror=function(){handleImageFallback(this);};
  img.src=fallbacks[0];
}
function attachSafeImages(root){
  (root||document).querySelectorAll('img[src^="./assets/"],img[data-src^="./assets/"]').forEach(function(img){
    prepareSafeImage(img,img.getAttribute("data-src")||img.getAttribute("src"));
  });
}

function renderCards(filter){const root=document.getElementById("cards");const list=orderedGreetings().filter(function(item){return filter==="all"||item.category===filter;});root.innerHTML=list.map(function(item){return `<article class="greeting-card" data-category="${item.category}"><div class="card-art"><img class="card-image" src="${item.image}" alt="${item.title}" loading="lazy"><div class="card-image-overlay"></div><div class="card-brand-badge"><img src="${LOGO_PATH}" alt="BarakaWay"></div><div class="card-category-badge">${item.label}</div><div class="card-site-mark">barakaway.app</div></div><div class="card-body"><h3 class="card-title">${item.title}</h3></div><div class="card-actions"><button class="action-btn" type="button" onclick="downloadReadyCard('${item.id}')">Жүктеу</button><button class="action-btn" type="button" onclick="copyCard('${item.id}')">Көшіру</button><button class="action-btn primary" type="button" onclick="shareCard('${item.id}')">Бөлісу</button></div></article>`;}).join("");attachSafeImages(root);}

function wrapCanvasText(ctx,text,x,y,maxWidth,lineHeight,maxLines){const words=String(text||"").split(/\s+/);let line="",lines=[];for(let i=0;i<words.length;i++){const test=line+words[i]+" ";if(ctx.measureText(test).width>maxWidth&&i>0){lines.push(line.trim());line=words[i]+" ";}else{line=test;}}if(line.trim())lines.push(line.trim());if(maxLines&&lines.length>maxLines){lines=lines.slice(0,maxLines);lines[lines.length-1]=lines[lines.length-1].replace(/[.,;:!?]*$/,"")+"…";}lines.forEach(function(l,i){ctx.fillText(l,x,y+i*lineHeight);});}

function getWrappedCanvasLines(ctx,text,maxWidth){
const words=String(text||"").trim().split(/\s+/).filter(Boolean);
let line="",lines=[];
for(let i=0;i<words.length;i++){
const test=line?line+" "+words[i]:words[i];
if(ctx.measureText(test).width>maxWidth&&line){
lines.push(line);
line=words[i];
}else{
line=test;
}
}
if(line)lines.push(line);
return lines;
}
function drawFittedCanvasText(ctx,text,x,top,maxWidth,maxHeight,options){
const opts=options||{};
let fontSize=opts.maxFontSize||43;
const minFontSize=opts.minFontSize||27;
const weight=opts.weight||"700";
const family=opts.family||"system-ui, Arial";
let lines=[],lineHeight=0,totalHeight=0;
while(fontSize>=minFontSize){
lineHeight=Math.round(fontSize*1.38);
ctx.font=weight+" "+fontSize+"px "+family;
lines=getWrappedCanvasLines(ctx,text,maxWidth);
totalHeight=lines.length*lineHeight;
if(totalHeight<=maxHeight)break;
fontSize-=2;
}
if(totalHeight>maxHeight){
lineHeight=Math.max(30,Math.floor(maxHeight/Math.max(lines.length,1)));
}
const startY=top+Math.max(0,(maxHeight-totalHeight)/2)+fontSize;
lines.forEach(function(line,index){
ctx.fillText(line,x,startY+index*lineHeight);
});
return {fontSize:fontSize,lines:lines.length,totalHeight:totalHeight};
}

function loadCanvasImage(src){
return new Promise(function(resolve,reject){
  const fallbacks=assetFallbacks(src);
  let index=0;
  const img=new Image();
  img.crossOrigin="anonymous";
  img.onload=function(){resolve(img)};
  img.onerror=function(){
    index++;
    if(index<fallbacks.length){img.src=fallbacks[index];}
    else{reject(new Error("Image load failed: "+src));}
  };
  img.src=fallbacks[0]||src;
});
}
function getAverageLuminance(ctx,x,y,w,h){
try{
const data=ctx.getImageData(x,y,w,h).data;
let total=0,count=0;
for(let i=0;i<data.length;i+=16){
const r=data[i],g=data[i+1],b=data[i+2];
total+=(0.2126*r+0.7152*g+0.0722*b);
count++;
}
return count?total/count:80;
}catch(e){return 80;}
}

}
return {panel:"rgba(0,0,0,.66)",text:"#f3d992",shadow:"rgba(0,0,0,.90)",blur:18};
}

function drawBarakaWayWatermark(ctx,w,h){
  ctx.save();
  ctx.globalAlpha=.085;
  ctx.translate(w/2,h/2);
  ctx.rotate(-Math.PI/7);
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillStyle="#fff4c2";
  ctx.strokeStyle="rgba(0,0,0,.42)";
  ctx.lineWidth=3;
  ctx.font="900 78px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif";
  ctx.strokeText("BarakaWay App",0,-26);
  ctx.fillText("BarakaWay App",0,-26);
  ctx.font="800 42px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif";
  ctx.strokeText("barakaway.app",0,42);
  ctx.fillText("barakaway.app",0,42);
  ctx.restore();

  ctx.save();
  ctx.globalAlpha=.045;
  ctx.rotate(-Math.PI/7);
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillStyle="#fff4c2";
  ctx.font="800 34px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif";
  const stepX=430;
  const stepY=260;
  for(let y=-h*1.2;y<h*1.8;y+=stepY){
    for(let x=-w*1.2;x<w*1.8;x+=stepX){
      ctx.fillText("BarakaWay App",x,y);
      ctx.fillText("barakaway.app",x,y+42);
    }
  }
  ctx.restore();
}

let zoomState={active:false,img:null,stage:null,scale:1.85,x:0,y:0,startX:0,startY:0,baseX:0,baseY:0,dragging:false};
function resolveAssetUrl(src){
  if(!src)return "";
  try{return new URL(src, window.location.href).href;}catch(_){return src;}
}
function stripAssetVersion(src){
  try{
    const u=new URL(src, window.location.href);
    u.search="";
    return u.href;
  }catch(_){
    return String(src).split("?")[0];
  }
}
function preloadZoomImage(src){
  return new Promise(function(resolve){
    const first=resolveAssetUrl(src);
    const fallback=stripAssetVersion(first);
    const img=new Image();
    img.decoding="async";
    img.onload=function(){resolve(first);};
    img.onerror=function(){
      if(fallback&&fallback!==first){
        const img2=new Image();
        img2.decoding="async";
        img2.onload=function(){resolve(fallback);};
        img2.onerror=function(){resolve(first);};
        img2.src=fallback;
      }else{
        resolve(first);
      }
    };
    img.src=first;
  });
}
function clampZoom(){
  const img=zoomState.img;
  const stage=zoomState.stage;
  if(!img||!stage)return;
  const rect=stage.getBoundingClientRect();
  const naturalW=img.offsetWidth*zoomState.scale;
  const naturalH=img.offsetHeight*zoomState.scale;
  const maxX=Math.max(30,(naturalW-rect.width)/2+90);
  const maxY=Math.max(30,(naturalH-rect.height)/2+90);
  zoomState.x=Math.max(-maxX,Math.min(maxX,zoomState.x));
  zoomState.y=Math.max(-maxY,Math.min(maxY,zoomState.y));
}
function applyZoomTransform(){
  clampZoom();
  if(zoomState.img){
    zoomState.img.style.transform=`translate(calc(-50% + ${zoomState.x}px), calc(-50% + ${zoomState.y}px)) scale(${zoomState.scale})`;
  }
}
async function openZoomViewer(src){
  const viewer=document.getElementById("zoomViewer");
  const img=document.getElementById("zoomImage");
  const stage=document.getElementById("zoomStage");
  if(!viewer||!img||!stage)return;
  zoomState.active=true;
  zoomState.img=img;
  zoomState.stage=stage;
  zoomState.scale=window.matchMedia("(max-width:560px)").matches?2.15:1.85;
  zoomState.x=0;
  zoomState.y=0;
  img.removeAttribute("src");
  img.style.opacity="0";
  viewer.classList.add("active");
  viewer.setAttribute("aria-hidden","false");
  document.body.style.overflow="hidden";
  const finalSrc=await preloadZoomImage(src);
  if(!zoomState.active)return;
  img.onload=function(){
    img.style.opacity="1";
    requestAnimationFrame(applyZoomTransform);
  };
  img.onerror=function(){
    img.style.opacity="1";
  };
  img.src=finalSrc;
  if(img.complete&&img.naturalWidth){
    img.style.opacity="1";
    requestAnimationFrame(applyZoomTransform);
  }
}
function closeZoomViewer(){
  const viewer=document.getElementById("zoomViewer");
  const img=document.getElementById("zoomImage");
  if(viewer){
    viewer.classList.remove("active");
    viewer.setAttribute("aria-hidden","true");
  }
  if(img){
    img.removeAttribute("src");
    img.style.opacity="0";
  }
  document.body.style.overflow="";
  zoomState.active=false;
  zoomState.dragging=false;
}
function zoomPointerDown(e){
  if(!zoomState.active)return;
  zoomState.dragging=true;
  zoomState.startX=e.clientX;
  zoomState.startY=e.clientY;
  zoomState.baseX=zoomState.x;
  zoomState.baseY=zoomState.y;
  if(zoomState.stage&&zoomState.stage.setPointerCapture){
    try{zoomState.stage.setPointerCapture(e.pointerId);}catch(_){}
  }
}
function zoomPointerMove(e){
  if(!zoomState.active||!zoomState.dragging)return;
  zoomState.x=zoomState.baseX+(e.clientX-zoomState.startX);
  zoomState.y=zoomState.baseY+(e.clientY-zoomState.startY);
  applyZoomTransform();
}
function zoomPointerUp(){zoomState.dragging=false;}
function bindZoomViewer(){
  const stage=document.getElementById("zoomStage");
  const viewer=document.getElementById("zoomViewer");
  if(!stage||!viewer||stage.dataset.bound==="1")return;
  stage.dataset.bound="1";
  stage.addEventListener("pointerdown",zoomPointerDown);
  stage.addEventListener("pointermove",zoomPointerMove);
  stage.addEventListener("pointerup",zoomPointerUp);
  stage.addEventListener("pointercancel",zoomPointerUp);
  viewer.addEventListener("click",function(e){if(e.target===viewer)closeZoomViewer();});
  window.addEventListener("keydown",function(e){if(e.key==="Escape")closeZoomViewer();});
}
function zoomCard(id){
  const g=findGreeting(id);
