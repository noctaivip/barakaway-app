function cleanPersonalName(value){
  return String(value||"")
    .replace(/أخي الكريم\s*\/\s*أختي الكريمة/g,"")
    .replace(/أخي الكريم/g,"")
    .replace(/أختي الكريمة/g,"")
    .replace(/أخي/g,"")
    .replace(/أختي/g,"")
    .replace(/الأخ/g,"")
    .replace(/الأخت/g,"")
    .replace(/يا\s+/g,"")
    .replace(/[،,]+$/g,"")
    .trim();
}
function withNamePrefix(name,text){
  const clean=cleanPersonalName(name);
  if(!clean)return text;
  return clean+"، "+text;
}
function pickPersonalPart(category,part){
  const tpl=personalizedTemplates[category]||personalizedTemplates.jumuah;
  const list=tpl[part]||[];
  if(!list.length)return "";
  const key="barakaway_personal_"+part+"_index_ar_"+category;
  let index=parseInt(localStorage.getItem(key)||"-1",10);
  if(!Number.isFinite(index))index=-1;
  index=(index+1)%list.length;
  localStorage.setItem(key,String(index));
  return list[index];
}
function selectPersonalHeadline(category){
const tpl=personalizedTemplates[category]||personalizedTemplates.jumuah;
const list=tpl.headlines||[tpl.title];
const key="barakaway_personal_headline_index_ar_"+category;
let index=parseInt(localStorage.getItem(key)||"-1",10);
if(!Number.isFinite(index))index=-1;
index=(index+1)%list.length;
localStorage.setItem(key,String(index));
return list[index];
}
function selectPersonalText(category,name){
const tpl=personalizedTemplates[category]||personalizedTemplates.jumuah;
if(!tpl)return withNamePrefix(name,"نسأل الله أن يرزقكم الخير والسكينة والبركة.");
const opening=pickPersonalPart(category,"openings");
const blessing=pickPersonalPart(category,"blessings");
const closing=pickPersonalPart(category,"closings");
const text=[opening,blessing,closing].filter(Boolean).join("، ").replace(/،\s*وأن/g,"، وأن");
return withNamePrefix(name,text||"نسأل الله أن يرزقكم الخير والسكينة والبركة.");
}

function orderedGreetings(){if(!isFriday())return greetings;return greetings.slice().sort(function(a,b){if(a.category==="jumuah"&&b.category!=="jumuah")return -1;if(a.category!=="jumuah"&&b.category==="jumuah")return 1;return 0;});}
function getTodayGreeting(){const list=orderedGreetings();const dayIndex=Math.floor(Date.now()/86400000);return list[dayIndex%list.length]||greetings[0];}
function updateToday(){return;}
function renderCards(filter){const root=document.getElementById("cards");const list=orderedGreetings().filter(function(item){return filter==="all"||item.category===filter;});root.innerHTML=list.map(function(item){return `<article class="greeting-card" data-category="${item.category}"><div class="card-art"><img class="card-image" src="${item.image}" alt="${item.title}" loading="lazy"><div class="card-image-overlay"></div><div class="card-brand-badge"><img src="${LOGO_PATH}" alt="BarakaWay"></div><div class="card-category-badge">${item.label}</div><div class="card-site-mark">barakaway.app</div></div><div class="card-body"><h3 class="card-title">${item.title}</h3></div><div class="card-actions"><button class="action-btn" type="button" onclick="openCard('${item.id}')">تكبير</button><button class="action-btn" type="button" onclick="copyCard('${item.id}')">نسخ</button><button class="action-btn primary" type="button" onclick="shareCard('${item.id}')">مشاركة</button></div></article>`;}).join("");}
function findGreeting(id){return greetings.find(function(item){return item.id===id;})||greetings[0];}
function generatePersonal(){saveName();const name=cleanPersonalName((document.getElementById("generatorName").value||"").trim());const cat=document.getElementById("generatorCategory").value;const tpl=personalizedTemplates[cat]||personalizedTemplates.jumuah;currentGreeting={id:"personal",category:cat,label:tpl.label,title:tpl.title,headline:selectPersonalHeadline(cat),text:selectPersonalText(cat,name),image:getNextPersonalImage(),personalName:name};openModal(currentGreeting);}
function regeneratePersonal(){
if(currentGreeting&&currentGreeting.id==="personal"){
const currentCategory=currentGreeting.category||"jumuah";
const currentName=cleanPersonalName(currentGreeting.personalName||(document.getElementById("generatorName").value||"").trim());

const tpl=personalizedTemplates[currentCategory]||personalizedTemplates.jumuah;

let headline=currentGreeting.headline||currentGreeting.title;
let headlineTries=0;
const headlineList=tpl.headlines||[tpl.title];

while(headline===currentGreeting.headline&&headlineTries<12){
headline=headlineList[Math.floor(Math.random()*headlineList.length)];
headlineTries++;
}

let text=currentGreeting.text;
let tries=0;

while(text===currentGreeting.text&&tries<12){
text=selectPersonalText(currentCategory,currentName);
tries++;
}

let image=getNextPersonalImage();

if(PERSONAL_CARD_IMAGES.length>1&&image===currentGreeting.image){
image=getNextPersonalImage();
}

currentGreeting={
id:"personal",
category:currentCategory,
label:tpl.label,
title:tpl.title,
headline:headline,
text:text,
image:image,
personalName:currentName
};

openModal(currentGreeting);
return;
}
showToast("أنشئ بطاقة شخصية أولًا");
}
function openTodayCard(){currentGreeting=getTodayGreeting();openModal(currentGreeting);}
function openCard(id){currentGreeting=findGreeting(id);openModal(currentGreeting);}
function copyCard(id){copyText(formatShareText(findGreeting(id)));}
function shareCard(id){currentGreeting=findGreeting(id);shareCurrent();}
function formatShareText(g){return "حمّل تطبيق BarakaWay — القرآن، الأذكار، الذكر، الأدعية، القبلة والمواد الإسلامية.\\n\\nhttps://barakaway.app";}

function wrapCanvasText(ctx,text,x,y,maxWidth,lineHeight,maxLines){const words=String(text||"").split(/\s+/);let line="",lines=[];for(let i=0;i<words.length;i++){const test=line+words[i]+" ";if(ctx.measureText(test).width>maxWidth&&i>0){lines.push(line.trim());line=words[i]+" ";}else{line=test;}}if(line.trim())lines.push(line.trim());if(maxLines&&lines.length>maxLines){lines=lines.slice(0,maxLines);lines[lines.length-1]=lines[lines.length-1].replace(/[.,;:!?]*$/,"")+"…";}lines.forEach(function(l,i){ctx.fillText(l,x,y+i*lineHeight);});}

function getWrappedCanvasLines(ctx,text,maxWidth){
const words=String(text||"").trim().split(/\s+/).filter(Boolean);
let line="",lines=[];
for(let i=0;i<words.length;i++){
const test=line?line+" "+words[i]:words[i];
if(ctx.measureText(test).width>maxWidth&&line){
lines.push(line);
line=words[i];
}else{
line=test;
}
}
if(line)lines.push(line);
return lines;
}
function drawFittedCanvasText(ctx,text,x,top,maxWidth,maxHeight,options){
const opts=options||{};
let fontSize=opts.maxFontSize||43;
const minFontSize=opts.minFontSize||27;
const weight=opts.weight||"700";
const family=opts.family||"system-ui, Arial";
let lines=[],lineHeight=0,totalHeight=0;
while(fontSize>=minFontSize){
lineHeight=Math.round(fontSize*1.38);
ctx.font=weight+" "+fontSize+"px "+family;
lines=getWrappedCanvasLines(ctx,text,maxWidth);
totalHeight=lines.length*lineHeight;
if(totalHeight<=maxHeight)break;
fontSize-=2;
}
if(totalHeight>maxHeight){
lineHeight=Math.max(30,Math.floor(maxHeight/Math.max(lines.length,1)));
}
const startY=top+Math.max(0,(maxHeight-totalHeight)/2)+fontSize;
lines.forEach(function(line,index){
ctx.fillText(line,x,startY+index*lineHeight);
});
return {fontSize:fontSize,lines:lines.length,totalHeight:totalHeight};
}

function drawRoundRect(ctx,x,y,w,h,r){const radius=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+radius,y);ctx.arcTo(x+w,y,x+w,y+h,radius);ctx.arcTo(x+w,y+h,x,y+h,radius);ctx.arcTo(x,y+h,x,y,radius);ctx.arcTo(x,y,x+w,y,radius);ctx.closePath();}
function loadCanvasImage(src){return new Promise(function(resolve,reject){const img=new Image();img.onload=function(){resolve(img)};img.onerror=reject;img.src=src;});}
function getAverageLuminance(ctx,x,y,w,h){
try{
const data=ctx.getImageData(x,y,w,h).data;
let total=0,count=0;
for(let i=0;i<data.length;i+=16){
const r=data[i],g=data[i+1],b=data[i+2];
total+=(0.2126*r+0.7152*g+0.0722*b);
count++;
}
return count?total/count:80;
}catch(e){return 80;}
}
function getPersonalTextStyle(ctx,w,h){
const lum=getAverageLuminance(ctx,Math.round(w*0.18),Math.round(h*0.33),Math.round(w*0.64),Math.round(h*0.32));
if(lum>175){
return {panel:"rgba(0,0,0,.68)",text:"#ffffff",shadow:"rgba(0,0,0,.92)",blur:16};
}
if(lum<82){
return {panel:"rgba(0,0,0,.68)",text:"#fff8e8",shadow:"rgba(0,0,0,.92)",blur:20};
}
return {panel:"rgba(0,0,0,.66)",text:"#f3d992",shadow:"rgba(0,0,0,.90)",blur:18};
}
async function drawImageCardToCanvas(g){const canvas=document.getElementById("previewCanvas");const ctx=canvas.getContext("2d");const w=canvas.width,h=canvas.height;ctx.clearRect(0,0,w,h);ctx.fillStyle="#0c120e";ctx.fillRect(0,0,w,h);try{const img=await loadCanvasImage(g.image);const scale=Math.max(w/img.width,h/img.height);const sw=w/scale,sh=h/scale;const sx=(img.width-sw)/2,sy=(img.height-sh)/2;ctx.drawImage(img,sx,sy,sw,sh,0,0,w,h);}catch(e){const grad=ctx.createLinearGradient(0,0,w,h);grad.addColorStop(0,"#082216");grad.addColorStop(.5,"#1e6c42");grad.addColorStop(1,"#d7b56d");ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);}
const bottom=ctx.createLinearGradient(0,h*.76,0,h);bottom.addColorStop(0,"rgba(0,0,0,0)");bottom.addColorStop(.78,"rgba(0,0,0,.46)");bottom.addColorStop(1,"rgba(0,0,0,.62)");ctx.fillStyle=bottom;ctx.fillRect(0,0,w,h);
ctx.strokeStyle="rgba(243,217,146,.78)";ctx.lineWidth=7;drawRoundRect(ctx,34,34,w-68,h-68,36);ctx.stroke();
try{const logo=await loadCanvasImage(LOGO_PATH);ctx.save();const logoX=(w-112)/2;drawRoundRect(ctx,logoX,58,112,112,30);ctx.clip();ctx.drawImage(logo,logoX,58,112,112);ctx.restore();ctx.strokeStyle="rgba(243,217,146,.70)";ctx.lineWidth=3;drawRoundRect(ctx,logoX,58,112,112,30);ctx.stroke();}catch(e){}
ctx.textAlign="center";ctx.textBaseline="alphabetic";
if(g.id==="personal"){
const style=getPersonalTextStyle(ctx,w,h);
ctx.save();
const panelX=88,panelY=320,panelW=w-176,panelH=610;
ctx.fillStyle=style.panel;
drawRoundRect(ctx,panelX,panelY,panelW,panelH,38);
ctx.fill();
ctx.shadowColor=style.shadow;
ctx.shadowBlur=style.blur;
ctx.fillStyle="#f3d992";
drawFittedCanvasText(ctx,g.headline||g.title,w/2,panelY+52,panelW-170,142,{maxFontSize:72,minFontSize:46,weight:"900",family:"Georgia, 'Times New Roman', serif"});
ctx.strokeStyle="rgba(243,217,146,.58)";
ctx.lineWidth=3;
ctx.beginPath();
ctx.moveTo(panelX+132,panelY+225);
ctx.lineTo(panelX+panelW-132,panelY+225);
ctx.stroke();
ctx.fillStyle=style.text;
drawFittedCanvasText(ctx,g.text,w/2,panelY+270,panelW-170,panelH-320,{maxFontSize:43,minFontSize:28,weight:"700",family:"system-ui, Arial"});
ctx.restore();
}
ctx.fillStyle="rgba(255,238,190,.96)";ctx.font="800 30px system-ui, Arial";ctx.fillText("BarakaWay App",w/2,h-92);ctx.fillStyle="rgba(255,238,190,.82)";ctx.font="650 25px system-ui, Arial";ctx.fillText("barakaway.app",w/2,h-54);return canvas;}
async function openModal(g){currentGreeting=g;await drawImageCardToCanvas(g);document.getElementById("modal").classList.add("open");document.getElementById("modal").setAttribute("aria-hidden","false");}
function closeModal(){document.getElementById("modal").classList.remove("open");document.getElementById("modal").setAttribute("aria-hidden","true");}
function canvasToBlob(canvas){return new Promise(function(resolve){canvas.toBlob(function(blob){resolve(blob);},"image/png",.96);});}

async function shareCurrent(){
const canvas=await drawImageCardToCanvas(currentGreeting);
const text=formatShareText(currentGreeting);
try{
const blob=await canvasToBlob(canvas);
const file=new File([blob],"barakaway-greeting.png",{type:"image/png"});
if(navigator.canShare&&navigator.canShare({files:[file]})){
await navigator.share({title:currentGreeting.title,text:text,files:[file]});
return;
}
if(navigator.share){
await navigator.share({title:currentGreeting.title,text:text});
return;
}
}catch(e){}
showToast("المشاركة غير متاحة على هذا الجهاز");
}

function copyCurrent(){copyText(formatShareText(currentGreeting));}
function copyText(text){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){showToast("تم نسخ النص");}).catch(function(){fallbackCopy(text);});}else{fallbackCopy(text);}}
function fallbackCopy(text){const area=document.createElement("textarea");area.value=text;document.body.appendChild(area);area.select();document.execCommand("copy");area.remove();showToast("تم نسخ النص");}
async function downloadCurrent(){const canvas=await drawImageCardToCanvas(currentGreeting);const a=document.createElement("a");a.href=canvas.toDataURL("image/png");a.download="barakaway-greeting.png";document.body.appendChild(a);a.click();a.remove();}
function showToast(message){const toast=document.getElementById("toast");toast.textContent=message;toast.classList.add("show");setTimeout(function(){toast.classList.remove("show");},1800);}
document.addEventListener("DOMContentLoaded",function(){loadName();updateToday();renderCards("jumuah");document.getElementById("generatorName").addEventListener("input",saveName);document.querySelectorAll(".tab").forEach(function(btn){btn.addEventListener("click",function(){document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("active");});btn.classList.add("active");renderCards(btn.getAttribute("data-filter"));});});document.getElementById("modal").addEventListener("click",function(e){if(e.target.id==="modal")closeModal();});});
</script>
