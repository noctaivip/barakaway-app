<script>
const SURAH_NUMBER = 80;

let currentAudio = null;
let currentButton = null;

function pad3(n) {
  return String(n).padStart(3, "0");
}

function audioUrl(ayahNumber) {
  return `https://verses.quran.foundation/AbdulBaset/Mujawwad/mp3/${pad3(SURAH_NUMBER)}${pad3(ayahNumber)}.mp3`;
}

function resetButton(button) {
  if (!button) return;
  button.classList.remove("is-playing");
  button.textContent = button.getAttribute("data-default-label");
}

function stopCurrentAyah() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
  if (currentButton) {
    resetButton(currentButton);
    currentButton = null;
  }
}

function playAyah(id, button) {
  const audio = document.getElementById(id);
  if (!audio) return;

  if (currentAudio && currentAudio !== audio) stopCurrentAyah();

  if (currentAudio === audio && !audio.paused) {
    stopCurrentAyah();
    return;
  }

  currentAudio = audio;
  currentButton = button;
  button.classList.add("is-playing");
  button.textContent = button.getAttribute("data-playing-label");

  audio.currentTime = 0;
  audio.play().catch(() => {
    resetButton(button);
    currentAudio = null;
    currentButton = null;
  });

  audio.onended = () => {
    if (currentButton === button) {
      resetButton(button);
      currentButton = null;
    }
    if (currentAudio === audio) currentAudio = null;
  };
}

function playAllAyahs() {
  const audios = Array.from(document.querySelectorAll(".ayah-audio"));
  const buttons = Array.from(document.querySelectorAll(".play-btn"));
  let index = 0;
  stopCurrentAyah();

  function playNext() {
    if (index >= audios.length) return;
    const audio = audios[index];
    const button = buttons[index];
    currentAudio = audio;
    currentButton = button;
    button.classList.add("is-playing");
    button.textContent = button.getAttribute("data-playing-label");
    audio.currentTime = 0;
    audio.play().catch(() => {
      resetButton(button);
      currentAudio = null;
      currentButton = null;
    });
    audio.onended = () => {
      resetButton(button);
      index += 1;
      playNext();
    };
  }
  playNext();
}

function barakaEscapeAttr(value){return String(value||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
function renderAyahs(arData) {
  const list = document.getElementById("ayahList");
  list.innerHTML = "";
  const count = arData.data.ayahs.length;
  for (let i = 0; i < count; i++) {
    const arabic = arData.data.ayahs[i];
    const n = arabic.numberInSurah;
    const article = document.createElement("article");
    article.className = "ayah-card";
    article.id = `ayah-${n}`;
    article.innerHTML = `<div class="ayah-toolbar"><button class="play-btn" type="button" data-default-label="▶ الآية ${n}" data-playing-label="■ إيقاف ${n}" onclick="playAyah('ayah-audio-${n}', this)">▶ الآية ${n}</button><div class="ayah-index">${n}</div></div><audio class="ayah-audio" id="ayah-audio-${n}" preload="none" src="${audioUrl(n)}"></audio><div class="ayah-arabic">${arabic.text}</div><div class="ayah-actions" aria-label="إجراءات الآية"><button class="ayah-action" type="button" data-ayah-action="share" data-ayah-number="${n}" data-ayah-arabic="${barakaEscapeAttr(arabic.text)}" aria-label="مشاركة"><svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.7 10.7l6.6-4.4M8.7 13.3l6.6 4.4"/></svg></button><button class="ayah-action" type="button" data-ayah-action="save" data-ayah-number="${n}" data-ayah-arabic="${barakaEscapeAttr(arabic.text)}" aria-label="حفظ"><svg viewBox="0 0 24 24"><path d="M6 4.5A1.5 1.5 0 0 1 7.5 3h9A1.5 1.5 0 0 1 18 4.5V21l-6-3.5L6 21V4.5z"/></svg></button></div>`;
    list.appendChild(article);
  }
  document.getElementById("loading").classList.add("hidden");
  document.dispatchEvent(new CustomEvent("barakaway:ayahs-rendered"));
}
async function loadSurah() {
  const loading = document.getElementById("loading");
  const error = document.getElementById("error");

  try {
    const arRes = await fetch(`https://api.alquran.cloud/v1/surah/${SURAH_NUMBER}/quran-uthmani`);
    if (!arRes.ok) throw new Error("Failed to load surah data");
    const arData = await arRes.json();
    if (arData.code !== 200) throw new Error("API returned an invalid response");
    renderAyahs(arData);
  } catch (e) {
    loading.classList.add("hidden");
    error.classList.remove("hidden");
    console.error(e);
  }
}

loadSurah();
</script>
