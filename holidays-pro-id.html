.hero h1{

  text-shadow:

    0 8px 24px rgba(0,0,0,.45)!important;
  position:relative;
  display:inline-block;
  padding-left:2px;
}


/* Ready-card fullscreen zoom */
.zoom-viewer{
  position:fixed;
  inset:0;
  z-index:9999;
  display:none;
  background:rgba(0,0,0,.92);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  touch-action:none;
}
.zoom-viewer.active{display:block}
.zoom-stage{
  position:absolute;
  inset:0;
  overflow:hidden;
  cursor:grab;
  touch-action:none;
}
.zoom-stage:active{cursor:grabbing}
.zoom-stage img{
  position:absolute;
  left:50%;
  top:50%;
  width:min(92vw,760px);
  max-width:none;
  height:auto;
  transform:translate(-50%,-50%) scale(1.85);
  transform-origin:center center;
  user-select:none;
  -webkit-user-drag:none;
  border-radius:18px;
  box-shadow:0 30px 90px rgba(0,0,0,.72);
  will-change:transform;
}
.zoom-close{
  position:fixed;
  top:calc(env(safe-area-inset-top,0px) + 14px);
  right:calc(env(safe-area-inset-right,0px) + 14px);
  z-index:10001;
  width:46px;
  height:46px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(12,16,20,.82);
  color:#fff;
  font-size:30px;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 14px 36px rgba(0,0,0,.44);
}
.zoom-hint{
  position:fixed;
  left:50%;
  bottom:calc(env(safe-area-inset-bottom,0px) + 18px);
  transform:translateX(-50%);
  z-index:10000;
  color:rgba(255,255,255,.78);
  background:rgba(12,16,20,.62);
  border:1px solid rgba(255,255,255,.12);
  border-radius:999px;
  padding:9px 14px;
  font-size:13px;
  font-weight:800;
  pointer-events:none;
}
@media(max-width:560px){
  .zoom-stage img{
    width:94vw;
    transform:translate(-50%,-50%) scale(2.15);
  }
}

function cleanPersonalName(value){
return String(value||"").replace(/[<>]/g,"").replace(/\s+/g," ").trim().slice(0,42);
}
function formatPersonalText(name,opening,blessing,closing){
const safeName=cleanPersonalName(name);
const body=String(opening||"").trim();
const first=body?body.charAt(0).toUpperCase()+body.slice(1):"Semoga Allah memberi kebaikan, perlindungan, ketenangan, dan barakah.";
const text=first+" "+String(blessing||"").trim()+" "+String(closing||"").trim();
return safeName ? safeName+", "+text : text;
}
function readPersonalHistory(key){
try{
const parsed=JSON.parse(localStorage.getItem(key)||"[]");
return Array.isArray(parsed)?parsed.filter(Boolean):[];
}catch(e){return [];}
}
function writePersonalHistory(key,value,limit){
const list=readPersonalHistory(key).filter(function(item){return item!==value;});
list.unshift(value);
localStorage.setItem(key,JSON.stringify(list.slice(0,limit)));
}
function choosePersonalItem(category,type,list,currentValue){
const storageKey="barakaway_personal_"+type+"_history_"+category;
const history=readPersonalHistory(storageKey);
let available=list.filter(function(item){return item!==currentValue&&history.indexOf(item)===-1;});
if(!available.length)available=list.filter(function(item){return item!==currentValue;});
if(!available.length)available=list.slice();
const selected=available[Math.floor(Math.random()*available.length)]||list[0]||"";
writePersonalHistory(storageKey,selected,type==="headline"?12:30);
return selected;
}
function choosePersonalComboPart(category,type,list){
const storageKey="barakaway_personal_combo_"+type+"_history_"+category;
const history=readPersonalHistory(storageKey);
let available=list.map(function(value,index){return {value:value,index:index};}).filter(function(item){return history.indexOf(String(item.index))===-1;});
if(!available.length)available=list.map(function(value,index){return {value:value,index:index};});
const selected=available[Math.floor(Math.random()*available.length)]||{value:list[0]||"",index:0};
writePersonalHistory(storageKey,String(selected.index),type==="opening"?10:8);
return selected;
}
function getPersonalRecentComboKey(category){return "barakaway_personal_combo_signature_history_"+category;}

}
function buildPersonalText(category,name,currentText){
const tpl=personalizedTemplates[category]||personalizedTemplates.jumuah;
const recent=readPersonalHistory(getPersonalRecentComboKey(category));
let selected=null;
for(let attempt=0;attempt<50;attempt++){
const opening=choosePersonalComboPart(category,"opening",tpl.openings||[]);
const blessing=choosePersonalComboPart(category,"blessing",personalBlessings);
const closing=choosePersonalComboPart(category,"closing",personalClosings);
const signature=[opening.index,blessing.index,closing.index].join("-");
const candidate=formatPersonalText(name,opening.value,blessing.value,closing.value);
selected={signature:signature,text:candidate};

}

}

function wrapCanvasText(ctx,text,x,y,maxWidth,lineHeight,maxLines){const words=String(text||"").split(/\s+/);let line="",lines=[];for(let i=0;i<words.length;i++){const test=line+words[i]+" ";if(ctx.measureText(test).width>maxWidth&&i>0){lines.push(line.trim());line=words[i]+" ";}else{line=test;}}if(line.trim())lines.push(line.trim());if(maxLines&&lines.length>maxLines){lines=lines.slice(0,maxLines);lines[lines.length-1]=lines[lines.length-1].replace(/[.,;:!?]*$/,"")+"…";}lines.forEach(function(l,i){ctx.fillText(l,x,y+i*lineHeight);});}

function getWrappedCanvasLines(ctx,text,maxWidth){
const words=String(text||"").trim().split(/\s+/).filter(Boolean);
let line="",lines=[];
for(let i=0;i<words.length;i++){
const test=line?line+" "+words[i]:words[i];
if(ctx.measureText(test).width>maxWidth&&line){
lines.push(line);
line=words[i];
}else{
line=test;
}
}
if(line)lines.push(line);
return lines;
}
function drawFittedCanvasText(ctx,text,x,top,maxWidth,maxHeight,options){
const opts=options||{};
let fontSize=opts.maxFontSize||43;
const minFontSize=opts.minFontSize||27;
const weight=opts.weight||"700";
const family=opts.family||"system-ui, Arial";
let lines=[],lineHeight=0,totalHeight=0;
while(fontSize>=minFontSize){
lineHeight=Math.round(fontSize*1.38);
ctx.font=weight+" "+fontSize+"px "+family;
lines=getWrappedCanvasLines(ctx,text,maxWidth);
totalHeight=lines.length*lineHeight;
if(totalHeight<=maxHeight)break;
fontSize-=2;
}
if(totalHeight>maxHeight){
lineHeight=Math.max(30,Math.floor(maxHeight/Math.max(lines.length,1)));
}
const startY=top+Math.max(0,(maxHeight-totalHeight)/2)+fontSize;
lines.forEach(function(line,index){
ctx.fillText(line,x,startY+index*lineHeight);
});
return {fontSize:fontSize,lines:lines.length,totalHeight:totalHeight};
}

function drawRoundRect(ctx,x,y,w,h,r){const radius=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+radius,y);ctx.arcTo(x+w,y,x+w,y+h,radius);ctx.arcTo(x+w,y+h,x,y+h,radius);ctx.arcTo(x,y+h,x,y,radius);ctx.arcTo(x,y,x+w,y,radius);ctx.closePath();}

function getAverageLuminance(ctx,x,y,w,h){
try{
const data=ctx.getImageData(x,y,w,h).data;
let total=0,count=0;
for(let i=0;i<data.length;i+=16){
const r=data[i],g=data[i+1],b=data[i+2];
total+=(0.2126*r+0.7152*g+0.0722*b);
count++;
}
return count?total/count:80;
}catch(e){return 80;}
}

}
return {panel:"rgba(0,0,0,.66)",text:"#f3d992",shadow:"rgba(0,0,0,.90)",blur:18};
}

let zoomState={active:false,img:null,stage:null,scale:1.85,x:0,y:0,startX:0,startY:0,baseX:0,baseY:0,dragging:false};
function clampZoom(){
  const img=zoomState.img;
  const stage=zoomState.stage;
  if(!img||!stage)return;
  const rect=stage.getBoundingClientRect();
  const naturalW=img.offsetWidth*zoomState.scale;
  const naturalH=img.offsetHeight*zoomState.scale;
  const maxX=Math.max(30,(naturalW-rect.width)/2+80);
  const maxY=Math.max(30,(naturalH-rect.height)/2+80);
  zoomState.x=Math.max(-maxX,Math.min(maxX,zoomState.x));
  zoomState.y=Math.max(-maxY,Math.min(maxY,zoomState.y));
}
function applyZoomTransform(){
  clampZoom();
  if(zoomState.img){
    zoomState.img.style.transform=`translate(calc(-50% + ${zoomState.x}px), calc(-50% + ${zoomState.y}px)) scale(${zoomState.scale})`;
  }
}
function openZoomViewer(src){
  const viewer=document.getElementById("zoomViewer");
  const img=document.getElementById("zoomImage");
  const stage=document.getElementById("zoomStage");
  if(!viewer||!img||!stage)return;
  zoomState.active=true;
  zoomState.img=img;
  zoomState.stage=stage;
  zoomState.scale=window.matchMedia("(max-width:560px)").matches?2.15:1.85;
  zoomState.x=0;
  zoomState.y=0;
  img.src=src;
  viewer.classList.add("active");
  viewer.setAttribute("aria-hidden","false");
  document.body.style.overflow="hidden";
  requestAnimationFrame(applyZoomTransform);
}
function closeZoomViewer(){
  const viewer=document.getElementById("zoomViewer");
  if(viewer){
    viewer.classList.remove("active");
    viewer.setAttribute("aria-hidden","true");
  }
  document.body.style.overflow="";
  zoomState.active=false;
  zoomState.dragging=false;
}
function zoomPointerDown(e){
  if(!zoomState.active)return;
  zoomState.dragging=true;
  zoomState.startX=e.clientX;
  zoomState.startY=e.clientY;
  zoomState.baseX=zoomState.x;
  zoomState.baseY=zoomState.y;
  if(zoomState.stage&&zoomState.stage.setPointerCapture){
    try{zoomState.stage.setPointerCapture(e.pointerId);}catch(_){}
  }
}
function zoomPointerMove(e){
  if(!zoomState.active||!zoomState.dragging)return;
  zoomState.x=zoomState.baseX+(e.clientX-zoomState.startX);
  zoomState.y=zoomState.baseY+(e.clientY-zoomState.startY);
  applyZoomTransform();
}
function zoomPointerUp(){
  zoomState.dragging=false;
}
function bindZoomViewer(){
  const stage=document.getElementById("zoomStage");
  const viewer=document.getElementById("zoomViewer");
  if(!stage||!viewer||stage.dataset.bound==="1")return;
  stage.dataset.bound="1";
  stage.addEventListener("pointerdown",zoomPointerDown);
  stage.addEventListener("pointermove",zoomPointerMove);
  stage.addEventListener("pointerup",zoomPointerUp);
  stage.addEventListener("pointercancel",zoomPointerUp);
  viewer.addEventListener("click",function(e){if(e.target===viewer)closeZoomViewer();});
  window.addEventListener("keydown",function(e){if(e.key==="Escape")closeZoomViewer();});
}
