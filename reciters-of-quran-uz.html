<style>
:root{
  --page:#06110f;
  --panel:#111b20;
  --panel-2:#0d1518;
  --gold:#d7b56d;
  --gold-2:#f0d891;
  --green:#4caf6a;
  --green-2:#2d7a46;
  --text:#f7f7f7;
  --muted:#cbd5df;
  --soft:#9aa7b2;
  --line:rgba(215,181,109,.22);
  --line-green:rgba(76,175,106,.26);
  --shadow:0 24px 70px rgba(0,0,0,.36);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;background:var(--page);}
body{
  margin:0;
  min-height:100vh;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 50% -12%,rgba(215,181,109,.16),transparent 36%),
    radial-gradient(circle at 88% 8%,rgba(76,175,106,.12),transparent 30%),
    linear-gradient(180deg,#06110f 0%,#0d1718 48%,#06110f 100%);
}
a{color:inherit;text-decoration:none;}
button,input,select{font-family:inherit;}
.page{width:min(100%,980px);margin:0 auto;padding:22px 18px 122px;}
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0 18px;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);}
.top-pill{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:9px 15px;border-radius:999px;background:rgba(18,25,33,.78);border:1px solid rgba(215,181,109,.18);color:#f7f2d9;font-size:13px;font-weight:900;}
.hero{position:relative;overflow:hidden;border-radius:38px;padding:42px 32px 34px;background:radial-gradient(circle at 88% 8%,rgba(215,181,109,.16),transparent 27%),radial-gradient(circle at 14% 88%,rgba(76,175,106,.14),transparent 28%),linear-gradient(135deg,#151d26 0%,#101820 50%,#17261f 100%);border:1px solid var(--line);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.04);}
.hero::after{content:"";position:absolute;inset:-40%;background:linear-gradient(115deg,transparent 0%,rgba(255,255,255,.04) 45%,transparent 55%);transform:rotate(8deg);pointer-events:none;}
.hero-inner{position:relative;z-index:2;}
.badge{display:inline-flex;align-items:center;gap:9px;padding:9px 15px;border-radius:999px;background:rgba(215,181,109,.10);border:1px solid rgba(215,181,109,.26);color:var(--gold-2);font-size:12px;font-weight:950;letter-spacing:.12em;text-transform:uppercase;}
h1{margin:20px 0 12px;max-width:780px;font-size:52px;line-height:.98;letter-spacing:-.065em;}
.hero-text{max-width:690px;color:var(--muted);font-size:17px;line-height:1.65;font-weight:650;}
.hero-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:28px;}
.btn{appearance:none;display:inline-flex;align-items:center;justify-content:center;gap:9px;min-height:52px;padding:14px 21px;border-radius:18px;border:1px solid transparent;font-size:14px;font-weight:950;cursor:pointer;text-decoration:none;transition:transform .18s ease,box-shadow .25s ease,background .25s ease,border-color .25s ease;}
.btn:hover{transform:translateY(-2px);}.btn:active{transform:scale(.985);}
.btn-primary{background:linear-gradient(135deg,#f0d891 0%,#d7b56d 42%,#a87d1c 100%);color:#11150f;box-shadow:0 18px 38px rgba(215,181,109,.22);}
.btn-secondary{background:rgba(20,28,37,.82);color:#f7faf8;border-color:rgba(215,181,109,.18);}
.btn-green{background:linear-gradient(135deg,#66c680 0%,#2d7a46 100%);color:white;box-shadow:0 18px 38px rgba(76,175,106,.16);}
.player-panel{margin-top:28px;border-radius:34px;padding:24px;background:radial-gradient(circle at 92% 8%,rgba(215,181,109,.12),transparent 30%),linear-gradient(135deg,#151d26 0%,#101820 56%,#14231b 100%);border:1px solid rgba(215,181,109,.18);box-shadow:0 18px 44px rgba(0,0,0,.24);}
.player-top{display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center;}
.current{display:flex;align-items:center;gap:14px;min-width:0;}
.avatar{width:64px;height:64px;border-radius:22px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2d2617,#214330);border:1px solid rgba(215,181,109,.28);font-size:30px;flex:0 0 auto;}
.current-title{margin:0;font-size:25px;line-height:1.1;letter-spacing:-.04em;}
.current-subtitle{margin-top:5px;color:#aeb9c5;font-size:13px;font-weight:750;}
.player-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;}
.audio-area{margin-top:18px;display:grid;gap:10px;}
audio{width:100%;height:44px;filter:drop-shadow(0 8px 18px rgba(0,0,0,.22));}
.audio-status{color:#d3dde6;font-size:12px;font-weight:850;min-height:18px;}
.quick-panel{margin-top:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{display:grid;gap:7px;}
.field label{color:var(--gold-2);font-size:11px;font-weight:950;text-transform:uppercase;letter-spacing:.11em;}
.select{width:100%;min-height:50px;border-radius:17px;border:1px solid rgba(215,181,109,.20);background:rgba(12,19,23,.78);color:var(--text);padding:0 14px;font-size:14px;font-weight:850;outline:none;}
.section{margin-top:34px;}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:18px;}
.section-title{margin:0;font-size:32px;line-height:1.08;letter-spacing:-.045em;}
.section-subtitle{margin:8px 0 0;max-width:620px;color:#aeb9c5;font-size:14px;font-weight:650;line-height:1.6;}
.section-note{color:var(--gold-2);font-size:12px;font-weight:950;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;}
.reciter-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;}
.reciter-card{position:relative;overflow:hidden;min-height:172px;border-radius:30px;padding:22px;border:1px solid rgba(255,255,255,.08);background:radial-gradient(circle at 88% 12%,rgba(215,181,109,.10),transparent 30%),linear-gradient(135deg,#151f29 0%,#121a22 54%,#14241f 100%);box-shadow:0 16px 36px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.035);cursor:pointer;text-align:left;color:inherit;transition:transform .18s ease,border-color .25s ease,box-shadow .25s ease;}
.reciter-card:hover{transform:translateY(-3px);border-color:rgba(215,181,109,.28);}
.reciter-card.selected{border-color:rgba(102,198,128,.52);box-shadow:0 22px 44px rgba(76,175,106,.16),inset 0 1px 0 rgba(255,255,255,.04);}
.reciter-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;}
.reciter-avatar{width:52px;height:52px;border-radius:20px;display:flex;align-items:center;justify-content:center;background:rgba(215,181,109,.12);border:1px solid rgba(215,181,109,.18);font-size:25px;}
.reciter-check{display:inline-flex;align-items:center;justify-content:center;min-height:28px;padding:5px 10px;border-radius:999px;background:rgba(76,175,106,.12);border:1px solid rgba(76,175,106,.26);color:#dff7e6;font-size:11px;font-weight:950;letter-spacing:.09em;text-transform:uppercase;}
.reciter-card h3{margin:18px 0 7px;font-size:22px;line-height:1.08;letter-spacing:-.035em;}
.reciter-card p{margin:0;color:#b7c1ca;font-size:14px;font-weight:650;line-height:1.5;}
.ayah-strip{margin-top:22px;display:grid;grid-template-columns:repeat(7,1fr);gap:9px;max-height:310px;overflow:auto;padding-right:4px;}
.ayah-btn{appearance:none;border:1px solid rgba(181,138,54,.24);background:rgba(255,255,255,.055);color:#f7f2d9;border-radius:16px;min-height:46px;font-size:13px;font-weight:950;cursor:pointer;}
.ayah-btn.is-playing{background:linear-gradient(135deg,#2d7a46,#4caf6a);color:#fff;border-color:rgba(102,198,128,.44);}
.toast{position:fixed;left:50%;bottom:94px;z-index:140;transform:translateX(-50%) translateY(14px);opacity:0;pointer-events:none;width:min(92%,460px);padding:14px 16px;border-radius:18px;background:rgba(16,24,32,.94);border:1px solid rgba(102,198,128,.24);color:#eaf7ee;font-size:13px;font-weight:850;text-align:center;box-shadow:0 18px 40px rgba(0,0,0,.35);transition:opacity .25s ease,transform .25s ease;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
html.light-mode body{background:linear-gradient(180deg,#f5f3ea,#f5f3ea)!important;color:#101418!important;}
html.light-mode .hero,html.light-mode .player-panel{background:radial-gradient(circle at 92% 0%,rgba(181,138,54,.10),transparent 36%),linear-gradient(180deg,#ffffff,#f8fbf7)!important;color:#101418!important;border-color:rgba(181,138,54,.22)!important;box-shadow:0 10px 24px rgba(18,34,24,.07)!important;}
html.light-mode .top-pill,html.light-mode .btn-secondary,html.light-mode .select{background:#fff;color:#203126;border-color:rgba(181,138,54,.22);}
html.light-mode .hero-text,html.light-mode .current-subtitle,html.light-mode .section-subtitle,html.light-mode .reciter-card p,html.light-mode .audio-status{color:#526158;}
html.light-mode .reciter-card{background:linear-gradient(180deg,#ffffff,#f7fbf7);color:#101418;border-color:rgba(181,138,54,.20);box-shadow:0 10px 24px rgba(18,34,24,.07);}
html.light-mode .ayah-btn{background:#fff;color:#203126;border-color:rgba(181,138,54,.20);}
@media(max-width:760px){
  .page{padding:18px 12px 110px;}
  .topbar{padding-top:8px;}
  .top-pill{min-height:38px;padding:8px 12px;font-size:12px;}
  .hero{padding:32px 20px 24px;border-radius:30px;}
  h1{font-size:39px;}
  .hero-text{font-size:16px;}
  .player-top,.section-head{grid-template-columns:1fr;align-items:flex-start;flex-direction:column;}
  .player-actions{width:100%;justify-content:stretch;}.player-actions .btn{flex:1 1 150px;}
  .quick-panel{grid-template-columns:1fr;}
  .reciter-grid{grid-template-columns:1fr;}
  .hero-actions .btn{width:100%;}
  .section-title{font-size:28px;}
  .ayah-strip{grid-template-columns:repeat(4,1fr);}
}
@media(max-width:420px){h1{font-size:35px;}.player-panel{padding:18px;border-radius:28px;}.current-title{font-size:22px;}.ayah-strip{grid-template-columns:repeat(3,1fr);}}


/* === BarakaWay mobile listening optimization === */
@media(max-width:760px){
  html,body{overflow-x:hidden;}
  body{background:linear-gradient(180deg,#06110f 0%,#0b1415 54%,#06110f 100%)!important;}
  .page{width:100%;padding:10px 10px calc(104px + env(safe-area-inset-bottom));}
  .topbar{top:0;margin:0 -10px;padding:8px 10px 10px;background:rgba(6,17,15,.82);border-bottom:1px solid rgba(215,181,109,.10);}
  .top-pill{min-height:38px;padding:8px 13px;border-radius:999px;font-size:12px;}
  .hero{border-radius:26px;padding:24px 18px 20px;margin-top:6px;box-shadow:0 18px 48px rgba(0,0,0,.30),inset 0 1px 0 rgba(255,255,255,.04);}
  .badge{padding:7px 11px;font-size:10.5px;letter-spacing:.10em;}
  h1{font-size:34px;line-height:1.02;letter-spacing:-.055em;margin:16px 0 9px;}
  .hero-text{font-size:14.5px;line-height:1.5;max-width:none;}
  .hero-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:18px;}
  .hero-actions .btn{width:100%;min-height:46px;padding:11px 10px;border-radius:15px;font-size:12.5px;}
  .hero-actions .btn-primary{grid-column:1 / -1;}

  .player-panel{position:sticky;top:57px;z-index:45;margin-top:14px;padding:15px;border-radius:24px;background:linear-gradient(135deg,rgba(21,29,38,.98),rgba(16,24,32,.98) 52%,rgba(20,35,27,.98))!important;box-shadow:0 20px 46px rgba(0,0,0,.42);}
  .player-top{display:grid!important;grid-template-columns:1fr;gap:12px;}
  .current{gap:10px;align-items:center;}
  .avatar{width:48px;height:48px;border-radius:17px;font-size:23px;}
  .current-title{font-size:19px;line-height:1.15;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .current-subtitle{font-size:12px;margin-top:3px;}
  .player-actions{display:grid;width:100%;grid-template-columns:1fr 92px;gap:8px;}
  .player-actions .btn{min-height:44px;padding:10px 9px;border-radius:14px;font-size:12.5px;}
  .audio-area{margin-top:12px;gap:7px;}
  audio{height:38px;}
  .audio-status{font-size:11.5px;line-height:1.35;}
  .quick-panel{margin-top:13px;gap:9px;}
  .field label{font-size:10px;letter-spacing:.09em;}
  .select{min-height:46px;border-radius:15px;padding:0 12px;font-size:13px;}

  .section{margin-top:26px;}
  .section-head{display:grid!important;grid-template-columns:1fr;gap:7px;margin-bottom:13px;}
  .section-title{font-size:25px;line-height:1.08;}
  .section-subtitle{font-size:13px;line-height:1.45;margin-top:6px;}
  .section-note{font-size:10.5px;}
  .reciter-grid{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;padding:0 2px 8px;margin:0 -2px;-webkit-overflow-scrolling:touch;}
  .reciter-card{flex:0 0 82%;min-height:156px;border-radius:23px;padding:17px;scroll-snap-align:start;}
  .reciter-avatar{width:44px;height:44px;border-radius:16px;font-size:21px;}
  .reciter-check{min-height:25px;padding:4px 8px;font-size:9.5px;}
  .reciter-card h3{font-size:18px;line-height:1.12;margin:14px 0 6px;}
  .reciter-card p{font-size:12.5px;line-height:1.4;}

  .ayah-strip{grid-template-columns:repeat(5,1fr);gap:7px;max-height:245px;margin-top:16px;padding:1px 2px 4px;}
  .ayah-btn{min-height:40px;border-radius:13px;font-size:12px;}
  .toast{bottom:calc(78px + env(safe-area-inset-bottom));width:calc(100% - 24px);font-size:12px;border-radius:16px;padding:12px 14px;}
}
@media(max-width:420px){
  .page{padding-left:9px;padding-right:9px;}
  h1{font-size:30px;}
  .hero{padding:22px 16px 18px;border-radius:24px;}
  .hero-actions{grid-template-columns:1fr;}
  .hero-actions .btn-primary{grid-column:auto;}
  .player-panel{top:55px;padding:13px;border-radius:22px;}
  .player-actions{grid-template-columns:1fr 82px;}
  .current-title{font-size:18px;}
  .reciter-card{flex-basis:88%;}
  .ayah-strip{grid-template-columns:repeat(4,1fr);max-height:232px;}
  .ayah-btn{min-height:38px;font-size:11.5px;border-radius:12px;}
}
@media(max-width:360px){
  h1{font-size:28px;}
  .hero-text{font-size:13.5px;}
  .player-actions{grid-template-columns:1fr;}
  .ayah-strip{grid-template-columns:repeat(3,1fr);}
}
@media(max-width:760px){
  html.light-mode .topbar{background:rgba(245,243,234,.88);border-bottom-color:rgba(181,138,54,.14);}
  html.light-mode .player-panel{background:linear-gradient(180deg,#ffffff,#f8fbf7)!important;box-shadow:0 12px 30px rgba(18,34,24,.12)!important;}
}



/* === BarakaWay luxury contrast refinement === */
:root{
  --lux-gold:#f3d47a;
  --lux-gold-deep:#b88722;
  --lux-green:#58d47f;
  --lux-green-deep:#1f7a45;
  --lux-emerald:#0f3327;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-1;
  background:
    radial-gradient(circle at 18% 16%, rgba(243,212,122,.10), transparent 24%),
    radial-gradient(circle at 86% 18%, rgba(88,212,127,.10), transparent 26%),
    linear-gradient(90deg, rgba(243,212,122,.035), transparent 18%, transparent 82%, rgba(88,212,127,.035));
}
.top-pill{
  border:1.4px solid rgba(243,212,122,.46)!important;
  box-shadow:0 0 0 1px rgba(243,212,122,.08),0 10px 26px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.07)!important;
}
.hero{
  border:1.5px solid rgba(243,212,122,.46)!important;
  box-shadow:0 28px 80px rgba(0,0,0,.38),0 0 0 1px rgba(88,212,127,.10),inset 0 1px 0 rgba(255,255,255,.06)!important;
}
.hero::before{
  content:"";
  position:absolute;
  inset:14px;
  border-radius:28px;
  pointer-events:none;
  border:1px solid rgba(88,212,127,.12);
}
.badge{
  border-color:rgba(243,212,122,.58)!important;
  box-shadow:0 0 0 1px rgba(88,212,127,.12),0 10px 26px rgba(243,212,122,.08)!important;
}
.btn{
  border-width:1.5px!important;
  letter-spacing:.01em;
}
.btn-primary{
  border-color:rgba(255,236,166,.70)!important;
  box-shadow:0 16px 34px rgba(243,212,122,.24),0 0 0 1px rgba(168,125,28,.22),inset 0 1px 0 rgba(255,255,255,.36)!important;
}
.btn-secondary{
  border-color:rgba(243,212,122,.42)!important;
  background:linear-gradient(180deg,rgba(21,30,38,.92),rgba(9,17,21,.92))!important;
  box-shadow:0 10px 24px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.06)!important;
}
.btn-green{
  border-color:rgba(121,241,159,.55)!important;
  background:linear-gradient(135deg,#67d98a 0%,#2d8b50 54%,#1c653a 100%)!important;
  box-shadow:0 16px 34px rgba(88,212,127,.20),0 0 0 1px rgba(88,212,127,.16),inset 0 1px 0 rgba(255,255,255,.20)!important;
}
.player-panel{
  border:1.5px solid rgba(243,212,122,.38)!important;
  box-shadow:0 24px 62px rgba(0,0,0,.34),0 0 0 1px rgba(88,212,127,.11),inset 0 1px 0 rgba(255,255,255,.06)!important;
}
.avatar,.reciter-avatar{
  border:1.5px solid rgba(243,212,122,.42)!important;
  box-shadow:0 0 0 1px rgba(88,212,127,.12),0 12px 24px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.10)!important;
}
.select{
  border:1.5px solid rgba(243,212,122,.34)!important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 10px 22px rgba(0,0,0,.16)!important;
}
.select:focus{
  border-color:rgba(88,212,127,.70)!important;
  box-shadow:0 0 0 4px rgba(88,212,127,.12),0 10px 22px rgba(0,0,0,.18)!important;
}
.reciter-card{
  border:1.5px solid rgba(243,212,122,.26)!important;
  background:
    radial-gradient(circle at 88% 12%,rgba(243,212,122,.12),transparent 30%),
    radial-gradient(circle at 8% 95%,rgba(88,212,127,.08),transparent 28%),
    linear-gradient(135deg,#151f29 0%,#101a20 54%,#12271e 100%)!important;
  box-shadow:0 18px 40px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.045)!important;
}
.reciter-card:nth-child(even){
  border-color:rgba(88,212,127,.30)!important;
  background:
    radial-gradient(circle at 88% 12%,rgba(88,212,127,.12),transparent 30%),
    radial-gradient(circle at 8% 95%,rgba(243,212,122,.08),transparent 28%),
    linear-gradient(135deg,#141f28 0%,#101a20 54%,#0f2a20 100%)!important;
}
.reciter-card:hover{
  border-color:rgba(243,212,122,.62)!important;
  box-shadow:0 24px 52px rgba(0,0,0,.32),0 0 0 1px rgba(243,212,122,.14),0 0 28px rgba(243,212,122,.10)!important;
}
.reciter-card.selected{
  border-color:rgba(88,212,127,.78)!important;
  box-shadow:0 24px 54px rgba(88,212,127,.16),0 0 0 1px rgba(243,212,122,.18),inset 0 1px 0 rgba(255,255,255,.06)!important;
}
.reciter-card.selected::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  border-radius:inherit;
  background:linear-gradient(90deg,rgba(88,212,127,.15),transparent 34%,rgba(243,212,122,.08));
}
.reciter-chip{
  border:1.3px solid rgba(88,212,127,.50)!important;
  background:linear-gradient(180deg,rgba(88,212,127,.18),rgba(22,78,48,.28))!important;
  box-shadow:0 8px 18px rgba(88,212,127,.10),inset 0 1px 0 rgba(255,255,255,.08)!important;
}
.reciter-card.selected .reciter-chip{
  color:#0d1b12!important;
  background:linear-gradient(135deg,#f3d47a,#d7b56d)!important;
  border-color:rgba(255,236,166,.65)!important;
}
.ayah-btn{
  border:1.4px solid rgba(243,212,122,.34)!important;
  background:linear-gradient(180deg,rgba(23,32,40,.92),rgba(10,18,22,.92))!important;
  box-shadow:0 10px 22px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.06)!important;
