<!DOCTYPE html><html lang="kk" dir="ltr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Таңдаулы — BarakaWay</title><link href="/favicon.png" rel="icon" type="image/png"><link href="/theme.css" rel="stylesheet"><link href="/theme-universal.css" rel="stylesheet"><style>body{margin:0;font-family:system-ui;background:#101418;color:#e9eef3;line-height:1.6;padding-bottom:110px}a{color:inherit}.page{max-width:850px;margin:auto;padding:34px 22px}.hero{border-radius:30px;padding:26px 22px;background:linear-gradient(135deg,#111a23,#182632 55%,#163228);border:1px solid rgba(102,198,128,.24);box-shadow:0 18px 38px rgba(0,0,0,.25)}.kicker{font-size:11px;font-weight:950;letter-spacing:.16em;text-transform:uppercase;color:#d7c07a;margin-bottom:8px}.hero h1{margin:0;font-size:34px;line-height:1.05;letter-spacing:-.05em}.hero p{margin:12px 0 0;color:#b9c8c0;font-weight:700}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:22px}.card{border-radius:24px;padding:18px;text-decoration:none;background:linear-gradient(135deg,#151f29,#18212b 55%,#162a25);border:1px solid rgba(96,147,120,.25);box-shadow:0 12px 24px rgba(0,0,0,.20)}.icon{width:42px;height:42px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:rgba(215,192,122,.12);font-size:22px;margin-bottom:14px}.title{font-size:18px;font-weight:950;letter-spacing:-.035em}.text{font-size:13px;color:#aebbb5;font-weight:700;margin-top:6px}.empty{margin-top:22px;padding:20px;border-radius:24px;background:#151d25;border:1px dashed rgba(215,192,122,.28);color:#b9c8c0;font-weight:700}@media(max-width:700px){.hero h1{font-size:28px}.grid{grid-template-columns:1fr}.page{padding:24px 16px}}</style></head><body><main class="page"><section class="hero"><div class="kicker">Жеке кеңістік</div><h1>Таңдаулы</h1><p>Сақталған сүрелер, зікірлер, мақалалар және Алланың есімдері күнделікті оқу үшін осында жиналады.</p></section><section class="empty" id="favoritesEmpty">Пайдаланушы жұлдызшамен белгілеген материалдар осында жиналады: сүрелер, зікірлер, мақалалар, Алланың есімдері және басқа пайдалы беттер.</section><section class="grid" id="favoritesGrid" style="margin-top:14px"></section><script>(function(){function read(){try{return JSON.parse(localStorage.getItem('barakaway_favorites_v1')||'[]')}catch(e){return[]}}var grid=document.getElementById('favoritesGrid');var empty=document.getElementById('favoritesEmpty');var list=read();if(list.length){empty.style.display='none';grid.innerHTML=list.map(function(x){return '<a class="card" href="'+(x.url||'#')+'"><div class="icon">💛</div><div class="title">'+(x.title||'Таңдаулы')+'</div><div class="text">'+(x.text||x.type||'Сақталған материал')+'</div></a>'}).join('');}})();</script><section class="grid"></section></main><script src="/bottom-nav.js"></script></body></html>
