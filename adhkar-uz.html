/* premium mobile nav, gold Arabic, working saved/favorites */
:root{--arabic:var(--gold);}
html.dark-mode{--arabic:var(--gold2);}
body{padding-bottom:96px;}
.container{padding-bottom:72px;}
.ar,.share-arabic{color:var(--arabic)!important;font-weight:400!important;}
.label.when-label{color:var(--gold2)!important;}
.card-action.is-active,.action.is-active{background:linear-gradient(135deg,#2d7a46,#4caf6a)!important;color:#fff!important;border-color:rgba(45,122,70,.42)!important;box-shadow:0 10px 24px rgba(45,122,70,.22)!important;}
.card-action.is-active svg,.action.is-active svg{stroke:#fff!important;}
.card-action.is-active[data-card-action="favorite"] svg,.action.is-active[data-action="favorite"] svg,.card-action.is-active[data-card-action="save"] svg,.action.is-active[data-action="save"] svg{fill:rgba(255,255,255,.32)!important;}
.card-action.is-active[data-card-action="favorite"] svg path,.action.is-active[data-action="favorite"] svg path{fill:#fff!important;}
.bottom-app-nav{position:fixed!important;left:0!important;right:0!important;bottom:0!important;z-index:3100!important;padding:8px 10px calc(8px + env(safe-area-inset-bottom))!important;background:linear-gradient(180deg,rgba(7,17,21,0),rgba(7,17,21,.78) 22%,rgba(7,17,21,.94))!important;backdrop-filter:blur(18px)!important;-webkit-backdrop-filter:blur(18px)!important;}
.bottom-app-nav-inner{width:min(100%,760px)!important;margin:0 auto!important;padding:6px!important;border-radius:28px!important;border:1px solid rgba(215,181,109,.22)!important;background:linear-gradient(180deg,rgba(18,30,36,.96),rgba(12,22,27,.96))!important;box-shadow:0 18px 44px rgba(0,0,0,.42)!important;}
.bottom-app-nav-item{color:#aebdb7!important;text-decoration:none!important;}
.bottom-app-nav-item.active,.bottom-app-nav-item.is-active{color:#fff!important;background:linear-gradient(135deg,rgba(45,122,70,.86),rgba(76,175,106,.28))!important;border:1px solid rgba(215,181,109,.24)!important;}
.bottom-app-nav-icon svg{stroke:currentColor!important;}
html.light-mode .bottom-app-nav{background:linear-gradient(180deg,rgba(246,245,239,0),rgba(246,245,239,.86) 26%,rgba(246,245,239,.97))!important;}
html.light-mode .bottom-app-nav-inner{background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(250,248,240,.96))!important;box-shadow:0 14px 36px rgba(28,31,24,.16)!important;}
html.light-mode .bottom-app-nav-item{color:#607064!important;}
html.light-mode .bottom-app-nav-item.active,html.light-mode .bottom-app-nav-item.is-active{color:#fff!important;}
@media(max-width:720px){body{padding-bottom:92px}.container{padding-bottom:58px}.ar{color:var(--arabic)!important}.hero{margin-bottom:16px}}

.card-action{width:46px!important;height:46px!important;box-shadow:0 10px 22px rgba(0,0,0,.10)!important;}

.nav-btn{min-height:48px!important;padding:12px 17px!important;font-size:14px!important;border-radius:18px!important;}
.idx{min-width:58px!important;width:58px!important;height:46px!important;border-radius:18px!important;font-size:13px!important;letter-spacing:.01em!important;}

.panel-intro{font-size:15px!important;line-height:1.55!important;}
@media(max-width:720px){.page-actions{gap:8px!important}.action{min-height:64px!important;border-radius:17px!important;font-size:10.5px!important}.action svg{width:22px!important;height:22px!important}.card-action{width:44px!important;height:44px!important}.idx{min-width:54px!important;width:54px!important;height:42px!important;font-size:12px!important}.nav-btn{min-height:46px!important;font-size:13px!important;padding:11px 10px!important}}
@media(max-width:390px){.action-label{display:block!important;font-size:9.5px!important}.action{min-height:60px!important;padding:6px 2px!important}.action svg{width:21px!important;height:21px!important}}



/* clean sticky layer toggles, no decorative boxes */
.layer-controls{
  position:sticky;
  top:0;
  z-index:3000;
  max-width:820px;
  margin:0 auto 18px;
  padding:10px 6px 12px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  border:0!important;
  border-radius:0!important;
  box-shadow:none!important;
  background:linear-gradient(180deg,rgba(18,30,36,.98),rgba(18,30,36,.92));
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}
.layer-toggle{
  position:relative;
  min-height:0;
  border:0!important;
  border-radius:0!important;
  background:transparent!important;
  box-shadow:none!important;
  color:var(--gold2);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  padding:0;
  font-size:13px;
  font-weight:750;
  cursor:pointer;
  user-select:none;
  letter-spacing:.01em;
}
.layer-toggle:hover{transform:none!important;border-color:transparent!important;box-shadow:none!important}
.layer-toggle input{position:absolute;opacity:0;pointer-events:none}
.toggle-mark{
  width:18px;
  height:18px;
  border-radius:5px;
  border:1.5px solid rgba(215,181,109,.66);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:transparent;
  box-shadow:none;
  flex:0 0 auto;
}
.toggle-mark::after{
  content:"";
  width:9px;
  height:5px;
  border-left:2px solid #fff;
  border-bottom:2px solid #fff;
  transform:rotate(-45deg) scale(.55);
  opacity:0;
  transition:.14s ease;
}
.layer-toggle:has(input:checked){
  color:#fff;
  background:transparent!important;
  border-color:transparent!important;
  box-shadow:none!important;
}
.layer-toggle:has(input:checked) .toggle-mark{
  background:linear-gradient(135deg,#2d7a46,#4caf6a);
  border-color:rgba(255,255,255,.32);
}
.layer-toggle:has(input:checked) .toggle-mark::after{opacity:1;transform:rotate(-45deg) scale(1)}
html.light-mode .layer-controls{
  background:linear-gradient(180deg,rgba(255,254,249,.98),rgba(255,254,249,.92));
  box-shadow:none!important;
}
html.light-mode .layer-toggle{background:transparent!important;color:#8a681f}
html.light-mode .layer-toggle:has(input:checked){color:#17221c}
html.hide-arabic .ar{display:none!important}
html.hide-translit .translit{display:none!important}
html.hide-meaning .meaning{display:none!important}
.ar{font-size:21px!important;line-height:1.82!important;font-weight:400!important;color:var(--arabic)!important}
.translit{white-space:pre-line!important;overflow:visible!important;text-overflow:clip!important;display:block!important;line-height:1.75!important}
.reading-mode .ar{font-size:23px!important;line-height:1.9!important}
@media(max-width:720px){
  .layer-controls{
    top:0;
    width:calc(100% + 24px);
    max-width:none;
    margin-left:-12px;
    margin-right:-12px;
    padding:9px 10px 10px;
    gap:11px;
    justify-content:center;
  }
  .layer-toggle{font-size:12px;gap:6px}
  .toggle-mark{width:17px;height:17px;border-radius:5px}
  .ar{font-size:18px!important;line-height:1.78!important}
  .reading-mode .ar{font-size:20px!important;line-height:1.88!important}
  .translit{font-size:14px!important;line-height:1.7!important}
}
@media(max-width:390px){
  .layer-controls{gap:8px;padding-left:7px;padding-right:7px}
  .layer-toggle{font-size:11px;gap:5px}
  .toggle-mark{width:16px;height:16px}
}


/* === v7: card favorite/save active state — gold icon only, no green background === */
.card-action.is-active[data-card-action="favorite"],
.card-action.is-active[data-card-action="save"]{
  background:rgba(181,138,54,.07)!important;
  color:var(--gold2)!important;
  border-color:rgba(215,181,109,.38)!important;
  box-shadow:0 10px 22px rgba(0,0,0,.10)!important;
}
.card-action.is-active[data-card-action="favorite"] svg,
.card-action.is-active[data-card-action="save"] svg{
  stroke:var(--gold2)!important;
  fill:none!important;
}
.card-action.is-active[data-card-action="favorite"] svg path,
.card-action.is-active[data-card-action="save"] svg path{
  fill:var(--gold2)!important;
  stroke:var(--gold2)!important;
}
html.light-mode .card-action.is-active[data-card-action="favorite"],
html.light-mode .card-action.is-active[data-card-action="save"]{
  color:var(--gold)!important;
  border-color:rgba(181,138,54,.42)!important;
}

<script id="barakaway-bottom-nav-inline">
(function () {
  var FAVORITES_KEY = 'barakaway_favorites_v1';

  function detectLang() {
    var htmlLang = (document.documentElement.getAttribute('lang') || '').toLowerCase();
    var path = window.location.pathname.toLowerCase();
    var match = path.match(/(?:^|[-_\/])(ru|en|kz|kk|uz|tr|ur|ar|id|bn|hi)(?=\.|-|_|\/|$)/);

    if (match) return match[1] === 'kk' ? 'kz' : match[1];
    if (htmlLang.indexOf('kk') === 0) return 'kz';
    if (htmlLang.indexOf('ru') === 0) return 'ru';
    if (htmlLang.indexOf('en') === 0) return 'en';
    if (htmlLang.indexOf('uz') === 0) return 'uz';
    if (htmlLang.indexOf('tr') === 0) return 'tr';
    if (htmlLang.indexOf('ur') === 0) return 'ur';
    if (htmlLang.indexOf('ar') === 0) return 'ar';
    if (htmlLang.indexOf('id') === 0) return 'id';
    if (htmlLang.indexOf('bn') === 0) return 'bn';
    if (htmlLang.indexOf('hi') === 0) return 'hi';

    return 'ru';
  }

  var lang = detectLang();

  var labels = {
    ru: { today:'Bugun', favorites:'Sevimli', quran:'Qurʼon', holidays:'Bayramlar', learning:'O‘rganish' },
    en: { today:'Today', favorites:'Favorites', quran:'Quran', holidays:'Holidays', learning:'Learning' },
    kz: { today:'Bugun', favorites:'Sevimli', quran:'Qurʼon', holidays:'Bayramlar', learning:'O‘qish' },
    uz: { today:'Bugun', favorites:'Sevimli', quran:'Qurʼon', holidays:'Bayramlar', learning:'O‘rganish' },
    tr: { today:'Bugün', favorites:'Favoriler', quran:'Kur’an', holidays:'Bayramlar', learning:'Öğrenme' },
    ar: { today:'اليوم', favorites:'المفضلة', quran:'القرآن', holidays:'الأعياد', learning:'التعلّم' },
    ur: { today:'آج', favorites:'پسندیدہ', quran:'قرآن', holidays:'اعیاد', learning:'تعلیم' },
    id: { today:'Hari ini', favorites:'Favorit', quran:'Quran', holidays:'Hari raya', learning:'Belajar' },
    bn: { today:'আজ', favorites:'প্রিয়', quran:'কুরআন', holidays:'উৎসব', learning:'শিক্ষা' },
    hi: { today:'आज', favorites:'पसंदीदा', quran:'क़ुरआन', holidays:'त्योहार', learning:'सीखना' }
  };

  var L = labels[lang] || labels.ru;

  function file(base) {
    return '/' + base + '-' + lang + '.html';
  }

  function readFavorites() {
    try {
      var raw = localStorage.getItem(FAVORITES_KEY);
      var list = raw ? JSON.parse(raw) : [];
      return Array.isArray(list) ? list.filter(Boolean) : [];
    } catch (e) {
      return [];
    }
  }

  function saveFavorites(list) {
    localStorage.setItem(FAVORITES_KEY, JSON.stringify(Array.isArray(list) ? list : []));
    updateNavHeart();
  }

  function hasFavorites() {
    return readFavorites().length > 0;
  }

  function buildId(data) {
    return (data.url || '') + '::' + (data.title || '');
  }

  window.BarakaWayFavorites = {
    list: readFavorites,
    hasAny: hasFavorites,

    isActive: function (id) {
      return readFavorites().some(function (x) {
        return String(x.id) === String(id);
      });
    },

    toggle: function (data) {
      var id = buildId(data);
      var list = readFavorites();

      var exists = list.some(function (x) {
        return String(x.id) === String(id);
      });

      if (exists) {
        list = list.filter(function (x) {
          return String(x.id) !== String(id);
        });
        saveFavorites(list);
        return false;
      }

      list.unshift({
        id: id,
        title: data.title || document.title,
        url: data.url || window.location.pathname,
        text: data.text || '',
        type: data.type || '',
        addedAt: new Date().toISOString()
      });

      saveFavorites(list);
      return true;
    },

    open: function () {
      window.location.href = file('favorites');
    },

    refreshNav: function () {
      updateNavHeart();
    }
  };

  function iconToday() {
    return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7.5h16"/><path d="M8 3.5v4"/><path d="M16 3.5v4"/><rect x="4" y="5.5" width="16" height="15" rx="3"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M8 16h.01"/><path d="M12 16h.01"/></svg>';
  }

  function iconHeart() {
    return '<svg class="bottom-nav-heart-svg" viewBox="0 0 24 24" aria-hidden="true"><path class="bottom-nav-heart-path" d="M12 20s-7-4.35-7-10.15A4.15 4.15 0 0 1 12 6.9a4.15 4.15 0 0 1 7 2.95C19 15.65 12 20 12 20Z"/></svg>';
  }

  function iconQuran() {
    return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5.5 4.5h5.2c1.1 0 1.8.7 1.8 1.8v13.2c0-1-.8-1.7-1.8-1.7H5.5A1.5 1.5 0 0 1 4 16.3V6a1.5 1.5 0 0 1 1.5-1.5Z"/><path d="M18.5 4.5h-5.2c-1.1 0-1.8.7-1.8 1.8v13.2c0-1 .8-1.7 1.8-1.7h5.2A1.5 1.5 0 0 0 20 16.3V6a1.5 1.5 0 0 0-1.5-1.5Z"/><path d="M8 8.5h2"/><path d="M14 8.5h2"/></svg>';
  }

  function iconHolidays() {
    return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.5l2.15 4.35 4.8.7-3.48 3.38.82 4.78L12 14.45 7.71 16.71l.82-4.78L5.05 8.55l4.8-.7L12 3.5Z"/><path d="M4.5 20.5h15"/></svg>';
  }

  function iconLearning() {
    return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.5 6.5A2.5 2.5 0 0 1 7 4h10a2.5 2.5 0 0 1 2.5 2.5v11A2.5 2.5 0 0 1 17 20H7a2.5 2.5 0 0 1-2.5-2.5v-11Z"/><path d="M9 8h6"/><path d="M9 12h6"/><path d="M9 16h3"/></svg>';
  }

  var navItems = [
    { key:'today', label:L.today, href:file('home'), icon:iconToday },
    { key:'favorites', label:L.favorites, href:file('favorites'), icon:iconHeart },
    { key:'quran', label:L.quran, href:file('quran'), icon:iconQuran },
    { key:'holidays', label:L.holidays, href:file('holidays'), icon:iconHolidays },
    { key:'learning', label:L.learning, href:file('learning'), icon:iconLearning }
  ];

function activeKey() {
  var p = decodeURIComponent(window.location.pathname || '').toLowerCase();
  var fileName = p.split('/').pop() || '';
  var title = (document.title || '').toLowerCase();
  var h1 = ((document.querySelector('h1') || {}).textContent || '').toLowerCase();
  var bodyClass = (document.body.className || '').toLowerCase();
  var pageText = p + ' ' + fileName + ' ' + title + ' ' + h1 + ' ' + bodyClass;

  if (
    fileName.indexOf('favorites-') === 0 ||
    fileName.indexOf('favorite-') === 0 ||
    pageText.indexOf('favorites') !== -1 ||
    pageText.indexOf('favorite') !== -1 ||
    pageText.indexOf('favourites') !== -1 ||
    pageText.indexOf('favourite') !== -1 ||
    pageText.indexOf('sevimli') !== -1
  ) return 'favorites';

  if (
    fileName.indexOf('quran-') === 0 ||
    pageText.indexOf('quran') !== -1 ||
    pageText.indexOf('surah') !== -1 ||
    pageText.indexOf('qurʼon') !== -1
  ) return 'quran';

  if (
    fileName.indexOf('holidays-') === 0 ||
    pageText.indexOf('holiday') !== -1 ||
    pageText.indexOf('holidays') !== -1 ||
    pageText.indexOf('eid') !== -1 ||
    pageText.indexOf('ramadan') !== -1 ||
    pageText.indexOf('calendar') !== -1 ||
    pageText.indexOf('bayram') !== -1
  ) return 'holidays';

  if (
    fileName.indexOf('learning-') === 0 ||
    pageText.indexOf('learning') !== -1 ||
    pageText.indexOf('learn') !== -1 ||
    pageText.indexOf('education') !== -1 ||
    pageText.indexOf('video') !== -1 ||
    pageText.indexOf('organish') !== -1
  ) return 'learning';

  if (
    fileName.indexOf('home-') === 0 ||
    fileName.indexOf('index') === 0 ||
    pageText.indexOf('home') !== -1 ||
    pageText.indexOf('bugun') !== -1 ||
    p === '/' ||
    p === ''
  ) return 'today';

  return '';
}

  function injectNavStyle() {
    var old = document.getElementById('barakaway-bottom-nav-final-style');
    if (old) old.remove();

    var style = document.createElement('style');
    style.id = 'barakaway-bottom-nav-final-style';

    style.textContent =
      '.bottom-app-nav{' +
        'z-index:3100 !important;' +
      '}' +

      '.bottom-app-nav-inner{' +
        'display:grid !important;' +
        'grid-template-columns:repeat(5,minmax(0,1fr)) !important;' +
        'align-items:center !important;' +
        'justify-items:center !important;' +
      '}' +

      '.bottom-app-nav-item{' +
        'box-sizing:border-box !important;' +
        'display:flex !important;' +
        'flex-direction:column !important;' +
        'align-items:center !important;' +
        'justify-content:center !important;' +
        'text-align:center !important;' +
        'gap:4px !important;' +
        'height:60px !important;' +
        'min-width:0 !important;' +
        'width:100% !important;' +
        'max-width:108px !important;' +
        'padding:7px 3px 6px !important;' +
        'border-radius:24px !important;' +
        'line-height:1 !important;' +
        'overflow:visible !important;' +
      '}' +

      '.bottom-app-nav-item.active{' +
        'width:100% !important;' +
        'max-width:108px !important;' +
        'min-height:60px !important;' +
        'border-radius:24px !important;' +
        'padding:7px 5px 6px !important;' +
        'overflow:visible !important;' +
      '}' +

      '.bottom-app-nav-icon{' +
        'box-sizing:border-box !important;' +
        'display:flex !important;' +
        'align-items:center !important;' +
        'justify-content:center !important;' +
        'width:26px !important;' +
        'height:26px !important;' +
        'min-width:26px !important;' +
        'min-height:26px !important;' +
        'margin:0 auto !important;' +
        'padding:0 !important;' +
        'flex:0 0 26px !important;' +
        'position:static !important;' +
        'transform:none !important;' +
      '}' +

      '.bottom-app-nav-icon svg{' +
        'display:block !important;' +
        'width:22px !important;' +
        'height:22px !important;' +
        'margin:0 auto !important;' +
        'position:static !important;' +
        'transform:none !important;' +
        'fill:none !important;' +
        'stroke:currentColor !important;' +
        'stroke-width:2 !important;' +
      '}' +

      '.bottom-app-nav-item.active .bottom-app-nav-icon,' +
      '.bottom-app-nav-item.active .bottom-app-nav-icon svg{' +
        'position:static !important;' +
        'transform:none !important;' +
      '}' +

      '.bottom-app-nav-item.active .bottom-app-nav-icon svg{' +
        'stroke-width:2.15 !important;' +
      '}' +

      '.bottom-app-nav-label{' +
        'box-sizing:border-box !important;' +
        'display:block !important;' +
        'width:100% !important;' +
        'max-width:100% !important;' +
        'text-align:center !important;' +
        'margin:0 auto !important;' +
        'padding:0 !important;' +
        'font-size:11px !important;' +
        'line-height:1.05 !important;' +
        'white-space:nowrap !important;' +
        'overflow:visible !important;' +
        'text-overflow:clip !important;' +
      '}' +

      '@media(max-width:420px){' +
        '.bottom-app-nav-item{' +
          'max-width:96px !important;' +
          'height:58px !important;' +
          'min-height:58px !important;' +
          'gap:3px !important;' +
          'padding:7px 2px 6px !important;' +
        '}' +
        '.bottom-app-nav-item.active{' +
          'max-width:96px !important;' +
          'min-height:58px !important;' +
          'padding:7px 3px 6px !important;' +
        '}' +
        '.bottom-app-nav-label{' +
          'font-size:10.5px !important;' +
        '}' +
        '.bottom-app-nav-icon{' +
          'width:25px !important;' +
          'height:25px !important;' +
          'min-width:25px !important;' +
          'min-height:25px !important;' +
          'flex-basis:25px !important;' +
        '}' +
        '.bottom-app-nav-icon svg{' +
          'width:21px !important;' +
          'height:21px !important;' +
        '}' +
      '}' +

      '.bottom-app-nav-item[data-nav="favorites"] .bottom-app-nav-icon svg,' +
      '.bottom-app-nav-item[data-nav="favorites"] .bottom-app-nav-icon svg path{' +
        'stroke:#d7c07a !important;' +
        'color:#d7c07a !important;' +
      '}' +

      '.bottom-app-nav-item[data-nav="favorites"] .bottom-app-nav-icon svg path{' +
        'fill:transparent !important;' +
      '}' +

      '.bottom-app-nav-item[data-nav="favorites"].has-favorites .bottom-app-nav-icon svg path{' +
        'fill:#d7c07a !important;' +
        'stroke:#d7c07a !important;' +
      '}' +

      '.bottom-app-nav-item[data-nav="favorites"].active,' +
'.bottom-app-nav-item[data-nav="favorites"].is-active{' +
  'background:linear-gradient(135deg,rgba(215,192,122,.20),rgba(58,130,82,.24)) !important;' +
  'border:1px solid rgba(215,192,122,.45) !important;' +
  'box-shadow:inset 0 0 0 1px rgba(255,255,255,.04),0 10px 24px rgba(0,0,0,.22) !important;' +
'}' +

'.bottom-app-nav-item[data-nav="favorites"] .bottom-app-nav-label{' +
  'color:inherit !important;' +
'}';

    document.head.appendChild(style);
  }

  function updateNavHeart() {
    var item = document.querySelector('.bottom-app-nav-item[data-nav="favorites"]');
    if (!item) return;

    if (hasFavorites()) {
      item.classList.add('has-favorites');
      item.setAttribute('data-favorites-state', 'filled');
    } else {
      item.classList.remove('has-favorites');
      item.setAttribute('data-favorites-state', 'empty');
    }
  }

  function renderBottomNav() {
    injectNavStyle();

    document.querySelectorAll('.bottom-app-nav').forEach(function (nav) {
      nav.remove();
    });

    var active = activeKey();

    var nav = document.createElement('nav');
    nav.className = 'bottom-app-nav';
    nav.setAttribute('aria-label', 'BarakaWay navigation');

    var inner = document.createElement('div');
    inner.className = 'bottom-app-nav-inner';

    navItems.forEach(function (item) {
      var a = document.createElement('a');
      a.className = 'bottom-app-nav-item' + (item.key === active ? ' active is-active' : '');
      a.href = item.href;
      a.dataset.nav = item.key;
      a.setAttribute('aria-label', item.label);

      if (item.key === active) {
        a.setAttribute('aria-current', 'page');
      }

      a.innerHTML =
        '<span class="bottom-app-nav-icon">' + item.icon() + '</span>' +
        '<span class="bottom-app-nav-label">' + item.label + '</span>';

      a.addEventListener('click', function () {
        document.querySelectorAll('.bottom-app-nav-item').forEach(function (el) {
          el.classList.remove('active', 'is-active');
          el.removeAttribute('aria-current');
        });

        a.classList.add('active');
        a.setAttribute('aria-current', 'page');
      });

      inner.appendChild(a);
    });

    nav.appendChild(inner);
    document.body.appendChild(nav);

    updateNavHeart();
  }

  function extractData(btn) {
    if (btn.dataset.surahName) {
      return {
        title: btn.dataset.surahName,
        url: btn.dataset.surahHref,
        text: btn.dataset.surahMeta,
        type: 'Sura'
      };
    }

    return {
      title: btn.dataset.title || document.title,
      url: btn.dataset.url || window.location.pathname,
      text: btn.dataset.text || '',
      type: btn.dataset.type || ''
    };
  }

  function updateButton(btn, active) {
    if (active) {
      btn.classList.add('is-active');
      btn.setAttribute('aria-pressed', 'true');
    } else {
      btn.classList.remove('is-active');
      btn.setAttribute('aria-pressed', 'false');
    }
  }

  function initFavoritesButtons() {
    document.querySelectorAll('[data-surah-action="favorite"], [data-surah-action="save"]').forEach(function (btn) {
      var data = extractData(btn);
      var id = buildId(data);

      updateButton(btn, window.BarakaWayFavorites.isActive(id));

      btn.addEventListener('click', function (e) {
        e.preventDefault();
        e.stopPropagation();

        var result = window.BarakaWayFavorites.toggle(data);

        updateButton(btn, result);
        updateNavHeart();
      });
    });
  }

  function boot() {
    renderBottomNav();
    initFavoritesButtons();

    window.addEventListener('storage', updateNavHeart);
    document.addEventListener('barakaway:favorites:changed', updateNavHeart);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
<script>
const DATA = {"categories":[["all","Barchasi"],["morning","Ertalab"],["evening","Kechqurun"],["after_prayer","Namozdan keyin"],["before_sleep","Uyqudan oldin"],["general","Umumiy"]],"intros":{"all":"Kundalik azkarlarning to‘liq amaliy to‘plami.","morning":"Ertalabki azkarlar: ertalab o‘qiladigan barcha zikrlar. Eng yaxshi vaqt — Fajrdan keyin quyosh chiqqunga qadar.","evening":"Kechki azkarlar: kechqurun o‘qiladigan barcha zikrlar. Eng yaxshi vaqt — Asrdan keyin Mag‘ribgacha.","after_prayer":"Farz namozlardan keyin darhol o‘qish tavsiya etiladi.","before_sleep":"Uyqudan oldin o‘qish tavsiya etiladi.","general":"Kun davomida takrorlash mumkin bo‘lgan umumiy azkarlar va zikrlar."},"items":[{"id":"01_hamd_salawat","n":"1/25","title":"Allohga hamd va Payg‘ambarga salovat ﷺ","cats":["morning","evening"],"rep":"1 marta","ref":"Ertalab va kechqurun","ar":"الْحَمْدُ لِلَّهِ وَحْدَهُ، وَالصَّلَاةُ وَالسَّلَامُ عَلَى مَنْ لَا نَبِيَّ بَعْدَهُ","tr":"Alʼ-hamdu li-Llyahi vahda-hu, va-s-salyatu va-s-salyamu ‘alya man lya nabiyya ba‘da-hu.","meaning":"Yolg‘iz Allohga hamd bo‘lsin. Undan keyin boshqa payg‘ambar kelmaydigan zotga salovat va salom bo‘lsin.","when":"Ertalab va kechqurun azkarlarning boshida o‘qiladi."},{"id":"02_ayat_kursi","n":"2/25","title":"Oyatul Kursiy","cats":["morning","evening","after_prayer","before_sleep"],"rep":"1 marta","ref":"Qurʼon 2:255","ar":"اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَنْ ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ","tr":"Allahu lya ilyaha illya Huva-lʼ-Hayyu-lʼ-Kayyum. Lya ta’huzuhu sinatun va lya naum. Lya-hu ma fi-s-samavati va ma fi-lʼ-ard. Man za-llyazi yashfa‘u ‘inda-hu illya bi-izni-hi. Ya‘lyamu ma bayna aydihim va ma halʼfahum, va lya yuhituna bi-shay’in min ‘ilʼmi-hi illya bi-ma sha’. Vasi‘a kursiyyu-hu-s-samavati va-lʼ-ard, va lya ya’udu-hu hifzu-huma, va Huva-lʼ-‘Aliyyu-lʼ-‘Azim.","meaning":"Alloh — Undan boshqa iloh yo‘q, U tirik va barcha narsani tutib turuvchidir. Uni mudroq ham, uyqu ham tutmaydi. Osmonlar va yerdagi barcha narsa Unikidir. Uning Kursiysi osmonlar va yerni qamrab olgan, ularni saqlash Unga og‘ir kelmaydi. U Oliy va Buyukdir.","when":"Ertalab, kechqurun, farz namozlardan keyin va uyqudan oldin o‘qiladi."},{"id":"03_ikhlas_falaq_nas","n":"3/25","title":"Al-Ixlos, Al-Falaq, An-Nos","cats":["morning","evening","before_sleep"],"rep":"3 marta","ref":"Qurʼon 112, 113, 114","ar":"بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ\nقُلْ هُوَ ٱللَّهُ أَحَدٌ ۝ ٱللَّهُ ٱلصَّمَدُ ۝ لَمْ يَلِدْ وَلَمْ يُولَدْ ۝ وَلَمْ يَكُن لَّهُۥ كُفُوًا أَحَدٌ\n\nبِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ\nقُلْ أَعُوذُ بِرَبِّ ٱلْفَلَقِ ۝ مِن شَرِّ مَا خَلَقَ ۝ وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ ۝ وَمِن شَرِّ ٱلنَّفَّٰثَٰتِ فِى ٱلْعُقَدِ ۝ وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ\n\nبِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ\nقُلْ أَعُوذُ بِرَبِّ ٱلنَّاسِ ۝ مَلِكِ ٱلنَّاسِ ۝ إِلَٰهِ ٱلنَّاسِ ۝ مِن شَرِّ ٱلْوَسْوَاسِ ٱلْخَنَّاسِ ۝ ٱلَّذِى يُوَسْوِسُ فِى صُدُورِ ٱلنَّاسِ ۝ مِنَ ٱلْجِنَّةِ وَٱلنَّاسِ","tr":"Bismi-Llyahi-r-Rahmani-r-Rahim. Kulʼ huva-Llahu ahad. Allahu-s-Samad. Lyam yalid va lyam yulyad. Va lyam yakul-lya-hu kufuvan ahad.\n\nBismi-Llyahi-r-Rahmani-r-Rahim. Kulʼ a‘uzu bi-Rabbi-lʼ-falyak. Min sharri ma halyak. Va min sharri gasikin iza vakab. Va min sharri-n-naffasati fi-lʼ-‘ukad. Va min sharri hasidin iza hasad.\n\nBismi-Llyahi-r-Rahmani-r-Rahim. Kulʼ a‘uzu bi-Rabbi-n-nas. Maliki-n-nas. Ilyahi-n-nas. Min sharri-lʼ-vasvasi-lʼ-hannas. Allyazi yuvasvisu fi suduri-n-nas. Mina-lʼ-djinnati va-n-nas.","meaning":"Qurʼonning oxirgi uch surasi: iymon pokligi, yaratilgan narsalarning yomonligidan, hasaddan, jin va odamlarning vasvasasidan himoya.","when":"Ertalab va kechqurun 3 martadan o‘qish tavsiya etiladi. Bu yomonliklardan himoya uchun kifoya qiladi."},{"id":"04_asbahna_morning","n":"4/25","title":"Biz tongga yetdik","cats":["morning"],"rep":"1 marta","ref":"Ertalab","ar":"أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ، رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ وَسُوءِ الْكِبَرِ، رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ","tr":"Asbahna va asbaha-lʼ-mulʼku li-Llyah, va-lʼ-hamdu li-Llyah. Lya ilyaha illya-Llahu vahda-hu lya sharika lya-hu, lya-hu-lʼ-mulʼku va lya-hu-lʼ-hamdu, va Huva ‘alya kulli shay’in kadir. Rabbi, as’aluka hayra ma fi haza-lʼ-yaumi va hayra ma ba‘da-hu, va a‘uzu bi-ka min sharri ma fi haza-lʼ-yaumi va sharri ma ba‘da-hu. Rabbi, a‘uzu bi-ka mina-lʼ-kasali va su’i-lʼ-kibar. Rabbi, a‘uzu bi-ka min ‘azabin fi-n-nari va ‘azabin fi-lʼ-kabr.","meaning":"Biz tongga yetdik va tongda mulk Allohnikidir. Allohdan boshqa iloh yo‘q. Ey Rabbim, bu kunning yaxshiligini so‘rayman va bu kunning yomonligidan, dangasalikdan, qarilik zaifligidan, do‘zax azobidan va qabr azobidan Senga panoh so‘rayman.","when":"Ertalab o‘qiladi."},{"id":"04_amsayna_evening","n":"4/25","title":"Biz kechga yetdik","cats":["evening"],"rep":"1 marta","ref":"Kechqurun","ar":"أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذِهِ اللَّيْلَةِ وَخَيْرَ مَا بَعْدَهَا، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذِهِ اللَّيْلَةِ وَشَرِّ مَا بَعْدَهَا، رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ وَسُوءِ الْكِبَرِ، رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ","tr":"Amsayna va amsa-lʼ-mulʼku li-Llyah, va-lʼ-hamdu li-Llyah. Lya ilyaha illya-Llahu vahda-hu lya sharika lya-hu, lya-hu-lʼ-mulʼku va lya-hu-lʼ-hamdu, va Huva ‘alya kulli shay’in kadir. Rabbi, as’aluka hayra ma fi hazihi-l-lyaylyati va hayra ma ba‘da-ha, va a‘uzu bi-ka min sharri ma fi hazihi-l-lyaylyati va sharri ma ba‘da-ha. Rabbi, a‘uzu bi-ka mina-lʼ-kasali va su’i-lʼ-kibar. Rabbi, a‘uzu bi-ka min ‘azabin fi-n-nari va ‘azabin fi-lʼ-kabr.","meaning":"Biz kechga yetdik va kechda mulk Allohnikidir. Ey Rabbim, bu kechaning yaxshiligini so‘rayman va uning yomonligidan, dangasalikdan, qarilik zaifligidan, do‘zax azobidan va qabr azobidan Senga panoh so‘rayman.","when":"Kechqurun o‘qiladi."},{"id":"05_bika_asbahna","n":"5/25","title":"Sening qudrating bilan tong va kechga yetdik","cats":["morning","evening"],"rep":"1 marta","ref":"Ertalab va kechqurun","ar":"اللَّهُمَّ بِكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ النُّشُورُ\n\nاللَّهُمَّ بِكَ أَمْسَيْنَا، وَبِكَ أَصْبَحْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ الْمَصِيرُ","tr":"Allahumma bi-ka asbahna, va bi-ka amsayna, va bi-ka nahya, va bi-ka namutu, va ilyayka-n-nushur.\n\nAllahumma bi-ka amsayna, va bi-ka asbahna, va bi-ka nahya, va bi-ka namutu, va ilyayka-lʼ-masir.","meaning":"Ey Alloh, Sening qudrating bilan tongga yetdik, Sening qudrating bilan kechga yetdik. Sening qudrating bilan yashaymiz va o‘lamiz. Qaytish ham Sengadir.","when":"Birinchi shakli ertalab, ikkinchi shakli kechqurun o‘qiladi."},{"id":"06_sayyid_istighfar","n":"6/25","title":"Sayyidul istig‘for","cats":["morning","evening"],"rep":"1 marta","ref":"Ertalab va kechqurun","ar":"اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبِي، فَاغْفِرْ لِي، فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ","tr":"Allahumma Anta Rabbi, lya ilyaha illya Anta. Halyaktani va ana ‘abduka, va ana ‘alya ‘ahdika va va‘dika ma-stata‘tu. A‘uzu bi-ka min sharri ma sana‘tu. Abu’u lyaka bi-ni‘matika ‘alayya, va abu’u bi-zanbi. Fagfir li, fa-inna-hu lya yagfiru-z-zunuba illya Anta.","meaning":"Ey Alloh, Sen mening Rabbimsan, Sendan boshqa iloh yo‘q. Sen meni yaratding, men Sening bandangman. Men imkonim boricha Senga bergan ahdimda turaman. Qilgan yomonligimdan Senga panoh so‘rayman. Neʼmatingni tan olaman va gunohimni tan olaman. Meni kechir, chunki gunohlarni Sendan boshqa hech kim kechirmaydi.","when":"Ertalab va kechqurun o‘qiladi."},{"id":"07_witness","n":"7/25","title":"Ertalab va kechqurun guvohlik","cats":["morning","evening"],"rep":"4 marta","ref":"Ertalab va kechqurun","ar":"اللَّهُمَّ إِنِّي أَصْبَحْتُ أُشْهِدُكَ، وَأُشْهِدُ حَمَلَةَ عَرْشِكَ، وَمَلَائِكَتَكَ، وَجَمِيعَ خَلْقِكَ، أَنَّكَ أَنْتَ اللَّهُ لَا إِلَهَ إِلَّا أَنْتَ وَحْدَكَ لَا شَرِيكَ لَكَ، وَأَنَّ مُحَمَّدًا عَبْدُكَ وَرَسُولُكَ","tr":"Allahumma inni asbahtu ushhiduka, va ushhidu hamalyata ‘arshika, va malyaikataka, va djami‘a halʼkika, annaka Anta-Llahu lya ilyaha illya Anta vahdaka lya sharika lyak, va anna Muhammadan ‘abduka va rasulyuk.","meaning":"Ey Alloh, tongda Seni, Arshingni ko‘taruvchi farishtalarni, barcha farishtalaringni va barcha maxluqotingni guvoh qilamanki, Sen Allohsan, Sendan boshqa iloh yo‘q, Sening sheriging yo‘q, Muhammad esa Sening bandang va rasulingdir.","when":"Ertalab va kechqurun 4 martadan o‘qiladi."},{"id":"08_blessing","n":"8/25","title":"Neʼmatlar uchun shukr","cats":["morning","evening"],"rep":"1 marta","ref":"Ertalab va kechqurun","ar":"اللَّهُمَّ مَا أَصْبَحَ بِي مِنْ نِعْمَةٍ أَوْ بِأَحَدٍ مِنْ خَلْقِكَ فَمِنْكَ وَحْدَكَ لَا شَرِيكَ لَكَ، فَلَكَ الْحَمْدُ وَلَكَ الشُّكْرُ","tr":"Allahumma ma asbaha bi min ni‘matin au bi-ahadin min halʼkika, fa-minka vahdaka lya sharika lyak, fa-lyaka-lʼ-hamdu va lyaka-sh-shukr.","meaning":"Ey Alloh, menga yoki maxluqotlaringdan biriga tongda yoki kechda yetgan har qanday neʼmat faqat Sendandir. Senga hamd va shukr bo‘lsin.","when":"Ertalab va kechqurun."},{"id":"09_afiya","n":"9/25","title":"Omonlik va salomatlik so‘rash","cats":["morning","evening"],"rep":"3 marta","ref":"Ertalab va kechqurun","ar":"اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لَا إِلَهَ إِلَّا أَنْتَ. اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْكُفْرِ وَالْفَقْرِ، وَأَعُوذُ بِكَ مِنْ عَذَابِ الْقَبْرِ، لَا إِلَهَ إِلَّا أَنْتَ","tr":"Allahumma ‘afini fi badani. Allahumma ‘afini fi sam‘i. Allahumma ‘afini fi basari. Lya ilyaha illya Anta. Allahumma inni a‘uzu bi-ka mina-lʼ-kufri va-lʼ-fakr, va a‘uzu bi-ka min ‘azabi-lʼ-kabr. Lya ilyaha illya Anta.","meaning":"Ey Alloh, tanamni, eshitishimni va ko‘rishimni omonda qil. Sendan boshqa iloh yo‘q. Ey Alloh, kufrdan, faqirlikdan va qabr azobidan Senga panoh so‘rayman.","when":"Ertalab va kechqurun 3 martadan aytish tavsiya etiladi."},{"id":"10_hasbi","n":"10/25","title":"Menga Alloh kifoya","cats":["morning","evening"],"rep":"7 marta","ref":"Ertalab va kechqurun","ar":"حَسْبِيَ اللَّهُ لَا إِلَهَ إِلَّا هُوَ، عَلَيْهِ تَوَكَّلْتُ، وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ","tr":"Hasbiya-Llahu lya ilyaha illya Huva, ‘aleyhi tavakkalʼtu, va Huva Rabbu-lʼ-‘arshi-lʼ-‘azim.","meaning":"Menga Alloh kifoya. Undan boshqa iloh yo‘q. Unga tavakkal qildim. U buyuk Arshning Rabbidir.","when":"Ertalab va kechqurun 7 martadan."},{"id":"11_protection_all_sides","n":"11/25","title":"Old, orqa, o‘ng, chap va yuqoridan himoya","cats":["morning","evening"],"rep":"1 marta","ref":"Ertalab va kechqurun","ar":"اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي الدُّنْيَا وَالْآخِرَةِ، اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي دِينِي وَدُنْيَايَ وَأَهْلِي وَمَالِي، اللَّهُمَّ اسْتُرْ عَوْرَاتِي، وَآمِنْ رَوْعَاتِي، اللَّهُمَّ احْفَظْنِي مِنْ بَيْنِ يَدَيَّ، وَمِنْ خَلْفِي، وَعَنْ يَمِينِي، وَعَنْ شِمَالِي، وَمِنْ فَوْقِي، وَأَعُوذُ بِعَظَمَتِكَ أَنْ أُغْتَالَ مِنْ تَحْتِي","tr":"Allahumma inni as’aluka-lʼ-‘afva va-lʼ-‘afiyata fi-d-dunʼya va-lʼ-ahira. Allahumma inni as’aluka-lʼ-‘afva va-lʼ-‘afiyata fi dini va dunʼyaya va ahli va mali. Allahumma-stur ‘aurati, va amin rau‘ati. Allahumma-hfazni min bayni yadayya, va min halʼfi, va ‘an yamini, va ‘an shimali, va min fauki, va a‘uzu bi-‘azamatika an ugtalya min tahti.","meaning":"Ey Alloh, dunyo va oxiratda afv va omonlik so‘rayman. Dinim, dunyom, oilam va molimda afv va omonlik so‘rayman. Ayblarimni yopgin, qo‘rquvlarimni xotirjamlikka aylantirgin. Oldimdan, orqamdan, o‘ngimdan, chapimdan va tepamdan meni saqla. Ostimdan halokatga uchrashdan Sening ulug‘liging bilan panoh so‘rayman.","when":"Ertalab va kechqurun."},{"id":"12_alim_ghayb","n":"12/25","title":"Nafs va shayton yomonligidan himoya","cats":["morning","evening"],"rep":"1 marta","ref":"Ertalab va kechqurun","ar":"اللَّهُمَّ عَالِمَ الْغَيْبِ وَالشَّهَادَةِ، فَاطِرَ السَّمَاوَاتِ وَالْأَرْضِ، رَبَّ كُلِّ شَيْءٍ وَمَلِيكَهُ، أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا أَنْتَ، أَعُوذُ بِكَ مِنْ شَرِّ نَفْسِي، وَمِنْ شَرِّ الشَّيْطَانِ وَشِرْكِهِ، وَأَنْ أَقْتَرِفَ عَلَى نَفْسِي سُوءًا، أَوْ أَجُرَّهُ إِلَى مُسْلِمٍ","tr":"Allahumma ‘alima-lʼ-gaybi va-sh-shahada, fatira-s-samavati va-lʼ-ard, Rabba kulli shay’in va malika-hu. Ashhadu an lya ilyaha illya Anta. A‘uzu bi-ka min sharri nafsi, va min sharri-sh-shaytani va shirki-hi, va an aktarifa ‘alya nafsi su’an au adjurra-hu ilya muslim.","meaning":"Ey Alloh, g‘ayb va oshkorni biluvchi, osmonlar va yerning Yaratuvchisi, barcha narsaning Rabbi va Egasi. O‘z nafsim yomonligidan, shayton yomonligidan va uning shirkidan, o‘zimga yoki bir musulmonga yomonlik yetkazishdan Senga panoh so‘rayman.","when":"Ertalab va kechqurun."},{"id":"13_bismillah_harm","n":"13/25","title":"Alloh nomi bilan — zarardan himoya","cats":["morning","evening"],"rep":"3 marta","ref":"Ertalab va kechqurun","ar":"بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ","tr":"Bismi-Llyahi-llyazi lya yadurru ma‘a-smihi shay’un fi-lʼ-ardi va lya fi-s-sama’i va Huva-s-Sami‘u-lʼ-‘Alim.","meaning":"Allohning nomi bilan. Uning nomi bilan yerda ham, osmonda ham hech narsa zarar yetkaza olmaydi. U Eshituvchi va Biluvchidir.","when":"Ertalab va kechqurun 3 martadan."},{"id":"14_raditu","n":"14/25","title":"Allohdan, Islomdan va Muhammad ﷺ dan rozi bo‘ldim","cats":["morning","evening"],"rep":"3 marta","ref":"Ertalab va kechqurun","ar":"رَضِيتُ بِاللَّهِ رَبًّا، وَبِالْإِسْلَامِ دِينًا، وَبِمُحَمَّدٍ نَبِيًّا","tr":"Raditu bi-Llyahi Rabban, va bi-lʼ-Islyami dinan, va bi-Muhammadin nabiyyan.","meaning":"Allohni Rabbim deb, Islomni dinim deb, Muhammadni payg‘ambarim deb rozi bo‘ldim.","when":"Ertalab va kechqurun 3 martadan."},{"id":"15_hayyu_qayyum","n":"15/25","title":"Ya Hayyu, Ya Qayyum","cats":["morning","evening"],"rep":"1 marta","ref":"Ertalab va kechqurun","ar":"يَا حَيُّ يَا قَيُّومُ، بِرَحْمَتِكَ أَسْتَغِيثُ، أَصْلِحْ لِي شَأْنِي كُلَّهُ، وَلَا تَكِلْنِي إِلَى نَفْسِي طَرْفَةَ عَيْنٍ","tr":"Ya Hayyu, ya Kayyum, bi-rahmatika astagis, aslih li sha’ni kullya-hu, va lya takilʼni ilya nafsi tarfata ‘ayn.","meaning":"Ey Tirik, ey barcha narsani tutib turuvchi Zot, rahmating bilan yordam so‘rayman. Barcha ishlarimni isloh qil va meni ko‘z ochib yumguncha ham o‘z nafsimga topshirib qo‘yma.","when":"Ertalab va kechqurun."},{"id":"16_morning_good","n":"16/25","title":"Bu kunning yaxshiligini so‘rayman","cats":["morning"],"rep":"1 marta","ref":"Ertalab","ar":"أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ رَبِّ الْعَالَمِينَ، اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ هَذَا الْيَوْمِ: فَتْحَهُ، وَنَصْرَهُ، وَنُورَهُ، وَبَرَكَتَهُ، وَهُدَاهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِيهِ وَشَرِّ مَا بَعْدَهُ","tr":"Asbahna va asbaha-lʼ-mulʼku li-Llyahi Rabbi-lʼ-‘alyamin. Allahumma inni as’aluka hayra haza-lʼ-yaum: fatha-hu, va nasra-hu, va nura-hu, va barakata-hu, va huda-hu. Va a‘uzu bi-ka min sharri ma fi-hi va sharri ma ba‘da-hu.","meaning":"Biz tongga yetdik va tongda mulk olamlar Rabbi Allohnikidir. Ey Alloh, bu kunning yaxshiligini: g‘alabasini, nurini, barakasini va hidoyatini so‘rayman. Undagi va undan keyingi yomonlikdan Senga panoh so‘rayman.","when":"Ertalab o‘qiladi."},{"id":"16_evening_good","n":"16/25","title":"Bu kechaning yaxshiligini so‘rayman","cats":["evening"],"rep":"1 marta","ref":"Kechqurun","ar":"أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ رَبِّ الْعَالَمِينَ، اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ هَذِهِ اللَّيْلَةِ: فَتْحَهَا، وَنَصْرَهَا، وَنُورَهَا، وَبَرَكَتَهَا، وَهُدَاهَا، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِيهَا وَشَرِّ مَا بَعْدَهَا","tr":"Amsayna va amsa-lʼ-mulʼku li-Llyahi Rabbi-lʼ-‘alyamin. Allahumma inni as’aluka hayra hazihi-l-lyaylya: fatha-ha, va nasra-ha, va nura-ha, va barakata-ha, va huda-ha. Va a‘uzu bi-ka min sharri ma fi-ha va sharri ma ba‘da-ha.","meaning":"Biz kechga yetdik va kechda mulk olamlar Rabbi Allohnikidir. Ey Alloh, bu kechaning yaxshiligini so‘rayman va undagi hamda undan keyingi yomonlikdan Senga panoh so‘rayman.","when":"Kechqurun o‘qiladi."},{"id":"17_fitra","n":"17/25","title":"Islom fitrati uzra","cats":["morning","evening"],"rep":"1 marta","ref":"Ertalab va kechqurun","ar":"أَصْبَحْنَا عَلَى فِطْرَةِ الْإِسْلَامِ، وَعَلَى كَلِمَةِ الْإِخْلَاصِ، وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ، وَعَلَى مِلَّةِ أَبِينَا إِبْرَاهِيمَ، حَنِيفًا مُسْلِمًا وَمَا كَانَ مِنَ الْمُشْرِكِينَ","tr":"Asbahna ‘alya fitrati-lʼ-Islyam, va ‘alya kalimati-lʼ-ihlyas, va ‘alya dini nabiyyina Muhammad, va ‘alya millyati abina Ibrahima, hanifan musliman, va ma kana mina-lʼ-mushrikin.","meaning":"Biz Islom fitrati, ixlos kalimasi, payg‘ambarimiz Muhammad ﷺ dini va otamiz Ibrohimning hanif va musulmon millati uzra tongga yoki kechga yetdik. U mushriklardan emas edi.","when":"Ertalab va kechqurun."},{"id":"18_subhanallah_100","n":"18/25","title":"Alloh pokdir va Unga hamd bo‘lsin","cats":["morning","evening","general"],"rep":"100 marta","ref":"Har kuni","ar":"سُبْحَانَ اللَّهِ وَبِحَمْدِهِ","tr":"Subhana-Llahi va bi-hamdihi.","meaning":"Alloh pokdir va Unga hamd bo‘lsin.","when":"Har kuni 100 marta."},{"id":"19_tawhid_10","n":"19/25","title":"Allohdan boshqa iloh yo‘q","cats":["morning","evening"],"rep":"10 marta","ref":"Ertalab va kechqurun","ar":"لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ","tr":"Lya ilyaha illya-Llahu vahda-hu lya sharika lya-hu, lya-hu-lʼ-mulʼku va lya-hu-lʼ-hamdu, va Huva ‘alya kulli shay’in kadir.","meaning":"Yolg‘iz Allohdan boshqa iloh yo‘q. Uning sherigi yo‘q. Mulk Unikidir, hamd Unikidir va U har narsaga qodirdir.","when":"Ertalab va kechqurun 10 martadan yoki kamida 1 marta."},{"id":"20_tawhid_daily","n":"20/25","title":"Kim buni kun davomida aytsa","cats":["general"],"rep":"1 marta yoki ko‘proq","ref":"Kun davomida","ar":"لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ","tr":"Lya ilyaha illya-Llahu vahda-hu lya sharika lya-hu, lya-hu-lʼ-mulʼku va lya-hu-lʼ-hamdu, va Huva ‘alya kulli shay’in kadir.","meaning":"Yolg‘iz Allohdan boshqa iloh yo‘q. Uning sherigi yo‘q. Mulk Unikidir, hamd Unikidir va U har narsaga qodirdir.","when":"Kun davomida o‘qish mumkin. Qancha ko‘p bo‘lsa, shuncha yaxshi."},{"id":"21_subhan_count","n":"21/25","title":"Yaratilganlar sonicha hamd","cats":["morning"],"rep":"3 marta","ref":"Ertalab","ar":"سُبْحَانَ اللَّهِ وَبِحَمْدِهِ، عَدَدَ خَلْقِهِ، وَرِضَا نَفْسِهِ، وَزِنَةَ عَرْشِهِ، وَمِدَادَ كَلِمَاتِهِ","tr":"Subhana-Llahi va bi-hamdihi ‘adada halʼkihi, va rida nafsihi, va zinata ‘arshihi, va midada kalimatihi.","meaning":"Alloh pokdir va Unga hamd bo‘lsin: yaratgan maxluqotlari sonicha, O‘zi rozi bo‘ladigan darajada, Arshining og‘irligicha va kalimalarining siyohi miqdoricha.","when":"Ertalab 3 marta."},{"id":"22_knowledge_rizq","n":"22/25","title":"Foydali ilm va pok rizq","cats":["morning"],"rep":"1 marta","ref":"Ertalab","ar":"اللَّهُمَّ إِنِّي أَسْأَلُكَ عِلْمًا نَافِعًا، وَرِزْقًا طَيِّبًا، وَعَمَلًا مُتَقَبَّلًا","tr":"Allahumma inni as’aluka ‘ilʼman nafi‘an, va rizkan tayyiban, va ‘amalan mutakabbalyan.","meaning":"Ey Alloh, Sendan foydali ilm, pok rizq va qabul bo‘ladigan amal so‘rayman.","when":"Ertalab aytish tavsiya etiladi."},{"id":"23_istighfar_100","n":"23/25","title":"Istig‘for","cats":["general","morning","evening"],"rep":"100 marta","ref":"Har kuni","ar":"أَسْتَغْفِرُ اللَّهَ وَأَتُوبُ إِلَيْهِ","tr":"Astagfiru-Llaha va atubu ilyayhi.","meaning":"Allohdan mag‘firat so‘rayman va Unga tavba qilaman.","when":"Kuniga 100 marta aytish tavsiya etiladi."},{"id":"24_complete_words","n":"24/25","title":"Allohning mukammal kalimalari bilan himoya","cats":["evening"],"rep":"3 marta","ref":"Kechqurun","ar":"أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ","tr":"A‘uzu bi-kalimati-Llyahi-t-tammati min sharri ma halyak.","meaning":"Alloh yaratgan narsalarning yomonligidan Uning mukammal kalimalari bilan panoh so‘rayman.","when":"Kechqurun 3 martadan."},{"id":"25_salawat","n":"25/25","title":"Payg‘ambar Muhammad ﷺ ga salovat","cats":["morning","evening","general"],"rep":"10 marta","ref":"Ertalab va kechqurun","ar":"اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى نَبِيِّنَا مُحَمَّدٍ","tr":"Allahumma salli va sallim ‘alya nabiyyina Muhammad.","meaning":"Ey Alloh, payg‘ambarimiz Muhammadga salovat va salom yubor.","when":"Ertalab va kechqurun. Kun davomida ham o‘qish mumkin."}]};

  reading: localStorage.getItem('adhkarReading')==='1'
};
function persist(){localStorage.setItem('adhkarFavorites',JSON.stringify([...store.favorites]));const bookmark=[...store.saved][0]||'';localStorage.setItem('adhkarSavedBookmark',bookmark);localStorage.setItem('adhkarSaved',JSON.stringify(bookmark?[bookmark]:[]));localStorage.setItem('adhkarPageFavorite',store.pageFavorite?'1':'0');localStorage.setItem('adhkarPageSaved',store.pageSaved?'1':'0');localStorage.setItem('adhkarReading',store.reading?'1':'0');}
function globalFavoriteKey(x){return '#'+x.id+'::'+x.title;}
function readGlobalFavorites(){try{const raw=localStorage.getItem('barakaway_favorites_v1');const arr=raw?JSON.parse(raw):[];return Array.isArray(arr)?arr:[]}catch(e){return []}}
function writeGlobalFavorites(arr){localStorage.setItem('barakaway_favorites_v1',JSON.stringify(arr));if(window.BarakaWayFavorites&&window.BarakaWayFavorites.refreshNav){window.BarakaWayFavorites.refreshNav();}document.dispatchEvent(new CustomEvent('barakaway:favorites:changed'));}
function syncGlobalFavorite(id,active){const x=findItem(id);if(!x)return;let arr=readGlobalFavorites();const gid=globalFavoriteKey(x);arr=arr.filter(v=>String(v.id)!==gid);if(active){arr.unshift({id:gid,title:x.n+' — '+x.title,url:window.location.pathname+'#'+x.id,text:x.ref+' • '+x.rep,type:'Azkar',addedAt:new Date().toISOString()});}writeGlobalFavorites(arr);}
function syncTopStates(){store.pageFavorite=store.favorites.size>0;store.pageSaved=store.saved.size>0;localStorage.setItem('adhkarPageFavorite',store.pageFavorite?'1':'0');localStorage.setItem('adhkarPageSaved',store.pageSaved?'1':'0');syncPageButtons();}
function openSavedFromTop(){
  const id=[...store.saved][0];
  if(!id){toast('Saqlangan joy tanlanmagan');return;}
  function go(){const el=document.getElementById(id);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});toast('Saqlangan joy ochildi');return true;}return false;}
  if(go()) return;
  state.category='all';
  state.query='';
  const search=document.getElementById('search');
  if(search) search.value='';
  renderAll();
  setTimeout(()=>{if(!go()) toast('Saqlangan joy topilmadi');},60);
}
function openFavoritesFromTop(){const arr=[...store.favorites].map(findItem).filter(Boolean);if(!arr.length){openList('favorites');return;}openList('favorites');}

function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('is-visible');clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>t.classList.remove('is-visible'),1800)}
function syncPageButtons(){document.querySelector('[data-action="favorite"]').classList.toggle('is-active',store.pageFavorite);document.querySelector('[data-action="save"]').classList.toggle('is-active',store.pageSaved);document.querySelector('[data-action="reading"]').classList.toggle('is-active',store.reading);document.documentElement.classList.toggle('reading-mode',store.reading)}
function itemMatches(x){const catOk = state.category==='all' || x.cats.includes(state.category); const q = state.query.trim().toLowerCase(); if(!q) return catOk; const blob=[x.n,x.title,x.ref,x.ar,x.tr,x.meaning,x.when,...x.cats].join(' ').toLowerCase(); return catOk && blob.includes(q);}
function renderNav(){const nav=document.getElementById('nav');nav.innerHTML=DATA.categories.map(([id,name])=>`<button class="nav-btn ${state.category===id?'is-active':''}" data-cat="${id}" type="button">${name}</button>`).join('');nav.querySelectorAll('[data-cat]').forEach(b=>b.addEventListener('click',()=>{state.category=b.dataset.cat;renderAll();}));}
function renderPanel(){const current=DATA.categories.find(x=>x[0]===state.category)||DATA.categories[0];document.getElementById('panelTitle').textContent=current[1];document.getElementById('panelIntro').textContent=DATA.intros[state.category]||'';}
function cardHtml(x,idx,total){const chips = [...x.cats.map(c=>({'morning':'ertalab','evening':'kechqurun','after_prayer':'namozdan keyin','before_sleep':'uyqudan oldin','general':'umumiy'}[c]||c)), x.rep].filter(Boolean);return `<article class="card" id="${esc(x.id)}" data-id="${esc(x.id)}"><div class="card-head"><div class="idx">${idx+1}/${total}</div><div class="meta"><h2 class="title">${esc(x.title)}</h2><div class="ref">${esc(x.ref)}</div><div class="rep">${esc(x.rep)}</div></div></div><div class="ar">${esc(x.ar)}</div><div class="label layer-translit-label">Transkripsiya</div><p class="translit">${esc(x.tr)}</p><div class="label layer-meaning-label">Tarjima</div><p class="meaning">${esc(x.meaning)}</p><div class="label when-label">Qachon o‘qiladi</div><p class="when">${esc(x.when)}</p><div class="chips">${chips.map(c=>`<span class="chip">${esc(c)}</span>`).join('')}</div><div class="card-actions" aria-label="Amallar"><button class="card-action ${store.favorites.has(x.id)?'is-active':''}" data-card-action="favorite" data-id="${esc(x.id)}" aria-label="Sevimli" type="button"><svg viewBox="0 0 24 24"><path d="M12 3.6l2.45 5.05 5.55.8-4.02 3.92.95 5.53L12 16.3l-4.93 2.6.95-5.53L4 9.45l5.55-.8L12 3.6z"></path></svg></button><button class="card-action ${store.saved.has(x.id)?'is-active':''}" data-card-action="save" data-id="${esc(x.id)}" aria-label="Joyni saqlash" type="button"><svg viewBox="0 0 24 24"><path d="M6 4.5A1.5 1.5 0 0 1 7.5 3h9A1.5 1.5 0 0 1 18 4.5V21l-6-3.5L6 21V4.5z"></path></svg></button><button class="card-action" data-card-action="share" data-id="${esc(x.id)}" aria-label="Ulashish" type="button"><svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><path d="M8.7 10.7l6.6-4.4M8.7 13.3l6.6 4.4"></path></svg></button></div></article>`;}
function renderGrid(){const grid=document.getElementById('grid');const rows=DATA.items.filter(itemMatches);grid.innerHTML = rows.length ? rows.map((x,i)=>cardHtml(x,i,rows.length)).join('') : `<div class="empty">Bu qidiruv bo‘yicha hech narsa topilmadi.</div>`;grid.querySelectorAll('[data-card-action]').forEach(btn=>btn.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();const id=btn.dataset.id;const action=btn.dataset.cardAction;if(action==='favorite'){const willAdd=!store.favorites.has(id);willAdd?store.favorites.add(id):store.favorites.delete(id);persist();syncGlobalFavorite(id,willAdd);syncTopStates();renderGrid();toast(willAdd?'Sevimliga qo‘shildi':'Sevimlidan olib tashlandi')}if(action==='save'){const willAdd=!store.saved.has(id);store.saved.clear();if(willAdd)store.saved.add(id);persist();syncTopStates();renderGrid();toast(willAdd?'Joy saqlandi':'Saqlangan joy o‘chirildi')}if(action==='share') shareItem(id);}));}
function renderAll(){renderNav();renderPanel();renderGrid();syncPageButtons();}
function findItem(id){return DATA.items.find(x=>x.id===id)}
async function nativeShare(text){if(navigator.share){try{await navigator.share({title:'Azkarlar — BarakaWay',text});return true}catch(e){return false}}return false}
async function copyText(text){try{await navigator.clipboard.writeText(text);toast('Matn nusxalandi');}catch(e){toast('Matnni qo‘lda nusxalang')}}
function shareItem(id){const x=findItem(id);if(!x)return;const text=`${x.title}\n\n${x.ar}\n\n${x.tr}\n\n${x.meaning}\n\n${x.when}`;openModal('Ulashish',`<div class="share-card"><div class="share-bismillah">بِسْمِ ٱللَّٰهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</div><div class="share-main">${esc(x.title)}</div><div class="share-sub">${esc(x.ref)} • ${esc(x.rep)}</div><div class="share-arabic">${esc(x.ar)}</div><div class="share-actions"><button class="share-button" id="shareNative" type="button">Ulashish</button><button class="share-button secondary" id="copyShare" type="button">Nusxalash</button></div></div>`);document.getElementById('shareNative').onclick=async()=>{const ok=await nativeShare(text);if(!ok) copyText(text)};document.getElementById('copyShare').onclick=()=>copyText(text)}
function openList(kind){const set = kind==='favorites'?store.favorites:store.saved;const title = kind==='favorites'?'Sevimli':'Saqlanganlar';const arr=[...set].map(findItem).filter(Boolean);const body = arr.length ? `<div class="list">${arr.map(x=>`<div class="list-item"><div><div class="list-title">${esc(x.n)} — ${esc(x.title)}</div><div class="list-meta">${esc(x.ref)} • ${esc(x.rep)}</div></div><button class="share-button secondary" data-go="${esc(x.id)}" type="button">Ochish</button></div>`).join('')}</div>` : `<div class="empty">Bu yerda hozircha hech narsa yo‘q.</div>`;openModal(title,body);document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{closeModal();document.getElementById(b.dataset.go)?.scrollIntoView({behavior:'smooth',block:'center'});});}
function openModal(title,body){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=body;document.getElementById('modal').classList.add('is-visible');}
function closeModal(){document.getElementById('modal').classList.remove('is-visible');}
function initTheme(){const saved=localStorage.getItem('theme');if(saved==='light'||saved==='dark'){document.documentElement.classList.toggle('dark-mode',saved==='dark');document.documentElement.classList.toggle('light-mode',saved==='light');}else{document.documentElement.classList.add('dark-mode');}}
function toggleTheme(){const dark=!document.documentElement.classList.contains('dark-mode');document.documentElement.classList.toggle('dark-mode',dark);document.documentElement.classList.toggle('light-mode',!dark);localStorage.setItem('theme',dark?'dark':'light');toast(dark?'Qorong‘i mavzu':'Yorug‘ mavzu')}

function initLayerControls(){
  const saved=(()=>{try{return JSON.parse(localStorage.getItem('adhkarLayerPrefs')||'{}')}catch(e){return {}}})();
  const defaults={arabic:true,translit:true,meaning:true};
  const prefs=Object.assign(defaults,saved||{});
  function apply(){
    document.documentElement.classList.toggle('hide-arabic',!prefs.arabic);
    document.documentElement.classList.toggle('hide-translit',!prefs.translit);
    document.documentElement.classList.toggle('hide-meaning',!prefs.meaning);
    localStorage.setItem('adhkarLayerPrefs',JSON.stringify(prefs));
  }
  document.querySelectorAll('[data-layer]').forEach(input=>{
    const key=input.dataset.layer;
    input.checked=!!prefs[key];
    input.addEventListener('change',()=>{prefs[key]=input.checked;apply();});
  });
  apply();
}

document.addEventListener('DOMContentLoaded',()=>{initTheme();initLayerControls();document.getElementById('search').addEventListener('input',e=>{state.query=e.target.value;renderGrid();});document.querySelectorAll('[data-action]').forEach(btn=>btn.addEventListener('click',async()=>{const a=btn.dataset.action;if(a==='favorite'){openFavoritesFromTop()}if(a==='save'){openSavedFromTop()}if(a==='reading'){store.reading=!store.reading;persist();syncPageButtons();toast(store.reading?'O‘qish rejimi yoqildi':'O‘qish rejimi o‘chirildi')}if(a==='theme'){toggleTheme()}if(a==='share'){const text='Azkarlar — BarakaWay. Ertalab va kechki azkarlar.';const ok=await nativeShare(text);if(!ok)copyText(text)}}));document.getElementById('modalClose').onclick=closeModal;document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});renderAll();syncTopStates();});
</script>
</body>
</html>
