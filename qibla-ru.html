<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кибла</title>
<style>

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#f5f7f8;
  color:#1f2a22;
  line-height:1.6;
}
.container{
  max-width:980px;
  margin:0 auto;
  background:#fff;
  padding:40px 28px 44px;
  box-shadow:0 6px 16px rgba(0,0,0,0.05);
}
h1{
  text-align:center;
  font-size:40px;
  margin:0 0 10px;
  letter-spacing:-0.02em;
}
.subtitle{
  text-align:center;
  color:#666;
  margin:0 0 22px;
  letter-spacing:1.2px;
  font-size:13px;
  text-transform:uppercase;
}
.hero{
  display:grid;
  grid-template-columns:1.15fr 0.85fr;
  gap:18px;
  margin-bottom:24px;
}
.panel{
  background:#f7faf8;
  border:1px solid #e3ece6;
  border-radius:20px;
  padding:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.03);
}
.section{ margin-top:28px; }
.section-title{
  font-size:24px;
  font-weight:800;
  margin:0 0 16px;
  padding-left:12px;
  border-left:4px solid #2d7a46;
}
.muted{ color:#5c6d63; }
.meta-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
  margin-top:14px;
}
.meta-item{
  background:#fff;
  border:1px solid #e5ece7;
  border-radius:16px;
  padding:14px;
}
.meta-label{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:1.1px;
  color:#6d7d74;
  margin-bottom:6px;
  font-weight:800;
}
.meta-value{
  font-size:16px;
  font-weight:700;
  color:#1f2a22;
}
.form-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}
.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.field label{
  font-size:12px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:1px;
  color:#64756b;
}
.input{
  width:100%;
  box-sizing:border-box;
  min-height:48px;
  border:1px solid #dfe7e1;
  border-radius:14px;
  padding:12px 14px;
  font-size:15px;
  color:#1f2a22;
  background:#fff;
  outline:none;
}
.input:focus{ border-color:#2d7a46; }
.btn-row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:14px;
}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:46px;
  padding:0 16px;
  border-radius:14px;
  border:1px solid #dfe7e1;
  background:#fff;
  color:#1f2a22;
  font-weight:800;
  font-size:14px;
  cursor:pointer;
}
.btn.primary{
  background:#2d7a46;
  color:#fff;
  border-color:#2d7a46;
}
.btn.secondary{
  background:#eef5f1;
  color:#2d7a46;
  border-color:#dfe9e3;
}
.badge-row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:14px;
}
.badge{
  display:inline-flex;
  align-items:center;
  min-height:34px;
  padding:6px 12px;
  border-radius:999px;
  border:1px solid #dfe9e3;
  background:#eef5f1;
  color:#2d7a46;
  font-size:12px;
  font-weight:800;
}
.badge.warn{
  background:#fff7e8;
  border-color:#f1dfb4;
  color:#8b5d00;
}
.badge.error{
  background:#fff0f0;
  border-color:#f0c7c7;
  color:#9d2e2e;
}
.qibla-stage{
  position:relative;
  min-height:480px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.compass-wrap{
  position:relative;
  width:360px;
  height:360px;
}
.compass-base{
  position:absolute;
  inset:0;
  border-radius:50%;
  background:radial-gradient(circle at center, #ffffff 0%, #f4faf6 55%, #e7f1eb 100%);
  border:1px solid #dfe9e3;
  box-shadow:inset 0 0 0 12px rgba(255,255,255,0.6), 0 14px 30px rgba(25,58,41,0.08);
}
.compass-ring{
  position:absolute;
  inset:18px;
  border:1px dashed #cfe0d5;
  border-radius:50%;
}
.compass-ring.secondary{
  inset:54px;
  border-style:solid;
  opacity:0.5;
}
.cardinal{
  position:absolute;
  left:50%;
  top:50%;
  transform-origin:center center;
  font-size:12px;
  font-weight:800;
  color:#61736a;
  letter-spacing:1px;
}
.cardinal.n{ transform:translate(-50%,-165px); }
.cardinal.e{ transform:translate(150px,-50%); }
.cardinal.s{ transform:translate(-50%,150px); }
.cardinal.w{ transform:translate(-165px,-50%); }
.direction-arrow{
  position:absolute;
  left:50%;
  top:50%;
  width:14px;
  height:170px;
  transform-origin:50% 86%;
  transform:translate(-50%,-86%) rotate(0deg);
  transition:transform 0.12s linear;
  will-change:transform;
}
.direction-arrow::before{
  content:"";
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:0;
  height:0;
  border-left:18px solid transparent;
  border-right:18px solid transparent;
  border-bottom:118px solid #2d7a46;
  filter:drop-shadow(0 10px 16px rgba(45,122,70,0.22));
}
.direction-arrow::after{
  content:"";
  position:absolute;
  bottom:-4px;
  left:50%;
  transform:translateX(-50%);
  width:26px;
  height:26px;
  background:#173224;
  border:5px solid #fff;
  border-radius:50%;
  box-shadow:0 4px 10px rgba(0,0,0,0.16);
}
.kaaba-dot{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:18px;
  height:18px;
  background:#2d7a46;
  border-radius:50%;
  box-shadow:0 0 0 10px rgba(45,122,70,0.14);
}
.precision-text{
  text-align:center;
  margin-top:18px;
  font-size:14px;
  color:#5d6f64;
}
.note-box{
  margin-top:14px;
  background:#f7faf8;
  border:1px solid #e4ece6;
  border-radius:16px;
  padding:16px;
  color:#52645a;
  font-size:14px;
}
.steps{
  display:grid;
  gap:12px;
}
.step{
  background:#fff;
  border:1px solid #e4ece6;
  border-radius:16px;
  padding:16px;
}
.step strong{
  display:block;
  margin-bottom:6px;
  font-size:15px;
}
.link{
  text-align:center;
  margin-top:38px;
}
.link a{
  color:#2d7a46;
  text-decoration:none;
  font-weight:800;
}
@media (max-width:900px){
  .hero{ grid-template-columns:1fr; }
}
@media (max-width:700px){
  .container{ padding:24px 14px 30px; }
  h1{ font-size:32px; }
  .subtitle{ font-size:12px; margin-bottom:18px; }
  .form-grid,.meta-grid{ grid-template-columns:1fr; }
  .btn-row .btn{ width:100%; }
  .qibla-stage{ min-height:360px; }
  .compass-wrap{ width:280px; height:280px; }
  .cardinal.n{ transform:translate(-50%,-128px); }
  .cardinal.e{ transform:translate(115px,-50%); }
  .cardinal.s{ transform:translate(-50%,115px); }
  .cardinal.w{ transform:translate(-130px,-50%); }
  .direction-arrow{ height:132px; }
  .direction-arrow::before{
    border-left-width:15px;
    border-right-width:15px;
    border-bottom-width:92px;
  }
}


@media (max-width:700px){
  .hero{ display:flex; flex-direction:column; }
  .qibla-stage{ order:-1; }
}

</style>

<body>
<div class="container">
  <h1>Кибла</h1>
  <div class="hero">
    <div class="panel">
      <div class="form-grid">
        <div class="field">
          <label for="countryInput">Страна</label>
          <input id="countryInput" class="input" placeholder="Например: Uzbekistan">
        </div>
        <div class="field">
          <label for="cityInput">Город</label>
          <input id="cityInput" class="input" list="citySuggestions" placeholder="Например: Tashkent">
          <datalist id="citySuggestions"></datalist>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn primary" id="searchCityBtn">Найти по городу</button>
        <button class="btn secondary" id="detectBtn">Определить автоматически</button>
        <button class="btn" id="resetHeadingBtn">Сбросить направление</button>
      </div>

      <div class="meta-grid">
        <div class="meta-item">
          <div class="meta-label">Локация</div>
          <div class="meta-value" id="locationName">Страница Киблы</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Координаты</div>
          <div class="meta-value" id="coordsText">—</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Направление к Каабе</div>
          <div class="meta-value" id="qiblaAngleText">—</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Примерная дистанция</div>
          <div class="meta-value" id="distanceText">—</div>
        </div>
      </div>

      <div class="badge-row">
        <span class="badge" id="sensorBadge">Живое направление киблы</span>
        <span class="badge warn" id="hintBadge">Стрелка обновляется при движении телефона и всегда показывает сторону Киблы</span>
      </div>

      </div>

    <div class="panel qibla-stage">
      <div class="compass-wrap">
        <div class="compass-base"></div>
        <div class="compass-ring"></div>
        <div class="compass-ring secondary"></div>

        <div class="cardinal n">N</div>
        <div class="cardinal e">E</div>
        <div class="cardinal s">S</div>
        <div class="cardinal w">W</div>

        <div class="direction-arrow" id="qiblaArrow"></div>
        <div class="kaaba-dot"></div>
      </div>
    </div>
  </div>

  <div class="link"><a href="home-ru.html">Вернуться на главную</a></div>
</div>

<script>
const UI = {"status_default": "Ожидает локацию", "status_sensor": "Датчик направления активен", "status_manual": "Ручной режим", "not_supported": "Датчик направления не поддерживается", "need_permission": "На iPhone может потребоваться разрешение на доступ к датчику движения", "unknown": "Не выбрано", "detect_error": "Не удалось определить локацию", "city_required": "Укажи и страну, и город.", "load_error": "Не удалось загрузить локацию по городу", "accuracy_good": "Компас активен · высокая точность", "accuracy_medium": "Компас активен · средняя точность", "accuracy_low": "Компас активен · нужна калибровка", "tilt_hint": "Держи телефон вертикально и подальше от металла и магнитов", "calibration_hint": "Если стрелка врёт — сделай калибровку компаса движением “восьмёрка” и повернись корпусом", "geolocation_accuracy": "Точность GPS", "heading_unavailable": "На этом устройстве нет надёжного компаса. Показывается статическое направление киблы"};

const state = {
  lat: localStorage.getItem('qibla_lat') || '',
  lon: localStorage.getItem('qibla_lon') || '',
  city: localStorage.getItem('qibla_city') || '',
  country: localStorage.getItem('qibla_country') || '',
  locationName: localStorage.getItem('qibla_location_name') || '',
  headingOffset: 0,
  lastHeading: null,
  lastRawHeading: null,
  lastCompassAccuracy: null,
  deviceOrientationAttached: false,
  smoothHeading: null,
  animationFrame: null,
  targetArrowAngle: null,
  lastOrientationSource: null,
  geolocationAccuracy: null,
  watchId: null
};

function toRadians(deg) { return deg * Math.PI / 180; }
function toDegrees(rad) { return rad * 180 / Math.PI; }

function computeQibla(lat, lon) {
  const kaabaLat = 21.4225;
  const kaabaLon = 39.8262;
  const phi1 = toRadians(lat);
  const phi2 = toRadians(kaabaLat);
  const dLon = toRadians(kaabaLon - lon);

  const y = Math.sin(dLon);
  const x = Math.cos(phi1) * Math.tan(phi2) - Math.sin(phi1) * Math.cos(dLon);

  let bearing = toDegrees(Math.atan2(y, x));
  bearing = (bearing + 360) % 360;

  const R = 6371;
  const dLat = toRadians(kaabaLat - lat);
  const dLon2 = toRadians(kaabaLon - lon);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(phi1) * Math.cos(phi2) * Math.sin(dLon2 / 2) ** 2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  const distanceKm = R * c;

  return { bearing, distanceKm };
}

function setLocationUI() {
  const name = state.locationName || UI.unknown;
  document.getElementById('locationName').textContent = name;
  if (state.lat && state.lon) {
    document.getElementById('coordsText').textContent = `${Number(state.lat).toFixed(4)}, ${Number(state.lon).toFixed(4)}`;
    const q = computeQibla(Number(state.lat), Number(state.lon));
    document.getElementById('qiblaAngleText').textContent = q.bearing.toFixed(1) + '°';
    const geoText = state.geolocationAccuracy != null ? ` · ${UI.geolocation_accuracy}: ±${Math.round(state.geolocationAccuracy)} м` : '';
    document.getElementById('distanceText').textContent = Math.round(q.distanceKm).toLocaleString() + ' km' + geoText;
    rotateStaticQibla(q.bearing);
  } else {
    document.getElementById('coordsText').textContent = '—';
    document.getElementById('qiblaAngleText').textContent = '—';
    document.getElementById('distanceText').textContent = '—';
  }
}

function renderArrow(angle) {
  const arrow = document.getElementById('qiblaArrow');
  arrow.style.transform = `translate(-50%,-86%) rotate(${angle}deg)`;
}

function rotateStaticQibla(bearing) {
  state.targetArrowAngle = bearing;
  renderArrow(bearing);
}

function saveLocation() {
  localStorage.setItem('qibla_lat', state.lat || '');
  localStorage.setItem('qibla_lon', state.lon || '');
  localStorage.setItem('qibla_city', state.city || '');
  localStorage.setItem('qibla_country', state.country || '');
  localStorage.setItem('qibla_location_name', state.locationName || '');
}

function alertMsg(msg) {
  alert(msg);
}

async function suggestCities() {
  const city = document.getElementById('cityInput').value.trim();
  const country = document.getElementById('countryInput').value.trim();
  if (city.length < 3) return;
  try {
    const query = [city, country].filter(Boolean).join(', ');
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&limit=6&q=${encodeURIComponent(query)}`);
    const data = await res.json();
    const datalist = document.getElementById('citySuggestions');
    datalist.innerHTML = '';
    data.forEach(item => {
      const option = document.createElement('option');
      option.value = item.name || item.display_name;
      option.label = item.display_name;
      datalist.appendChild(option);
    });
  } catch (_) {}
}

async function searchByCity() {
  const city = document.getElementById('cityInput').value.trim();
  const country = document.getElementById('countryInput').value.trim();
  if (!city || !country) {
    alertMsg(UI.city_required);
    return;
  }
  try {
    const query = encodeURIComponent([city, country].join(', '));
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q=${query}`);
    const data = await res.json();
    if (!data || !data.length) throw new Error('Not found');
    const item = data[0];
    state.lat = item.lat;
    state.lon = item.lon;
    state.city = city;
    state.country = country;
    state.locationName = `${city}, ${country}`;
    state.geolocationAccuracy = null;
    saveLocation();
    setLocationUI();
    await initOrientationIfPossible();
    document.getElementById('sensorBadge').textContent = UI.status_manual;
    document.getElementById('sensorBadge').className = 'badge';
  } catch (e) {
    alertMsg(UI.load_error);
  }
}


function normalizeAngle(angle) {
  let a = angle % 360;
  if (a < 0) a += 360;
  return a;
}

function shortestAngleDelta(from, to) {
  let diff = normalizeAngle(to) - normalizeAngle(from);
  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;
  return diff;
}

function getScreenOrientationAngle() {
  if (screen.orientation && typeof screen.orientation.angle === 'number') {
    return screen.orientation.angle;
  }
  if (typeof window.orientation === 'number') {
    return window.orientation;
  }
  return 0;
}

function getHeadingFromEvent(event) {
  if (typeof event.webkitCompassHeading === 'number') {
    state.lastOrientationSource = 'webkitCompassHeading';
    state.lastCompassAccuracy = typeof event.webkitCompassAccuracy === 'number' ? event.webkitCompassAccuracy : null;
    return normalizeAngle(event.webkitCompassHeading);
  }

  if (typeof event.alpha === 'number') {
    if (event.absolute === false && event.type !== 'deviceorientationabsolute') {
      return null;
    }
    const screenAngle = getScreenOrientationAngle();
    state.lastOrientationSource = event.type === 'deviceorientationabsolute' ? 'deviceorientationabsolute' : 'deviceorientation';
    state.lastCompassAccuracy = null;
    return normalizeAngle(360 - event.alpha - screenAngle);
  }

  return null;
}

function updateSensorBadge() {
  const badge = document.getElementById('sensorBadge');
  const hint = document.getElementById('hintBadge');

  if (state.lastHeading == null) {
    badge.textContent = UI.heading_unavailable;
    badge.className = 'badge warn';
    hint.textContent = UI.calibration_hint;
    return;
  }

  if (typeof state.lastCompassAccuracy === 'number') {
    if (state.lastCompassAccuracy <= 15) {
      badge.textContent = UI.accuracy_good;
      badge.className = 'badge';
    } else if (state.lastCompassAccuracy <= 35) {
      badge.textContent = UI.accuracy_medium;
      badge.className = 'badge warn';
    } else {
      badge.textContent = UI.accuracy_low;
      badge.className = 'badge error';
    }
  } else {
    badge.textContent = UI.status_sensor;
    badge.className = 'badge';
  }

  hint.textContent = UI.tilt_hint;
}

function handleOrientation(event) {
  if (!state.lat || !state.lon) return;
  const rawHeading = getHeadingFromEvent(event);
  if (rawHeading == null || Number.isNaN(rawHeading)) return;

  const tooFlat = typeof event.beta === 'number' && typeof event.gamma === 'number' &&
    Math.abs(event.beta) > 75 && Math.abs(event.gamma) < 20;

  if (tooFlat) {
    document.getElementById('hintBadge').textContent = UI.tilt_hint;
    document.getElementById('hintBadge').className = 'badge warn';
  } else {
    document.getElementById('hintBadge').textContent = UI.calibration_hint;
    document.getElementById('hintBadge').className = 'badge warn';
  }

  if (state.smoothHeading == null) {
    state.smoothHeading = rawHeading;
  } else {
    const delta = shortestAngleDelta(state.smoothHeading, rawHeading);
    state.smoothHeading = normalizeAngle(state.smoothHeading + delta * 0.12);
  }

  state.lastRawHeading = rawHeading;
  state.lastHeading = state.smoothHeading;

  const q = computeQibla(Number(state.lat), Number(state.lon));
  const relative = normalizeAngle(q.bearing - state.smoothHeading + state.headingOffset);
  state.targetArrowAngle = relative;

  updateSensorBadge();
}

function animateArrow() {
  if (state.targetArrowAngle != null) {
    const arrow = document.getElementById('qiblaArrow');
    const current = arrow.dataset.currentAngle ? Number(arrow.dataset.currentAngle) : state.targetArrowAngle;
    const delta = shortestAngleDelta(current, state.targetArrowAngle);
    const next = normalizeAngle(current + delta * 0.22);
    arrow.dataset.currentAngle = String(next);
    renderArrow(next);
  }
  state.animationFrame = requestAnimationFrame(animateArrow);
}

async function initOrientationIfPossible() {
  try {
    if (typeof DeviceOrientationEvent === 'undefined') {
      document.getElementById('sensorBadge').textContent = UI.not_supported;
      document.getElementById('sensorBadge').className = 'badge error';
      return;
    }

    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      const result = await DeviceOrientationEvent.requestPermission();
      if (result !== 'granted') {
        document.getElementById('sensorBadge').textContent = UI.need_permission;
        document.getElementById('sensorBadge').className = 'badge warn';
        return;
      }
    }

    if (!state.deviceOrientationAttached) {
      window.addEventListener('deviceorientationabsolute', handleOrientation, true);
      window.addEventListener('deviceorientation', handleOrientation, true);
      window.addEventListener('orientationchange', () => {
        state.smoothHeading = null;
      }, true);
      state.deviceOrientationAttached = true;
    }

    if (!state.animationFrame) {
      state.animationFrame = requestAnimationFrame(animateArrow);
    }

    updateSensorBadge();
  } catch (_) {
    document.getElementById('sensorBadge').textContent = UI.not_supported;
    document.getElementById('sensorBadge').className = 'badge error';
  }
}

async function detectLocation() {
  if (!navigator.geolocation) {
    alertMsg(UI.detect_error);
    return;
  }

  const onSuccess = async (pos) => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    state.lat = String(lat);
    state.lon = String(lon);
    state.geolocationAccuracy = typeof pos.coords.accuracy === 'number' ? pos.coords.accuracy : null;

    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
      const data = await res.json();
      const addr = data.address || {};
      const city = addr.city || addr.town || addr.village || addr.county || '';
      const country = addr.country || '';
      state.city = city;
      state.country = country;
      state.locationName = [city, country].filter(Boolean).join(', ') || UI.unknown;
      document.getElementById('cityInput').value = city;
      document.getElementById('countryInput').value = country;
    } catch (_) {
      state.locationName = UI.unknown;
    }

    saveLocation();
    setLocationUI();
    await initOrientationIfPossible();
  };

  navigator.geolocation.getCurrentPosition(onSuccess, () => {
    alertMsg(UI.detect_error);
  }, {
    enableHighAccuracy: true,
    timeout: 15000,
    maximumAge: 0
  });

  if (state.watchId == null && navigator.geolocation.watchPosition) {
    state.watchId = navigator.geolocation.watchPosition(onSuccess, () => {}, {
      enableHighAccuracy: true,
      timeout: 15000,
      maximumAge: 3000
    });
  }
}

function resetDirection() {
  state.headingOffset = 0;
  state.smoothHeading = null;
  if (state.lat && state.lon) {
    const q = computeQibla(Number(state.lat), Number(state.lon));
    const base = state.lastHeading == null ? q.bearing : normalizeAngle(q.bearing - state.lastHeading);
    state.targetArrowAngle = base;
    renderArrow(base);
    document.getElementById('hintBadge').textContent = UI.calibration_hint;
    alertMsg('Компас сброшен. Для максимальной точности откалибруй телефон движением “восьмёрка”.');
  }
}

function bootstrap() {
  document.getElementById('cityInput').addEventListener('input', suggestCities);
  document.getElementById('searchCityBtn').addEventListener('click', searchByCity);
  document.getElementById('detectBtn').addEventListener('click', detectLocation);
  document.getElementById('resetHeadingBtn').addEventListener('click', resetDirection);

  document.getElementById('cityInput').value = state.city || '';
  document.getElementById('countryInput').value = state.country || '';
  setLocationUI();
  if (state.lat && state.lon) {
    setLocationUI();
    initOrientationIfPossible();
  }
}

bootstrap();
</script>
</body>
</html>
