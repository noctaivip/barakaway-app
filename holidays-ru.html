function selectPersonalText(category,name){const tpl=personalizedTemplates[category]||personalizedTemplates.jumuah;const list=tpl.texts||[];const seed=String(name||"").split("").reduce(function(sum,ch){return sum+ch.charCodeAt(0);},0)+Math.floor(Date.now()/60000);const index=list.length?seed%list.length:0;return list[index]?list[index](name):name+", пусть Аллах дарует вам благо, защиту и баракат.";}
function getNextPersonalImage(){let index=parseInt(localStorage.getItem("barakaway_personal_card_index")||"0",10);if(!Number.isFinite(index)||index<0)index=0;const image=PERSONAL_CARD_IMAGES[index%PERSONAL_CARD_IMAGES.length];localStorage.setItem("barakaway_personal_card_index",String((index+1)%PERSONAL_CARD_IMAGES.length));return image;}
let currentGreeting=greetings[0];
function saveName(){localStorage.setItem("barakaway_greeting_name",(document.getElementById("generatorName").value||"").trim());}
function loadName(){document.getElementById("generatorName").value=localStorage.getItem("barakaway_greeting_name")||"";}
function isFriday(){return new Date().getDay()===5;}
function orderedGreetings(){if(!isFriday())return greetings;return greetings.slice().sort(function(a,b){if(a.category==="jumuah"&&b.category!=="jumuah")return -1;if(a.category!=="jumuah"&&b.category==="jumuah")return 1;return 0;});}
function getTodayGreeting(){const list=orderedGreetings();const dayIndex=Math.floor(Date.now()/86400000);return list[dayIndex%list.length]||greetings[0];}
function updateToday(){return;}
function renderCards(filter){const root=document.getElementById("cards");const list=orderedGreetings().filter(function(item){return filter==="all"||item.category===filter;});root.innerHTML=list.map(function(item){return `<article class="greeting-card" data-category="${item.category}"><div class="card-art"><img class="card-image" src="${item.image}" alt="${item.title}" loading="lazy"><div class="card-image-overlay"></div><div class="card-brand-badge"><img src="${LOGO_PATH}" alt="BarakaWay"></div><div class="card-category-badge">${item.label}</div><div class="card-site-mark">barakaway.app</div></div><div class="card-body"><h3 class="card-title">${item.title}</h3><p class="card-text">${item.text}</p></div><div class="card-actions"><button class="action-btn" type="button" onclick="openCard('${item.id}')">Zoom</button><button class="action-btn" type="button" onclick="copyCard('${item.id}')">Копировать</button><button class="action-btn primary" type="button" onclick="shareCard('${item.id}')">Поделиться</button></div></article>`;}).join("");}
function findGreeting(id){return greetings.find(function(item){return item.id===id;})||greetings[0];}
function generatePersonal(){saveName();const name=(document.getElementById("generatorName").value||"").trim()||"Дорогой брат / дорогая сестра";const cat=document.getElementById("generatorCategory").value;const tpl=personalizedTemplates[cat]||personalizedTemplates.jumuah;currentGreeting={id:"personal",category:cat,label:tpl.label,title:tpl.title,text:selectPersonalText(cat,name),image:getNextPersonalImage(),personalName:name};openModal(currentGreeting);}
function openTodayCard(){currentGreeting=getTodayGreeting();openModal(currentGreeting);}
function openCard(id){currentGreeting=findGreeting(id);openModal(currentGreeting);}
function copyCard(id){copyText(formatShareText(findGreeting(id)));}
function shareCard(id){currentGreeting=findGreeting(id);shareCurrent();}
function formatShareText(g){return "Скачать приложение BarakaWay — Коран, Азкары, Зикры, Дуа, Кибла и исламские материалы.\n\nhttps://barakaway.app";}

function wrapCanvasText(ctx,text,x,y,maxWidth,lineHeight,maxLines){const words=String(text||"").split(/\s+/);let line="",lines=[];for(let i=0;i<words.length;i++){const test=line+words[i]+" ";if(ctx.measureText(test).width>maxWidth&&i>0){lines.push(line.trim());line=words[i]+" ";}else{line=test;}}if(line.trim())lines.push(line.trim());if(maxLines&&lines.length>maxLines){lines=lines.slice(0,maxLines);lines[lines.length-1]=lines[lines.length-1].replace(/[.,;:!?]*$/,"")+"…";}lines.forEach(function(l,i){ctx.fillText(l,x,y+i*lineHeight);});}

function drawRoundRect(ctx,x,y,w,h,r){const radius=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+radius,y);ctx.arcTo(x+w,y,x+w,y+h,radius);ctx.arcTo(x+w,y+h,x,y+h,radius);ctx.arcTo(x,y+h,x,y,radius);ctx.arcTo(x,y,x+w,y,radius);ctx.closePath();}
function loadCanvasImage(src){return new Promise(function(resolve,reject){const img=new Image();img.onload=function(){resolve(img)};img.onerror=reject;img.src=src;});}
async function drawImageCardToCanvas(g){const canvas=document.getElementById("previewCanvas");const ctx=canvas.getContext("2d");const w=canvas.width,h=canvas.height;ctx.clearRect(0,0,w,h);ctx.fillStyle="#0c120e";ctx.fillRect(0,0,w,h);try{const img=await loadCanvasImage(g.image);const scale=Math.max(w/img.width,h/img.height);const sw=w/scale,sh=h/scale;const sx=(img.width-sw)/2,sy=(img.height-sh)/2;ctx.drawImage(img,sx,sy,sw,sh,0,0,w,h);}catch(e){const grad=ctx.createLinearGradient(0,0,w,h);grad.addColorStop(0,"#082216");grad.addColorStop(.5,"#1e6c42");grad.addColorStop(1,"#d7b56d");ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);}
const bottom=ctx.createLinearGradient(0,h*.76,0,h);bottom.addColorStop(0,"rgba(0,0,0,0)");bottom.addColorStop(.78,"rgba(0,0,0,.46)");bottom.addColorStop(1,"rgba(0,0,0,.62)");ctx.fillStyle=bottom;ctx.fillRect(0,0,w,h);
ctx.strokeStyle="rgba(243,217,146,.78)";ctx.lineWidth=7;drawRoundRect(ctx,34,34,w-68,h-68,36);ctx.stroke();
try{const logo=await loadCanvasImage(LOGO_PATH);ctx.save();drawRoundRect(ctx,58,58,112,112,30);ctx.clip();ctx.drawImage(logo,58,58,112,112);ctx.restore();ctx.strokeStyle="rgba(243,217,146,.70)";ctx.lineWidth=3;drawRoundRect(ctx,58,58,112,112,30);ctx.stroke();}catch(e){}
ctx.textAlign="center";ctx.textBaseline="alphabetic";
if(g.id==="personal"){
ctx.save();
ctx.fillStyle="rgba(0,0,0,.30)";drawRoundRect(ctx,96,385,w-192,430,34);ctx.fill();
ctx.shadowColor="rgba(0,0,0,.82)";ctx.shadowBlur=18;
ctx.fillStyle="#fff8e8";ctx.font="700 46px system-ui, Arial";
wrapCanvasText(ctx,g.text,w/2,485,w-260,64,6);
ctx.restore();
}
ctx.fillStyle="rgba(255,238,190,.96)";ctx.font="800 30px system-ui, Arial";ctx.fillText("BarakaWay App",w/2,h-92);ctx.fillStyle="rgba(255,238,190,.82)";ctx.font="650 25px system-ui, Arial";ctx.fillText("barakaway.app",w/2,h-54);return canvas;}
async function openModal(g){currentGreeting=g;await drawImageCardToCanvas(g);document.getElementById("modal").classList.add("open");document.getElementById("modal").setAttribute("aria-hidden","false");}
function closeModal(){document.getElementById("modal").classList.remove("open");document.getElementById("modal").setAttribute("aria-hidden","true");}
function canvasToBlob(canvas){return new Promise(function(resolve){canvas.toBlob(function(blob){resolve(blob);},"image/png",.96);});}

async function shareCurrent(){
const canvas=await drawImageCardToCanvas(currentGreeting);
const text=formatShareText(currentGreeting);
try{
const blob=await canvasToBlob(canvas);
const file=new File([blob],"barakaway-greeting.png",{type:"image/png"});
if(navigator.canShare&&navigator.canShare({files:[file]})){
await navigator.share({title:currentGreeting.title,text:text,files:[file]});
return;
}
if(navigator.share){
await navigator.share({title:currentGreeting.title,text:text});
return;
}
}catch(e){}
showToast("Поделиться недоступно на этом устройстве");
}

function copyCurrent(){copyText(formatShareText(currentGreeting));}
function copyText(text){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){showToast("Текст скопирован");}).catch(function(){fallbackCopy(text);});}else{fallbackCopy(text);}}
function fallbackCopy(text){const area=document.createElement("textarea");area.value=text;document.body.appendChild(area);area.select();document.execCommand("copy");area.remove();showToast("Текст скопирован");}
async function downloadCurrent(){const canvas=await drawImageCardToCanvas(currentGreeting);const a=document.createElement("a");a.href=canvas.toDataURL("image/png");a.download="barakaway-greeting.png";document.body.appendChild(a);a.click();a.remove();}
function showToast(message){const toast=document.getElementById("toast");toast.textContent=message;toast.classList.add("show");setTimeout(function(){toast.classList.remove("show");},1800);}
document.addEventListener("DOMContentLoaded",function(){loadName();updateToday();renderCards("jumuah");document.getElementById("generatorName").addEventListener("input",saveName);document.querySelectorAll(".tab").forEach(function(btn){btn.addEventListener("click",function(){document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("active");});btn.classList.add("active");renderCards(btn.getAttribute("data-filter"));});});document.getElementById("modal").addEventListener("click",function(e){if(e.target.id==="modal")closeModal();});});
