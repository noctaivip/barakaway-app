<!DOCTYPE html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Избранное — BarakaWay</title><link href="/favicon.png" rel="icon" type="image/png"><link href="/theme.css" rel="stylesheet"><link href="/theme-universal.css" rel="stylesheet"><style>body{margin:0;font-family:system-ui;background:#101418;color:#e9eef3;line-height:1.6;padding-bottom:110px}a{color:inherit}.page{max-width:850px;margin:auto;padding:34px 22px}.hero{border-radius:30px;padding:26px 22px;background:linear-gradient(135deg,#111a23,#182632 55%,#163228);border:1px solid rgba(102,198,128,.24);box-shadow:0 18px 38px rgba(0,0,0,.25)}.kicker{font-size:11px;font-weight:950;letter-spacing:.16em;text-transform:uppercase;color:#d7c07a;margin-bottom:8px}.hero h1{margin:0;font-size:34px;line-height:1.05;letter-spacing:-.05em}.hero p{margin:12px 0 0;color:#b9c8c0;font-weight:700}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:22px}.card{border-radius:24px;padding:18px;text-decoration:none;background:linear-gradient(135deg,#151f29,#18212b 55%,#162a25);border:1px solid rgba(96,147,120,.25);box-shadow:0 12px 24px rgba(0,0,0,.20)}.icon{width:42px;height:42px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:rgba(215,192,122,.12);font-size:22px;margin-bottom:14px}.title{font-size:18px;font-weight:950;letter-spacing:-.035em}.text{font-size:13px;color:#aebbb5;font-weight:700;margin-top:6px}.empty{margin-top:22px;padding:20px;border-radius:24px;background:#151d25;border:1px dashed rgba(215,192,122,.28);color:#b9c8c0;font-weight:700}@media(max-width:700px){.hero h1{font-size:28px}.grid{grid-template-columns:1fr}.page{padding:24px 16px}}


/* Light mode fix: favorites hero must not keep the dark card background */
html.light-mode .hero,
body.light-mode .hero{
  background:linear-gradient(135deg,#ffffff 0%,#f7fbf8 58%,#eef7f1 100%) !important;
  border:1.5px solid rgba(143,182,155,.58) !important;
  box-shadow:0 18px 42px rgba(33,58,41,.10), inset 0 1px 0 rgba(255,255,255,.96) !important;
  color:#142019 !important;
}

html.light-mode .hero h1,
body.light-mode .hero h1{
  color:#142019 !important;
}

html.light-mode .hero p,
body.light-mode .hero p{
  color:#405248 !important;
}

.card{position:relative}.card-link{display:block;text-decoration:none;color:inherit}.remove{position:absolute;top:14px;right:14px;z-index:3;width:36px;height:36px;border-radius:999px;border:1px solid rgba(215,192,122,.34);background:rgba(215,192,122,.10);color:#f0d891;font-size:20px;font-weight:950;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}.remove:hover{background:rgba(215,192,122,.20)}html.light-mode .remove{background:#fff8df!important;border-color:#d8c783!important;color:#6d550b!important}html.light-mode .remove:hover{background:#fff1bf!important}</style>
<script src="/theme-init.js"></script>
<link rel="stylesheet" href="/theme.css">
<link rel="stylesheet" href="/theme-universal.css">
</head><body><main class="page"><section class="hero"><div class="kicker">Личное пространство</div><h1>Избранное</h1><p>Все сохранённые суры, аскары, статьи и имена Аллаха будут собираться здесь для ежедневного чтения.</p></section><section class="empty" id="favoritesEmpty">Здесь будут собираться материалы, которые пользователь отметил звёздочкой: суры, аскары, статьи, имена Аллаха и другие полезные страницы.</section><section class="grid" id="favoritesGrid" style="margin-top:14px"></section><script>(function(){
  var KEY='barakaway_favorites_v1';

  function safe(value){
    return String(value==null?'':value)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  function read(){
    try{
      var parsed=JSON.parse(localStorage.getItem(KEY)||'[]');
      return Array.isArray(parsed)?parsed.filter(Boolean):[];
    }catch(e){
      return [];
    }
  }

  function write(list){
    try{localStorage.setItem(KEY,JSON.stringify(Array.isArray(list)?list:[]));}catch(e){}
    try{document.dispatchEvent(new CustomEvent('barakaway:favorites:changed'));}catch(e){}
  }

  function itemId(x){
    return String((x && x.id) || ((x && x.url || '') + '::' + (x && x.title || '')));
  }

  function render(){
    var grid=document.getElementById('favoritesGrid');
    var empty=document.getElementById('favoritesEmpty');
    var list=read();

    if(!list.length){
      empty.style.display='';
      grid.innerHTML='';
      return;
    }

    empty.style.display='none';
    grid.innerHTML=list.map(function(x){
      var id=safe(itemId(x));
      var url=safe(x.url||'#');
      var title=safe(x.title||'Избранное');
      var text=safe(x.text||x.type||'Сохранённый материал');
      return '<div class="card" data-id="'+id+'">'+
        '<button class="remove" type="button" data-remove-id="'+id+'" aria-label="Удалить из избранного">×</button>'+
        '<a class="card-link" href="'+url+'">'+
        '<div class="icon">💛</div>'+
        '<div class="title">'+title+'</div>'+
        '<div class="text">'+text+'</div>'+
        '</a>'+
      '</div>';
    }).join('');
  }

  document.addEventListener('click',function(e){
    var btn=e.target && e.target.closest ? e.target.closest('[data-remove-id]') : null;
    if(!btn) return;
    e.preventDefault();
    e.stopPropagation();
    var id=btn.getAttribute('data-remove-id');
    var next=read().filter(function(x){return itemId(x)!==id;});
    write(next);
    render();
  });

  render();
})();</script><section class="grid"></section></main><script src="/bottom-nav.js"></script></body></html>
