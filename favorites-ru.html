</head><body><main class="page"><section class="hero"><div class="kicker">Личное пространство</div><h1>Избранное</h1><p>Все сохранённые суры, аскары, статьи и имена Аллаха будут собираться здесь для ежедневного чтения.</p></section><section class="empty" id="favoritesEmpty">Здесь будут собираться материалы, которые пользователь отметил звёздочкой: суры, аскары, статьи, имена Аллаха и другие полезные страницы.</section><section class="grid" id="favoritesGrid" style="margin-top:14px"></section><script>
(function(){
  var KEY='barakaway_favorites_v1';
  var CURRENT_LANG='ru';
  var TEXT={fav:'Избранное',saved:'сохранено',savedMaterial:'Сохранённый материал',dua:'Дуа',remove:'Удалить из избранного'};
  var pageCache={};

  function safe(value){
    return String(value == null ? '' : value)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  function read(){
    try{
      var parsed=JSON.parse(localStorage.getItem(KEY)||'[]');
      return Array.isArray(parsed)?parsed.filter(Boolean):[];
    }catch(e){return [];}
  }

  function write(list){
    try{localStorage.setItem(KEY,JSON.stringify(Array.isArray(list)?list:[]));}catch(e){}
    try{document.dispatchEvent(new CustomEvent('barakaway:favorites:changed'));}catch(e){}
    if(window.BarakaWayFavorites&&typeof window.BarakaWayFavorites.refreshNav==='function'){
      try{window.BarakaWayFavorites.refreshNav();}catch(e){}
    }
  }

  function itemId(x){
    return String((x && x.id) || ((x && x.url || '') + '::' + (x && x.title || '')));
  }

  function normalizeLang(lang){
    lang=String(lang||'').toLowerCase();
    if(lang==='kk') return 'kz';
    return lang || CURRENT_LANG;
  }

  function localizedUrl(url){
    url=String(url||'#');
    return url.replace(/(prophets-duas-)(ru|en|tr|uz|id|kz|kk|hi|bn|ur|ar)(\.html)/i,function(_,a,b,c){return a+CURRENT_LANG+c;});
  }

  function parseProphetsDuaId(id){
    var m=String(id||'').match(/(?:^|\/)prophets-duas-(ru|en|tr|uz|id|kz|kk|hi|bn|ur|ar)\.html::dua::(.+)$/i);
    return m?{sourceLang:normalizeLang(m[1]),duaId:m[2]}:null;
  }

  function localProphetsDuaGlobalId(duaId){
    return '/prophets-duas-'+CURRENT_LANG+'.html::dua::'+duaId;
  }

  function fetchProphetsPage(){
    var url='/prophets-duas-'+CURRENT_LANG+'.html';
    if(!pageCache[url]){
      pageCache[url]=fetch(url,{cache:'force-cache'}).then(function(r){
        if(!r.ok) throw new Error('Failed to load '+url);
        return r.text();
      }).then(function(html){
        return new DOMParser().parseFromString(html,'text/html');
      }).catch(function(){return null;});
    }
    return pageCache[url];
  }

  function pickText(root, selectors){
    for(var i=0;i<selectors.length;i++){
      var el=root.querySelector(selectors[i]);
      var text=el && el.textContent ? el.textContent.trim() : '';
      if(text) return text;
    }
    return '';
  }

  function resolveItem(x){
    var rawId=itemId(x);
    var parsed=parseProphetsDuaId(rawId);
    var fallback={
      id: rawId,
      removeId: rawId,
      url: localizedUrl(x && x.url || '#'),
      title: (x && x.title) || TEXT.fav,
      text: (x && (x.text || x.type)) || TEXT.savedMaterial,
      type: (x && x.type) || TEXT.savedMaterial
    };

    if(!parsed){
      return Promise.resolve(fallback);
    }

    fallback.id=localProphetsDuaGlobalId(parsed.duaId);
    fallback.url='/prophets-duas-'+CURRENT_LANG+'.html#'+parsed.duaId;
    fallback.type=TEXT.dua;

    return fetchProphetsPage().then(function(doc){
      if(!doc) return fallback;
      var selector='details.nested-dua[data-dua-id="'+CSS.escape(parsed.duaId)+'"]';
      var dua=doc.querySelector(selector);
      if(!dua) return fallback;
      var title=dua.getAttribute('data-dua-title') || pickText(dua,[
        ':scope > summary .dua-title',
        'summary .dua-title',
        '.dua-title'
      ]);
      var text=pickText(dua,[
        ':scope > .dua-body .dua-meaning',
        ':scope > .dua-body .dua-translit',
        ':scope > .dua-body .dua-arabic',
        '.dua-meaning',
        '.dua-translit',
        '.dua-arabic'
      ]);
      return {
        id:fallback.id,
        removeId:rawId,
        url:fallback.url,
        title:title || fallback.title,
        text:text || fallback.text,
        type:TEXT.dua
      };
    });
  }

  function updateCount(n){
    var count=document.getElementById('favoritesCount');
    if(count) count.textContent=n+' '+TEXT.saved;
  }

  function render(){
    var grid=document.getElementById('favoritesGrid');
    var empty=document.getElementById('favoritesEmpty');
    var clear=document.getElementById('favoritesClear');
    var list=read();
    if(!grid || !empty) return;

    updateCount(list.length);

    if(!list.length){
      empty.style.display='';
      if(clear) clear.classList.remove('is-visible');
      grid.innerHTML='';
      return;
    }

    empty.style.display='none';
    if(clear) clear.classList.add('is-visible');
    grid.innerHTML=list.map(function(x){
      var id=safe(itemId(x));
      var url=safe(localizedUrl(x && x.url || '#'));
      var title=safe((x && x.title) || TEXT.fav);
      var text=safe((x && (x.text || x.type)) || TEXT.savedMaterial);
      var type=safe((x && x.type) || TEXT.savedMaterial);
      return '<div class="card" data-id="'+id+'">'+
        '<button class="remove" type="button" data-remove-id="'+id+'" aria-label="'+safe(TEXT.remove)+'">×</button>'+
        '<button class="drag-handle" type="button" aria-label="Reorder"><span></span></button>'+
        '<a href="'+url+'" style="text-decoration:none;color:inherit;display:block">'+
        '<div class="icon">💛</div>'+
        '<div class="title">'+title+'</div>'+
        '<div class="text">'+text+'</div>'+
        '<span class="badge">'+type+'</span>'+
        '</a>'+
      '</div>';
    }).join('');

    Promise.all(list.map(resolveItem)).then(function(localized){
      var current=read();
      if(current.length!==list.length) return;
      grid.innerHTML=localized.map(function(x){
        var id=safe(x.removeId || x.id);
        return '<div class="card" data-id="'+id+'">'+
          '<button class="remove" type="button" data-remove-id="'+id+'" aria-label="'+safe(TEXT.remove)+'">×</button>'+
        '<button class="drag-handle" type="button" aria-label="Reorder"><span></span></button>'+
          '<a href="'+safe(x.url)+'" style="text-decoration:none;color:inherit;display:block">'+
          '<div class="icon">💛</div>'+
          '<div class="title">'+safe(x.title)+'</div>'+
          '<div class="text">'+safe(x.text)+'</div>'+
          '<span class="badge">'+safe(x.type)+'</span>'+
          '</a>'+
        '</div>';
      }).join('');
    });
  }

  var draggedCard=null;
  var draggedGrid=null;
  var dragStartY=0;
  var dragCurrentY=0;
  var dragPointerId=null;

  function persistOrderFromDom(){
    var grid=document.getElementById('favoritesGrid');
    if(!grid) return;
    var ids=[].slice.call(grid.querySelectorAll('.card[data-id]')).map(function(card){return card.getAttribute('data-id');}).filter(Boolean);
    if(!ids.length) return;
    var list=read();
    var byId={};
    list.forEach(function(x){byId[itemId(x)]=x;});
    var next=[];
    ids.forEach(function(id){if(byId[id]){next.push(byId[id]);delete byId[id];}});
    list.forEach(function(x){var id=itemId(x);if(byId[id]) next.push(x);});
    if(next.length===list.length) write(next);
  }

  function applyDragTransform(){
    if(!draggedCard) return;
    var dy=dragCurrentY-dragStartY;
    draggedCard.style.transform='translate3d(0,'+dy+'px,0) scale(.965)';
  }

  document.addEventListener('pointerdown',function(e){
    var handle=e.target && e.target.closest ? e.target.closest('.drag-handle') : null;
    if(!handle) return;
    var card=handle.closest('.card');
    var grid=handle.closest('#favoritesGrid');
    if(!card || !grid) return;
    e.preventDefault();
    e.stopPropagation();
    draggedCard=card;
    draggedGrid=grid;
    dragStartY=e.clientY;
    dragCurrentY=e.clientY;
    dragPointerId=e.pointerId;
    card.classList.add('is-dragging');
    applyDragTransform();
    try{handle.setPointerCapture(e.pointerId);}catch(err){}
  });

  function animateReorder(grid, mutator){
    var cards=[].slice.call(grid.querySelectorAll('.card'));
    var first=new Map();
    cards.forEach(function(card){first.set(card,card.getBoundingClientRect());});
    mutator();
    cards=[].slice.call(grid.querySelectorAll('.card'));
    cards.forEach(function(card){
      if(card===draggedCard) return;
      var before=first.get(card);
      if(!before) return;
      var after=card.getBoundingClientRect();
      var dx=before.left-after.left;
      var dy=before.top-after.top;
      if(!dx && !dy) return;
      card.classList.add('is-reorder-animating');
      card.style.transform='translate('+dx+'px,'+dy+'px)';
      card.getBoundingClientRect();
      card.style.transform='';
      window.setTimeout(function(){card.classList.remove('is-reorder-animating');},240);
    });
  }

  document.addEventListener('pointermove',function(e){
    if(!draggedCard || !draggedGrid) return;
    if(dragPointerId!==null && e.pointerId!==dragPointerId) return;
    e.preventDefault();
    dragCurrentY=e.clientY;
    applyDragTransform();

    var cards=[].slice.call(draggedGrid.querySelectorAll('.card')).filter(function(card){return card!==draggedCard;});
    var over=null;
    for(var i=0;i<cards.length;i++){
      var rect=cards[i].getBoundingClientRect();
      if(e.clientY>=rect.top && e.clientY<=rect.bottom){over=cards[i];break;}
    }
    if(!over) return;
    var rect=over.getBoundingClientRect();
    var before=e.clientY < rect.top + rect.height/2;
    animateReorder(draggedGrid,function(){
      draggedGrid.insertBefore(draggedCard,before ? over : over.nextSibling);
    });
    applyDragTransform();
  },{passive:false});

  document.addEventListener('pointerup',function(e){
    if(!draggedCard) return;
    if(dragPointerId!==null && e.pointerId!==dragPointerId) return;
    draggedCard.classList.remove('is-dragging');
    draggedCard.style.transform='';
    persistOrderFromDom();
    draggedCard=null;
    draggedGrid=null;
    dragPointerId=null;
    dragStartY=0;
    dragCurrentY=0;
  });

  document.addEventListener('pointercancel',function(e){
    if(draggedCard){
      draggedCard.classList.remove('is-dragging');
      draggedCard.style.transform='';
    }
    draggedCard=null;
    draggedGrid=null;
    dragPointerId=null;
    dragStartY=0;
    dragCurrentY=0;
  });

  document.addEventListener('click' ,function(e){
    var btn=e.target && e.target.closest ? e.target.closest('[data-remove-id]') : null;
    if(!btn)return;
    e.preventDefault();
    e.stopPropagation();
    var id=btn.getAttribute('data-remove-id');
    var next=read().filter(function(x){return itemId(x)!==id;});
    write(next);
    render();
  });

  var clearBtn=document.getElementById('favoritesClear');
  if(clearBtn){
    clearBtn.addEventListener('click',function(){write([]);render();});
  }

  document.addEventListener('barakaway:favorites:changed',render);
  render();
})();
</script><section class="grid"></section></main><script src="web-navigation.js?v=no-dua-force-20260616-2"></script>
