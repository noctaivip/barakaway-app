function shareApp(){
  const shareData = {
    title: "Hidden Sadaqa",
    text: "Hidden Sadaqa",
    url: window.location.origin ? window.location.origin + window.location.pathname : window.location.href
  };

  if (navigator.share) {
    navigator.share(shareData).catch(function(){});
    return;
  }

  if (navigator.clipboard && window.location.href) {
    navigator.clipboard.writeText(window.location.href).then(function(){
      alert("Ссылка на приложение скопирована.");
    }).catch(function(){
      prompt("Скопируй ссылку вручную:", window.location.href);
    });
    return;
  }

  prompt("Скопируй ссылку вручную:", window.location.href);
}

</script>

.mobile-top-controls{display:none;}

@media(max-width:700px){

  .mobile-top-controls{
    display:block;
    position:absolute;
    top:30px;
    left:0;
    right:0;
    z-index:1000;
    pointer-events:none;
  }

  .icon-btn{
    position:absolute;
    width:46px;
    height:46px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.34);
    background:rgba(255,255,255,0.58);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    box-shadow:
      0 10px 24px rgba(18,34,24,0.10),
      inset 0 1px 0 rgba(255,255,255,0.42);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
    cursor:pointer;
    overflow:hidden;
    pointer-events:auto;
  }

  .icon-btn.left{left:12px;}
  .icon-btn.right{right:12px;}

  .icon-btn svg{
    width:22px;
    height:22px;
    fill:#2d7a46;
    position:relative;
    z-index:2;
  }

  .icon-btn .ripple{
    position:absolute;
    inset:0;
    border-radius:50%;
    transform:scale(0);
    background:radial-gradient(circle, rgba(45,122,70,0.22) 0%, rgba(45,122,70,0.10) 38%, rgba(45,122,70,0.00) 70%);
    opacity:0;
    z-index:1;
  }

  .icon-btn:active .ripple{
    animation:mobileRipple .42s ease-out;
  }

  @keyframes mobileRipple{
    0%{
      transform:scale(0.15);
      opacity:1;
    }
    100%{
      transform:scale(2.2);
      opacity:0;
    }
  }

  .icon-btn:active{
    transform:scale(0.96);
  }

  .lang-change,
  .install-box{
    display:none;
  }

  .container{
    padding-top:94px;
  }
}
