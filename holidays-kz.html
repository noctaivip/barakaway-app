function cleanPersonalName(value){
  return String(value||"")
    .replace(/[<>]/g,"")
    .replace(/\s+/g," ")
    .trim()
    .slice(0,42);
}
function formatPersonalText(name,text){
  const safeName=cleanPersonalName(name);
  const body=String(text||"").trim();
  if(!safeName)return body;
  return safeName+", "+body;
}
function getPersonalHistory(key){
  try{
    const data=JSON.parse(localStorage.getItem(key)||"[]");
    return Array.isArray(data)?data:[];
  }catch(e){return [];}
}
function savePersonalHistory(key,value,limit){
  const history=getPersonalHistory(key).filter(function(item){return item!==value;});
  history.unshift(value);
  localStorage.setItem(key,JSON.stringify(history.slice(0,limit)));
}
function pickPersonalOption(category,type,list,currentValue,limit){
  if(!Array.isArray(list)||!list.length)return "";
  const key="barakaway_personal_"+type+"_history_"+category;
  const history=getPersonalHistory(key);
  let available=list.filter(function(item){return item!==currentValue&&history.indexOf(item)===-1;});
  if(!available.length)available=list.filter(function(item){return item!==currentValue;});
  if(!available.length)available=list.slice();
  const selected=available[Math.floor(Math.random()*available.length)]||list[0]||"";
  savePersonalHistory(key,selected,limit);
  return selected;
}
function selectPersonalHeadline(category,currentValue){
  const tpl=personalizedTemplates[category]||personalizedTemplates.jumuah;
  return pickPersonalOption(category,"headline",tpl.headlines||[tpl.title],currentValue||"",20)||tpl.title;
}
function buildPersonalText(category,name,currentSignature){
  const tpl=personalizedTemplates[category]||personalizedTemplates.jumuah;
  const openings=tpl.openings||[];
  const blessings=tpl.blessings||[];
  const closings=tpl.closings||[];
  const totalCombos=openings.length*blessings.length*closings.length;
  if(!totalCombos)return formatPersonalText(name,"Алла бұл күнді нұрға, тыныштыққа және баракатқа толтырсын.");
  const key="barakaway_personal_combo_history_"+category;
  const history=getPersonalHistory(key);
  let selected=null;
  for(let attempt=0;attempt<80;attempt++){
    const oi=Math.floor(Math.random()*openings.length);
    const bi=Math.floor(Math.random()*blessings.length);
    const ci=Math.floor(Math.random()*closings.length);
    const signature=oi+"-"+bi+"-"+ci;
    if(signature!==currentSignature&&history.indexOf(signature)===-1){
      selected={signature:signature,text:openings[oi]+". "+blessings[bi]+" "+closings[ci]};
      break;
    }
  }
  if(!selected){
    const oi=Math.floor(Math.random()*openings.length);
    const bi=Math.floor(Math.random()*blessings.length);
    const ci=Math.floor(Math.random()*closings.length);
    selected={signature:oi+"-"+bi+"-"+ci,text:openings[oi]+". "+blessings[bi]+" "+closings[ci]};
  }
  savePersonalHistory(key,selected.signature,40);
  return {text:formatPersonalText(name,selected.text),signature:selected.signature,total:totalCombos};
}

function getGreetingThemeAccent(){
  const premiumTheme=(localStorage.getItem("barakaway_premium_theme")||"").toLowerCase().trim();
  const explicitTheme=(document.documentElement.getAttribute("data-theme")||document.body.getAttribute("data-theme")||"").toLowerCase().trim();
  const theme=(premiumTheme&&premiumTheme!=="free"&&premiumTheme!=="default")?premiumTheme:explicitTheme;

  if(theme.includes("purple")||theme.includes("violet")||theme.includes("фиолет"))return "#7c3aed";
  if(theme.includes("red")||theme.includes("ruby")||theme.includes("красн"))return "#dc2626";
  if(theme.includes("gold")||theme.includes("золот"))return "#d7b56d";

  /* Free/default BarakaWay theme: use the same dark-green accent as Home */
  return "#2d7a46";
}
function updateGreetingFieldTheme(){
  document.documentElement.style.setProperty("--bw-theme-accent",getGreetingThemeAccent());
}
function syncAudienceNameField(){
  const audienceEl=document.getElementById("generatorAudience");
  const nameEl=document.getElementById("generatorName");
  if(!audienceEl||!nameEl)return;
  const isIndividual=(audienceEl.value||"individual")==="individual";
  nameEl.disabled=!isIndividual;
  nameEl.required=isIndividual;
  nameEl.placeholder=isIndividual?"Recipient name":"No name needed for group greeting";
  if(!isIndividual){
    nameEl.value="";
    localStorage.removeItem("barakaway_greeting_name");
  }
}
function initAudienceNameLogic(){
  updateGreetingFieldTheme();
  const audienceEl=document.getElementById("generatorAudience");
  if(audienceEl&&!audienceEl.dataset.nameLogicReady){
    audienceEl.dataset.nameLogicReady="1";
    audienceEl.addEventListener("change",function(){saveAudience();syncAudienceNameField();});
  }
  syncAudienceNameField();
  setTimeout(updateGreetingFieldTheme,300);
  setTimeout(updateGreetingFieldTheme,1000);
}

function audienceLabelForText(audience,name){
  const clean=cleanPersonalName(name||"");
  if(audience==="individual")return clean;
  const el=document.getElementById("generatorAudience");
  if(el&&el.selectedOptions&&el.selectedOptions[0])return (el.selectedOptions[0].textContent||"").trim();
  const labels={team:"Команда",employees:"Сотрудники",relatives:"Родные",colleagues:"Коллеги",partners:"Партнёры",collective:"Коллектив","all-muslims":"Всех мусульман"};
  return labels[audience]||"";
}
function adaptTextForAudience(text,audience){
  if(audience==="individual")return String(text||"");
  let t=String(text||"");
  t=t.replace(/tu/gi,"ustedes").replace(/te/gi,"les");
  t=t.replace(/you/g,"you all").replace(/Your/g,"Your").replace(/your heart/gi,"your hearts").replace(/your soul/gi,"your souls");
  t=t.replace(/тебя/gi,"вас").replace(/тебе/gi,"вам").replace(/твой/gi,"ваш").replace(/твоя/gi,"ваша").replace(/твое/gi,"ваше").replace(/твои/gi,"ваши");
  t=t.replace(/seni/gi,"sizleri").replace(/sana/gi,"sizlere").replace(/senin/gi,"sizlerin");
  t=t.replace(/kamu/gi,"kalian").replace(/hatimu/gi,"hati kalian");
  return t;
}
function groupGreetingOpening(audience,label){
  const openings={
    "team":"Бүкіл команданы құттықтаймын.",
    "employees":"Барлық қызметкерлерді құттықтаймын.",

    "all-muslims":"Барлық мұсылмандарды құттықтаймын.",
  };
  return openings[audience]||"";
}
function formatPersonalTextForAudience(name,text){
  const audience=getGeneratorAudience();
  if(audience==="individual"){
    if(typeof formatPersonalTextWithName==="function")return formatPersonalTextWithName(name,text);
    if(typeof withPersonalName==="function")return withPersonalName(name,text);
    if(typeof withNamePrefix==="function")return withNamePrefix(name,text);
    const clean=cleanPersonalName(name||"");
    return clean?clean+", "+text:text;
  }
  const label=audienceLabelForText(audience,"");
  const body=adaptTextForAudience(text,audience).replace(/^\s+/,"");
  const opening=groupGreetingOpening(audience,label);
  if(!opening)return body;
  return opening+" "+body.charAt(0).toUpperCase()+body.slice(1);
}

}

function renderCards(filter){const root=document.getElementById("cards");if(!root)return;const list=orderedGreetings().filter(function(item){return filter==="all"||item.category===filter;});
function esc(value){return String(value==null?"":value).replace(/[&<>"']/g,function(ch){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch];});}
function attr(value){return esc(value);}
root.innerHTML=list.map(function(item){return `<article class="greeting-card" data-category="${attr(item.category)}"><div class="card-art" onclick="openCard('${attr(item.id)}')"><img class="card-image" src="${attr(item.image)}" alt="${attr(item.title)}" loading="lazy"><div class="card-image-overlay"></div><div class="card-brand-badge"><img src="${attr(LOGO_PATH)}" alt="BarakaWay" loading="lazy"></div><div class="card-category-badge">${esc(item.label)}</div><div class="card-site-mark">barakaway.app</div></div><div class="card-body"><h3 class="card-title">${esc(item.title)}</h3><p class="card-text">${esc(item.text)}</p></div><div class="card-actions"><button class="action-btn" type="button" onclick="openCard('${attr(item.id)}')">Ашу</button><button class="action-btn" type="button" onclick="shareCard('${attr(item.id)}')">Бөлісу</button><button class="action-btn" type="button" onclick="copyCard('${attr(item.id)}')">Көшіру</button></div></article>`;}).join("");}

function generatePersonal(){initAudienceNameLogic();const audience=getGeneratorAudience();const nameInput=document.getElementById("generatorName");let name=cleanPersonalName((nameInput&&audience==="individual")?nameInput.value||"":"");if(audience==="individual"&&!name){if(nameInput){nameInput.focus();nameInput.classList.add("field-error");setTimeout(()=>nameInput.classList.remove("field-error"),900);}alert("Please enter the recipient name for a personal greeting.");return;}saveName();const cat=document.getElementById("generatorCategory").value;
const tpl=personalizedTemplates[cat]||personalizedTemplates.jumuah;
const personalText=selectPersonalText(cat,personalName);
currentGreeting={
id:"personal",
category:cat,
label:tpl.label,
title:tpl.title,
headline:selectPersonalHeadline(cat),
text:personalText.text,
personalSignature:personalText.signature,

};
openModal(currentGreeting);
}

const personalName=cleanPersonalName(currentGreeting.personalName||(document.getElementById("generatorName").value||""));
const tpl=personalizedTemplates[currentCategory]||personalizedTemplates.jumuah;

image=getNextPersonalImage();
}
currentGreeting={

label:tpl.label,
title:tpl.title,
headline:selectPersonalHeadline(currentCategory,currentGreeting.headline),
text:personalText.text,
personalSignature:personalText.signature,

}
showToast("Алдымен жеке карточка жасаңыз");
}
function openTodayCard(){currentGreeting=getTodayGreeting();openModal(currentGreeting);}
function openCard(id){currentGreeting=findGreeting(id);openModal(currentGreeting);}
function copyCard(id){copyText(formatShareText(findGreeting(id)));}
function shareCard(id){currentGreeting=findGreeting(id);requestShareConfirmation(currentGreeting);}
function formatShareText(g){return "BarakaWay — күн сайын Аллаға бір қадам жақын.\nbarakaway.app";}

function wrapCanvasText(ctx,text,x,y,maxWidth,lineHeight,maxLines){const words=String(text||"").split(/\s+/);let line="",lines=[];for(let i=0;i<words.length;i++){const test=line+words[i]+" ";if(ctx.measureText(test).width>maxWidth&&i>0){lines.push(line.trim());line=words[i]+" ";}else{line=test;}}if(line.trim())lines.push(line.trim());if(maxLines&&lines.length>maxLines){lines=lines.slice(0,maxLines);lines[lines.length-1]=lines[lines.length-1].replace(/[.,;:!?]*$/,"")+"…";}lines.forEach(function(l,i){ctx.fillText(l,x,y+i*lineHeight);});}

function getWrappedCanvasLines(ctx,text,maxWidth){
const words=String(text||"").trim().split(/\s+/).filter(Boolean);
let line="",lines=[];
for(let i=0;i<words.length;i++){
const test=line?line+" "+words[i]:words[i];
if(ctx.measureText(test).width>maxWidth&&line){
lines.push(line);
line=words[i];
}else{
line=test;
}
}
if(line)lines.push(line);
return lines;
}
function drawFittedCanvasText(ctx,text,x,top,maxWidth,maxHeight,options){
const opts=options||{};
let fontSize=opts.maxFontSize||43;
const minFontSize=opts.minFontSize||27;
const weight=opts.weight||"700";
const family=opts.family||"system-ui, Arial";
let lines=[],lineHeight=0,totalHeight=0;
while(fontSize>=minFontSize){
lineHeight=Math.round(fontSize*1.38);
ctx.font=weight+" "+fontSize+"px "+family;
lines=getWrappedCanvasLines(ctx,text,maxWidth);
totalHeight=lines.length*lineHeight;
if(totalHeight<=maxHeight)break;
fontSize-=2;
}
if(totalHeight>maxHeight){
lineHeight=Math.max(30,Math.floor(maxHeight/Math.max(lines.length,1)));
}
const startY=top+Math.max(0,(maxHeight-totalHeight)/2)+fontSize;
lines.forEach(function(line,index){
ctx.fillText(line,x,startY+index*lineHeight);
});
return {fontSize:fontSize,lines:lines.length,totalHeight:totalHeight};
}


function getLocalizedSalamGreeting(){
  const lang=(document.documentElement.getAttribute("lang")||"en").toLowerCase();
  const map={
    ru:"Ассаламу алейкум ва рахматуллахи ва баракатуху",
    en:"Assalamu alaikum wa rahmatullahi wa barakatuh",
    tr:"Esselamu aleyküm ve rahmetullahi ve berekatüh",
    id:"Assalamu’alaikum warahmatullahi wabarakatuh",
    uz:"Assalomu alaykum va rahmatullohi va barokatuh",
    kk:"Ассаламу алейкум уа рахматуллахи уа баракатуху",
    hi:"अस्सलामु अलैकुम व रहमतुल्लाहि व बरकातुहू",
    bn:"আসসালামু আলাইকুম ওয়া রহমাতুল্লাহি ওয়া বারাকাতুহু",
    ur:"السلام علیکم ورحمۃ اللہ وبرکاتہ",
    ar:"السلام عليكم ورحمة الله وبركاته"
  };
  return map[lang]||map.en;
}
function drawSalamGreetingLine(ctx,text,x,top,maxWidth){
  ctx.save();
  ctx.textAlign="center";
  ctx.textBaseline="alphabetic";
  ctx.shadowColor="rgba(0,0,0,.90)";
  ctx.shadowBlur=14;
  ctx.fillStyle="#fff4c2";
  drawFittedCanvasText(ctx,text,x,top,maxWidth,52,{maxFontSize:34,minFontSize:24,weight:"850",family:"Georgia, 'Times New Roman', system-ui, serif"});
  ctx.restore();
}

function drawRoundRect(ctx,x,y,w,h,r){const radius=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+radius,y);ctx.arcTo(x+w,y,x+w,y+h,radius);ctx.arcTo(x+w,y+h,x,y+h,radius);ctx.arcTo(x,y+h,x,y,radius);ctx.arcTo(x,y,x+w,y,radius);ctx.closePath();}
function loadCanvasImage(src){return new Promise(function(resolve,reject){const img=new Image();img.onload=function(){resolve(img)};img.onerror=reject;img.src=src;});}
function getAverageLuminance(ctx,x,y,w,h){
try{
const data=ctx.getImageData(x,y,w,h).data;
let total=0,count=0;
for(let i=0;i<data.length;i+=16){
const r=data[i],g=data[i+1],b=data[i+2];
total+=(0.2126*r+0.7152*g+0.0722*b);
count++;
}
return count?total/count:80;
}catch(e){return 80;}
}
function getPersonalTextStyle(ctx,w,h){
const lum=getAverageLuminance(ctx,Math.round(w*0.18),Math.round(h*0.33),Math.round(w*0.64),Math.round(h*0.32));
if(lum>175){
return {panel:"rgba(0,0,0,.68)",text:"#ffffff",shadow:"rgba(0,0,0,.92)",blur:16};
}
if(lum<82){
return {panel:"rgba(0,0,0,.68)",text:"#fff8e8",shadow:"rgba(0,0,0,.92)",blur:20};
}
return {panel:"rgba(0,0,0,.66)",text:"#f3d992",shadow:"rgba(0,0,0,.90)",blur:18};
}
async function drawImageCardToCanvas(g){const canvas=document.getElementById("previewCanvas");const ctx=canvas.getContext("2d");const w=canvas.width,h=canvas.height;ctx.clearRect(0,0,w,h);ctx.fillStyle="#0c120e";ctx.fillRect(0,0,w,h);try{const img=await loadCanvasImage(g.image);const scale=Math.max(w/img.width,h/img.height);const sw=w/scale,sh=h/scale;const sx=(img.width-sw)/2,sy=(img.height-sh)/2;ctx.drawImage(img,sx,sy,sw,sh,0,0,w,h);}catch(e){const grad=ctx.createLinearGradient(0,0,w,h);grad.addColorStop(0,"#082216");grad.addColorStop(.5,"#1e6c42");grad.addColorStop(1,"#d7b56d");ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);}
const bottom=ctx.createLinearGradient(0,h*.76,0,h);bottom.addColorStop(0,"rgba(0,0,0,0)");bottom.addColorStop(.78,"rgba(0,0,0,.46)");bottom.addColorStop(1,"rgba(0,0,0,.62)");ctx.fillStyle=bottom;ctx.fillRect(0,0,w,h);
ctx.strokeStyle="rgba(243,217,146,.78)";ctx.lineWidth=7;drawRoundRect(ctx,34,34,w-68,h-68,36);ctx.stroke();
try{const logo=await loadCanvasImage(LOGO_PATH);ctx.save();const logoX=(w-112)/2;drawRoundRect(ctx,logoX,58,112,112,30);ctx.clip();ctx.drawImage(logo,logoX,58,112,112);ctx.restore();ctx.strokeStyle="rgba(243,217,146,.70)";ctx.lineWidth=3;drawRoundRect(ctx,logoX,58,112,112,30);ctx.stroke();}catch(e){}
ctx.textAlign="center";ctx.textBaseline="alphabetic";
if(g.id==="personal"){
const style=getPersonalTextStyle(ctx,w,h);
ctx.save();
const panelX=88,panelY=320,panelW=w-176,panelH=610;
ctx.fillStyle=style.panel;
drawRoundRect(ctx,panelX,panelY,panelW,panelH,38);
ctx.fill();
ctx.shadowColor=style.shadow;
ctx.shadowBlur=style.blur;
ctx.fillStyle="#f3d992";
drawFittedCanvasText(ctx,g.headline||g.title,w/2,panelY+52,panelW-170,142,{maxFontSize:72,minFontSize:46,weight:"900",family:"Georgia, 'Times New Roman', serif"});
ctx.strokeStyle="rgba(243,217,146,.58)";
ctx.lineWidth=3;
ctx.beginPath();
ctx.moveTo(panelX+132,panelY+225);
ctx.lineTo(panelX+panelW-132,panelY+225);
ctx.stroke();
drawSalamGreetingLine(ctx,getLocalizedSalamGreeting(),w/2,panelY+242,panelW-170);
ctx.strokeStyle="rgba(243,217,146,.38)";
ctx.lineWidth=2;
ctx.beginPath();
ctx.moveTo(panelX+172,panelY+306);
ctx.lineTo(panelX+panelW-172,panelY+306);
ctx.stroke();
ctx.fillStyle=style.text;
drawFittedCanvasText(ctx,g.text,w/2,panelY+332,panelW-170,panelH-386,{maxFontSize:41,minFontSize:27,weight:"700",family:"system-ui, Arial"});
ctx.restore();
}
ctx.fillStyle="rgba(255,238,190,.96)";ctx.font="800 30px system-ui, Arial";ctx.fillText("BarakaWay қосымшасы",w/2,h-92);ctx.fillStyle="rgba(255,238,190,.82)";ctx.font="650 25px system-ui, Arial";ctx.fillText("BarakaWay — күн сайын Аллаға бір қадам жақын.\nbarakaway.app",w/2,h-54);return canvas;}
async function openModal(g){currentGreeting=g;await drawImageCardToCanvas(g);document.getElementById("modal").classList.add("open");document.getElementById("modal").setAttribute("aria-hidden","false");}
function closeModal(){document.getElementById("modal").classList.remove("open");document.getElementById("modal").setAttribute("aria-hidden","true");}
function canvasToBlob(canvas){return new Promise(function(resolve){canvas.toBlob(function(blob){resolve(blob);},"image/png",.96);});}


const SHARE_CONFIRM_TEXT={"confirm": "Растаймын", "cancel": "Бас тарту", "title": "Құттықтауды жіберуді растаңыз", "dailyTitle": "Күнделікті құттықтауды жіберуді растаңыз", "body": "Сіз мына құттықтауды жібергелі тұрсыз: {category}. Жібермес бұрын таңдалған ашықхатты тексеріңіз.", "dailyBody": "Сіз күнделікті құттықтауды жібергелі тұрсыз. Жібермес бұрын таңдалған ашықхатты тексеріңіз.", "category": "Санат"};
function getShareConfirmCategory(g){
  if(!g)return "";
  return g.label||g.title||"";
}
function getShareConfirmTitle(g){
  if(g&&g.category==="daily")return SHARE_CONFIRM_TEXT.dailyTitle;
  return SHARE_CONFIRM_TEXT.title;
}
function getShareConfirmBody(g){
  const category=getShareConfirmCategory(g);
  if(g&&g.category==="daily")return SHARE_CONFIRM_TEXT.dailyBody;
  return SHARE_CONFIRM_TEXT.body.replace("{category}",category);
}
function requestShareConfirmation(g){
  if(g)currentGreeting=g;
  const modal=document.getElementById("shareConfirmModal");
  if(!modal){confirmedShareCurrent();return;}
  document.getElementById("shareConfirmTitle").textContent=getShareConfirmTitle(currentGreeting);
  document.getElementById("shareConfirmCategory").textContent=SHARE_CONFIRM_TEXT.category+": "+getShareConfirmCategory(currentGreeting);
  document.getElementById("shareConfirmBody").textContent=getShareConfirmBody(currentGreeting);
  document.getElementById("shareConfirmCancel").textContent=SHARE_CONFIRM_TEXT.cancel;
  document.getElementById("shareConfirmOk").textContent=SHARE_CONFIRM_TEXT.confirm;
  modal.classList.add("open");
  modal.setAttribute("aria-hidden","false");
}
function closeShareConfirm(){
  const modal=document.getElementById("shareConfirmModal");
  if(!modal)return;
  modal.classList.remove("open");
  modal.setAttribute("aria-hidden","true");
}
function confirmShareNow(){
  closeShareConfirm();
  confirmedShareCurrent();
}

async function confirmedShareCurrent(){
const canvas=await drawImageCardToCanvas(currentGreeting);
const text=formatShareText(currentGreeting);
try{
const blob=await canvasToBlob(canvas);
const file=new File([blob],"barakaway-greeting.png",{type:"image/png"});
if(navigator.canShare&&navigator.canShare({files:[file]})){
await navigator.share({title:currentGreeting.title,text:text,files:[file]});
return;
}
if(navigator.share){
await navigator.share({title:currentGreeting.title,text:text});
return;
}
}catch(e){}
showToast("Бұл құрылғыда бөлісу қолжетімді емес");
}

function copyCurrent(){copyText(formatShareText(currentGreeting));}
function copyText(text){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){showToast("Мәтін көшірілді");}).catch(function(){fallbackCopy(text);});}else{fallbackCopy(text);}}
function fallbackCopy(text){const area=document.createElement("textarea");area.value=text;document.body.appendChild(area);area.select();document.execCommand("copy");area.remove();showToast("Мәтін көшірілді");}
async function downloadCurrent(){const canvas=await drawImageCardToCanvas(currentGreeting);const a=document.createElement("a");a.href=canvas.toDataURL("image/png");a.download="barakaway-greeting.png";document.body.appendChild(a);a.click();a.remove();}
function showToast(message){const toast=document.getElementById("toast");toast.textContent=message;toast.classList.add("show");setTimeout(function(){toast.classList.remove("show");},1800);}
document.addEventListener("DOMContentLoaded",function(){loadName();updateToday();renderCards("jumuah");document.getElementById("generatorName").addEventListener("input",saveName);document.querySelectorAll(".tab").forEach(function(btn){btn.addEventListener("click",function(){document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("active");});btn.classList.add("active");renderCards(btn.getAttribute("data-filter"));});});document.getElementById("modal").addEventListener("click",function(e){if(e.target.id==="modal")closeModal();});const scm=document.getElementById("shareConfirmModal");if(scm){scm.addEventListener("click",function(e){if(e.target.id==="shareConfirmModal")closeShareConfirm();});}});
</script>
